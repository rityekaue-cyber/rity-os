// ─── CLOUD DB (localStorage + Supabase sync) ─────────────────
const SUPA_URL_LS='__supa_url__';
const SUPA_KEY_LS='__supa_key__';
let _sc=null; // supabase client
let _syncCBs=[];
let _syncSt='idle';

const Sync={
  onStatus(fn){_syncCBs.push(fn);},
  _emit(s){_syncSt=s;_syncCBs.forEach(fn=>fn(s));},
  isOk(){return _sc!==null;},
  isConfigured(){return !!(localStorage.getItem(SUPA_URL_LS)&&localStorage.getItem(SUPA_KEY_LS));},
  getCfg(){return{url:localStorage.getItem(SUPA_URL_LS)||'',key:localStorage.getItem(SUPA_KEY_LS)||''};},
  saveCfg(url,key){localStorage.setItem(SUPA_URL_LS,url.trim());localStorage.setItem(SUPA_KEY_LS,key.trim());},
  async init(){
    if(!this.isConfigured())return false;
    if(typeof window.supabase==='undefined'){this._emit('offline');return false;}
    try{
      const{url,key}=this.getCfg();
      _sc=window.supabase.createClient(url,key);
      this._emit('syncing');
      const{data,error}=await _sc.from('rity_os').select('key,value');
      if(error)throw error;
      // Mesclar dados da nuvem no localStorage (nuvem vence se mais recente)
      (data||[]).forEach(r=>{
        try{localStorage.setItem(r.key,JSON.stringify(r.value));}catch{}
      });
      this._emit('ok');
      return true;
    }catch(e){console.warn('Sync:',e.message);_sc=null;this._emit('error');return false;}
  },
  push(k,v){
    if(!_sc)return;
    _sc.from('rity_os').upsert({key:k,value:v,updated_at:new Date().toISOString()},{onConflict:'key'})
      .then(({error})=>{if(!error)this._emit('ok');else this._emit('error');})
      .catch(()=>this._emit('error'));
    this._emit('syncing');
  }
};

const lsGet=(k,def=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch{return def;}};
const lsSet=(k,v)=>{
  try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  Sync.push(k,v); // sync em background, não bloqueia
};

// ─── API CLAUDE ───────────────────────────────────────────────
const ANTHR_KEY_LS='__anthr_key__';
const getAK=()=>localStorage.getItem(ANTHR_KEY_LS)||'';
const setAK=v=>localStorage.setItem(ANTHR_KEY_LS,v.trim());

async function chamarClaude(systemPrompt,msgs,maxTokens=800){
  const k=getAK();
  if(!k)throw new Error('Chave da IA não configurada. Vá em ⚙️ → IA para configurar.');
  const headers={'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  if(k.startsWith('sk-ant'))headers['x-api-key']=k;
  else headers['Authorization']=`Bearer ${k}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers,
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system:systemPrompt,messages:msgs})
  });
  if(!res.ok){const err=await res.text();throw new Error(`API ${res.status}: ${err.slice(0,200)}`);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||'Erro da API');
  return data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'';
}

// ─── POMODORO ────────────────────────────────────────────────
function beep(tipo){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notas=tipo==='pausa'?[[660,0,.2],[660,.25,.2]]:[[880,0,.15],[1108,.18,.15],[1320,.36,.25]];
    notas.forEach(([f,d,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+d+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+dur+.05);
    });
  }catch(e){}
}

function Pomodoro({cor,onFase}){
  const c=cor||'#fbbf24';
  const FASES=[{l:'1ª METADE',d:45*60,e:'📖'},{l:'PAUSA',d:10*60,e:'🚶'},{l:'2ª METADE',d:45*60,e:'✏️'}];
  const[fase,setFase]=useState(0);
  const[secs,setSecs]=useState(FASES[0].d);
  const[rodando,setRodando]=useState(false);
  const[feito,setFeito]=useState(false);
  const endRef=useRef(null);
  const timerRef=useRef(null);
  const disparouRef=useRef(false);
  const cur=FASES[fase];

  const limparTimer=()=>{clearInterval(timerRef.current);timerRef.current=null;};

  useEffect(()=>{
    if(!rodando){limparTimer();return;}
    disparouRef.current=false;
    timerRef.current=setInterval(()=>{
      const r=Math.max(0,Math.round((endRef.current-Date.now())/1000));
      setSecs(r);
      if(r===0&&!disparouRef.current){
        disparouRef.current=true;
        limparTimer();
        setRodando(false);
        setFeito(true);
        beep(fase===1?'pausa':'done');
        if(fase!==1&&onFase)onFase(45);
      }
    },400);
    return limparTimer;
  },[rodando,fase]);

  const iniciar=()=>{endRef.current=Date.now()+secs*1000;setRodando(true);setFeito(false);disparouRef.current=false;};
  const pausar=()=>{limparTimer();setSecs(Math.max(0,Math.round((endRef.current-Date.now())/1000)));endRef.current=null;setRodando(false);};
  const proxFase=()=>{limparTimer();const n=(fase+1)%3;setFase(n);setSecs(FASES[n].d);setRodando(false);setFeito(false);disparouRef.current=false;};
  const irFase=i=>{limparTimer();setFase(i);setSecs(FASES[i].d);setRodando(false);setFeito(false);};
  const reiniciar=()=>{limparTimer();setSecs(cur.d);setRodando(false);setFeito(false);};

  const mm=Math.floor(secs/60);const ss_=secs%60;
  const pct=Math.max(0,Math.min(1,1-secs/cur.d));
  const r=40;const circ=2*Math.PI*r;
  return(
    <div style={{padding:'13px',borderRadius:13,background:`${c}08`,border:`1px solid ${c}22`,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:4}}>
        <span style={{fontSize:9,letterSpacing:'2px',color:c,fontFamily:"'DM Mono',monospace",fontWeight:800}}>⏱ POMODORO 45·10·45</span>
        <div style={{display:'flex',gap:4}}>
          {FASES.map((f,i)=>(
            <button key={i} onClick={()=>irFase(i)} style={{padding:'2px 7px',borderRadius:4,cursor:'pointer',fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:700,background:fase===i?`${c}22`:'transparent',color:fase===i?c:'#334155',border:`1px solid ${fase===i?c+'44':'rgba(255,255,255,.06)'}`,transition:'all .15s'}}>
              {f.e} {f.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{position:'relative',width:88,height:88,flexShrink:0}}>
          <svg width="88" height="88" style={{transform:'rotate(-90deg)'}}>
            <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5"/>
            <circle cx="44" cy="44" r={r} fill="none" stroke={feito?'#34d399':c} strokeWidth="5"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
              style={{transition:'stroke-dashoffset .4s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:19,fontWeight:900,fontFamily:"'DM Mono',monospace",color:feito?'#34d399':rodando?'#fff':c,lineHeight:1}}>{pad(mm)}:{pad(ss_)}</div>
            <div style={{fontSize:8,color:'#334155',marginTop:1}}>{Math.round(pct*100)}%</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:feito?'#34d399':'#c8d0e0',marginBottom:10}}>
            {feito?`✅ ${cur.l} concluída!`:rodando?`${cur.e} ${cur.l}...`:cur.l}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {feito?(
              <button onClick={proxFase} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#34d399,#34d399)',color:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {fase<2?'PRÓXIMA →':'🏆 FEITO'}
              </button>
            ):(
              <button onClick={rodando?pausar:iniciar} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:rodando?`${c}18`:`linear-gradient(135deg,${c},${c})`,color:rodando?c:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {rodando?'⏸ PAUSAR':'▶ INICIAR'}
              </button>
            )}
            <button onClick={reiniciar} style={{padding:'8px 10px',borderRadius:8,border:`1px solid ${c}30`,background:'transparent',color:c,fontSize:11,cursor:'pointer'}}>↺</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Componente auxiliar para adicionar tempo manual (sem hooks problemáticos)
function AddTempoManual({onAdd}){
  const[mat,setMat]=useState('');
  const[min,setMin]=useState('');
  const[salvo,setSalvo]=useState(false);
  const add=()=>{
    const m=parseInt(min);
    if(!mat.trim()||!m||m<=0)return;
    onAdd({mat:mat.trim(),min:m,dt:Date.now()});
    setMat('');setMin('');
    setSalvo(true);setTimeout(()=>setSalvo(false),2000);
  };
  return(
    <div style={{display:'flex',gap:8}}>
      <input value={mat} onChange={e=>setMat(e.target.value)} placeholder="Matéria..." style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#c8d0e0',fontSize:12,outline:'none'}}/>
      <input type="number" value={min} onChange={e=>setMin(e.target.value)} placeholder="min" style={{width:65,padding:'8px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#fbbf24',fontSize:13,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
      <button onClick={add} disabled={!mat.trim()||!min} style={{padding:'8px 14px',borderRadius:8,border:'none',background:mat.trim()&&min?'#fbbf24':'rgba(255,255,255,.05)',color:mat.trim()&&min?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>{salvo?'✅':'+'}  </button>
    </div>
  );
}

function Estrelas({val,onChange}){
  const CORS_DIF=['#34d399','#a3e635','#fbbf24','#fb923c','#f87171'];
  return(
    <div style={{display:'flex',gap:3}}>
      {[1,2,3,4,5].map(s=>(
        <button key={s} onClick={()=>onChange(s)} style={{flex:1,padding:'7px 3px',borderRadius:6,border:`1px solid ${val>=s?CORS_DIF[s-1]:'rgba(255,255,255,.08)'}`,background:val>=s?`${CORS_DIF[s-1]}22`:'rgba(255,255,255,.02)',fontSize:13,cursor:'pointer',transition:'all .1s'}}>⭐</button>
      ))}
    </div>
  );
}

  const[ankiRegs,setAnkiRegs]=useState(()=>lsGet('rev_anki',[]));
  const[nlmRegs,setNlmRegs]=useState(()=>lsGet('rev_nlm',[]));
  const[rev1h30Regs,setRev1h30Regs]=useState(()=>lsGet('rev_1h30',[]));

  // Formulário Anki — lista dinâmica de matérias
  const[ankiItens,setAnkiItens]=useState([{mat:'',profundo:'',leve:'',dif:0}]);
  const[ankiSalvo,setAnkiSalvo]=useState(false);

  // Formulário NLM
  const[nlmForm,setNlmForm]=useState({mat:'',oque:'',tempo:'',qtd:'',dif:0});
  const[nlmSalvo,setNlmSalvo]=useState(false);

  // Formulário 1h30 — 3 slots
  const[slots,setSlots]=useState([
    {mat:'',oque:'',qtd:'',dif:0},
    {mat:'',oque:'',qtd:'',dif:0},
    {mat:'',oque:'',qtd:'',dif:0},
  ]);
  const[slotSalvo,setSlotSalvo]=useState(false);

  // Tempo morto feito
  const[tmFeitoAnki,setTmFeitoAnki]=useState(()=>lsGet(`tm_anki_${hoje}`,false));
  const[tmFeitoNlm,setTmFeitoNlm]=useState(()=>lsGet(`tm_nlm_${hoje}`,false));

  const MATS=CICLO.map(c=>c.mat).filter((v,i,a)=>a.indexOf(v)===i);
  const CORS_DIF=['#34d399','#a3e635','#fbbf24','#fb923c','#f87171'];
  const LABELS_DIF=['FÁCIL','TRANQUILO','MÉDIO','DIFÍCIL','MUITO DIFÍCIL'];

  // ── Motor Tempo Morto ──────────────────────────────────────
  const tempoMorto=useMemo(()=>{
    const todayMs=new Date().setHours(0,0,0,0);
    // Anki: matéria com maior dificuldade + mais dias sem fazer
    const porMatAnki={};
    ankiRegs.forEach(r=>{
      r.itens?.forEach(it=>{
        if(!it.mat)return;
        porMatAnki[it.mat]||(porMatAnki[it.mat]={difs:[],ultimoDt:0});
        porMatAnki[it.mat].difs.push(it.dif||0);
        if(r.dt>porMatAnki[it.mat].ultimoDt)porMatAnki[it.mat].ultimoDt=r.dt;
      });
    });
    const rankAnki=Object.entries(porMatAnki).map(([mat,v])=>{
      const difMedia=v.difs.reduce((s,d)=>s+d,0)/v.difs.length;
      const diasSem=Math.floor((todayMs-v.ultimoDt)/86400000);
      return{mat,difMedia,diasSem,score:difMedia*(diasSem+1)};
    }).sort((a,b)=>b.score-a.score);

    // NLM: matéria com maior dificuldade + mais dias sem áudio
    const porMatNlm={};
    nlmRegs.forEach(r=>{
      if(!r.mat)return;
      porMatNlm[r.mat]||(porMatNlm[r.mat]={difs:[],ultimoDt:0});
      porMatNlm[r.mat].difs.push(r.dif||0);
      if(r.dt>porMatNlm[r.mat].ultimoDt)porMatNlm[r.mat].ultimoDt=r.dt;
    });
    // Adicionar score Guruja se tiver
    const gurujaData=lsGet('guruja_data',null);
    const rankNlm=Object.entries(porMatNlm).map(([mat,v])=>{
      const difMedia=v.difs.reduce((s,d)=>s+d,0)/v.difs.length;
      const diasSem=Math.floor((todayMs-v.ultimoDt)/86400000);
      const gurujaBonus=gurujaData?.prioridades?.find(p=>p.mat?.includes(mat.split(' ')[0]))?.status==='critica'?2:0;
      return{mat,difMedia,diasSem,score:difMedia*(diasSem+1)+gurujaBonus};
    }).sort((a,b)=>b.score-a.score);

    // Se não tem histórico, sugere matérias do ciclo com maior peso
    const sugestaoAnki=rankAnki[0]||{mat:CICLO.find(c=>c.tag?.includes('⭐⭐⭐⭐⭐'))?.mat||'AFO',difMedia:0,diasSem:0};
    const sugestaoNlm=rankNlm[0]||{mat:CICLO.find(c=>c.tag?.includes('⭐⭐⭐⭐⭐'))?.mat||'Auditoria Governamental',difMedia:0,diasSem:0};

    return{anki:sugestaoAnki,nlm:sugestaoNlm};
  },[ankiRegs,nlmRegs]);

  // Alerta 1h30
  const deve1h30=totalBlocos>0&&totalBlocos%5===0;
  const faltam1h30=5-(totalBlocos%5)||5;

  // ── Ações ──────────────────────────────────────────────────
  const salvarAnki=()=>{
    const validos=ankiItens.filter(it=>it.mat&&it.dif>0);
    if(!validos.length)return;
    const novo={id:Date.now(),dt:Date.now(),dia:hoje,itens:validos};
    const n=[...ankiRegs,novo];
    setAnkiRegs(n);lsSet('rev_anki',n);
    setAnkiItens([{mat:'',profundo:'',leve:'',dif:0}]);
    setAnkiSalvo(true);setTimeout(()=>setAnkiSalvo(false),2500);
  };
  const addAnkiItem=()=>setAnkiItens(a=>[...a,{mat:'',profundo:'',leve:'',dif:0}]);
  const updAnki=(i,k,v)=>setAnkiItens(a=>a.map((it,j)=>j===i?{...it,[k]:v}:it));
  const remAnki=i=>setAnkiItens(a=>a.filter((_,j)=>j!==i));

  const salvarNlm=()=>{
    if(!nlmForm.mat||!nlmForm.dif)return;
    const novo={...nlmForm,id:Date.now(),dt:Date.now(),dia:hoje};
    const n=[...nlmRegs,novo];
    setNlmRegs(n);lsSet('rev_nlm',n);
    setNlmForm({mat:'',oque:'',tempo:'',qtd:'',dif:0});
    setNlmSalvo(true);setTimeout(()=>setNlmSalvo(false),2500);
  };

  const salvar1h30=()=>{
    const validos=slots.filter(s=>s.mat&&s.dif>0);
    if(!validos.length)return;
    const novo={id:Date.now(),dt:Date.now(),dia:hoje,blocoRef:totalBlocos,slots:validos};
    const n=[...rev1h30Regs,novo];
    setRev1h30Regs(n);lsSet('rev_1h30',n);
    setSlots([{mat:'',oque:'',qtd:'',dif:0},{mat:'',oque:'',qtd:'',dif:0},{mat:'',oque:'',qtd:'',dif:0}]);
    setSlotSalvo(true);setTimeout(()=>setSlotSalvo(false),2500);
  };
  const updSlot=(i,k,v)=>setSlots(a=>a.map((s,j)=>j===i?{...s,[k]:v}:s));

  const marcarTmAnki=()=>{setTmFeitoAnki(true);lsSet(`tm_anki_${hoje}`,true);};
  const marcarTmNlm=()=>{setTmFeitoNlm(true);lsSet(`tm_nlm_${hoje}`,true);};

  // ── Renderização auxiliar ──────────────────────────────────

  const HistoricoCompacto=({regs,tipo})=>{
    const ults=regs.slice(-3).reverse();
    if(!ults.length)return null;
    return(
      <div style={{marginTop:8}}>
        <div style={{fontSize:8,color:'#1e293b',letterSpacing:'2px',fontFamily:"'DM Mono',monospace",marginBottom:4}}>ÚLTIMOS REGISTROS</div>
        {ults.map((r,i)=>(
          <div key={i} style={{padding:'6px 9px',borderRadius:8,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',marginBottom:3,fontSize:10,color:'#475569'}}>
            {tipo==='anki'&&r.itens?.map((it,j)=><span key={j} style={{marginRight:8}}>{it.mat} {it.profundo?`${it.profundo}P`:''}{it.leve?`/${it.leve}L`:''} {it.dif?`${'⭐'.repeat(it.dif)}`:''}</span>)}
            {tipo==='nlm'&&<span>{r.mat} · {r.oque||'—'} · {r.tempo?`${r.tempo}min`:''} {r.dif?`${'⭐'.repeat(r.dif)}`:''}</span>}
            {tipo==='1h30'&&r.slots?.map((s,j)=><span key={j} style={{marginRight:8}}>{s.mat} {s.dif?`${'⭐'.repeat(s.dif)}`:''}</span>)}
            <span style={{color:'#1e293b',marginLeft:4}}>{r.dia}</span>
          </div>
        ))}
      </div>
    );
  };

  return(
    <div>
      {/* ── TEMPO MORTO ─────────────────────────────────────── */}
      <div style={{background:'linear-gradient(135deg,rgba(96,165,250,.08),rgba(5,10,20,.98))',border:'1px solid rgba(96,165,250,.25)',borderRadius:14,padding:'14px',marginBottom:16}}>
        <div style={{fontSize:9,letterSpacing:'3px',color:'#60a5fa',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:10}}>⏳ TEMPO MORTO — O QUE FAZER AGORA</div>
        <div style={{fontSize:9,color:'#334155',lineHeight:1.7,marginBottom:10}}>Calculado automaticamente pelo app todo dia com base no seu histórico de Anki, NLM e Guruja.</div>

        {/* Card Anki */}
        <div style={{padding:'11px 13px',borderRadius:11,background:tmFeitoAnki?'rgba(52,211,153,.08)':'rgba(167,139,250,.08)',border:`1px solid ${tmFeitoAnki?'rgba(52,211,153,.3)':'rgba(167,139,250,.3)'}`,marginBottom:8}}>
          <div style={{fontSize:8,color:tmFeitoAnki?'#34d399':'#a78bfa',fontFamily:"'DM Mono',monospace",letterSpacing:'2px',marginBottom:4}}>🃏 ANKI AGORA</div>
          <div style={{fontSize:15,fontWeight:900,color:tmFeitoAnki?'#34d399':'#e8edf5',fontFamily:"'DM Serif Display',serif",marginBottom:2}}>{tempoMorto.anki.mat}</div>
          {tempoMorto.anki.difMedia>0&&<div style={{fontSize:10,color:'#475569',marginBottom:8}}>Dif média {tempoMorto.anki.difMedia.toFixed(1)}★ · {tempoMorto.anki.diasSem}d sem revisar</div>}
          {!tempoMorto.anki.difMedia&&<div style={{fontSize:10,color:'#334155',marginBottom:8}}>Matéria mais pesada do ciclo — comece por ela</div>}
          {tmFeitoAnki
            ?<div style={{fontSize:11,color:'#34d399',fontWeight:700}}>✅ Feito hoje!</div>
            :<button onClick={marcarTmAnki} style={{padding:'7px 16px',borderRadius:8,border:'none',background:'#a78bfa',color:'#050a14',fontSize:11,fontWeight:800,cursor:'pointer'}}>✓ Fiz!</button>
          }
        </div>

        {/* Card NLM */}
        <div style={{padding:'11px 13px',borderRadius:11,background:tmFeitoNlm?'rgba(52,211,153,.08)':'rgba(52,211,153,.06)',border:`1px solid ${tmFeitoNlm?'rgba(52,211,153,.4)':'rgba(52,211,153,.25)'}`,}}>
          <div style={{fontSize:8,color:tmFeitoNlm?'#34d399':'#34d399',fontFamily:"'DM Mono',monospace",letterSpacing:'2px',marginBottom:4}}>🎧 ÁUDIO NLM AGORA</div>
          <div style={{fontSize:15,fontWeight:900,color:tmFeitoNlm?'#34d399':'#e8edf5',fontFamily:"'DM Serif Display',serif",marginBottom:2}}>{tempoMorto.nlm.mat}</div>
          {tempoMorto.nlm.difMedia>0&&<div style={{fontSize:10,color:'#475569',marginBottom:8}}>Dif média {tempoMorto.nlm.difMedia.toFixed(1)}★ · {tempoMorto.nlm.diasSem}d sem áudio</div>}
          {!tempoMorto.nlm.difMedia&&<div style={{fontSize:10,color:'#334155',marginBottom:8}}>Matéria crítica no edital — priorize o áudio</div>}
          {tmFeitoNlm
            ?<div style={{fontSize:11,color:'#34d399',fontWeight:700}}>✅ Feito hoje!</div>
            :<button onClick={marcarTmNlm} style={{padding:'7px 16px',borderRadius:8,border:'none',background:'#34d399',color:'#050a14',fontSize:11,fontWeight:800,cursor:'pointer'}}>✓ Ouvi!</button>
          }
        </div>
      </div>

      {/* ── ANKI DO DIA ─────────────────────────────────────── */}
      <div style={{background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.2)',borderRadius:13,padding:'14px',marginBottom:14}}>
        <div style={{fontSize:9,letterSpacing:'3px',color:'#a78bfa',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:12}}>🃏 ANKI DO DIA</div>
        {ankiItens.map((it,i)=>(
          <div key={i} style={{padding:'11px',borderRadius:11,background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.15)',marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{fontSize:9,color:'#a78bfa',fontFamily:"'DM Mono',monospace",fontWeight:700}}>MATÉRIA {i+1}</div>
              {ankiItens.length>1&&<button onClick={()=>remAnki(i)} style={{padding:'2px 7px',borderRadius:5,border:'1px solid rgba(248,113,113,.25)',background:'transparent',color:'#f87171',fontSize:10,cursor:'pointer'}}>×</button>}
            </div>
            {/* Matéria */}
            <div style={{marginBottom:8}}>
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:5}}>
                {MATS.slice(0,6).map(m=><button key={m} onClick={()=>updAnki(i,'mat',m)} style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${it.mat===m?'#a78bfa':'rgba(255,255,255,.07)'}`,background:it.mat===m?'rgba(167,139,250,.2)':'transparent',color:it.mat===m?'#a78bfa':'#475569',fontSize:9,cursor:'pointer'}}>{m}</button>)}
              </div>
              <input value={MATS.includes(it.mat)?'':it.mat} onChange={e=>updAnki(i,'mat',e.target.value)} placeholder="Ou digitar matéria..." style={{width:'100%',padding:'7px 10px',borderRadius:7,border:'1px solid rgba(167,139,250,.15)',background:'rgba(167,139,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
            </div>
            {/* Quantidade */}
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:8,color:'#334155',marginBottom:3}}>ESTUDO PROFUNDO (cards)</div>
                <input type="number" value={it.profundo} onChange={e=>updAnki(i,'profundo',e.target.value)} placeholder="ex: 83" style={{width:'100%',padding:'9px',borderRadius:7,border:'1px solid rgba(167,139,250,.2)',background:'rgba(167,139,250,.05)',color:'#a78bfa',fontSize:15,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:8,color:'#334155',marginBottom:3}}>ESTUDO LEVE (cards)</div>
                <input type="number" value={it.leve} onChange={e=>updAnki(i,'leve',e.target.value)} placeholder="ex: 34" style={{width:'100%',padding:'9px',borderRadius:7,border:'1px solid rgba(56,189,248,.2)',background:'rgba(56,189,248,.05)',color:'#38bdf8',fontSize:15,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
              </div>
            </div>
            {/* Dificuldade */}
            <div style={{fontSize:8,color:'#334155',marginBottom:5}}>DIFICULDADE</div>
            <Estrelas val={it.dif} onChange={v=>updAnki(i,'dif',v)}/>
            {it.dif>0&&<div style={{textAlign:'center',fontSize:9,color:CORS_DIF[it.dif-1],marginTop:3,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{LABELS_DIF[it.dif-1]}</div>}
          </div>
        ))}
        <button onClick={addAnkiItem} style={{width:'100%',padding:'9px',borderRadius:9,border:'1px dashed rgba(167,139,250,.3)',background:'transparent',color:'#a78bfa',fontSize:11,cursor:'pointer',marginBottom:10}}>+ Adicionar outra matéria</button>
        <button onClick={salvarAnki} disabled={!ankiItens.some(it=>it.mat&&it.dif>0)} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:ankiItens.some(it=>it.mat&&it.dif>0)?'linear-gradient(135deg,#a78bfa,#a78bfa)':'rgba(255,255,255,.05)',color:ankiItens.some(it=>it.mat&&it.dif>0)?'#050a14':'#1e293b',fontSize:13,fontWeight:900,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>
          {ankiSalvo?'✅ SALVO!':'💾 SALVAR ANKI'}
        </button>
        <HistoricoCompacto regs={ankiRegs} tipo="anki"/>
      </div>

      {/* ── NOTEBOOKLM ──────────────────────────────────────── */}
      <div style={{background:'rgba(52,211,153,.05)',border:'1px solid rgba(52,211,153,.2)',borderRadius:13,padding:'14px',marginBottom:14}}>
        <div style={{fontSize:9,letterSpacing:'3px',color:'#34d399',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:12}}>🎧 NOTEBOOKLM</div>
        {/* Matéria */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:8,color:'#334155',marginBottom:5}}>MATÉRIA</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:5}}>
            {MATS.slice(0,6).map(m=><button key={m} onClick={()=>setNlmForm(f=>({...f,mat:m}))} style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${nlmForm.mat===m?'#34d399':'rgba(255,255,255,.07)'}`,background:nlmForm.mat===m?'rgba(52,211,153,.2)':'transparent',color:nlmForm.mat===m?'#34d399':'#475569',fontSize:9,cursor:'pointer'}}>{m}</button>)}
          </div>
          <input value={MATS.includes(nlmForm.mat)?'':nlmForm.mat} onChange={e=>setNlmForm(f=>({...f,mat:e.target.value}))} placeholder="Ou digitar matéria..." style={{width:'100%',padding:'7px 10px',borderRadius:7,border:'1px solid rgba(52,211,153,.15)',background:'rgba(52,211,153,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
        </div>
        {/* O que fez */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:8,color:'#334155',marginBottom:4}}>O QUE FEZ (campo livre)</div>
          <textarea value={nlmForm.oque} onChange={e=>setNlmForm(f=>({...f,oque:e.target.value}))} rows={2} placeholder="ex: Ouvi podcast de pegadinhas, fiz flashcards de NBC TA 700..." style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid rgba(52,211,153,.18)',background:'rgba(52,211,153,.04)',color:'#c8d0e0',fontSize:12,outline:'none',resize:'vertical',boxSizing:'border-box'}}/>
        </div>
        {/* Tempo + Qtd */}
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:8,color:'#334155',marginBottom:3}}>TEMPO (min)</div>
            <input type="number" value={nlmForm.tempo} onChange={e=>setNlmForm(f=>({...f,tempo:e.target.value}))} placeholder="ex: 35" style={{width:'100%',padding:'9px',borderRadius:7,border:'1px solid rgba(52,211,153,.2)',background:'rgba(52,211,153,.05)',color:'#34d399',fontSize:15,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:8,color:'#334155',marginBottom:3}}>QUESTÕES / FLASHCARDS (qtd)</div>
            <input type="number" value={nlmForm.qtd} onChange={e=>setNlmForm(f=>({...f,qtd:e.target.value}))} placeholder="se fizer" style={{width:'100%',padding:'9px',borderRadius:7,border:'1px solid rgba(52,211,153,.15)',background:'rgba(52,211,153,.04)',color:'#34d399',fontSize:15,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
          </div>
        </div>
        {/* Dificuldade */}
        <div style={{fontSize:8,color:'#334155',marginBottom:5}}>DIFICULDADE</div>
        <Estrelas val={nlmForm.dif} onChange={v=>setNlmForm(f=>({...f,dif:v}))}/>
        {nlmForm.dif>0&&<div style={{textAlign:'center',fontSize:9,color:CORS_DIF[nlmForm.dif-1],marginTop:3,marginBottom:10,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{LABELS_DIF[nlmForm.dif-1]}</div>}
        <button onClick={salvarNlm} disabled={!nlmForm.mat||!nlmForm.dif} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:nlmForm.mat&&nlmForm.dif?'linear-gradient(135deg,#34d399,#34d399)':'rgba(255,255,255,.05)',color:nlmForm.mat&&nlmForm.dif?'#050a14':'#1e293b',fontSize:13,fontWeight:900,cursor:'pointer',fontFamily:"'DM Mono',monospace",marginTop:nlmForm.dif?0:10}}>
          {nlmSalvo?'✅ SALVO!':'💾 SALVAR NLM'}
        </button>
        <HistoricoCompacto regs={nlmRegs} tipo="nlm"/>
      </div>

      {/* ── REVISÃO 1H30 ────────────────────────────────────── */}
      <div style={{background:deve1h30?'linear-gradient(135deg,rgba(251,191,36,.1),rgba(5,10,20,.98))':'rgba(251,191,36,.03)',border:`${deve1h30?'2px':'1px'} solid ${deve1h30?'rgba(251,191,36,.5)':'rgba(251,191,36,.15)'}`,borderRadius:13,padding:'14px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:deve1h30?10:6}}>
          <div style={{fontSize:9,letterSpacing:'3px',color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:800}}>🔄 REVISÃO 1H30</div>
          <div style={{padding:'3px 8px',borderRadius:5,background:deve1h30?'rgba(251,191,36,.2)':'rgba(251,191,36,.08)',color:'#fbbf24',fontSize:9,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{totalBlocos} blocos</div>
        </div>
        {deve1h30?(
          <div>
            <div style={{padding:'9px 11px',borderRadius:9,background:'rgba(251,191,36,.1)',border:'1px solid rgba(251,191,36,.3)',marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:800,color:'#fbbf24'}}>🚨 HORA DA REVISÃO GRANDE!</div>
              <div style={{fontSize:10,color:'rgba(251,191,36,.7)',marginTop:2}}>Você completou {totalBlocos} blocos. Registre as 3 matérias revisadas.</div>
            </div>
            {slots.map((s,i)=>(
              <div key={i} style={{padding:'11px',borderRadius:11,background:'rgba(251,191,36,.04)',border:'1px solid rgba(251,191,36,.15)',marginBottom:10}}>
                <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginBottom:8}}>MATÉRIA {i+1}{i===0?' — MAIS DIFÍCIL':''}</div>
                <input value={s.mat} onChange={e=>updSlot(i,'mat',e.target.value)} placeholder="Nome da matéria..." style={{width:'100%',padding:'8px 10px',borderRadius:7,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:8}}/>
                <textarea value={s.oque} onChange={e=>updSlot(i,'oque',e.target.value)} rows={1} placeholder="O que fez? (Anki, NLM, questões, leitura...)" style={{width:'100%',padding:'7px 10px',borderRadius:7,border:'1px solid rgba(251,191,36,.15)',background:'rgba(251,191,36,.03)',color:'#c8d0e0',fontSize:11,outline:'none',resize:'vertical',boxSizing:'border-box',marginBottom:8}}/>
                <div style={{display:'flex',gap:8,marginBottom:8}}>

  const addT=()=>{if(!novoT.trim())return;const n=[...tarefas,{id:Date.now(),txt:novoT.trim(),prior:novoTPrior,done:false}];setTarefas(n);lsSet(`casa_t_${dk}`,n);setNovoT('');};
  const togT=id=>{const n=tarefas.map(t=>t.id===id?{...t,done:!t.done}:t);setTarefas(n);lsSet(`casa_t_${dk}`,n);};
  const delT=id=>{const n=tarefas.filter(t=>t.id!==id);setTarefas(n);lsSet(`casa_t_${dk}`,n);};
  const savH=v=>{setHidra(v);lsSet(`hidra_${dk}`,v);};
  const savJ=(k,v)=>{const j={...jejum,[k]:v};setJejum(j);lsSet(`jejum_${dk}`,j);};
  const savTr=(k,v)=>{const t={...treino,[k]:v};setTreino(t);lsSet(`treino_${dk}`,t);};
  const savP=()=>{lsSet(`pergs_${dk}`,pergs);setPergsSalvo(true);setTimeout(()=>setPergsSalvo(false),2000);};
  const addEv=()=>{if(!evForm.dia||!evForm.desc)return;const n=[...eventosSem,{...evForm,id:Date.now()}];setEventosSem(n);lsSet('eventos_semana',n);setEvForm({dia:'',cat:'',desc:'',hora:''});setEvSalvo(true);setTimeout(()=>setEvSalvo(false),2000);};
  const delEv=id=>{const n=eventosSem.filter(e=>e.id!==id);setEventosSem(n);lsSet('eventos_semana',n);};
  const revSemItems=lsGet('rev_sem_items',[]).filter(s=>!s.feito);
  const CATS=['Kauê','Casa','Saúde','Trabalho','Outro'];

  const BH=({titulo,k,cor,badge})=>(
    <button onClick={()=>toggle(k)} style={{width:'100%',padding:'11px 13px',borderRadius:aberto[k]?'11px 11px 0 0':'11px',border:`1px solid ${cor}25`,background:aberto[k]?`${cor}10`:`${cor}06`,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:aberto[k]?0:8}}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span style={{fontSize:12,fontWeight:800,color:cor}}>{titulo}</span>
        {badge&&<span style={{fontSize:8,padding:'1px 6px',borderRadius:4,background:`${cor}20`,color:cor,fontFamily:"'DM Mono',monospace"}}>{badge}</span>}
      </div>
      <span style={{fontSize:11,color:cor}}>{aberto[k]?'▲':'▼'}</span>
    </button>
  );

  return(
    <div>
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[['hoje','📅 Hoje'],['semana','🗓️ Semana']].map(([v,l])=>{const a=view===v;return(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'10px',borderRadius:10,border:`1px solid ${a?'#fbbf24':'rgba(255,255,255,.08)'}`,background:a?'rgba(251,191,36,.12)':'transparent',color:a?'#fbbf24':'#334155',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>
        );})}
      </div>

      {view==='hoje'&&<div>
        {/* Resumo */}
        <div style={{background:'rgba(251,191,36,.05)',border:'1px solid rgba(251,191,36,.15)',borderRadius:12,padding:'11px 13px',marginBottom:12}}>
          <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginBottom:6}}>📍 {DIAS_FULL[dw].toUpperCase()}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[[`💧 ${(mlAtual/1000).toFixed(1)}L`,mlAtual>=META_AGUA?'#34d399':'#60a5fa'],
              [`🏃 ${treino.fez===true?'feito':treino.fez===false?'não fez':'pendente'}`,treino.fez===true?'#34d399':treino.fez===false?'#f87171':'#334155'],
              [`🏡 ${tarefas.filter(t=>!t.done).length} taref.`,tarefas.filter(t=>t.prior==='urgente'&&!t.done).length>0?'#f87171':'#60a5fa'],
              [`⚓ ${naval.filter(Boolean).length}/${NAVAL_ITEMS.length}`,naval.every(Boolean)?'#34d399':'#60a5fa'],
            ].map(([l,c])=>(
              <div key={l} style={{padding:'4px 9px',borderRadius:7,background:`${c}12`,border:`1px solid ${c}25`}}>
                <span style={{fontSize:10,color:c,fontWeight:700}}>{l}</span>
              </div>
            ))}
          </div>
        </div>

        {/* KAUÊ */}
        <BH titulo="⚓ Kauê" k="kaue" cor="#f87171" badge={kagenda.escola?'escola hoje':null}/>
        {aberto.kaue&&<div style={{padding:'12px 13px',borderRadius:'0 0 11px 11px',border:'1px solid rgba(248,113,113,.2)',borderTop:'none',background:'rgba(248,113,113,.03)',marginBottom:8}}>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
            {['Escola','Naval','Basquete','Médico'].map(c=><button key={c} onClick={()=>togK(c.toLowerCase(),!kagenda[c.toLowerCase()])} style={{padding:'6px 11px',borderRadius:8,border:`1px solid ${kagenda[c.toLowerCase()]?'#f87171':'rgba(255,255,255,.08)'}`,background:kagenda[c.toLowerCase()]?'rgba(248,113,113,.18)':'rgba(255,255,255,.03)',color:kagenda[c.toLowerCase()]?'#f87171':'#475569',fontSize:11,cursor:'pointer'}}>{c==='Escola'?'🏫':c==='Naval'?'⚓':c==='Basquete'?'🏀':'🏥'} {c}</button>)}

          <input value={kagenda.compromisso||''} onChange={e=>togK('compromisso',e.target.value)} placeholder="Compromisso específico..." style={{width:'100%',padding:'7px 10px',borderRadius:8,border:'1px solid rgba(248,113,113,.18)',background:'rgba(248,113,113,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:10}}/>
          <div style={{fontSize:9,color:'#334155',fontFamily:"'DM Mono',monospace",marginBottom:6}}>CHECKLIST NAVAL</div>
          {NAVAL_ITEMS.map((it,i)=>(
            <div key={i} onClick={()=>toggleNaval(i)} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',borderRadius:7,marginBottom:3,cursor:'pointer',background:naval[i]?'rgba(52,211,153,.06)':'rgba(255,255,255,.02)',border:`1px solid ${naval[i]?'rgba(52,211,153,.2)':'rgba(255,255,255,.04)'}`}}>
              <div style={{width:14,height:14,borderRadius:'50%',flexShrink:0,border:`2px solid ${naval[i]?'#34d399':'rgba(255,255,255,.15)'}`,background:naval[i]?'#34d399':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#050a14',fontWeight:900}}>{naval[i]?'✓':''}</div>
              <span style={{fontSize:11,color:naval[i]?'#34d399':'#64748b',textDecoration:naval[i]?'line-through':'none'}}>{it}</span>
            </div>
          ))}
        </div>}

        {/* CASA */}
        <BH titulo="🏡 Casa" k="casa" cor="#60a5fa" badge={tarefas.filter(t=>t.prior==='urgente'&&!t.done).length>0?'urgente!':null}/>

            <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 9px',borderRadius:8,marginBottom:4,background:t.done?'rgba(52,211,153,.04)':'rgba(255,255,255,.02)',border:`1px solid ${t.done?'rgba(52,211,153,.15)':'rgba(255,255,255,.05)'}`}}>

              <span onClick={()=>togT(t.id)} style={{flex:1,fontSize:11,color:t.done?'#334155':'#c8d0e0',textDecoration:t.done?'line-through':'none',cursor:'pointer'}}>{t.txt}</span>

              <button onClick={()=>delT(t.id)} style={{padding:'1px 5px',borderRadius:4,border:'none',background:'transparent',color:'#334155',fontSize:10,cursor:'pointer'}}>×</button>
            </div>
          ))}
          <div style={{display:'flex',gap:5,marginTop:6}}>
            <input value={novoT} onChange={e=>setNovoT(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addT()} placeholder="Nova tarefa..." style={{flex:1,padding:'7px 10px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.04)',color:'#c8d0e0',fontSize:11,outline:'none'}}/>
            <select value={novoTPrior} onChange={e=>setNovoTPrior(e.target.value)} style={{padding:'7px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'#0c1220',color:'#c8d0e0',fontSize:10,outline:'none'}}>

            </select>
            <button onClick={addT} style={{padding:'7px 12px',borderRadius:8,border:'none',background:'#60a5fa',color:'#050a14',fontSize:14,fontWeight:900,cursor:'pointer'}}>+</button>
          </div>
          <div style={{display:'flex',gap:6,marginTop:8}}>
            <input value={mercado} onChange={e=>{setMercado(e.target.value);lsSet(`casa_m_${dk}`,e.target.value);}} placeholder="🛒 Mercado..." style={{flex:1,padding:'7px 9px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.03)',color:'#c8d0e0',fontSize:11,outline:'none'}}/>
            <input value={cozinhar} onChange={e=>{setCozinhar(e.target.value);lsSet(`casa_c_${dk}`,e.target.value);}} placeholder="🍳 Cozinhar..." style={{flex:1,padding:'7px 9px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.03)',color:'#c8d0e0',fontSize:11,outline:'none'}}/>
          </div>
        </div>}

        {/* DIETA */}
        <BH titulo="🥗 Dieta" k="dieta" cor="#34d399" badge={mlAtual>=META_AGUA?'água ✓':null}/>

            <div style={{fontSize:9,color:'#334155',marginBottom:5}}>⏳ JEJUM</div>
            <div style={{display:'flex',gap:6,marginBottom:jejum.fez?6:0}}>
              <button onClick={()=>savJ('fez',true)} style={{flex:1,padding:'8px',borderRadius:8,border:`2px solid ${jejum.fez===true?'#34d399':'rgba(255,255,255,.08)'}`,background:jejum.fez===true?'rgba(52,211,153,.15)':'rgba(255,255,255,.02)',color:jejum.fez===true?'#34d399':'#475569',fontSize:11,fontWeight:700,cursor:'pointer'}}>✅ Fiz</button>
              <button onClick={()=>savJ('fez',false)} style={{flex:1,padding:'8px',borderRadius:8,border:`2px solid ${jejum.fez===false?'#f87171':'rgba(255,255,255,.08)'}`,background:'rgba(255,255,255,.02)',color:'#475569',fontSize:11,fontWeight:700,cursor:'pointer'}}>❌ Não</button>
            </div>
            {jejum.fez===true&&<div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:5}}>
              {['12','14','16','18','20','24'].map(h=><button key={h} onClick={()=>savJ('horas',h)} style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${jejum.horas===h?'#34d399':'rgba(255,255,255,.07)'}`,background:jejum.horas===h?'rgba(52,211,153,.18)':'transparent',color:jejum.horas===h?'#34d399':'#475569',fontSize:10,cursor:'pointer'}}>{h}h</button>)}
            </div>}
          </div>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:9,color:'#334155'}}>💧 ÁGUA</span>
              <span style={{fontSize:10,color:mlAtual>=META_AGUA?'#34d399':'#60a5fa',fontFamily:"'DM Mono',monospace",fontWeight:700}}>{(mlAtual/1000).toFixed(2).replace('.',',')}L/3L</span>
            </div>
            <BarProg done={mlAtual} total={META_AGUA} cor={mlAtual>=META_AGUA?'#34d399':'#60a5fa'} h={5}/>
            <div style={{display:'flex',gap:6,marginTop:7}}>
              <button onClick={()=>savH(Math.max(0,hidra-1))} style={{flex:1,padding:'8px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'transparent',color:'#60a5fa',fontSize:16,cursor:'pointer'}}>−</button>
              <button onClick={()=>savH(Math.min(16,hidra+1))} style={{flex:2,padding:'8px',borderRadius:8,border:'none',background:mlAtual>=META_AGUA?'rgba(52,211,153,.15)':'rgba(96,165,250,.8)',color:mlAtual>=META_AGUA?'#34d399':'#050a14',fontSize:11,fontWeight:800,cursor:'pointer'}}>{mlAtual>=META_AGUA?`✅ ${(mlAtual/1000).toFixed(1)}L`:'+ 250ml'}</button>
            </div>
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:9,color:'#334155',marginBottom:5}}>SEGUIU O PLANO?</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>{setSeguiu(true);lsSet(`seguiu_${dk}`,true);}} style={{flex:1,padding:'8px',borderRadius:8,border:`2px solid ${seguiu===true?'#34d399':'rgba(255,255,255,.08)'}`,background:seguiu===true?'rgba(52,211,153,.15)':'rgba(255,255,255,.02)',color:seguiu===true?'#34d399':'#475569',fontSize:11,fontWeight:700,cursor:'pointer'}}>✅ Sim!</button>
              <button onClick={()=>{setSeguiu(false);lsSet(`seguiu_${dk}`,false);}} style={{flex:1,padding:'8px',borderRadius:8,border:`2px solid ${seguiu===false?'#f87171':'rgba(255,255,255,.08)'}`,background:'rgba(255,255,255,.02)',color:'#475569',fontSize:11,fontWeight:700,cursor:'pointer'}}>❌ Não</button>
            </div>
          </div>
        </div>}

        {/* TREINO */}
        <BH titulo="🏃 Treino" k="treino" cor="#a78bfa" badge={treino.fez===true?'feito ✓':null}/>
        {aberto.treino&&<div style={{padding:'12px 13px',borderRadius:'0 0 11px 11px',border:'1px solid rgba(167,139,250,.2)',borderTop:'none',background:'rgba(167,139,250,.03)',marginBottom:8}}>
          <div style={{fontSize:9,color:'#334155',marginBottom:5}}>TREINO DE HOJE (você define)</div>
          <input value={treino.tipo} onChange={e=>savTr('tipo',e.target.value)} placeholder="ex: Corrida leve 35min, Musculação, Caminhada..." style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid rgba(167,139,250,.2)',background:'rgba(167,139,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:8}}/>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'#334155',marginBottom:3}}>DURAÇÃO (min)</div>
              <input type="number" value={treino.dur} onChange={e=>savTr('dur',e.target.value)} placeholder="45" style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid rgba(167,139,250,.18)',background:'rgba(167,139,250,.04)',color:'#a78bfa',fontSize:14,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
            </div>
            <div style={{flex:2}}>
              <div style={{fontSize:9,color:'#334155',marginBottom:5}}>FEZ?</div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>savTr('fez',true)} style={{flex:1,padding:'8px',borderRadius:8,border:`2px solid ${treino.fez===true?'#34d399':'rgba(255,255,255,.08)'}`,background:treino.fez===true?'rgba(52,211,153,.15)':'rgba(255,255,255,.02)',color:treino.fez===true?'#34d399':'#475569',fontSize:11,fontWeight:700,cursor:'pointer'}}>✅ Fiz!</button>
                <button onClick={()=>savTr('fez',false)} style={{flex:1,padding:'8px',borderRadius:8,border:`2px solid ${treino.fez===false?'#f87171':'rgba(255,255,255,.08)'}`,background:'rgba(255,255,255,.02)',color:'#475569',fontSize:11,fontWeight:700,cursor:'pointer'}}>❌ Não</button>
              </div>
            </div>
          </div>
        </div>}

        {/* PERGUNTAS */}
        <BH titulo="💭 Perguntas Essenciais" k="perguntas" cor="#fbbf24"/>
        {aberto.perguntas&&<div style={{padding:'12px 13px',borderRadius:'0 0 11px 11px',border:'1px solid rgba(251,191,36,.2)',borderTop:'none',background:'rgba(251,191,36,.03)',marginBottom:8}}>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,color:'#334155',marginBottom:5}}>⚡ ENERGIA HOJE (1 a 5)</div>
            <div style={{display:'flex',gap:5}}>
              {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setPergs(p=>({...p,energia:n}))} style={{flex:1,padding:'8px',borderRadius:8,border:`1px solid ${pergs.energia===n?'#fbbf24':'rgba(255,255,255,.08)'}`,background:pergs.energia===n?'rgba(251,191,36,.2)':'rgba(255,255,255,.02)',color:pergs.energia===n?'#fbbf24':'#475569',fontSize:13,cursor:'pointer'}}>{'⚡'.repeat(n)}</button>)}
            </div>
          </div>
          {[['O que pode me travar hoje?','travar'],['Minha meta mínima do dia','meta'],['Uma coisa diferente de ontem','diferente'],['Maior vitória de ontem','vitoria']].map(([label,key])=>(
            <div key={key} style={{marginBottom:8}}>
              <div style={{fontSize:9,color:'#334155',marginBottom:3}}>{label.toUpperCase()}</div>
              <input value={pergs[key]} onChange={e=>setPergs(p=>({...p,[key]:e.target.value}))} placeholder="..." style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid rgba(251,191,36,.15)',background:'rgba(251,191,36,.03)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
            </div>
          ))}
          <button onClick={savP} style={{width:'100%',padding:'11px',borderRadius:9,border:'none',background:'linear-gradient(135deg,#fbbf24,#fbbf24)',color:'#050a14',fontSize:12,fontWeight:800,cursor:'pointer'}}>{pergsSalvo?'✅ Salvo!':'💾 Salvar respostas'}</button>
        </div>}
      </div>}

      {view==='semana'&&<div>
        <div style={{background:'rgba(251,191,36,.04)',border:'1px solid rgba(251,191,36,.18)',borderRadius:12,padding:'13px',marginBottom:14}}>
          <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginBottom:8}}>➕ ADICIONAR EVENTO</div>
          <div style={{display:'flex',gap:5,marginBottom:6}}>
            {DIAS.map((d,i)=>{const hj=i===dw;return(
              <button key={d} onClick={()=>setEvForm(f=>({...f,dia:d}))} style={{flex:1,padding:'6px 2px',borderRadius:6,border:`1px solid ${evForm.dia===d?'#fbbf24':hj?'rgba(255,255,255,.18)':'rgba(255,255,255,.07)'}`,background:evForm.dia===d?'rgba(251,191,36,.2)':hj?'rgba(255,255,255,.04)':'transparent',color:evForm.dia===d?'#fbbf24':hj?'#c8d0e0':'#334155',fontSize:9,cursor:'pointer'}}>{d[0]}</button>
            );})}
          </div>
          <div style={{display:'flex',gap:5,marginBottom:6}}>
            <select value={evForm.cat} onChange={e=>setEvForm(f=>({...f,cat:e.target.value}))} style={{flex:1,padding:'7px',borderRadius:7,border:'1px solid rgba(255,255,255,.08)',background:'#0c1220',color:'#c8d0e0',fontSize:11,outline:'none'}}>
              <option value="">Categoria...</option>
              {CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <input type="time" value={evForm.hora} onChange={e=>setEvForm(f=>({...f,hora:e.target.value}))} style={{width:80,padding:'7px',borderRadius:7,border:'1px solid rgba(255,255,255,.08)',background:'#0c1220',color:'#c8d0e0',fontSize:10,outline:'none'}}/>
          </div>
          <div style={{display:'flex',gap:5}}>
            <input value={evForm.desc} onChange={e=>setEvForm(f=>({...f,desc:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addEv()} placeholder="Descrição..." style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#c8d0e0',fontSize:12,outline:'none'}}/>
            <button onClick={addEv} style={{padding:'8px 14px',borderRadius:8,border:'none',background:evForm.dia&&evForm.desc?'#fbbf24':'rgba(255,255,255,.05)',color:evForm.dia&&evForm.desc?'#050a14':'#1e293b',fontSize:14,fontWeight:900,cursor:'pointer'}}>{evSalvo?'✅':'+'}</button>
          </div>
        </div>
        {DIAS.map((d,i)=>{
          const hj=i===dw;
          const evDia=eventosSem.filter(e=>e.dia===d);
          const revDia=revSemItems.filter(s=>s.dia===d);
          const total=evDia.length+revDia.length;
          return(
            <div key={d} style={{marginBottom:8,borderRadius:12,overflow:'hidden',border:`1px solid ${hj?'rgba(251,191,36,.3)':'rgba(255,255,255,.06)'}`,opacity:i<dw&&!hj?.55:1}}>
              <div style={{padding:'8px 12px',background:hj?'rgba(251,191,36,.07)':'rgba(255,255,255,.02)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:11,fontWeight:800,color:hj?'#fbbf24':'#334155',fontFamily:"'DM Mono',monospace"}}>{hj?'▶ ':''}{DIAS_FULL[i].toUpperCase()}{hj?' — HOJE':''}</span>
                <span style={{fontSize:9,color:'#1e293b',fontFamily:"'DM Mono',monospace"}}>{total} item{total!==1?'s':''}</span>
              </div>
              {revDia.map(s=>(
                <div key={s.id} style={{padding:'6px 12px',borderTop:'1px solid rgba(255,255,255,.04)',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:11}}>📚</span>

              {evDia.map(e=>(

                  {e.hora&&<span style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace",width:36,flexShrink:0}}>{e.hora}</span>}
                  <span style={{fontSize:11}}>{e.cat==='Kauê'?'⚓':e.cat==='Casa'?'🏡':e.cat==='Saúde'?'💊':e.cat==='Trabalho'?'💼':'📌'}</span>
                  <div style={{flex:1}}><div style={{fontSize:11,color:'#c8d0e0'}}>{e.desc}</div>{e.cat&&<div style={{fontSize:9,color:'#334155'}}>{e.cat}</div>}</div>

                </div>
              ))}
              {total===0&&<div style={{padding:'7px 12px',fontSize:10,color:'#1e293b'}}>Dia livre ✓</div>}
            </div>
          );
        })}
      </div>}
    </div>
  );
}

              <div style={{fontSize:8,color:'#334155',lineHeight:1,marginTop:2}}>{fmtMin(minHoje)} hoje · {fmtMin(minSemana)}/{metaHoras}h</div>
            </div>
            <button onClick={()=>setShowCfg(true)} style={{width:30,height:30,borderRadius:'50%',border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.04)',color:'#475569',fontSize:14,cursor:'pointer'}}>⚙️</button>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div style={{display:'flex',gap:5}}>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(96,165,250,.1)',color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>⏱ {fmtMin(minSemana)}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.1)',color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>B{feitos.length}/{N}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.08)',color:Math.round(minSemana/(metaHoras*60)*100)>=100?'#34d399':'#fbbf24',fontFamily:"'DM Mono',monospace"}}>{Math.round(minSemana/(metaHoras*60)*100)}% meta</span>
          </div>
          <span style={{fontSize:9,color:'#334155',fontFamily:"'DM Mono',monospace"}}>{pct}% · ciclo {cicloNum}</span>
        </div>
        <BarProg done={feitos.length} total={N} cor={corPrx} h={3}/>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'14px 14px 0'}}>
        {tab==='ia'     &&<TabIA     appCtx={appCtx} onMIT={saveMIT}/>}
        {tab==='estudo' &&<TabEstudo feitos={feitos} cicloNum={cicloNum} horas={horas} onConcluir={concluir} onIrPara={irPara} onAddHoras={addHoras} mit={mit} planoSemana={planoSemana} onSavePlano={savePlano}/>}
        {tab==='revisao'&&<TabRevisao totalBlocos={feitos.length}/>}
        {tab==='erros'  &&<TabErros/>}
        {tab==='agenda' &&<TabAgenda planoSemana={planoSemana}/>}
        <div style={{height:80}}/>
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#07101f',borderTop:'1px solid rgba(255,255,255,.07)',display:'flex',zIndex:50}}>
        {TABS.map(t=>{const a=tab===t.id;return(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'9px 2px 7px',border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
            {t.badge>0&&<div style={{position:'absolute',top:4,right:'8%',width:14,height:14,borderRadius:'50%',background:'#f87171',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#050a14',fontWeight:900}}>{t.badge}</div>}
            <span style={{fontSize:a?20:17,transition:'font-size .15s'}}>{t.e}</span>
            <span style={{fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:a?800:400,color:a?'#fbbf24':'#334155'}}>{t.l}</span>
            {a&&<div style={{position:'absolute',top:0,left:'10%',right:'10%',height:2,borderRadius:1,background:'#fbbf24'}}/>}
          </button>
        );})}
      </div>

      {trofeu&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,flexDirection:'column',gap:16}} onClick={()=>setTrofeu(false)}>
          <div style={{fontSize:64}}>🏆</div>
          <div style={{fontFamily:"'DM Serif Display',serif",color:'#fbbf24',fontSize:26}}>Ciclo {cicloNum-1} completo!</div>
        </div>
      )}
      {showCfg&&<ModalConfig fechar={()=>setShowCfg(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>

<script>
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='rity-os-v4';
const ASSETS=[self.registration.scope];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(cache=>cache.addAll(ASSETS).catch(()=>{})));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(cached=>cached||fetch(e.request).catch(()=>cached)));});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
