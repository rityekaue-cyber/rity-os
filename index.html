// ─── TAB DADOS — Diário · Por Matéria · Visão Geral ─────────
function TabDados({horas}){
  const[sub,setSub]=useState('diario');
  const[semOffset,setSemOffset]=useState(0);
  const[matIdx,setMatIdx]=useState(0);
  const[insightTexto,setInsightTexto]=useState({diario:'',materia:'',geral:''});
  const[insightLoad,setInsightLoad]=useState('');

  const hist=useMemo(()=>lsGet('historico_diario',[]),[]);
  const feitos=useMemo(()=>lsGet('feitos',[]),[]);

  // ── helpers ──────────────────────────────────────────────────
  const corAc=p=>p===null?'#64748b':p>=85?'#34d399':p>=70?'#fbbf24':p>=60?'#fb923c':'#f87171';
  const fmtMin=m=>{if(!m)return'0min';const h=Math.floor(m/60);const mn=m%60;return h>0?(mn>0?`${h}h${mn}min`:`${h}h`):`${mn}min`;};

  // ── semana ISO ───────────────────────────────────────────────
  const getSemana=(offset=0)=>{
    const d=new Date(); d.setHours(0,0,0,0);
    const dow=(d.getDay()+6)%7;
    const seg=new Date(d); seg.setDate(d.getDate()-dow+offset*7);
    const dom=new Date(seg); dom.setDate(seg.getDate()+6);
    return{ini:seg,fim:dom,iniMs:seg.getTime(),fimMs:dom.getTime()+86399999};
  };
  const sem=useMemo(()=>getSemana(semOffset),[semOffset]);
  const fmtData=d=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;

  // ── dados da semana ──────────────────────────────────────────
  const histSem=useMemo(()=>hist.filter(r=>{const dt=r.dt||0;return dt>=sem.iniMs&&dt<=sem.fimMs;}),[hist,sem]);
  const horasSem=useMemo(()=>horas.filter(e=>e.dt>=sem.iniMs&&e.dt<=sem.fimMs),[horas,sem]);
  const minSem=horasSem.reduce((s,e)=>s+e.min,0);
  const totalQ=histSem.reduce((s,r)=>s+(parseInt(r.questoes)||0),0);
  const totalAc=histSem.reduce((s,r)=>s+(parseInt(r.acertei)||0),0);
  const pctSem=totalQ>0?Math.round(totalAc/totalQ*100):null;
  const diasSem=new Set(histSem.map(r=>r.dia||r.id?.split('_')[0]||'')).size;

  // streak
  const streak=useMemo(()=>{
    const dias=[...new Set(hist.map(r=>r.dia||r.id?.split('_')[0]||'').filter(Boolean))].sort().reverse();
    let s=0; const hoje=new Date().toISOString().split('T')[0];
    for(let i=0;i<dias.length;i++){
      const exp=new Date(hoje); exp.setDate(exp.getDate()-i);
      if(dias[i]===exp.toISOString().split('T')[0]) s++;
      else break;
    }
    return s;
  },[hist]);

  // top/pior matéria da semana
  const porMatSem=useMemo(()=>{
    const m={};
    histSem.forEach(r=>{
      if(!r.materia)return;
      if(!m[r.materia])m[r.materia]={q:0,ac:0,min:0};
      m[r.materia].q+=parseInt(r.questoes)||0;
      m[r.materia].ac+=parseInt(r.acertei)||0;
    });
    horasSem.forEach(e=>{if(e.mat&&m[e.mat])m[e.mat].min+=e.min;});
    return Object.entries(m).map(([mat,v])=>({mat,q:v.q,ac:v.ac,min:v.min,pct:v.q>0?Math.round(v.ac/v.q*100):null}));
  },[histSem,horasSem]);

  const comDados=porMatSem.filter(x=>x.q>=5);
  const melhor=comDados.sort((a,b)=>(b.pct||0)-(a.pct||0))[0]||null;
  const pior=comDados.sort((a,b)=>(a.pct||0)-(b.pct||0))[0]||null;
  const top3=[...porMatSem].sort((a,b)=>b.min-a.min).slice(0,3);

  // negligenciadas (sem registro há 7 dias)
  const negligentes=useMemo(()=>{
    const limite=Date.now()-7*86400000;
    return Object.keys(GURUJA_SEED).filter(mat=>{
      const ult=hist.filter(r=>r.materia===mat).sort((a,b)=>(b.dt||0)-(a.dt||0))[0];
      return!ult||(ult.dt||0)<limite;
    });
  },[hist]);

  // horário de pico
  const picoPorFaixa=useMemo(()=>{
    const faixas={madrugada:{q:0,ac:0,l:'🌙 Madrugada',h:'0–5h'},manha:{q:0,ac:0,l:'🌅 Manhã',h:'5–12h'},tarde:{q:0,ac:0,l:'☀️ Tarde',h:'12–18h'},noite:{q:0,ac:0,l:'🌆 Noite',h:'18–24h'}};
    hist.forEach(r=>{
      if(!r.dt)return;
      const h=new Date(r.dt).getHours();
      const f=h<5?'madrugada':h<12?'manha':h<18?'tarde':'noite';
      faixas[f].q+=parseInt(r.questoes)||0;
      faixas[f].ac+=parseInt(r.acertei)||0;
    });
    const total=Object.values(faixas).reduce((s,f)=>s+f.q,0);
    if(total<10)return null;
    const melhorFaixa=Object.values(faixas).filter(f=>f.q>=5).sort((a,b)=>(b.ac/Math.max(b.q,1))-(a.ac/Math.max(a.q,1)))[0];
    return melhorFaixa?{...melhorFaixa,pct:Math.round(melhorFaixa.ac/melhorFaixa.q*100)}:null;
  },[hist]);

  // ── matérias ordenadas por prioridade Meirelles para sub-aba Por Matéria ─
  const matsOrdenadas=useMemo(()=>{
    const ordem={urgente:0,alta:1,media:2,leve:3,cortar:4};
    return Object.keys(GURUJA_SEED).sort((a,b)=>(ordem[getPrioridadeMeirelles(a).prioridade]||5)-(ordem[getPrioridadeMeirelles(b).prioridade]||5));
  },[]);
  const matAtual=matsOrdenadas[matIdx]||matsOrdenadas[0]||'';
  const gseedAtual=GURUJA_SEED[matAtual]||{};
  const meir=getPrioridadeMeirelles(matAtual);

  // dados históricos da matéria atual
  const histMat=useMemo(()=>hist.filter(r=>r.materia===matAtual),[hist,matAtual]);
  const horasMat=useMemo(()=>horas.filter(e=>e.mat===matAtual),[horas,matAtual]);
  const minMatTotal=horasMat.reduce((s,e)=>s+e.min,0);
  const qMatTotal=histMat.reduce((s,r)=>s+(parseInt(r.questoes)||0),0);
  const acMatTotal=histMat.reduce((s,r)=>s+(parseInt(r.acertei)||0),0);
  const pctMat=qMatTotal>0?Math.round(acMatTotal/qMatTotal*100):null;

  // evolução semanal da matéria (6 semanas)
  const evolMat=useMemo(()=>Array.from({length:6},(_,i)=>{
    const s=getSemana(-5+i);
    const ss=histMat.filter(r=>(r.dt||0)>=s.iniMs&&(r.dt||0)<=s.fimMs);
    const q=ss.reduce((s,r)=>s+(parseInt(r.questoes)||0),0);
    const ac=ss.reduce((s,r)=>s+(parseInt(r.acertei)||0),0);
    return{label:`S${i+1}`,pct:q>0?Math.round(ac/q*100):null,q};
  }),[histMat]);

  // comparativo períodos (Forma 3) — janela rolante de 14 dias, nunca fica desatualizado
  const cicloAtualData={ini:new Date(Date.now()-14*86400000),label:'Últimos 14 dias'};
  const ciclsComp=useMemo(()=>{
    const mats=Object.keys(GURUJA_SEED);
    return mats.map(mat=>{
      const ant=hist.filter(r=>r.materia===mat&&new Date(r.dia||r.id?.split('_')[0]||'2000-01-01')<cicloAtualData.ini);
      const atu=hist.filter(r=>r.materia===mat&&new Date(r.dia||r.id?.split('_')[0]||'2000-01-01')>=cicloAtualData.ini);
      const calc=arr=>{const q=arr.reduce((s,r)=>s+(parseInt(r.questoes)||0),0);const ac=arr.reduce((s,r)=>s+(parseInt(r.acertei)||0),0);return q>0?Math.round(ac/q*100):null;};
      const pAnt=calc(ant); const pAtu=calc(atu);
      const minAtu=horas.filter(e=>e.mat===mat&&new Date(e.dt||0)>=cicloAtualData.ini).reduce((s,e)=>s+e.min,0);
      return{mat,pAnt,pAtu,delta:pAnt!==null&&pAtu!==null?pAtu-pAnt:null,minAtu};
    });
  },[hist,horas]);

  // ── gerar insight IA ─────────────────────────────────────────
  const gerarInsight=async(tipo)=>{
    setInsightLoad(tipo);
    const ctx=tipo==='diario'
      ?`Semana ${fmtData(sem.ini)}-${fmtData(sem.fim)}: ${fmtMin(minSem)} estudados, ${totalQ} questões, ${pctSem}% acerto, ${diasSem} dias. Top matérias: ${top3.map(t=>`${t.mat} ${t.pct}%`).join(', ')}. Negligenciadas: ${negligentes.slice(0,3).join(', ')||'nenhuma'}.`
      :tipo==='materia'
      ?`Matéria: ${matAtual}. Acerto total: ${pctMat}%. Horas: ${fmtMin(minMatTotal)}. Prioridade: ${meir.prioridade}. Jornada Guruja: ${gseedAtual.jornada}%. Evolução: ${evolMat.map(e=>e.pct!==null?e.pct+'%':'—').join('→')}.`
      :`Comparativo ciclos: ${ciclsComp.filter(c=>c.pAtu!==null).map(c=>`${c.mat}: ant ${c.pAnt}% → atu ${c.pAtu}% (${c.delta!==null?(c.delta>=0?'+':'')+c.delta+'pts':'novo'})`).join('; ')}.`;
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-5',max_tokens:200,system:'Você é analista de estudos para concursos. Responda em português, máximo 100 palavras, identifique o padrão mais importante e dê UMA ação concreta. Seja direto.',messages:[{role:'user',content:`Analise: ${ctx} Ciclo: ${feitos.length}/48 blocos feitos.`}]})});
      const d=await resp.json();
      const txt=d.content?.[0]?.text||'Sem resposta.';
      setInsightTexto(prev=>({...prev,[tipo]:txt}));
    }catch(e){setInsightTexto(prev=>({...prev,[tipo]:'Erro ao gerar insight.'}));}
    setInsightLoad('');
  };

  // ── Painel de negligência + pico (Forma 4) ───────────────────
  const PainelNegligencia=()=>(
    <div style={{marginBottom:14}}>
      <div style={{padding:'10px 13px',borderRadius:11,background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.18)',marginBottom:8}}>
        <div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:6}}>⚠️ SEM REGISTRO HÁ +7 DIAS</div>
        {negligentes.length===0
          ?<div style={{fontSize:10,color:'#34d399'}}>✅ Todas as matérias ativas esta semana</div>
          :<div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {negligentes.slice(0,6).map(m=>{
              const ult=hist.filter(r=>r.materia===m).sort((a,b)=>(b.dt||0)-(a.dt||0))[0];
              const dias=ult?Math.floor((Date.now()-(ult.dt||0))/86400000):null;
              return<span key={m} style={{fontSize:9,padding:'2px 8px',borderRadius:5,background:'rgba(248,113,113,.12)',color:'#f87171',fontFamily:"'DM Mono',monospace"}}>{m.replace('Dir. ','').slice(0,14)}{dias?` · ${dias}d`:''}</span>;
            })}
          </div>
        }
      </div>
      {picoPorFaixa&&(
        <div style={{padding:'9px 13px',borderRadius:11,background:'rgba(96,165,250,.06)',border:'1px solid rgba(96,165,250,.18)'}}>
          <div style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:3}}>⚡ SEU HORÁRIO DE PICO</div>
          <div style={{fontSize:12,color:'#60a5fa',fontWeight:700}}>{picoPorFaixa.l} · {picoPorFaixa.h} · <span style={{color:'#34d399'}}>{picoPorFaixa.pct}% acerto</span></div>
        </div>
      )}
    </div>
  );

  // ── Botão insight (Forma 5) ───────────────────────────────────
  const BotaoInsight=({tipo})=>(
    <div style={{marginTop:16}}>
      {!insightTexto[tipo]
        ?<button onClick={()=>gerarInsight(tipo)} disabled={insightLoad===tipo}
          style={{width:'100%',padding:'12px',borderRadius:11,border:'1px solid rgba(99,102,241,.4)',background:'rgba(99,102,241,.08)',color:'#6366f1',fontSize:12,fontWeight:700,cursor:'pointer'}}>
          {insightLoad===tipo?'⏳ Gerando insight...':'💡 Gerar insight desta análise'}
        </button>
        :<div style={{padding:'13px',borderRadius:11,background:'rgba(99,102,241,.1)',border:'1px solid rgba(99,102,241,.3)'}}>
          <div style={{fontSize:9,color:'#6366f1',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:6}}>💡 INSIGHT IA</div>
          <div style={{fontSize:11,color:'#e8edf5',lineHeight:1.6}}>{insightTexto[tipo]}</div>
        </div>
      }
    </div>
  );

  // ── SUB-ABA DIÁRIO — Relatório Semanal (Forma 1) ─────────────
  function SubDiario(){
    return(
      <div>
        {/* Navegação de semanas */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderRadius:12,background:'rgba(99,102,241,.06)',border:'1px solid rgba(99,102,241,.2)',marginBottom:14}}>
          <button onClick={()=>setSemOffset(v=>v-1)} style={{padding:'6px 14px',borderRadius:8,border:'1px solid rgba(99,102,241,.3)',background:'rgba(99,102,241,.1)',color:'#6366f1',fontSize:16,cursor:'pointer'}}>←</button>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:13,fontWeight:900,color:'#e8edf5'}}>Semana de {fmtData(sem.ini)} a {fmtData(sem.fim)}</div>
            <div style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace"}}>{semOffset===0?'SEMANA ATUAL':semOffset===-1?'SEMANA PASSADA':`há ${Math.abs(semOffset)} semanas`}</div>
          </div>
          <button onClick={()=>setSemOffset(v=>Math.min(v+1,0))} disabled={semOffset===0} style={{padding:'6px 14px',borderRadius:8,border:'1px solid rgba(99,102,241,.3)',background:semOffset===0?'rgba(148,163,184,.08)':'rgba(99,102,241,.1)',color:semOffset===0?'#334155':'#6366f1',fontSize:16,cursor:semOffset===0?'default':'pointer'}}>→</button>
        </div>

        {/* Cards de métricas */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:14}}>
          {[
            ['⏱',fmtMin(minSem),'Horas estudadas',`${Math.round(minSem/36/60*100)}% da meta 36h`,'#6366f1'],
            ['📅',diasSem,'Dias estudados',`${streak} dia(s) consecutivos`,'#60a5fa'],
            ['📝',totalQ||'—','Questões','nesta semana','#fbbf24'],
            ['🎯',pctSem!==null?pctSem+'%':'—','Acerto médio',pctSem!==null?(pctSem>=80?'✅ acima da meta':'⚠️ abaixo de 80%'):'sem dados','#34d399'],
          ].map(([ic,v,l,sub,c])=>(
            <div key={l} style={{padding:'14px',borderRadius:12,background:`${c}08`,border:`1px solid ${c}25`}}>
              <div style={{fontSize:11,marginBottom:4}}>{ic}</div>
              <div style={{fontSize:22,fontWeight:900,color:c,fontFamily:"'DM Mono',monospace",lineHeight:1}}>{v}</div>
              <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>{l}</div>
              <div style={{fontSize:8,color:'#475569',marginTop:2}}>{sub}</div>
            </div>
          ))}
        </div>

        {/* Barra de progresso da meta */}
        <div style={{marginBottom:14,padding:'12px',borderRadius:11,background:'rgba(99,102,241,.06)',border:'1px solid rgba(99,102,241,.18)'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style={{fontSize:10,color:'#6366f1',fontWeight:700}}>Meta semanal: 36h</span>
            <span style={{fontSize:10,color:'#6366f1',fontFamily:"'DM Mono',monospace",fontWeight:900}}>{Math.min(100,Math.round(minSem/36/60*100))}%</span>
          </div>
          <div style={{height:8,borderRadius:4,background:'rgba(255,255,255,.06)',overflow:'hidden'}}>
            <div style={{width:`${Math.min(100,Math.round(minSem/36/60*100))}%`,height:'100%',background:'#6366f1',borderRadius:4,transition:'width .5s'}}/>
          </div>
        </div>

        {/* Melhor e pior matéria */}
        {(melhor||pior)&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
            {melhor&&<div style={{padding:'12px',borderRadius:11,background:'rgba(52,211,153,.06)',border:'1px solid rgba(52,211,153,.2)'}}>
              <div style={{fontSize:8,color:'#34d399',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:4}}>🏆 MELHOR SEMANA</div>
              <div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{melhor.mat.replace('Dir. ','').slice(0,16)}</div>
              <div style={{fontSize:18,fontWeight:900,color:'#34d399',fontFamily:"'DM Mono',monospace"}}>{melhor.pct}%</div>
            </div>}
            {pior&&pior.mat!==melhor?.mat&&<div style={{padding:'12px',borderRadius:11,background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.2)'}}>
              <div style={{fontSize:8,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:4}}>⚠️ ATENÇÃO</div>
              <div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{pior.mat.replace('Dir. ','').slice(0,16)}</div>
              <div style={{fontSize:18,fontWeight:900,color:'#f87171',fontFamily:"'DM Mono',monospace"}}>{pior.pct}%</div>
            </div>}
          </div>
        )}

        {/* Top 3 matérias */}
        {top3.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace",letterSpacing:'1px',marginBottom:8}}>📊 TOP MATÉRIAS DA SEMANA</div>
            {top3.map((t,i)=>{
              const c=corAc(t.pct);
              return(
                <div key={t.mat} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',marginBottom:5}}>
                  <span style={{fontSize:14,fontWeight:900,color:'#334155',fontFamily:"'DM Mono',monospace",width:20}}>{i+1}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{t.mat}</div>
                    <div style={{fontSize:9,color:'#475569'}}>{fmtMin(t.min)} · {t.q} questões</div>
                  </div>
                  <div style={{fontSize:16,fontWeight:900,color:c,fontFamily:"'DM Mono',monospace"}}>{t.pct!==null?t.pct+'%':'—'}</div>
                </div>
              );
            })}
          </div>
        )}

        {histSem.length===0&&<div style={{textAlign:'center',padding:'24px',color:'#334155',fontSize:12,border:'1px dashed rgba(148,163,184,.15)',borderRadius:12,marginBottom:14}}>Nenhuma sessão registrada nesta semana.</div>}

        <BotaoInsight tipo="diario"/>
      </div>
    );
  }

  // ── SUB-ABA POR MATÉRIA (Forma 2) ────────────────────────────
  function SubPorMateria(){
    const corM=corMeirelles(meir.prioridade);
    const maxEvolPct=Math.max(...evolMat.map(e=>e.pct||0),100);
    return(
      <div>
        {/* Navegação de matérias */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <button onClick={()=>setMatIdx(v=>Math.max(0,v-1))} disabled={matIdx===0} style={{padding:'8px 14px',borderRadius:9,border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.03)',color:matIdx===0?'#334155':'var(--text3)',fontSize:13,cursor:matIdx===0?'default':'pointer'}}>←</button>
          <div style={{textAlign:'center',flex:1}}>
            <div style={{fontSize:8,color:'#64748b',fontFamily:"'DM Mono',monospace",marginBottom:2}}>{matIdx+1} / {matsOrdenadas.length}</div>
            <div style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{matAtual}</div>
            <span style={{fontSize:9,padding:'1px 7px',borderRadius:4,background:`${corM}20`,color:corM,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{labelMeirelles(meir.prioridade)}</span>
          </div>
          <button onClick={()=>setMatIdx(v=>Math.min(matsOrdenadas.length-1,v+1))} disabled={matIdx===matsOrdenadas.length-1} style={{padding:'8px 14px',borderRadius:9,border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.03)',color:matIdx===matsOrdenadas.length-1?'#334155':'var(--text3)',fontSize:13,cursor:matIdx===matsOrdenadas.length-1?'default':'pointer'}}>→</button>
        </div>

        {/* Card principal da matéria */}
        <div style={{padding:'16px',borderRadius:14,background:`${corM}08`,border:`2px solid ${corM}30`,marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <div style={{fontSize:11,color:corM,fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:4}}>{meir.ferramenta} · {gseedAtual.jornada||0}% jornada</div>
              <div style={{fontSize:36,fontWeight:900,color:corAc(pctMat),fontFamily:"'DM Mono',monospace",lineHeight:1}}>{pctMat!==null?pctMat+'%':'—'}</div>
              <div style={{fontSize:10,color:'#64748b',marginTop:4}}>{acMatTotal}/{qMatTotal} questões · {fmtMin(minMatTotal)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:9,color:'#64748b',marginBottom:4}}>nível</div>
              <div style={{fontSize:12,fontWeight:700,color:'#94a3b8'}}>{gseedAtual.nivel||'—'}</div>
            </div>
          </div>

          {/* Mini gráfico SVG evolução 6 semanas */}
          {evolMat.some(e=>e.pct!==null)&&(
            <div style={{marginTop:8}}>
              <div style={{fontSize:8,color:'#64748b',fontFamily:"'DM Mono',monospace",marginBottom:4}}>EVOLUÇÃO 6 SEMANAS</div>
              <svg viewBox="0 0 200 50" style={{width:'100%',height:50}}>
                <line x1="0" y1={50-(70/maxEvolPct)*50} x2="200" y2={50-(70/maxEvolPct)*50} stroke="#fbbf24" strokeWidth="0.5" strokeDasharray="3,3" opacity="0.5"/>
                <line x1="0" y1={50-(85/maxEvolPct)*50} x2="200" y2={50-(85/maxEvolPct)*50} stroke="#34d399" strokeWidth="0.5" strokeDasharray="3,3" opacity="0.5"/>
                {evolMat.map((e,i)=>{
                  if(e.pct===null)return null;
                  const x=i*(200/5);
                  const y=50-(e.pct/maxEvolPct)*50;
                  const next=evolMat[i+1];
                  return(
                    <g key={i}>
                      {next&&next.pct!==null&&<line x1={x} y1={y} x2={x+40} y2={50-(next.pct/maxEvolPct)*50} stroke="#6366f1" strokeWidth="1.5"/>}
                      <circle cx={x} cy={y} r="3" fill={corAc(e.pct)}/>
                    </g>
                  );
                })}
              </svg>
            </div>
          )}
        </div>

        {/* Assuntos ordenados do pior para melhor */}
        {gseedAtual.assuntos?.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace",letterSpacing:'1px',marginBottom:8}}>📖 ASSUNTOS — pior para melhor</div>
            {[...gseedAtual.assuntos].sort((a,b)=>(a.acerto||100)-(b.acerto||100)).map((as,i)=>{
              const c=corAc(as.acerto);
              return(
                <div key={i} style={{padding:'9px 12px',borderRadius:10,background:`${c}06`,border:`1px solid ${c}20`,marginBottom:5}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <div style={{fontSize:11,color:'var(--text)',fontWeight:700,flex:1,marginRight:8,lineHeight:1.3}}>{as.titulo}</div>
                    <div style={{fontSize:16,fontWeight:900,color:c,fontFamily:"'DM Mono',monospace",flexShrink:0}}>{as.acerto!==null?as.acerto+'%':'—'}</div>
                  </div>
                  <div style={{height:4,borderRadius:2,background:'rgba(255,255,255,.05)',overflow:'hidden'}}>
                    <div style={{width:`${as.acerto||0}%`,height:'100%',background:c,borderRadius:2}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <BotaoInsight tipo="materia"/>
      </div>
    );
  }

  // ── SUB-ABA VISÃO GERAL — Comparativo de Ciclos (Forma 3) ────
  function SubVisaoGeral(){
    const comParacomp=ciclsComp.filter(c=>c.pAtu!==null||c.pAnt!==null);
    const melhorouMais=[...comParacomp].filter(c=>c.delta!==null).sort((a,b)=>b.delta-a.delta)[0];
    const piorouMais=[...comParacomp].filter(c=>c.delta!==null).sort((a,b)=>a.delta-b.delta)[0];
    return(
      <div>
        {/* Resumo geral dos ciclos */}
        {(melhorouMais||piorouMais)&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
            {melhorouMais&&<div style={{padding:'12px',borderRadius:11,background:'rgba(52,211,153,.06)',border:'1px solid rgba(52,211,153,.2)'}}>
              <div style={{fontSize:8,color:'#34d399',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:4}}>📈 MAIS EVOLUIU</div>
              <div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{melhorouMais.mat.replace('Dir. ','').slice(0,16)}</div>
              <div style={{fontSize:18,fontWeight:900,color:'#34d399',fontFamily:"'DM Mono',monospace"}}>+{melhorouMais.delta}pts</div>
            </div>}
            {piorouMais&&piorouMais.delta<0&&<div style={{padding:'12px',borderRadius:11,background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.2)'}}>
              <div style={{fontSize:8,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:4}}>📉 MAIS CAIU</div>
              <div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{piorouMais.mat.replace('Dir. ','').slice(0,16)}</div>

              <div key={c.mat} style={{padding:'9px 12px',borderRadius:8,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',display:'grid',gridTemplateColumns:'1fr 52px 52px 40px',gap:4,marginBottom:4,alignItems:'center'}}>

        <BotaoInsight tipo="geral"/>

  // ── RENDER PRINCIPAL ─────────────────────────────────────────
  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>
      <div style={{fontSize:9,letterSpacing:'3px',color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:12}}>📓 DADOS DE ESTUDO</div>

      {/* Painel de negligência + pico — sempre visível (Forma 4) */}
      <PainelNegligencia/>

      {/* Sub-abas */}
      <div style={{display:'flex',gap:0,marginBottom:16,borderRadius:11,overflow:'hidden',border:'1px solid rgba(148,163,184,.15)'}}>
        {[['diario','📅 Semanal'],['materia','📈 Por Matéria'],['geral','📊 Ciclos']].map(([id,l])=>(
          <button key={id} onClick={()=>setSub(id)}
            style={{flex:1,padding:'10px 4px',border:'none',borderRight:'1px solid rgba(148,163,184,.1)',background:sub===id?'rgba(99,102,241,.15)':'rgba(255,255,255,.02)',color:sub===id?'#6366f1':'#475569',fontSize:10,fontWeight:sub===id?900:400,cursor:'pointer',fontFamily:"'DM Mono',monospace",transition:'all .15s'}}>
            {l}
          </button>

      </div>

      {sub==='diario'  &&<SubDiario/>}
      {sub==='materia' &&<SubPorMateria/>}
      {sub==='geral'   &&<SubVisaoGeral/>}
    </div>
  );
}
// ─── APP RAIZ ────────────────────────────────────────────────
function App(){
  const[feitos,setFeitos]=useState([]);
  const[cicloNum,setCicloNum]=useState(10);
  const[horas,setHoras]=useState([]);
  const[mit,setMit]=useState([]);
  const[historico,setHistorico]=useState(()=>lsGet('historico_diario',[]));
  const[tmIA,setTmIA]=useState(()=>lsGet('tm_ia_cache',null));
  const[darkMode,setDarkMode]=useState(()=>{
    const saved=localStorage.getItem('theme_mode');
    return saved!=='light'; // padrão escuro
  });

  useEffect(()=>{
    if(darkMode){document.body.classList.remove('light');document.body.classList.add('dark');}
    else{document.body.classList.remove('dark');document.body.classList.add('light');}
    lsSet('theme_mode',darkMode?'dark':'light');
  },[darkMode]);
  const[planoSemana,setPlanoSemana]=useState(()=>lsGet('plano_semanal',null));
  const[tab,setTab]=useState('ia');
  const[clock,setClock]=useState(new Date());
  const[showCfg,setShowCfg]=useState(false);
  const[trofeu,setTrofeu]=useState(false);
  const[syncSt,setSyncSt]=useState('idle');

  // ── SISTEMA DE VOLTA — detecta ausência e simplifica retorno ──
  const[telaVolta,setTelaVolta]=useState(false);
  const[voltaMotivo,setVoltaMotivo]=useState('');
  const[voltaModoMinimo,setVoltaModoMinimo]=useState(false);

  // Calcula dias desde o último acesso registrado
  const diasAusente=useMemo(()=>{
    const ultimo=lsGet('ultimo_acesso',null);
    if(!ultimo)return 0;
    return Math.floor((Date.now()-ultimo)/86400000);
  },[]);

  // Registra o acesso atual e decide se mostra tela de volta
  useEffect(()=>{
    const ultimo=lsGet('ultimo_acesso',null);
    const agora=Date.now();
    if(ultimo){
      const dias=Math.floor((agora-ultimo)/86400000);
      if(dias>=2)setTelaVolta(true);
      if(dias>=3)setVoltaModoMinimo(true); // 3+ dias → modo mínimo por padrão
    }
    lsSet('ultimo_acesso',agora);
  },[]);

  useEffect(()=>{
    Sync.onStatus(s=>setSyncSt(s));
    if(Sync.isConfigured()){Sync.init().then(ok=>{if(ok){setFeitos(lsGet('feitos',[]));setCicloNum(lsGet('cicloNum',1));setHoras(lsGet('horas',[]));setMit(lsGet('mit',[]));}});}
    // ── Seed único: simulado Guruja 13-19/07 (251 questões, 8 matérias) ──
    // Sem isso, a fila de Questões (últimos 7 dias) não enxerga esse resultado real.
    (()=>{
      const KEY='rity_seed_simulado_20260719';
      if(!localStorage.getItem(KEY)){
        try{
          const hist=JSON.parse(localStorage.getItem('historico_diario')||'[]');
          const novos=[
            {materia:'Dir. Administrativo',questoes:63,acertei:59,dt:Date.now(),origem:'guruja_simulado'},
            {materia:'Dir. Constitucional',questoes:42,acertei:40,dt:Date.now(),origem:'guruja_simulado'},
            {materia:'Português',questoes:22,acertei:19,dt:Date.now(),origem:'guruja_simulado'},
            {materia:'Dir. Civil',questoes:25,acertei:21,dt:Date.now(),origem:'guruja_simulado'},
            {materia:'Dir. Financeiro / AFO',questoes:43,acertei:37,dt:Date.now(),origem:'guruja_simulado'},
            {materia:'Dir. Penal',questoes:18,acertei:16,dt:Date.now(),origem:'guruja_simulado'},
            {materia:'Raciocínio Lógico',questoes:17,acertei:13,dt:Date.now(),origem:'guruja_simulado'},
            {materia:'Dir. Tributário',questoes:21,acertei:16,dt:Date.now(),origem:'guruja_simulado'},
          ];
          localStorage.setItem('historico_diario',JSON.stringify([...hist,...novos]));
          localStorage.setItem(KEY,'done');
        }catch(e){}
      }
    })();
    const _f=lsGet('feitos',[]);
    if(lsGet('ciclo_versao','')!=='v37'){
      if(_f.length>0)lsSet('feitos',[]);
      lsSet('cicloNum',19);lsSet('ciclo_versao','v37');
    }
    setFeitos(lsGet('feitos',[]));setCicloNum(lsGet('cicloNum',1));setHoras(lsGet('horas',[]));setMit(lsGet('mit',[]));
    const tick=setInterval(()=>setClock(new Date()),1000);
    return()=>clearInterval(tick);
  },[]);

  const feitosSet=useMemo(()=>new Set(feitos),[feitos]);
  const pendentes=useMemo(()=>CICLO.filter(s=>!feitosSet.has(s.id)),[feitosSet]);
  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[clock.toDateString()]);
  const semStart=todayStart-6*86400000;
  const tmSugestao=useMemo(()=>calcTempoMorto(feitos,horas,historico),[feitos,horas,historico,clock.toDateString()]);
  const minHoje=useMemo(()=>horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0),[horas,todayStart]);
  const minSemana=useMemo(()=>horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0),[horas,semStart]);
  const metaHoras=lsGet('meta_horas_sem',35);
  const appCtx={cicloNum,feitosN:feitos.length,N,pendentes,minHoje,minSemana};

  const registrarVolta=(motivo)=>{
    // Camada 3 — salva histórico de ausências para padrão IA
    const hist=lsGet('historico_ausencias',[]);
    if(diasAusente>=2){
      hist.push({
        dias:diasAusente,
        motivo,
        blocos:feitos.length,
        dt:Date.now(),
        semana:getDK(),
      });
      lsSet('historico_ausencias',hist.slice(-20)); // guarda últimas 20
    }
    setTelaVolta(false);
  };

  const concluir=id=>{if(feitos.includes(id))return;const n=[...feitos,id];if(n.length>=N){lsSet('feitos',[]);lsSet('cicloNum',cicloNum+1);setFeitos([]);setCicloNum(c=>c+1);setTrofeu(true);setTimeout(()=>setTrofeu(false),4000);}else{lsSet('feitos',n);setFeitos(n);}};
  const desmarcar=n=>{lsSet('feitos',n);setFeitos(n);};
  const irPara=id=>{
    const targetIdx=CICLO.findIndex(s=>s.id===id);
    // IDs de todos os blocos ANTES do destino
    const anteriores=CICLO.slice(0,targetIdx).map(s=>s.id);
    // Une os já feitos com os anteriores — sem apagar o que foi feito fora de ordem
    const merged=[...new Set([...feitos,...anteriores])];
    // Remove o bloco destino da lista (para ele ficar como próximo)
    const final=merged.filter(fid=>fid!==id);
    lsSet('feitos',final);setFeitos(final);
  };
  const addHoras=e=>{const n=[...horas,e];lsSet('horas',n);setHoras(n);};
  const syncHistorico=()=>setHistorico(lsGet('historico_diario',[]));
  const saveMIT=itens=>{lsSet('mit',itens);setMit(itens);};
  const savePlano=p=>{setPlanoSemana(p);lsSet('plano_semanal',p);};

  const pct=Math.round(feitos.length/N*100);
  const prox=pendentes[0];
  const corPrx=prox?.tag?.includes('TRIÂNGULO')?'#fbbf24':prox?.cor||'#fbbf24';
  const urgentes=lsGet('rev_urgentes',[]);

  const chaveOK=getAK().startsWith('sk-ant');

  const TABS=[
    {id:'ia',e:'🤖',l:'IA'},
    {id:'estudo',e:'📚',l:'Estudo'},
    {id:'hoje',e:'📅',l:'Hoje'},
    {id:'revisao',e:'🧠',l:'Revisão'},
    {id:'dados',e:'📓',l:'Dados'},
    {id:'mapa',e:'📊',l:'Mapa'},
  ];

  return(
    <div style={{minHeight:'100dvh',background:'var(--bg)',display:'flex',flexDirection:'column'}}>

      {/* ── TELA DE VOLTA — aparece quando ficou 2+ dias fora ── */}
      {telaVolta&&(
        <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:500,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{maxWidth:360,width:'100%'}}>
            {/* Ícone e saudação */}
            <div style={{textAlign:'center',marginBottom:28}}>
              <div style={{fontSize:48,marginBottom:12}}>
                {diasAusente>=7?'🌱':diasAusente>=3?'☕':'👋'}
              </div>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:'var(--text)',marginBottom:8}}>
                {diasAusente>=7
                  ?'Você voltou.'
                  :diasAusente>=3
                  ?'Bem-vinda de volta.'
                  :'Olá, Ritchely.'
                }
              </div>
              <div style={{fontSize:13,color:'var(--text4)',lineHeight:1.7}}>
                {diasAusente>=7
                  ?`Ficou ${diasAusente} dias fora. Tudo bem. O importante é que você voltou.`
                  :diasAusente>=3
                  ?`${diasAusente} dias fora. Não precisa recuperar tudo hoje.`
                  :`${diasAusente} dias fora. Vamos retomar.`
                }
              </div>
            </div>

            {/* O que aconteceu */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,color:'var(--text4)',fontFamily:"'DM Mono',monospace",marginBottom:10,textAlign:'center'}}>O QUE ACONTECEU?</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[
                  {v:'sobrecarregada',l:'Estava sobrecarregada'},
                  {v:'imprevisto',l:'Tive um imprevisto'},
                  {v:'desmotivada',l:'Perdi a motivação'},
                  {v:'pausa',l:'Precisava de uma pausa'},
                ].map(({v,l})=>(
                  <button key={v} onClick={()=>setVoltaMotivo(v)}
                    style={{padding:'12px 8px',borderRadius:10,border:`2px solid ${voltaMotivo===v?'#fbbf24':'var(--border)'}`,background:voltaMotivo===v?'rgba(251,191,36,.1)':'transparent',color:voltaMotivo===v?'#fbbf24':'var(--text4)',fontSize:12,cursor:'pointer',lineHeight:1.4,transition:'all .15s'}}>
                    {l}
                  </button>

            <div style={{padding:'16px',borderRadius:14,background:'rgba(167,139,250,.08)',border:'2px solid rgba(167,139,250,.3)',marginBottom:16}}>
              <div style={{fontSize:10,color:'#a78bfa',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:6,letterSpacing:'1px'}}>🃏 MODO MÍNIMO — começo mais fácil</div>

              <button onClick={()=>{registrarVolta(voltaMotivo||'pausa');setTab('hoje');}}

                🃏 Só Anki hoje — vamos lá
              </button>
            </div>

            {/* Ver tudo — secundário */}
            <button onClick={()=>registrarVolta(voltaMotivo||'pausa')}
              style={{width:'100%',padding:'11px',borderRadius:10,border:'1px solid var(--border)',background:'transparent',color:'var(--text4)',fontSize:12,cursor:'pointer'}}>

            {/* Padrão identificado — só aparece se tiver histórico */}

              const mediaD=Math.round(hist.reduce((s,h)=>s+h.dias,0)/hist.length);

            {!chaveOK&&<span onClick={()=>setShowCfg(true)} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(248,113,113,.12)',color:'#f87171',border:'1px solid rgba(248,113,113,.3)',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>⚠️ SEM CHAVE IA</span>}
            {urgentes.length>0&&<span onClick={()=>setTab('revisao')} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(248,113,113,.1)',color:'#f87171',border:'1px solid rgba(248,113,113,.25)',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>🚨 {urgentes.length} urgente{urgentes.length>1?'s':''}</span>}

              <div style={{fontSize:8,color:'var(--text4)',lineHeight:1,marginTop:2}}>{fmtMin(minHoje)} hoje · {fmtMin(minSemana)}/{metaHoras}h</div>
            </div>
            <button onClick={()=>setDarkMode(v=>!v)} title={darkMode?'Modo claro':'Modo escuro'} style={{width:32,height:32,borderRadius:'50%',border:'1px solid var(--border2)',background:'var(--card2)',color:'var(--text3)',fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{darkMode?'☀️':'🌙'}</button>
            <button onClick={()=>setShowCfg(true)} style={{width:32,height:32,borderRadius:'50%',border:'1px solid var(--border2)',background:'var(--card2)',color:'var(--text3)',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>⚙️</button>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div style={{display:'flex',gap:5}}>

            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.1)',color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>B{feitos.length}/{N}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.08)',color:Math.round(minSemana/(metaHoras*60)*100)>=100?'#34d399':'#fbbf24',fontFamily:"'DM Mono',monospace"}}>{Math.round(minSemana/(metaHoras*60)*100)}% meta</span>
          </div>
          <span style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace"}}>{pct}% · ciclo {cicloNum}</span>
        </div>
        <BarProg done={feitos.length} total={N} cor={corPrx} h={3}/>

            {t.badge>0&&<div style={{position:'absolute',top:4,right:'8%',width:14,height:14,borderRadius:'50%',background:'#f87171',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#050a14',fontWeight:900}}>{t.badge}</div>}
            <span style={{fontSize:a?20:17,transition:'font-size .15s'}}>{t.e}</span>
            <span style={{fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:a?800:400,color:a?'#fbbf24':'#334155'}}>{t.l}</span>
            {a&&<div style={{position:'absolute',top:0,left:'10%',right:'10%',height:2,borderRadius:1,background:'#fbbf24'}}/>}
          </button>
        );})}
      </div>

      {trofeu&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,flexDirection:'column',gap:16}} onClick={()=>setTrofeu(false)}>
          <div style={{fontSize:64}}>🏆</div>
          <div style={{fontFamily:"'DM Serif Display',serif",color:'#fbbf24',fontSize:26}}>Ciclo {cicloNum-1} completo!</div>
        </div>
      )}
      {showCfg&&<ModalConfig fechar={()=>setShowCfg(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>

<script>
if('serviceWorker' in navigator){
  // Cache versionado com timestamp do build — força atualização a cada deploy
  const BUILD_TS='${Date.now()}';
  const swCode=`
const CACHE='rity-os-${new Date().toISOString().slice(0,10)}-'+self.registration.scope.slice(-6).replace(/[^a-z0-9]/gi,'');
const ASSETS=[self.registration.scope];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(cache=>cache.addAll(ASSETS).catch(()=>{})));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>{console.log('[SW] Deletando cache antigo:',k);return caches.delete(k)}))));self.clients.claim();});
self.addEventListener('fetch',e=>{
  // Network-first: tenta rede, fallback para cache
  e.respondWith(
    fetch(e.request).then(r=>{
      const clone=r.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone)).catch(()=>{});
      return r;
    }).catch(()=>caches.match(e.request))
  );
});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
