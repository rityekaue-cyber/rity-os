// ── Tags dinâmicas — calculadas em runtime com base no historico real ──
function calcTagDinamica(mat){
  const hist=lsGet('historico_diario',[]);
  const difBase=lsGet('dif_base_materias',{});
  const regs=hist.filter(r=>r.materia===mat&&parseInt(r.questoes)>0);
  if(!regs.length){
    // Sem questões: usa dif base se definida
    const dif=difBase[mat]||0;
    if(dif>=4)return'🔴 CRÍTICO (base)';
    if(dif>=3)return'🟡 ATENÇÃO (base)';
    if(dif>0)return'🟢 OK (base)';
    return'⬜ NÃO INICIADO';
  }
  const tq=regs.reduce((s,r)=>s+(parseInt(r.questoes)||0),0);
  const ta=regs.reduce((s,r)=>s+(parseInt(r.acertei)||0),0);
  const pct=tq>0?Math.round(ta/tq*100):0;
  const lastDt=Math.max(...regs.map(r=>r.dt||0));
  const diasSem=Math.floor((Date.now()-lastDt)/86400000);
  if(pct>=85){
    if(diasSem>15)return'🟡 OXIDANDO ('+pct+'%)';
    return'🟢 SÓLIDO ('+pct+'%)';
  }
  if(pct>=70)return'🟡 ATENÇÃO ('+pct+'%)';
  return'🔴 CRÍTICO ('+pct+'%)';
}

  isOk(){return _sc!==null;},
  isConfigured(){return !!(localStorage.getItem(SUPA_URL_LS)&&localStorage.getItem(SUPA_KEY_LS));},
  getCfg(){return{url:localStorage.getItem(SUPA_URL_LS)||'',key:localStorage.getItem(SUPA_KEY_LS)||''};},
  saveCfg(url,key){localStorage.setItem(SUPA_URL_LS,url.trim());localStorage.setItem(SUPA_KEY_LS,key.trim());},
  async init(){
    if(!this.isConfigured())return false;
    if(typeof window.supabase==='undefined'){this._emit('offline');return false;}
    try{
      const{url,key}=this.getCfg();
      _sc=window.supabase.createClient(url,key);
      this._emit('syncing');
      const{data,error}=await _sc.from('rity_os').select('key,value,updated_at');
      if(error)throw error;
      // Mesclar: nuvem vence se updated_at mais recente que local
      const cloudMap={};
      (data||[]).forEach(r=>{cloudMap[r.key]=r;});
      (data||[]).forEach(r=>{
        try{
          const localRaw=localStorage.getItem(r.key);
          // Se não tem local ou nuvem é mais recente, usa nuvem
          if(!localRaw){localStorage.setItem(r.key,JSON.stringify(r.value));return;}
          // Se updated_at existe, compara; senão nuvem vence
          if(r.updated_at){
            const cloudTs=new Date(r.updated_at).getTime();
            const localMeta=localStorage.getItem('__ts_'+r.key);
            const localTs=localMeta?parseInt(localMeta):0;
            if(cloudTs>localTs)localStorage.setItem(r.key,JSON.stringify(r.value));
          }else{localStorage.setItem(r.key,JSON.stringify(r.value));}
        }catch{}
      });
      // Após pull, empurra chaves locais que não estão na nuvem
      const cloudKeys=new Set((data||[]).map(r=>r.key));
      const syncKeys=['feitos','cicloNum','horas','historico_diario','rev_anki','rev_nlm','rev_caderno','rev_1h30','rev_topicos','anki_meta','dif_base_materias','criticos_manuais','edital_status','guruja_data','plano_semanal','urgentes_ia','ia_hist','theme_mode','ciclo_versao'];
      for(const k of syncKeys){
        if(!cloudKeys.has(k)){
          const v=localStorage.getItem(k);
          if(v!==null){try{await _sc.from('rity_os').upsert({key:k,value:JSON.parse(v)},{onConflict:'key'});}catch{}}
        }
      }
      this._emit('ok');
      return true;
    }catch(e){console.warn('Sync:',e.message);_sc=null;this._emit('error');return false;}
  },
  push(k,v){
    if(!_sc)return;
    _sc.from('rity_os').upsert({key:k,value:v,updated_at:new Date().toISOString()},{onConflict:'key'})
      .then(({error})=>{if(!error)this._emit('ok');else this._emit('error');})
      .catch(()=>this._emit('error'));
    this._emit('syncing');
  }
};

const lsGet=(k,def=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch{return def;}};
const lsSet=(k,v)=>{
  try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  Sync.push(k,v); // sync em background, não bloqueia
};

const ANTHR_KEY_LS='__anthr_key__';
const getAK=()=>localStorage.getItem(ANTHR_KEY_LS)||'';
const setAK=v=>localStorage.setItem(ANTHR_KEY_LS,v.trim());

async function chamarClaude(systemPrompt,msgs,maxTokens=800){
  const k=getAK();
  if(!k)throw new Error('Chave da IA não configurada. Vá em ⚙️ → IA para configurar.');
  const headers={'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  if(k.startsWith('sk-ant'))headers['x-api-key']=k;
  else headers['Authorization']=`Bearer ${k}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers,
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system:systemPrompt,messages:msgs})
  });
  if(!res.ok){const err=await res.text();throw new Error(`API ${res.status}: ${err.slice(0,200)}`);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||'Erro da API');
  return data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'';
}

function beep(tipo){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notas=tipo==='pausa'?[[660,0,.2],[660,.25,.2]]:[[880,0,.15],[1108,.18,.15],[1320,.36,.25]];
    notas.forEach(([f,d,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+d+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+dur+.05);
    });
  }catch(e){}
}

function Pomodoro({cor,onFase}){
  const c=cor||'#fbbf24';
  const FASES=[{l:'1ª METADE',d:45*60,e:'📖'},{l:'PAUSA',d:10*60,e:'🚶'},{l:'2ª METADE',d:45*60,e:'✏️'}];
  const[fase,setFase]=useState(0);
  const[secs,setSecs]=useState(FASES[0].d);
  const[rodando,setRodando]=useState(false);
  const[feito,setFeito]=useState(false);
  const endRef=useRef(null);
  const timerRef=useRef(null);
  const disparouRef=useRef(false);
  const cur=FASES[fase];

  const limparTimer=()=>{clearInterval(timerRef.current);timerRef.current=null;};

  useEffect(()=>{
    if(!rodando){limparTimer();return;}
    disparouRef.current=false;
    timerRef.current=setInterval(()=>{
      const r=Math.max(0,Math.round((endRef.current-Date.now())/1000));
      setSecs(r);
      if(r===0&&!disparouRef.current){
        disparouRef.current=true;
        limparTimer();
        setRodando(false);
        setFeito(true);
        beep(fase===1?'pausa':'done');
        if(fase!==1&&onFase)onFase(45);
      }
    },400);
    return limparTimer;
  },[rodando,fase]);

  const iniciar=()=>{endRef.current=Date.now()+secs*1000;setRodando(true);setFeito(false);disparouRef.current=false;};
  const pausar=()=>{limparTimer();setSecs(Math.max(0,Math.round((endRef.current-Date.now())/1000)));endRef.current=null;setRodando(false);};
  const proxFase=()=>{limparTimer();const n=(fase+1)%3;setFase(n);setSecs(FASES[n].d);setRodando(false);setFeito(false);disparouRef.current=false;};
  const irFase=i=>{limparTimer();setFase(i);setSecs(FASES[i].d);setRodando(false);setFeito(false);};
  const reiniciar=()=>{limparTimer();setSecs(cur.d);setRodando(false);setFeito(false);};

  const mm=Math.floor(secs/60);const ss_=secs%60;
  const pct=Math.max(0,Math.min(1,1-secs/cur.d));
  const r=40;const circ=2*Math.PI*r;
  return(
    <div style={{padding:'13px',borderRadius:13,background:`${c}08`,border:`1px solid ${c}22`,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:4}}>
        <span style={{fontSize:9,letterSpacing:'2px',color:c,fontFamily:"'DM Mono',monospace",fontWeight:800}}>⏱ POMODORO 45·10·45</span>
        <div style={{display:'flex',gap:4}}>
          {FASES.map((f,i)=>(
            <button key={i} onClick={()=>irFase(i)} style={{padding:'2px 7px',borderRadius:4,cursor:'pointer',fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:700,background:fase===i?`${c}22`:'transparent',color:fase===i?c:'#334155',border:`1px solid ${fase===i?c+'44':'rgba(148,163,184,.25)'}`,transition:'all .15s'}}>
              {f.e} {f.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{position:'relative',width:88,height:88,flexShrink:0}}>
          <svg width="88" height="88" style={{transform:'rotate(-90deg)'}}>
            <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5"/>
            <circle cx="44" cy="44" r={r} fill="none" stroke={feito?'#34d399':c} strokeWidth="5"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
              style={{transition:'stroke-dashoffset .4s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:19,fontWeight:900,fontFamily:"'DM Mono',monospace",color:feito?'#34d399':rodando?'#fff':c,lineHeight:1}}>{pad(mm)}:{pad(ss_)}</div>
            <div style={{fontSize:8,color:'#64748b',marginTop:1}}>{Math.round(pct*100)}%</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:feito?'#34d399':'#c8d0e0',marginBottom:10}}>
            {feito?`✅ ${cur.l} concluída!`:rodando?`${cur.e} ${cur.l}...`:cur.l}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {feito?(
              <button onClick={proxFase} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#34d399,#34d399)',color:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {fase<2?'PRÓXIMA →':'🏆 FEITO'}
              </button>
            ):(
              <button onClick={rodando?pausar:iniciar} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:rodando?`${c}18`:`linear-gradient(135deg,${c},${c})`,color:rodando?c:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {rodando?'⏸ PAUSAR':'▶ INICIAR'}
              </button>
            )}
            <button onClick={reiniciar} style={{padding:'8px 10px',borderRadius:8,border:`1px solid ${c}30`,background:'transparent',color:c,fontSize:11,cursor:'pointer'}}>↺</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Retorna mapa { "Mat — Tópico": { q, a, pct } } do histórico real
function calcAcertoPorAssunto(){
  const hist=lsGet('historico_diario',[]);
  const por={};
  hist.forEach(r=>{
    if(!r.materia||!r.assunto)return;
    const q=parseInt(r.questoes)||0;
    const a=parseInt(r.acertei)||0;
    if(!q)return;
    const k=r.materia+'|||'+r.assunto;
    if(!por[k])por[k]={q:0,a:0,mat:r.materia,assunto:r.assunto,lastDt:0};
    por[k].q+=q; por[k].a+=a;
    if((r.dt||0)>por[k].lastDt)por[k].lastDt=r.dt||0;
  });
  return por;
}

// Calcula score de perigo: peso_topico × (1 - acerto) × fator_tempo
// score alto = tópico que cai muito + você está indo mal + faz tempo que não toca
function calcScorePerigo(pesoTopico, acertoPct, lastDtMs){
  const deficit = 1 - (acertoPct !== null ? acertoPct/100 : 0.7); // sem dado = assume 30% acerto
  const diasSem = Math.min(Math.floor((Date.now()-(lastDtMs||0))/86400000), 60);
  const fatorTempo = 1 + diasSem*0.02; // cada dia parado aumenta 2% o perigo
  return pesoTopico * deficit * fatorTempo;
}

// Retorna top N tópicos mais perigosos cruzando EDITAL × histórico real
function calcTop5Perigos(n=5){
  const porAssunto=calcAcertoPorAssunto();
  const todayMs=new Date().setHours(0,0,0,0);
  const perigos=[];
  Object.entries(EDITAL).forEach(([mat,dados])=>{
    dados.top.forEach(topico=>{
      const k=mat+'|||'+topico.t;
      const reg=porAssunto[k]||null;
      const acerto=reg?Math.round(reg.a/reg.q*100):null;
      const lastDt=reg?.lastDt||0;
      const score=calcScorePerigo(topico.p, acerto, lastDt);
      const diasSem=Math.floor((todayMs-(lastDt||0))/86400000);
      perigos.push({mat,topico:topico.t,pesoEdital:topico.p,acerto,score,diasSem,temDado:!!reg});
    });
  });
  return perigos.sort((a,b)=>b.score-a.score).slice(0,n);
}

// Retorna ranking de matérias com pontos em risco
function calcPontosEmRisco(){
  const hist=lsGet('historico_diario',[]);
  const porMat={};
  hist.forEach(r=>{
    if(!r.materia||!parseInt(r.questoes))return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0};
    porMat[r.materia].q+=parseInt(r.questoes)||0;
    porMat[r.materia].a+=parseInt(r.acertei)||0;
  });
  return Object.keys(EDITAL).map(mat=>{
    const reg=porMat[mat]||null;
    const acerto=reg&&reg.q>0?Math.round(reg.a/reg.q*100):null;
    const topPeso=EDITAL[mat].top.reduce((s,t)=>s+t.p,0); // soma dos tops
    const deficit=acerto!==null?(100-acerto)/100:0.5;
    const pontosRisco=Math.round(topPeso*deficit*10)/10;
    const pontosGarantidos=acerto!==null?Math.round(topPeso*(acerto/100)*10)/10:null;
    return{mat,acerto,pontosRisco,pontosGarantidos,topPeso,temDado:!!reg};
  }).sort((a,b)=>b.pontosRisco-a.pontosRisco);
}

// ── SAÚDE DA SEMANA — score composto 0-10 ────────────────────
function calcSaude(){
  const hoje=getDK();
  const todayMs=new Date().setHours(0,0,0,0);
  const semStart=todayMs-6*86400000;

  // Fator 1: Meta de horas (peso 2)
  const horas=lsGet('horas',[]);
  const minSem=horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0);
  const metaH=lsGet('meta_horas_sem',35)*60;
  const pctMeta=metaH>0?minSem/metaH:0;
  const f1=pctMeta>=0.8?2:pctMeta>=0.5?1:0;
  const f1label=pctMeta>=0.8?'✅':pctMeta>=0.5?'⚠️':'🔴';

  // Fator 2: Revisão TEC em dia (itens atrasados)
  const caderno=lsGet('rev_caderno',[]);
  const todayStr=new Date().toISOString().split('T')[0];
  const atrasados=caderno.filter(t=>!t.feito&&!t.dominado&&t.prazo&&t.prazo<todayStr).length;
  const f2=atrasados===0?2:atrasados<=2?1:0;
  const f2label=atrasados===0?'✅':atrasados<=2?'⚠️':'🔴';

  // Fator 3: Sequência de Anki (dias seguidos)
  let sequenciaAnki=0;
  for(let i=0;i<7;i++){
    const d=new Date(todayMs-i*86400000);
    const dk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(lsGet(`anki_feito_${dk}`,null))sequenciaAnki++;
    else break;
  }
  const f3=sequenciaAnki>=3?2:sequenciaAnki>=1?1:0;
  const f3label=sequenciaAnki>=3?'✅':sequenciaAnki>=1?'⚠️':'🔴';

  // Fator 4: Matérias críticas sem contato há 7+ dias
  const hist=lsGet('historico_diario',[]);
  const sete=todayMs-7*86400000;
  const porMat={};
  hist.forEach(r=>{
    if(!r.materia||!parseInt(r.questoes))return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,lastDt:0};
    porMat[r.materia].q+=parseInt(r.questoes)||0;
    porMat[r.materia].a+=parseInt(r.acertei)||0;
    if((r.dt||0)>porMat[r.materia].lastDt)porMat[r.materia].lastDt=r.dt||0;
  });
  const criticasSemContato=Object.entries(porMat).filter(([,v])=>{
    const pct=v.q>0?Math.round(v.a/v.q*100):100;
    return pct<70&&v.lastDt<sete;
  }).length;
  const f4=criticasSemContato===0?2:criticasSemContato<=2?1:0;
  const f4label=criticasSemContato===0?'✅':criticasSemContato<=2?'⚠️':'🔴';

  // Fator 5: Travamentos na semana
  const travamentos=hist.filter(r=>r.travou&&(r.dt||0)>=semStart).length;
  const f5=travamentos<=1?2:travamentos<=3?1:0;
  const f5label=travamentos<=1?'✅':travamentos<=3?'⚠️':'🔴';

  const score=f1+f2+f3+f4+f5;
  const nivel=score>=8?'ÓTIMA':score>=6?'BOA':score>=4?'ATENÇÃO':'RISCO';
  const cor=score>=8?'#34d399':score>=6?'#a3e635':score>=4?'#fbbf24':'#f87171';
  const emoji=score>=8?'💚':score>=6?'🟢':score>=4?'🟡':'🔴';

  return{
    score,nivel,cor,emoji,
    fatores:[
      {k:'Meta',label:f1label,detalhe:`${Math.round(pctMeta*100)}% da meta (${Math.floor(minSem/60)}h/${lsGet('meta_horas_sem',35)}h)`,val:f1},
      {k:'TEC',label:f2label,detalhe:`${atrasados} revisão(ões) atrasada(s)`,val:f2},
      {k:'Anki',label:f3label,detalhe:`${sequenciaAnki} dia(s) seguidos`,val:f3},
      {k:'Críticas',label:f4label,detalhe:`${criticasSemContato} matéria(s) crítica(s) sem contato`,val:f4},
      {k:'Travou',label:f5label,detalhe:`${travamentos} travamento(s) esta semana`,val:f5},
    ]
  };
}

// ── Helpers de aproveitamento ──────────────────────────────────
function calcRankingAproveitamento(){
  const historico=lsGet('historico_diario',[]);
  const difBase=lsGet('dif_base_materias',{});
  const porMat={};

  // Grupo 1: matérias com questões reais
  historico.forEach(r=>{
    if(!r.materia)return;
    const q=parseInt(r.questoes)||0;
    const a=parseInt(r.acertei)||0;
    if(!q)return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,temDado:true};
    porMat[r.materia].q+=q;
    porMat[r.materia].a+=a;
  });

  // Grupo 2: matérias sem questões mas com dificuldade base definida
  Object.entries(difBase).forEach(([mat,dif])=>{
    if(porMat[mat])return; // já tem dado real, ignora
    if(!dif)return;
    // Converte dif 1-5 em % equivalente: 5⭐=0%, 4⭐=30%, 3⭐=55%, 2⭐=75%, 1⭐=90%
    const pctEquiv=[90,75,55,30,0][dif-1];
    porMat[mat]={q:null,a:null,pct:pctEquiv,temDado:false,difBase:dif};
  });

  // Monta ranking
  const comDado=Object.entries(porMat)
    .filter(([,v])=>v.temDado)
    .map(([mat,v])=>{
      const pct=Math.round(v.a/v.q*100);
      const label=pct>=85?'🟢 SÓLIDO':pct>=70?'🟡 ATENÇÃO':'🔴 CRÍTICO';
      return{mat,pct,q:v.q,label,temDado:true};
    })
    .sort((a,b)=>a.pct-b.pct);

  const semDado=Object.entries(porMat)
    .filter(([,v])=>!v.temDado)
    .map(([mat,v])=>{
      const label=v.pct<=30?'🔴 CRÍTICO (base)':v.pct<=55?'🟡 ATENÇÃO (base)':'🟢 OK (base)';
      return{mat,pct:v.pct,difBase:v.difBase,label,temDado:false};
    })
    .sort((a,b)=>a.pct-b.pct);

  return{comDado,semDado};
}

function fmtRanking(){
  const{comDado,semDado}=calcRankingAproveitamento();
  const escala='ESCALA: ≥85%=SÓLIDO · 70-84%=ATENÇÃO · <70%=CRÍTICO';
  const parteComDado=comDado.length
    ? 'COM QUESTÕES (pior→melhor): '+comDado.map(r=>`${r.label} ${r.mat} ${r.pct}%(${r.q}Q)`).join(' | ')
    : 'Sem questões registradas ainda';
  const parteSemDado=semDado.length
    ? 'SEM QUESTÕES (dif base): '+semDado.map(r=>`${r.label} ${r.mat} dif${r.difBase}⭐`).join(' | ')
    : '';
  return [escala,parteComDado,parteSemDado].filter(Boolean).join(' || ');
}

  async function enviar(texto){
    if(carregando||!texto.trim())return;
    setCarregando(true);
    const nova=[...hist,{role:'user',content:texto}];
    setHist(nova);lsSet('ia_hist',nova);
    try{
      const resposta=await chamarClaude(buildSystem(),nova.slice(-18));
      const mitMatch=resposta.match(/MIT:\["([^"]+)","([^"]+)","([^"]+)"\]/);
      if(mitMatch)onMIT([mitMatch[1],mitMatch[2],mitMatch[3]]);
      const limpo=resposta.replace(/MIT:\[.*?\]/g,'').trim();
      const nova2=[...nova,{role:'assistant',content:limpo}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }catch(e){
      const nova2=[...nova,{role:'assistant',content:`❌ ${e.message}`}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }
    setCarregando(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  function iniciarDia(){
    const checkin=buildCheckin();
    setHist([]);lsSet('ia_hist',[]);
    const msg={role:'assistant',content:checkin};
    setHist([msg]);lsSet('ia_hist',[msg]);
    setTimeout(()=>inputRef.current?.focus(),300);
  }

  const gerarExporte=()=>{
    const hist=lsGet('historico_diario',[]);
    const horas=lsGet('horas',[]);
    const anki=lsGet('rev_anki',[]);
    const nlm=lsGet('rev_nlm',[]);
    const difBase=lsGet('dif_base_materias',{});
    const editalSt=lsGet('edital_status',{});
    const gurujaData=lsGet('guruja_data',null);
    const criticos=lsGet('criticos_manuais',[]);
    const d=new Date();

    // Aproveitamento por matéria
    const porMat={};
    hist.forEach(r=>{
      if(!r.materia)return;
      const q=parseInt(r.questoes)||0;const a=parseInt(r.acertei)||0;
      if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,travou:[],assuntos:{}};
      if(q){porMat[r.materia].q+=q;porMat[r.materia].a+=a;}
      if(r.travou)porMat[r.materia].travou.push(r.travou);
      if(r.assunto&&q){
        const k=r.assunto;
        if(!porMat[r.materia].assuntos[k])porMat[r.materia].assuntos[k]={q:0,a:0};
        porMat[r.materia].assuntos[k].q+=q;
        porMat[r.materia].assuntos[k].a+=a;
      }
    });

    // Horas por matéria
    const porHoras={};
    horas.forEach(e=>{
      const m=e.mat||'Geral';

    // Monta texto
    let txt=`═══════════════════════════════════════
RITY OS — EXPORTAÇÃO PARA IA
${d.toLocaleDateString('pt-BR')} · Ciclo ${appCtx.cicloNum} · Blocos ${appCtx.feitosN}/${N}
═══════════════════════════════════════

📊 APROVEITAMENTO POR MATÉRIA
Escala: ≥85% SÓLIDO · 70-84% ATENÇÃO · <70% CRÍTICO
───────────────────────────────────────
`;

    const ranking=Object.entries(porMat)
      .filter(([,v])=>v.q>0)
      .map(([mat,v])=>({mat,pct:Math.round(v.a/v.q*100),q:v.q,a:v.a,travou:v.travou,assuntos:v.assuntos}))
      .sort((a,b)=>a.pct-b.pct);

    ranking.forEach(r=>{
      const label=r.pct>=85?'🟢 SÓLIDO':r.pct>=70?'🟡 ATENÇÃO':'🔴 CRÍTICO';
      txt+=`${label} ${r.mat}: ${r.pct}% (${r.a}/${r.q}Q)
`;
      // Assuntos
      const assRank=Object.entries(r.assuntos)
        .map(([ass,v])=>({ass,pct:Math.round(v.a/v.q*100),q:v.q}))
        .sort((a,b)=>a.pct-b.pct);
      assRank.forEach(a=>{
        const al=a.pct>=85?'✅':a.pct>=70?'⚠️':'❌';
        txt+=`   ${al} ${a.ass}: ${a.pct}% (${a.q}Q)
`;
      });
      // O que travou
      if(r.travou.length>0){
        const uniq=[...new Set(r.travou)];
        txt+=`   🔴 Travou: ${uniq.slice(0,3).join('; ')}
`;
      }
    });

    // Matérias sem questões com dif base
    const semQuestoes=Object.entries(difBase).filter(([mat])=>!porMat[mat]||!porMat[mat].q);
    if(semQuestoes.length>0){
      txt+=`
📌 SEM QUESTÕES — DIFICULDADE BASE
───────────────────────────────────────
`;
      semQuestoes.forEach(([mat,dif])=>{
        const label=dif>=4?'🔴 CRÍTICO':dif>=3?'🟡 ATENÇÃO':'🟢 OK';
        txt+=`${label} ${mat}: dif base ${dif}⭐
`;
      });
    }

    // Horas por matéria
    txt+=`
⏱ HORAS POR MATÉRIA (total)
───────────────────────────────────────
`;
    Object.entries(porHoras)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,12)
      .forEach(([mat,min])=>{
        const h=Math.floor(min/60);const m2=min%60;
        txt+=`${mat}: ${h>0?h+'h':''}${m2>0?m2+'min':''}
`;
      });

    // Status do edital
    const matsEdital=Object.keys(EDITAL);
    txt+=`
📋 STATUS DO EDITAL
───────────────────────────────────────
`;
    matsEdital.forEach(mat=>{
      const tops=EDITAL[mat].top;
      const dom=tops.filter(t=>editalSt[mat+':'+t.t]==='domino').length;
      const est=tops.filter(t=>editalSt[mat+':'+t.t]==='estudei').length;
      if(dom>0||est>0){
        txt+=`${mat}: ✅${dom} domino · 🟡${est} estudei · ⬜${tops.length-dom-est} pendente
`;
        tops.filter(t=>editalSt[mat+':'+t.t]==='estudei').forEach(t=>{
          txt+=`   🟡 ${t.t} (${t.p}%)
`;
        });
      }
    });

    // Pontos críticos manuais
    if(criticos.length>0){
      txt+=`
🎯 PONTOS CRÍTICOS MANUAIS
───────────────────────────────────────
`;
      criticos.forEach(c2=>{
        txt+=`${c2.prioridade==='alta'?'🔴':c2.prioridade==='media'?'🟡':'🟢'} ${c2.mat}`;

        txt+='\n';
      });
    }

    // Ciclo atual
    txt+=`
🔄 CICLO ATUAL — BLOCOS PENDENTES
───────────────────────────────────────
`;
    const feitos=lsGet('feitos',[]);
    const feitosSet=new Set(feitos);
    CICLO.filter(s=>!feitosSet.has(s.id)).forEach(s=>{
      txt+=`B${s.id} ${s.mat} — ${s.conteudo||s.tag||''}
`;
    });

    // Guruja
    if(gurujaData?.alerta){
      txt+=`
📊 GURUJA
───────────────────────────────────────
`;
      txt+=`Alerta: ${gurujaData.alerta}
`;
    }

    // Anki
    const ankiRegs=lsGet('rev_anki',[]);
    if(ankiRegs.length>0){
      txt+=`
🃏 ANKI — ${ankiRegs.length} sessões
───────────────────────────────────────
`;
      const porAnki={};
      ankiRegs.forEach(r=>{
        if(!r.mat)return;
        if(!porAnki[r.mat])porAnki[r.mat]={s:0,cards:0,q:0,difs:[],last:''};
        porAnki[r.mat].s++;porAnki[r.mat].cards+=parseInt(r.cards)||0;
        porAnki[r.mat].q+=parseInt(r.questoes)||0;
        if(r.dif)porAnki[r.mat].difs.push(r.dif);
        if(r.dia>porAnki[r.mat].last)porAnki[r.mat].last=r.dia;
      });
      Object.entries(porAnki).sort((a,b)=>(b[1].difs.reduce((s,d)=>s+d,0)/(b[1].difs.length||1))-(a[1].difs.reduce((s,d)=>s+d,0)/(a[1].difs.length||1)))
        .forEach(([mat,v])=>{
          const dm=v.difs.length?(v.difs.reduce((s,d)=>s+d,0)/v.difs.length).toFixed(1):'-';
          const lbl=parseFloat(dm)>=4?'🔴':parseFloat(dm)>=3?'🟡':'🟢';
          txt+=`${lbl} ${mat}: ${v.s} sessões · ${v.cards} cards · ${v.q}Q · dif ${dm}★ · último: ${v.last}
`;
        });
    }

    // NLM
    const nlmRegs=lsGet('rev_nlm',[]);
    if(nlmRegs.length>0){
      txt+=`
🎧 NOTEBOOKLM — ${nlmRegs.length} sessões
───────────────────────────────────────
`;
      const porNlm={};
      nlmRegs.forEach(r=>{
        if(!r.mat)return;
        if(!porNlm[r.mat])porNlm[r.mat]={s:0,min:0,difs:[],oque:[],last:''};
        porNlm[r.mat].s++;porNlm[r.mat].min+=parseInt(r.tempo)||0;
        if(r.dif)porNlm[r.mat].difs.push(r.dif);
        if(r.oque&&!porNlm[r.mat].oque.includes(r.oque))porNlm[r.mat].oque.push(r.oque);
        if(r.dia>porNlm[r.mat].last)porNlm[r.mat].last=r.dia;
      });
      Object.entries(porNlm).sort((a,b)=>(b[1].difs.reduce((s,d)=>s+d,0)/(b[1].difs.length||1))-(a[1].difs.reduce((s,d)=>s+d,0)/(a[1].difs.length||1)))
        .forEach(([mat,v])=>{
          const dm=v.difs.length?(v.difs.reduce((s,d)=>s+d,0)/v.difs.length).toFixed(1):'-';
          const lbl=parseFloat(dm)>=4?'🔴':parseFloat(dm)>=3?'🟡':'🟢';
          const h=Math.floor(v.min/60);const m2=v.min%60;
          txt+=`${lbl} ${mat}: ${v.s} sessões · ${h>0?h+'h':''}${m2>0?m2+'min':''} · dif ${dm}★ · último: ${v.last}
`;
          if(v.oque.length)txt+=`   Conteúdo: ${v.oque.slice(0,2).join('; ')}
`;
        });
    }

    // Caderno de Erros
    const cadRegs=lsGet('rev_caderno',[]);
    if(cadRegs.length>0){
      txt+=`
📕 CADERNO DE ERROS — ${cadRegs.length} sessões
───────────────────────────────────────
`;
      const porCad={};
      cadRegs.forEach(r=>{
        if(!r.mat)return;
        if(!porCad[r.mat])porCad[r.mat]={q:0,anki:0,nlm:0,s:0};
        porCad[r.mat].s++;porCad[r.mat].q+=parseInt(r.questoes)||0;
        porCad[r.mat].anki+=parseInt(r.anki)||0;porCad[r.mat].nlm+=parseInt(r.nlm)||0;
      });
      Object.entries(porCad).sort((a,b)=>b[1].q-a[1].q).forEach(([mat,v])=>{
        txt+=`${mat}: ${v.q}Q vistas · ${v.anki} pro Anki · ${v.nlm} pro NLM (${v.s} sessões)
`;
      });
    }

    // Revisão 1h30
    const rev1h30=lsGet('rev_1h30',[]);
    if(rev1h30.length>0){
      txt+=`
🔄 REVISÃO 1H30 — ${rev1h30.length} revisões
───────────────────────────────────────
`;
      rev1h30.slice(-4).reverse().forEach(r=>{
        txt+=`${r.dia} (bloco ${r.blocoRef}):
`;
        (r.slots||[]).filter(s=>s.mat).forEach(s=>{
          const oq=(s.oque||[]).join(', ')||'-';
          txt+=`  • ${s.mat}: ${oq}${s.questoes?' · '+s.questoes+'Q':''}${s.dif?' · dif '+s.dif+'★':''}
`;
        });
      });
    }

    // Tópicos para revisitar
    const topicos=lsGet('rev_topicos',[]);

      txt+=`
📌 TÓPICOS PARA REVISITAR — ${topPend.length} pendentes
───────────────────────────────────────
`;
      topPend.forEach(t=>{txt+=`• ${t.txt}
`;});
    }

    txt+=`
═══════════════════════════════════════
Cole este texto no Claude.ai para análise completa.
═══════════════════════════════════════`;

    setExportTxt(txt);
    setExportModal(true);
  };

// ── MOTOR UNIFICADO: Forma 1 (roteamento por canal) + Forma 4 (penalidade de ausência) ──
// Cada canal tem lógica própria e memória de quando cada matéria apareceu nele.
// Penalidade: quanto mais dias sem aparecer naquele canal, maior o score naquele canal.

function _buildBaseMat(historico){
  // Constrói mapa base por matéria com todos os dados necessários
  const todayMs=new Date().setHours(0,0,0,0);
  const semStart=todayMs-7*86400000;
  const porMat={};
  const allMats=CICLO.map(s=>s.mat).filter((v,i,a)=>a.indexOf(v)===i);
  allMats.forEach(m=>{porMat[m]={q:0,a:0,difs:[],travou:0,lastDt:0,lastAnki:0,lastNlm:0,lastRev1h:0};});
  historico.slice(-60).forEach(r=>{
    if(!r.materia)return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,difs:[],travou:0,lastDt:0,lastAnki:0,lastNlm:0,lastRev1h:0};
    const v=porMat[r.materia];
    if(parseInt(r.questoes)>0){v.q+=parseInt(r.questoes)||0;v.a+=parseInt(r.acertei)||0;}
    if(r.dificuldade)v.difs.push(r.dificuldade);
    if((r.dt||0)>v.lastDt)v.lastDt=r.dt||0;
    if(r.travou&&(r.dt||0)>=semStart)v.travou++;
  });
  const ankiRegs=lsGet('rev_anki',[]);
  ankiRegs.forEach(r=>{if(r.mat&&porMat[r.mat]&&(r.dt||0)>porMat[r.mat].lastAnki)porMat[r.mat].lastAnki=r.dt||0;});
  const nlmRegs=lsGet('rev_nlm',[]);
  nlmRegs.forEach(r=>{if(r.mat&&porMat[r.mat]&&(r.dt||0)>porMat[r.mat].lastNlm)porMat[r.mat].lastNlm=r.dt||0;});
  const rev1h30=lsGet('rev_1h30',[]);
  rev1h30.forEach(reg=>{(reg.slots||[]).forEach(s=>{if(s.mat&&porMat[s.mat]&&(reg.dt||0)>porMat[s.mat].lastRev1h)porMat[s.mat].lastRev1h=reg.dt||0;});});
  return{porMat,todayMs};
}

function calcMotorCanais(feitos,horas,historico){
  const{porMat,todayMs}=_buildBaseMat(historico);

  const diasSem=(lastDt)=>Math.floor((todayMs-(lastDt||0))/86400000);
  const deficit=(v)=>v.q>0?(1-v.a/v.q):0.5; // sem dado = assume 50% déficit
  const difMedia=(v)=>v.difs.length?v.difs.reduce((s,d)=>s+d,0)/v.difs.length:2.5;
  const pesoEdital=(mat)=>{
    const tops=EDITAL[mat]?.top||[];
    return tops.reduce((s,t)=>s+t.p,0)/100; // normalizado 0-1
  };

  // ── CANAL ANKI: score = déficit × 3 + diasSemAnki × 0.4 + travou × 1.5 ──
  // Forma 1: prioriza déficit de acerto
  // Forma 4: penaliza ausência no canal Anki especificamente
  const rankAnki=Object.entries(porMat).map(([mat,v])=>{
    const score=deficit(v)*3 + diasSem(v.lastAnki)*0.4 + v.travou*1.5 + difMedia(v)*0.5;
    return{mat,score,pct:v.q>0?Math.round(v.a/v.q*100):null,diasSemAnki:diasSem(v.lastAnki),motivo:''};
  }).sort((a,b)=>b.score-a.score);

  // 3 matérias para Anki sem repetição, cada uma com justificativa
  const anki1=rankAnki[0]||null;
  const anki2=rankAnki.find(r=>r.mat!==anki1?.mat)||null;
  const anki3=rankAnki.find(r=>r.mat!==anki1?.mat&&r.mat!==anki2?.mat)||null;
  if(anki1)anki1.motivo=`déficit ${anki1.pct!==null?anki1.pct+'%':'sem dado'} · ${anki1.diasSemAnki}d sem Anki`;
  if(anki2)anki2.motivo=`${anki2.diasSemAnki}d sem Anki · déficit ${anki2.pct!==null?anki2.pct+'%':'sem dado'}`;
  if(anki3)anki3.motivo=`${anki3.diasSemAnki}d sem Anki`;
  const ankiMaterias=[
    anki1?{mat:anki1.mat,cards:35,motivo:anki1.motivo}:null,
    anki2?{mat:anki2.mat,cards:20,motivo:anki2.motivo}:null,
    anki3?{mat:anki3.mat,cards:20,motivo:anki3.motivo}:null,
  ].filter(Boolean);
  if(!ankiMaterias.length)ankiMaterias.push({mat:'Matéria prioritária',cards:75,motivo:'meta do dia'});

  // ── CANAL NLM ÁUDIO: score = diasSemNlm × 0.6 + déficit × 1.5 + pesoEdital × 0.3 ──
  // Forma 1: prioriza tempo sem teoria (NLM é canal passivo/teórico)
  // Forma 4: penaliza ausência no canal NLM especificamente
  const rankNlm=Object.entries(porMat).map(([mat,v])=>{
    const score=diasSem(v.lastNlm)*0.6 + deficit(v)*1.5 + pesoEdital(mat)*0.3 + v.travou*0.8;
    return{mat,score,pct:v.q>0?Math.round(v.a/v.q*100):null,diasNlm:diasSem(v.lastNlm)};
  }).sort((a,b)=>b.score-a.score);
  const nlmTop=rankNlm[0]||null;

  // ── CANAL REVISÃO 1h: score = pesoEdital × 2 + diasSemRev × 0.5 + déficit × 1 ──
  // Forma 1: prioriza impacto na nota (peso no edital)
  // Forma 4: penaliza ausência no canal Revisão 1h especificamente
  const rankRev1h=Object.entries(porMat).map(([mat,v])=>{
    const score=pesoEdital(mat)*2 + diasSem(v.lastRev1h)*0.5 + deficit(v)*1 + v.travou*0.5;
    return{mat,score,pct:v.q>0?Math.round(v.a/v.q*100):null,diasSemRev:diasSem(v.lastRev1h)};
  }).sort((a,b)=>b.score-a.score);
  const rev1hTop=rankRev1h.slice(0,3);

  // ── Ranking geral para tempo morto / contexto IA ──
  const rankGeral=Object.entries(porMat).map(([mat,v])=>{
    const score=deficit(v)*2+difMedia(v)*1+diasSem(v.lastDt)*0.3+v.travou*1.2+pesoEdital(mat)*0.5;
    return{mat,score,difMedia:difMedia(v),diasSem:diasSem(v.lastDt)};
  }).sort((a,b)=>b.score-a.score);

  const travouRecente=historico.slice(-5).filter(r=>r.travou).map(r=>`${r.materia}: ${r.travou}`);

  return{
    anki:{materias:ankiMaterias,ranking:rankAnki.slice(0,5)},
    nlm:{top:nlmTop,ranking:rankNlm.slice(0,5)},
    rev1h:{top:rev1hTop,ranking:rankRev1h.slice(0,5)},
    geral:rankGeral.slice(0,5),
    travouRecente,
    ts:Date.now(),
  };
}

// Mantém compatibilidade com código legado que usa calcTempoMorto
function calcTempoMorto(feitos,horas,historico){
  const motor=calcMotorCanais(feitos,horas,historico);
  const fallback={mat:'AFO',difMedia:0,diasSem:0};
  return{
    anki:motor.geral[0]||fallback,
    nlm:motor.nlm.top?{mat:motor.nlm.top.mat,difMedia:0,diasSem:motor.nlm.top.diasNlm}:motor.geral[1]||fallback,
    ranking:motor.geral,
    travouRecente:motor.travouRecente,
    ts:motor.ts,
  };
}


// ── Motor Revisão de Hoje (Modo 2 — esqueleto) ─────────────────
function calcRevisaoHoje(feitos){
  const hoje=getDK();
  const dw=new Date().getDay();
  const trabalha=[2,4,5].includes(dw);
  const historico=lsGet('historico_diario',[]);
  const caderno=lsGet('rev_caderno',[]);
  const todayMs=new Date().setHours(0,0,0,0);
  const ontemMs=todayMs-86400000;
  const ontemKey=new Date(ontemMs).toISOString().split('T')[0];
  const naoFeitoOntem=lsGet(`nao_fiz_${ontemKey}`,null);
  const ankiMeta=lsGet('anki_meta',{meta:75,backlog:0});
  const metaHoje=ankiMeta.meta||75;
  const ankiHoje=lsGet(`anki_feito_${hoje}`,null);

  // Usa o novo motor de canais
  const motor=calcMotorCanais(feitos,lsGet('horas',[]),historico);

  // TEC — usa rev_caderno unificado
  const tecHoje=caderno.filter(t=>{
    if(t.feito||t.dominado||!t.prazo)return false;
    return new Date(t.prazo).setHours(0,0,0,0)<=todayMs;
  });
  const tecProximo=caderno.filter(t=>{
    if(t.feito||t.dominado||!t.prazo)return false;
    const p=new Date(t.prazo).setHours(0,0,0,0);
    return p>todayMs&&p<=todayMs+7*86400000;
  });
  const tecCronico=caderno.filter(t=>!t.feito&&!t.dominado&&(t.tentativas||1)>=3);

  const nlmFeito=lsGet(`nlm_feito_${hoje}`,false);
  const blocoAtual=feitos?feitos.length:0;
  const janelaMeio=blocoAtual>=12&&blocoAtual<=14;
  const janelaFinal=blocoAtual>=20&&blocoAtual<=22;
  const janelaAtiva=janelaMeio||janelaFinal;

  // Alertas
  const alertas=[];
  if(tecCronico.length>0)alertas.push({tipo:'cronico',msg:`${tecCronico[0].mat} errado ${tecCronico[0].tentativas}x — considere NLM`});
  if((ankiMeta.backlog||0)>150)alertas.push({tipo:'backlog',msg:`Backlog Anki: ${ankiMeta.backlog} — não adicionar novos por 2 dias`});
  if(janelaAtiva)alertas.push({tipo:'janela',msg:`Bloco ${blocoAtual}/25 — janela NLM ativa`});

  return{
    anki:{meta:metaHoje,materias:motor.anki.materias,feito:ankiHoje,backlog:ankiMeta.backlog||0},
    tec:{hoje:tecHoje,proximo:tecProximo,cronico:tecCronico},
    nlm:{
      candidato:motor.nlm.top?{mat:motor.nlm.top.mat,pct:motor.nlm.top.pct,diasNlm:motor.nlm.top.diasNlm,travou:0,emJanela:janelaAtiva,score:motor.nlm.top.score}:null,
      todos:motor.nlm.ranking.slice(0,3).map(r=>({mat:r.mat,pct:r.pct,diasNlm:r.diasNlm,score:r.score,emJanela:janelaAtiva})),
      janelaAtiva,feito:nlmFeito,blocoAtual
    },
    rev1h:motor.rev1h,
    alertas,trabalha,hojeKey:hoje,naoFeitoOntem,
    motor, // expõe o motor completo para uso na UI
  };
}

function TabHoje({feitos,onAddHoras}){
  const hoje=getDK();
  const dw=new Date().getDay();
  const NOMES_DW=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const trabalha=[2,4,5].includes(dw);
  const totalH=trabalha?4:6;

  // ── Estados colapsáveis ──────────────────────────────────────
  const[abertos,setAbertos]=useState({despacho:true,anki:false,tec:false,nlm:false});
  const toggle=k=>setAbertos(p=>({...p,[k]:!p[k]}));

  // ── Estados de dados ─────────────────────────────────────────
  const[ankiFeito,setAnkiFeito]=useState(()=>lsGet(`anki_feito_${hoje}`,null));
  const[tecModal,setTecModal]=useState(false);
  const[tecForm,setTecForm]=useState({mat:'',assunto:'',feitas:'',acertei:'',prazo:'D+3',obs:''});
  const[tecSalvo,setTecSalvo]=useState(false);
  const[despacho,setDespacho]=useState(()=>lsGet(`despacho_ia_${hoje}`,null));
  const[despachoLoad,setDespachoLoad]=useState(false);
  const[naoFiz,setNaoFiz]=useState(()=>lsGet(`nao_fiz_${hoje}`,{}));
  const[naoFizModal,setNaoFizModal]=useState(null); // 'anki'|'tec'|'nlm'
  const[naoFizMotivo,setNaoFizMotivo]=useState('');
  const[ankiCards,setAnkiCards]=useState({});
  const[ankiExpandMats,setAnkiExpandMats]=useState(false);

  // ── Motor: calcula tudo ───────────────────────────────────────
  const rev=useMemo(()=>calcRevisaoHoje(feitos),[feitos,hoje]);

  // ── Alerta de Oxidação: matérias ≥85% sem aparecer há 15+ dias ──
  const alertaOxidacao=useMemo(()=>{
    const hist=lsGet('historico_diario',[]);
    const todayMs=new Date().setHours(0,0,0,0);
    const porMat={};
    hist.forEach(r=>{
      if(!r.materia||!parseInt(r.questoes))return;
      if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,lastDt:0};
      porMat[r.materia].q+=parseInt(r.questoes)||0;
      porMat[r.materia].a+=parseInt(r.acertei)||0;
      if((r.dt||0)>porMat[r.materia].lastDt)porMat[r.materia].lastDt=r.dt||0;
    });
    return Object.entries(porMat)
      .filter(([,v])=>{
        const pct=v.q>0?Math.round(v.a/v.q*100):0;
        const diasSem=Math.floor((todayMs-(v.lastDt||0))/86400000);
        return pct>=85&&diasSem>=15;
      })
      .map(([mat,v])=>{
        const pct=Math.round(v.a/v.q*100);
        const diasSem=Math.floor((todayMs-(v.lastDt||0))/86400000);
        return{mat,pct,diasSem};
      })
      .sort((a,b)=>b.diasSem-a.diasSem);
  },[hoje]);

  // ── Motor ANKI + NLM: usa novo motor de canais (Forma 1 + Forma 4) ────────
  const ankiMaterias=useMemo(()=>{
    const hist=lsGet('historico_diario',[]);
    const motor=calcMotorCanais(feitos,lsGet('horas',[]),hist);
    return motor.anki.materias;
  },[feitos,hoje]);

  // ── Motor TEC: usa rev_caderno unificado ──────────────────────
  const tecHoje=useMemo(()=>{
    const caderno=lsGet('rev_caderno',[]);
    const todayMs=new Date().setHours(0,0,0,0);
    const d3=[],d15=[],d30=[];
    caderno.filter(t=>!t.feito&&!t.dominado&&t.prazo).forEach(t=>{
      const prazoMs=new Date(t.prazo).setHours(0,0,0,0);
      const diff=Math.round((prazoMs-todayMs)/86400000);
      if(diff<=0)d3.push({...t,atrasado:diff<0});
      else if(diff<=7)d15.push(t);
      else d30.push(t);
    });
    return{d3,d15,d30,total:caderno.filter(t=>!t.feito&&!t.dominado).length};
  },[hoje]);

  // ── Motor NLM: usa novo motor de canais ─────────────────────
  const nlmSugerido=useMemo(()=>{
    const hist=lsGet('historico_diario',[]);
    const motor=calcMotorCanais(feitos,lsGet('horas',[]),hist);
    const blocoAtual=feitos?.length||0;
    const emJanela=(blocoAtual>=12&&blocoAtual<=14)||(blocoAtual>=20&&blocoAtual<=22);
    const top=motor.nlm.top;
    if(!top)return null;
    return{mat:top.mat,pct:top.pct,diasNlm:top.diasNlm,travou:0,emJanela,score:top.score};
  },[feitos,hoje]);

  // ── Ações ─────────────────────────────────────────────────────
  const marcarAnki=()=>{
    const total=Object.values(ankiCards).reduce((s,v)=>s+(parseInt(v)||0),0)||75;
    const registro={feito:true,cards:total,porMat:ankiCards,mats:ankiMaterias,dt:Date.now()};
    lsSet(`anki_feito_${hoje}`,registro);
    setAnkiFeito(registro);
    if(onAddHoras)onAddHoras({mat:'Anki',min:30,dt:Date.now()});
  };

  const marcarNaoFiz=()=>{
    const novo={...naoFiz,[naoFizModal]:{motivo:naoFizMotivo,dt:Date.now()}};
    lsSet(`nao_fiz_${hoje}`,novo);
    setNaoFiz(novo);
    setNaoFizModal(null);setNaoFizMotivo('');
  };

  const salvarTec=()=>{
    if(!tecForm.mat)return;
    const prazoDias={'D+3':3,'D+15':15,'D+45':45}[tecForm.prazo]||3;
    const prazoDate=new Date();prazoDate.setDate(prazoDate.getDate()+prazoDias);
    const prazoStr=prazoDate.toISOString().split('T')[0];
    const pct=tecForm.feitas&&tecForm.acertei?Math.round(parseInt(tecForm.acertei)/parseInt(tecForm.feitas)*100):null;
    const novo={id:Date.now(),mat:tecForm.mat,assunto:tecForm.assunto,feitas:parseInt(tecForm.feitas)||0,acertei:parseInt(tecForm.acertei)||0,pct,prazo:prazoStr,prazoLabel:tecForm.prazo,fase:1,tentativas:1,feito:false,dominado:false,dia:hoje,obs:tecForm.obs,origem:'hoje'};
    const caderno=[...lsGet('rev_caderno',[]),novo];
    lsSet('rev_caderno',caderno);
    setTecForm({mat:'',assunto:'',feitas:'',acertei:'',prazo:'D+3',obs:''});
    setTecSalvo(true);setTimeout(()=>{setTecSalvo(false);setTecModal(false);},1500);
  };

  const marcarTecItem=(id,acertou)=>{
    const caderno=lsGet('rev_caderno',[]).map(t=>{
      if(t.id!==id)return t;
      if(acertou){
        const fase=t.fase||1;
        if(fase>=3)return{...t,feito:true,dominado:true};
        const proxFase=fase+1;
        const proxDias=proxFase===2?15:30;
        const novo=new Date();novo.setDate(novo.getDate()+proxDias);
        return{...t,prazo:novo.toISOString().split('T')[0],prazoLabel:proxFase===2?'D+15':'D+45',fase:proxFase};
      }
      const fase=t.fase||1;
      const voltaDias=fase===3?15:3;
      const voltaFase=fase===3?2:1;
      const novo=new Date();novo.setDate(novo.getDate()+voltaDias);
      return{...t,prazo:novo.toISOString().split('T')[0],prazoLabel:fase===3?'D+15':'D+3',fase:voltaFase,tentativas:(t.tentativas||1)+1};
    });
    lsSet('rev_caderno',caderno);
  };

  const gerarDespacho=async()=>{
    if(despachoLoad)return;
    const k=getAK();if(!k?.startsWith('sk-ant'))return;
    setDespachoLoad(true);
    try{
      const ontem=lsGet(`nao_fiz_${(()=>{const d=new Date();d.setDate(d.getDate()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})()}`,{});
      const cobrar=Object.entries(ontem).map(([m,v])=>`${m}: "${v.motivo||'sem motivo'}"`).join(', ');
      const ctx=`Hoje: ${NOMES_DW[dw]}, ${trabalha?'dia de trabalho':'dia livre'}, bloco ${feitos?.length||0}/25.
Anki: ${ankiMaterias.map(m=>`${m.mat}(${m.cards}cards)`).join(', ')}.
TEC hoje: ${tecHoje.d3.length} itens vencendo, ${tecHoje.d15.length} próximos.
NLM urgente: ${nlmSugerido?.mat||'-'} (${nlmSugerido?.pct||'?'}%, ${nlmSugerido?.diasNlm||0}d sem NLM).
${cobrar?`Não fez ontem: ${cobrar}.`:''}`;
      const res=await chamarClaude(`Você é assessora de estudos da Ritchely (TCE-RJ). Regras: TEC=caderno erros D+3/D+15/D+30. ANKI=75 cards/dia em 3 matérias. NLM=teoria profunda 1h30. Responda em 3 linhas diretas sem firulas. ${cobrar?'Cobre o que não foi feito ontem e adapte o plano de hoje.':''}`,
        [{role:'user',content:ctx}],120);
      lsSet(`despacho_ia_${hoje}`,res);setDespacho(res);
    }catch(e){console.log(e);}
    setDespachoLoad(false);
  };

  useEffect(()=>{if(!despacho&&getAK()?.startsWith('sk-ant'))gerarDespacho();},[]);

  // ── Helpers visuais ───────────────────────────────────────────
  const pctLive=tecForm.feitas&&tecForm.acertei?Math.round(parseInt(tecForm.acertei)/parseInt(tecForm.feitas)*100):null;
  const pctCor=pctLive===null?'var(--text4)':pctLive>=85?'#34d399':pctLive>=70?'#fbbf24':'#f87171';
  const totalAnkiInput=Object.values(ankiCards).reduce((s,v)=>s+(parseInt(v)||0),0);

  const CardHeader=({emoji,titulo,resumo,key_:k,cor,feito,nfz})=>(
    <button onClick={()=>toggle(k)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'11px 14px',background:'transparent',border:'none',cursor:'pointer',textAlign:'left'}}>
      <span style={{fontSize:18}}>{emoji}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:700,color:feito?'#34d399':nfz?'var(--text4)':'var(--text)',textDecoration:nfz?'line-through':'none'}}>{titulo}</div>
        <div style={{fontSize:11,color:'var(--text4)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{resumo}</div>
      </div>
      {feito&&<span style={{fontSize:11,color:'#34d399',fontWeight:700,flexShrink:0}}>✅</span>}
      {nfz&&!feito&&<span style={{fontSize:11,color:'var(--text4)',flexShrink:0}}>❌</span>}
      {!feito&&!nfz&&<span style={{fontSize:11,color:'var(--text4)',flexShrink:0}}>{abertos[k]?'▲':'▼'}</span>}
    </button>
  );

  const BtnNaoFiz=({tipo})=>(
    <button onClick={()=>{setNaoFizModal(tipo);setNaoFizMotivo('');}} style={{padding:'7px 12px',borderRadius:8,border:'1px solid rgba(248,113,113,.3)',background:'transparent',color:'#f87171',fontSize:11,cursor:'pointer'}}>
      ❌ Não fiz
    </button>
  );

  // ── Sub-aba estado ────────────────────────────────────────────
  const[subAba,setSubAba]=useState('hoje');
  // ── Hoje sem pensar: feitos locais ───────────────────────────
  const[hspFeito,setHspFeito]=useState(()=>lsGet(`hsp_${hoje}`,{b1:false,b2:false,min:false,planob:false}));
  const marcarHsp=k=>{const n={...hspFeito,[k]:true};setHspFeito(n);lsSet(`hsp_${hoje}`,n);};
  const hspTodos=Object.values(hspFeito).every(Boolean);

  // ── Calcular blocos do "Hoje sem pensar" ─────────────────────
  const hspPlan=useMemo(()=>{
    const feitosSet=new Set(feitos);
    const pendentes=CICLO.filter(s=>!feitosSet.has(s.id));
    // Bloco 1: mais crítico do ciclo
    const criticos=pendentes.filter(s=>s.tag?.includes('CRÍTICO')||s.tag?.includes('ATRASADA'));
    const b1=criticos[0]||pendentes[0]||null;
    // Bloco 2: TEC vencendo hoje OU segundo bloco
    const tecVencendo=tecHoje.d3.length>0;
    const b2desc=tecVencendo
      ?{label:`TEC — ${tecHoje.d3.length} revisão(ões) vencendo`,mat:'TEC',h:0.5,ic:'🔴',motivo:'não pode atrasar — afeta fixação'}
      :(pendentes.find(s=>s.id!==(b1?.id))||null);
    // Revisão mínima: Anki 25 cards da matéria mais crítica
    const mat1=ankiMaterias[0]?.mat||'matéria prioritária';
    // Plano B fixo
    return{b1,b2:b2desc,mat1};
  },[feitos,tecHoje,ankiMaterias]);

  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>

      {/* HEADER */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:'var(--text)',fontFamily:"'DM Serif Display',serif"}}>{NOMES_DW[dw]}</div>
          <div style={{fontSize:11,color:'var(--text4)'}}>{totalH}h disponíveis · bloco {feitos?.length||0}/25{trabalha?' · 💼 trabalho':''}</div>
        </div>
        <button onClick={gerarDespacho} disabled={despachoLoad} style={{padding:'7px 12px',borderRadius:9,border:'1px solid rgba(251,191,36,.3)',background:'rgba(251,191,36,.08)',color:'#fbbf24',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>
          {despachoLoad?'⏳':'🤖 Despacho'}
        </button>
      </div>

      {/* SAÚDE DA SEMANA */}
      {(()=>{
        const saude=calcSaude();
        const [saudeAberta,setSaudeAberta]=React.useState(()=>lsGet('saude_aberta',false));
        const toggle=()=>{const n=!saudeAberta;setSaudeAberta(n);lsSet('saude_aberta',n);};
        const barW=Math.round(saude.score/10*100);
        return(
          <div style={{borderRadius:13,overflow:'hidden',border:`1px solid ${saude.cor}40`,marginBottom:10}}>
            <button onClick={toggle} style={{width:'100%',padding:'10px 14px',background:`${saude.cor}0d`,border:'none',cursor:'pointer',textAlign:'left'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <span style={{fontSize:16}}>{saude.emoji}</span>
                  <div>
                    <span style={{fontSize:10,color:saude.cor,fontFamily:"'DM Mono',monospace",fontWeight:900,letterSpacing:'1px'}}>SAÚDE DA SEMANA</span>
                    <span style={{fontSize:10,color:saude.cor,fontWeight:900,marginLeft:8}}>{saude.score}/10 — {saude.nivel}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  {saude.fatores.map(f=>(
                    <span key={f.k} style={{fontSize:13}}>{f.label}</span>
                  ))}
                  <span style={{fontSize:10,color:'var(--text4)',marginLeft:2}}>{saudeAberta?'▲':'▼'}</span>
                </div>
              </div>
              {/* Barra de progresso */}
              <div style={{height:5,borderRadius:3,background:'rgba(148,163,184,.2)',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${barW}%`,background:saude.cor,borderRadius:3,transition:'width .4s'}}/>
              </div>
            </button>
            {saudeAberta&&(
              <div style={{padding:'10px 14px 12px',background:`${saude.cor}06`,borderTop:`1px solid ${saude.cor}20`}}>
                {saude.fatores.map(f=>{
                  const fc=f.val===2?'#34d399':f.val===1?'#fbbf24':'#f87171';
                  return(
                    <div key={f.k} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 10px',borderRadius:8,background:`${fc}0a`,border:`1px solid ${fc}20`,marginBottom:5}}>
                      <span style={{fontSize:14,flexShrink:0}}>{f.label}</span>
                      <div style={{flex:1}}>
                        <span style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{f.k}</span>
                        <span style={{fontSize:10,color:'var(--text4)',marginLeft:6}}>{f.detalhe}</span>
                      </div>
                      <div style={{display:'flex',gap:3,flexShrink:0}}>
                        {[0,1,2].map(n=>(
                          <div key={n} style={{width:8,height:8,borderRadius:'50%',background:f.val>=n+1?fc:'rgba(148,163,184,.2)'}}/>
                        ))}
                      </div>
                    </div>
                  );
                })}
                <div style={{fontSize:9,color:'var(--text4)',marginTop:6,fontStyle:'italic'}}>
                  Meta · TEC em dia · Sequência Anki · Matérias críticas · Travamentos
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* SUB-ABAS */}
      <div style={{display:'flex',gap:4,marginBottom:12,overflowX:'auto',scrollbarWidth:'none'}}>
        {[
          {id:'hoje',l:'🧭 Hoje sem pensar'},
          {id:'blocos',l:'📅 Blocos'},
          {id:'tec',l:`🔴 TEC${tecHoje.d3.length>0?` (${tecHoje.d3.length})`:''}` },
          {id:'radar',l:'🎯 Radar'},
        ].map(s=>{
          const at=subAba===s.id;
          return(
            <button key={s.id} onClick={()=>setSubAba(s.id)} style={{flexShrink:0,padding:'8px 12px',borderRadius:9,border:`1px solid ${at?'var(--tab-active-border)':'var(--border)'}`,background:at?'var(--tab-active-bg)':'transparent',color:at?'var(--tab-active-color)':'var(--tab-inactive-color)',fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>
              {s.l}
            </button>
          );
        })}
      </div>

      {/* ── SUB-ABA: HOJE SEM PENSAR ── */}
      {subAba==='hoje'&&(
        <div>
          <div style={{padding:'10px 13px',borderRadius:11,background:'rgba(96,165,250,.06)',border:'1px solid rgba(96,165,250,.2)',marginBottom:14}}>
            <div style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace",fontWeight:800,letterSpacing:'1px',marginBottom:2}}>🧭 HOJE SEM PENSAR — itens inegociáveis</div>
            <div style={{fontSize:10,color:'var(--text4)'}}>Calculado automaticamente · sem IA · sem espera · marque ao fazer</div>
          </div>

          {hspTodos&&(
            <div style={{padding:'16px',borderRadius:13,background:'rgba(52,211,153,.08)',border:'2px solid rgba(52,211,153,.4)',marginBottom:14,textAlign:'center'}}>
              <div style={{fontSize:22,marginBottom:4}}>✅</div>
              <div style={{fontSize:15,fontWeight:900,color:'#34d399',fontFamily:"'DM Serif Display',serif"}}>Dia salvo!</div>
              <div style={{fontSize:11,color:'var(--text4)',marginTop:3}}>Você fez o que importava hoje.</div>
            </div>
          )}

          {/* Bloco 1 */}
          <div style={{padding:'14px',borderRadius:13,background:hspFeito.b1?'rgba(52,211,153,.07)':'rgba(248,113,113,.07)',border:`2px solid ${hspFeito.b1?'rgba(52,211,153,.4)':'rgba(248,113,113,.35)'}`,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,letterSpacing:'1px',marginBottom:4}}>🔴 BLOCO 1 — MAIOR RETORNO AGORA</div>
                {hspPlan.b1
                  ?<>
                    <div style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{hspPlan.b1.ic} {hspPlan.b1.mat}</div>
                    <div style={{fontSize:11,color:'var(--text4)',marginTop:2}}>{hspPlan.b1.conteudo}</div>
                    <div style={{display:'flex',gap:6,marginTop:5}}>
                      <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:'rgba(248,113,113,.12)',color:'#f87171',fontFamily:"'DM Mono',monospace"}}>{hspPlan.b1.h}h · {hspPlan.b1.tipo}</span>
                      <span style={{fontSize:9,color:'var(--text4)'}}>{hspPlan.b1.tag}</span>
                    </div>
                  </>
                  :<div style={{fontSize:13,color:'#34d399',fontWeight:700}}>✅ Ciclo completo!</div>
                }
              </div>
            </div>
            {!hspFeito.b1
              ?<button onClick={()=>marcarHsp('b1')} style={{width:'100%',padding:'10px',borderRadius:9,border:'none',background:'#f87171',color:'#0f172a',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Fiz</button>
              :<div style={{textAlign:'center',fontSize:12,color:'#34d399',fontWeight:700}}>✅ Feito!</div>
            }
          </div>

          {/* Bloco 2 */}
          <div style={{padding:'14px',borderRadius:13,background:hspFeito.b2?'rgba(52,211,153,.07)':'rgba(251,191,36,.06)',border:`2px solid ${hspFeito.b2?'rgba(52,211,153,.4)':'rgba(251,191,36,.3)'}`,marginBottom:8}}>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:800,letterSpacing:'1px',marginBottom:4}}>🟡 BLOCO 2 — SEGUNDA PRIORIDADE</div>
              {hspPlan.b2&&typeof hspPlan.b2==='object'&&hspPlan.b2.mat==='TEC'
                ?<>
                  <div style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{hspPlan.b2.label}</div>
                  <div style={{fontSize:11,color:'var(--text4)',marginTop:2}}>{hspPlan.b2.motivo}</div>
                  <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:'rgba(248,113,113,.12)',color:'#f87171',fontFamily:"'DM Mono',monospace",marginTop:5,display:'inline-block'}}>~30min</span>
                </>
                :hspPlan.b2
                  ?<>
                    <div style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>{hspPlan.b2.ic} {hspPlan.b2.mat}</div>
                    <div style={{fontSize:11,color:'var(--text4)',marginTop:2}}>{hspPlan.b2.conteudo}</div>
                    <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:'rgba(251,191,36,.12)',color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginTop:5,display:'inline-block'}}>{hspPlan.b2.h}h · {hspPlan.b2.tipo}</span>
                  </>
                  :<div style={{fontSize:13,color:'#34d399',fontWeight:700}}>✅ Nada pendente</div>
              }
            </div>
            {!hspFeito.b2
              ?<button onClick={()=>marcarHsp('b2')} style={{width:'100%',padding:'10px',borderRadius:9,border:'none',background:'#fbbf24',color:'#0f172a',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Fiz</button>
              :<div style={{textAlign:'center',fontSize:12,color:'#34d399',fontWeight:700}}>✅ Feito!</div>
            }
          </div>

          {/* Revisão mínima */}
          <div style={{padding:'14px',borderRadius:13,background:hspFeito.min?'rgba(52,211,153,.07)':'rgba(167,139,250,.06)',border:`2px solid ${hspFeito.min?'rgba(52,211,153,.4)':'rgba(167,139,250,.3)'}`,marginBottom:8}}>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:'#a78bfa',fontFamily:"'DM Mono',monospace",fontWeight:800,letterSpacing:'1px',marginBottom:4}}>🟢 REVISÃO MÍNIMA — o mínimo do mínimo</div>
              <div style={{fontSize:14,fontWeight:900,color:'var(--text)'}}>🃏 Anki — 25 cards</div>
              <div style={{fontSize:11,color:'var(--text4)',marginTop:2}}>Matéria: {hspPlan.mat1} · só os mais urgentes</div>
              <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:'rgba(167,139,250,.12)',color:'#a78bfa',fontFamily:"'DM Mono',monospace",marginTop:5,display:'inline-block'}}>~15min · impede o dia de ser perdido</span>
            </div>
            {!hspFeito.min
              ?<button onClick={()=>marcarHsp('min')} style={{width:'100%',padding:'10px',borderRadius:9,border:'none',background:'#a78bfa',color:'#0f172a',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Fiz o Anki mínimo</button>
              :<div style={{textAlign:'center',fontSize:12,color:'#34d399',fontWeight:700}}>✅ Feito!</div>
            }
          </div>

          {/* Plano B */}
          <div style={{padding:'14px',borderRadius:13,background:hspFeito.planob?'rgba(52,211,153,.07)':'rgba(148,163,184,.05)',border:`2px solid ${hspFeito.planob?'rgba(52,211,153,.4)':'rgba(148,163,184,.2)'}`,marginBottom:8}}>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:9,color:'var(--text4)',fontFamily:"'DM Mono',monospace",fontWeight:800,letterSpacing:'1px',marginBottom:4}}>⚪ PLANO B — se a rotina quebrar</div>
              <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>20min: Anki 10 cards + 1 TEC</div>
              <div style={{fontSize:11,color:'var(--text4)',marginTop:3,lineHeight:1.6}}>
                Se só tiver <strong style={{color:'var(--text)'}}>30min</strong>: só o Anki mínimo (25 cards)<br/>
                Se só tiver <strong style={{color:'var(--text)'}}>20min</strong>: Anki 10 cards + marcar 1 TEC<br/>
                Se o dia for <strong style={{color:'var(--text)'}}>perdido</strong>: leia 1 tópico do edital antes de dormir
              </div>
            </div>
            {!hspFeito.planob
              ?<button onClick={()=>marcarHsp('planob')} style={{width:'100%',padding:'10px',borderRadius:9,border:'1px solid rgba(148,163,184,.3)',background:'transparent',color:'var(--text4)',fontSize:12,fontWeight:700,cursor:'pointer'}}>✅ Usei o Plano B</button>
              :<div style={{textAlign:'center',fontSize:12,color:'#34d399',fontWeight:700}}>✅ Registrado</div>
            }
          </div>
        </div>
      )}

      {/* ── SUB-ABA: BLOCOS (conteúdo original da aba Hoje) ── */}
      {subAba==='blocos'&&(
        <div>
          {/* DESPACHO IA */}
          <div style={{background:'linear-gradient(135deg,rgba(251,191,36,.08),rgba(251,191,36,.03))',border:'1px solid rgba(251,191,36,.2)',borderRadius:12,marginBottom:10,overflow:'hidden'}}>
            <button onClick={()=>toggle('despacho')} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:'transparent',border:'none',cursor:'pointer'}}>
              <span style={{fontSize:10,color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:700,letterSpacing:'1px'}}>🤖 ASSESSORA — {hoje}</span>
              <span style={{fontSize:10,color:'var(--text4)'}}>{abertos.despacho?'▲':'▼'}</span>
            </button>
            {abertos.despacho&&<div style={{padding:'0 14px 12px',fontSize:12,color:'var(--text2)',lineHeight:1.7,whiteSpace:'pre-line'}}>
              {despacho||<span style={{color:'var(--text4)'}}>{getAK()?.startsWith('sk-ant')?'Gerando...':'Configure a chave IA em ⚙️'}</span>}
            </div>}
            {!abertos.despacho&&despacho&&<div style={{padding:'0 14px 10px',fontSize:11,color:'var(--text4)',lineHeight:1.5}}>{despacho.split('\n')[0]}</div>}
          </div>

          {/* ALERTA DE OXIDAÇÃO */}
          {alertaOxidacao.length>0&&(
            <div style={{padding:'10px 13px',borderRadius:11,background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.35)',marginBottom:10}}>
              <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:6}}>🟡 RISCO DE OXIDAÇÃO — matérias sólidas paradas</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {alertaOxidacao.map(item=>(
                  <div key={item.mat} style={{padding:'4px 9px',borderRadius:7,background:'rgba(251,191,36,.12)',border:'1px solid rgba(251,191,36,.3)'}}>
                    <span style={{fontSize:11,color:'#fbbf24',fontWeight:700}}>{item.mat}</span>
                    <span style={{fontSize:9,color:'#94a3b8',marginLeft:5}}>{item.pct}% · {item.diasSem}d sem revisar</span>
                  </div>
                ))}
              </div>
              <div style={{fontSize:9,color:'#94a3b8',marginTop:6}}>Matéria ≥85% sem aparecer há 15+ dias pode travar na prova.</div>
            </div>
          )}

          {/* CARDS COLAPSÁVEIS: ANKI, TEC resumo, NLM */}
          <div style={{border:'1px solid var(--border)',borderRadius:13,overflow:'hidden',background:'var(--card)'}}>
            {/* ANKI */}
            <div style={{borderBottom:'1px solid var(--border)'}}>
              <CardHeader emoji="🟣" titulo="ANKI — 75 cards" resumo={ankiFeito?`✅ feito · ${ankiFeito.cards} cards`:`${ankiMaterias.map(m=>m.mat.split(' ')[0]+' '+m.cards).join(' · ')}`} key_="anki" cor="#a78bfa" feito={!!ankiFeito} nfz={!!naoFiz.anki}/>
              {abertos.anki&&!ankiFeito&&!naoFiz.anki&&<div style={{padding:'0 14px 14px'}}>
                <div style={{fontSize:10,color:'var(--text4)',fontFamily:"'DM Mono',monospace",marginBottom:8}}>DISTRIBUIÇÃO DE HOJE</div>
                {ankiMaterias.map((m,i)=>(
                  <div key={m.mat} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:9,background:`rgba(167,139,250,${i===0?'.1':'.05'})`,border:`1px solid rgba(167,139,250,${i===0?'.3':'.15'})`,marginBottom:6}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{m.mat}</div>
                      <div style={{fontSize:10,color:'var(--text4)'}}>{m.motivo}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:11,color:'#a78bfa',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:3}}>{m.cards} cards</div>
                      <input type="number" placeholder={String(m.cards)} value={ankiCards[m.mat]||''} onChange={e=>setAnkiCards(p=>({...p,[m.mat]:e.target.value}))}
                        style={{width:60,padding:'4px 6px',borderRadius:6,border:'1px solid rgba(167,139,250,.3)',background:'rgba(167,139,250,.05)',color:'#a78bfa',fontSize:12,fontWeight:700,textAlign:'center',outline:'none',fontFamily:"'DM Mono',monospace"}}/>
                    </div>
                  </div>
                ))}
                {totalAnkiInput>0&&<div style={{fontSize:10,color:'var(--text4)',textAlign:'center',marginBottom:8}}>
                  Total: <strong style={{color:'#a78bfa'}}>{totalAnkiInput}</strong> cards
                  {totalAnkiInput>=75&&<span style={{color:'#34d399',marginLeft:6}}>✅ Meta batida!</span>}
                  {totalAnkiInput>0&&totalAnkiInput<75&&<span style={{color:'#fbbf24',marginLeft:6}}>⚠️ faltam {75-totalAnkiInput}</span>}
                </div>}
                <div style={{display:'flex',gap:6}}>
                  <button onClick={marcarAnki} style={{flex:2,padding:'10px',borderRadius:9,border:'none',background:'#a78bfa',color:'#0f172a',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Fiz o Anki</button>
                  <BtnNaoFiz tipo="anki"/>
                </div>
              </div>}
              {abertos.anki&&ankiFeito&&<div style={{padding:'0 14px 14px'}}>
                <div style={{fontSize:11,color:'#34d399',fontWeight:700,marginBottom:6}}>✅ Feito hoje — {ankiFeito.cards} cards</div>
                {ankiFeito.mats?.map(m=><div key={m.mat} style={{fontSize:10,color:'var(--text4)',marginBottom:2}}>• {m.mat}: {ankiFeito.porMat?.[m.mat]||m.cards} cards</div>)}
              </div>}
            </div>
            {/* NLM */}
            <div>
              <CardHeader emoji="🔵" titulo="NLM — 1h30 teoria" resumo={naoFiz.nlm?'❌ não fiz':nlmSugerido?`${nlmSugerido.mat} · ${nlmSugerido.pct}% acerto · ${nlmSugerido.diasNlm}d sem NLM${nlmSugerido.emJanela?' · ⚡ janela ativa':''}`:'-'} key_="nlm" cor="#34d399" feito={!!lsGet(`nlm_feito_${hoje}`,false)} nfz={!!naoFiz.nlm}/>
              {abertos.nlm&&!naoFiz.nlm&&<div style={{padding:'0 14px 14px'}}>
                {nlmSugerido&&<div style={{padding:'10px 12px',borderRadius:10,background:'rgba(52,211,153,.06)',border:'1px solid rgba(52,211,153,.2)',marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:4}}>{nlmSugerido.mat}</div>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:nlmSugerido.pct>=70?'#fbbf24':'#f87171'}}>{nlmSugerido.pct}% acerto</span>
                    <span style={{fontSize:10,color:'var(--text4)'}}>travou {nlmSugerido.travou}x</span>
                    <span style={{fontSize:10,color:'var(--text4)'}}>{nlmSugerido.diasNlm}d sem NLM</span>
                    {nlmSugerido.emJanela&&<span style={{fontSize:10,color:'#34d399',fontWeight:700}}>⚡ janela do ciclo</span>}
                  </div>
                </div>}
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>{lsSet(`nlm_feito_${hoje}`,true);if(onAddHoras)onAddHoras({mat:`NLM — ${nlmSugerido?.mat||''}`,min:90,dt:Date.now()});}} style={{flex:2,padding:'9px',borderRadius:9,border:'none',background:'#34d399',color:'#0f172a',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Fiz o NLM</button>
                  <BtnNaoFiz tipo="nlm"/>
                </div>
              </div>}
            </div>
          </div>
        </div>
      )}

      {/* ── SUB-ABA: TEC — unificado caderno + registros ── */}
      {subAba==='tec'&&(()=>{
        const todosItens=lsGet('rev_caderno',[]);
        const tecItens=todosItens.filter(t=>t.prazo&&!t.feito&&!t.dominado);
        const todayStr=new Date().toISOString().split('T')[0];
        const proxStr=new Date(Date.now()+7*86400000).toISOString().split('T')[0];
        const vencendo=tecItens.filter(t=>t.prazo<=todayStr).sort((a,b)=>a.prazo.localeCompare(b.prazo));
        const proximos=tecItens.filter(t=>t.prazo>todayStr&&t.prazo<=proxStr).sort((a,b)=>a.prazo.localeCompare(b.prazo));
        const futuros=tecItens.filter(t=>t.prazo>proxStr).sort((a,b)=>a.prazo.localeCompare(b.prazo));
        const faseCor={1:'#60a5fa',2:'#fbbf24',3:'#34d399'};
        const dominados=todosItens.filter(t=>t.dominado).length;

        const ItemTEC=({t,destacado})=>{
          const fc=faseCor[t.fase||1]||'#60a5fa';
          const atrasado=t.prazo<todayStr;
          return(
            <div style={{padding:'11px 13px',borderRadius:11,background:destacado?`rgba(248,113,113,.06)`:'rgba(255,255,255,.03)',border:`1px solid ${atrasado?'rgba(248,113,113,.45)':destacado?'rgba(248,113,113,.22)':'var(--border)'}`,marginBottom:7}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:800,color:'var(--text)'}}>{t.mat}</div>
                  {t.assunto&&<div style={{fontSize:10,color:'var(--text4)',marginTop:1}}>{t.assunto}</div>}
                  <div style={{display:'flex',gap:5,marginTop:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:9,padding:'1px 7px',borderRadius:4,background:`${fc}20`,color:fc,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{t.prazoLabel||'D+3'} · fase {t.fase||1}/3</span>
                    <span style={{fontSize:9,color:'var(--text4)',fontFamily:"'DM Mono',monospace"}}>📅 {t.prazo}</span>
                    {t.origem&&<span style={{fontSize:9,color:'var(--text4)'}}>via {t.origem==='caderno'?'Caderno':'TEC'}</span>}
                    {atrasado&&<span style={{fontSize:9,color:'#f87171',fontWeight:700}}>⚠️ atrasado</span>}
                  </div>
                </div>
              </div>
              {destacado&&<div style={{display:'flex',gap:6}}>
                <button onClick={()=>marcarTecItem(t.id,true)} style={{flex:1,padding:'8px',borderRadius:8,border:'none',background:'rgba(52,211,153,.15)',color:'#34d399',fontSize:11,fontWeight:800,cursor:'pointer'}}>✅ Acertei</button>
                <button onClick={()=>marcarTecItem(t.id,false)} style={{flex:1,padding:'8px',borderRadius:8,border:'none',background:'rgba(248,113,113,.15)',color:'#f87171',fontSize:11,fontWeight:800,cursor:'pointer'}}>❌ Errei</button>
              </div>}
            </div>
          );
        };

        return(
          <div>
            {/* Contadores */}
            <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
              {[
                [`📅 Hoje (${vencendo.length})`,'#f87171',vencendo.length>0],
                [`📆 7 dias (${proximos.length})`,'#fbbf24',false],
                [`🗓️ Futuros (${futuros.length})`,'#60a5fa',false],
                [`✅ Dominados (${dominados})`,'#34d399',false],
              ].map(([l,c,destaque])=>(
                <div key={l} style={{padding:'5px 10px',borderRadius:8,background:`${c}${destaque?'18':'0d'}`,border:`1px solid ${c}${destaque?'45':'22'}`}}>
                  <span style={{fontSize:10,color:c,fontWeight:destaque?900:700}}>{l}</span>
                </div>
              ))}
            </div>

            {/* Vencendo hoje */}
            {vencendo.length>0&&<>
              <div style={{fontSize:10,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:8}}>📅 REVISAR HOJE</div>
              {vencendo.map(t=><ItemTEC key={t.id} t={t} destacado={true}/>)}
            </>}

            {/* Próximos 7 dias */}
            {proximos.length>0&&<>
              <div style={{fontSize:10,color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,marginTop:10}}>📆 PRÓXIMOS 7 DIAS</div>
              {proximos.map(t=><ItemTEC key={t.id} t={t} destacado={false}/>)}
            </>}

            {/* Futuros */}
            {futuros.length>0&&<>
              <div style={{fontSize:10,color:'#60a5fa',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,marginTop:10}}>🗓️ PROGRAMADOS</div>
              {futuros.map(t=><ItemTEC key={t.id} t={t} destacado={false}/>)}
