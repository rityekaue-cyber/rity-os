                    <div key={m.mat} style={{padding:'10px 12px',borderRadius:10,background:matFeita?'rgba(52,211,153,.08)':`rgba(167,139,250,${i===0?'.1':'.05'})`,border:`1px solid ${matFeita?'rgba(52,211,153,.35)':`rgba(167,139,250,${i===0?'.3':'.15'})`}`,marginBottom:8}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:matFeita?0:6}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:700,color:matFeita?'#34d399':'var(--text)'}}>{matFeita?'✅ ':''}{m.mat}</div>
                          <div style={{fontSize:10,color:'var(--text4)',marginTop:1}}>{m.motivo}</div>
                        </div>
                        <div style={{textAlign:'right',flexShrink:0}}>
                          <div style={{fontSize:12,color:'#a78bfa',fontFamily:"'DM Mono',monospace",fontWeight:700}}>{m.cards} cards</div>
                          {!matFeita&&<input type="number" placeholder={String(m.cards)} value={ankiCards[m.mat]||''} onChange={e=>setAnkiCards(p=>({...p,[m.mat]:e.target.value}))}
                            style={{width:60,padding:'4px 6px',borderRadius:6,border:'1px solid rgba(167,139,250,.3)',background:'rgba(167,139,250,.05)',color:'#a78bfa',fontSize:12,fontWeight:700,textAlign:'center',outline:'none',fontFamily:"'DM Mono',monospace",marginTop:3}}/>}
                        </div>
                      </div>
                      {/* Foco por assunto do Guruja */}
                      {!matFeita&&(()=>{
                        const criticos=getAssuntosCriticos(m.mat,2);
                        if(!criticos.length)return null;
                        return(
                          <div style={{padding:'7px 9px',borderRadius:7,background:'rgba(248,113,113,.07)',border:'1px solid rgba(248,113,113,.2)',marginBottom:7}}>
                            <div style={{fontSize:8,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:4,letterSpacing:'1px'}}>🎯 FOCO GURUJA — assuntos críticos</div>
                            {criticos.map((a,j)=>(
                              <div key={j} style={{display:'flex',alignItems:'center',gap:6,marginBottom:j<criticos.length-1?3:0}}>
                                <span style={{fontSize:10,color:'var(--text)',flex:1,lineHeight:1.3}}>{a.titulo.length>40?a.titulo.slice(0,38)+'…':a.titulo}</span>
                                <span style={{fontSize:9,color:a.acerto<70?'#f87171':'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:700,flexShrink:0}}>{a.acerto}%</span>
                                {a.diffMedia<0&&<span style={{fontSize:9,color:'#f87171',flexShrink:0}}>⬇️{Math.abs(a.diffMedia).toFixed(1)}%</span>}
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                      {!matFeita&&(
                        <div style={{display:'flex',gap:6}}>
                          <button onClick={()=>marcarAnkiMat(m.mat)} style={{flex:2,padding:'8px',borderRadius:8,border:'none',background:'#a78bfa',color:'#0f172a',fontSize:11,fontWeight:800,cursor:'pointer'}}>✅ Fiz — {m.mat.split(' ')[0]}</button>
                          <button onClick={()=>{setNaoFizModal('anki');setNaoFizMotivo('');}} style={{padding:'8px 10px',borderRadius:8,border:'1px solid rgba(248,113,113,.3)',background:'transparent',color:'#f87171',fontSize:11,cursor:'pointer'}}>❌</button>
                        </div>
                      )}
                    </div>
                  );
                })}
                {/* Total e botão geral */}
                {(()=>{
                  const nFeitas=Object.values(ankiFeitosMat).filter(v=>v.feito).length;
                  const totalCards=Object.values(ankiFeitosMat).reduce((s,v)=>s+(v.cards||0),0);
                  if(nFeitas===0)return null;
                  return(
                    <div style={{padding:'8px 12px',borderRadius:9,background:'rgba(52,211,153,.06)',border:'1px solid rgba(52,211,153,.2)',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontSize:11,color:'#34d399'}}>{nFeitas}/{ankiMaterias.length} matérias feitas · {totalCards} cards</span>
                      {nFeitas<ankiMaterias.length&&<button onClick={marcarAnki} style={{padding:'6px 12px',borderRadius:7,border:'none',background:'#a78bfa',color:'#0f172a',fontSize:11,fontWeight:800,cursor:'pointer'}}>✅ Marcar todas</button>}
                    </div>
                  );
                })()}
                <BtnNaoFiz tipo="anki"/>
              </div>}
              {abertos.anki&&ankiFeito&&<div style={{padding:'0 14px 14px'}}>
                <div style={{fontSize:11,color:'#34d399',fontWeight:700,marginBottom:6}}>✅ Feito hoje — {ankiFeito.cards} cards</div>
                {ankiFeito.mats?.map(m=><div key={m.mat} style={{fontSize:10,color:'var(--text4)',marginBottom:2}}>• {m.mat}: {ankiFeito.porMat?.[m.mat]||m.cards} cards</div>)}
              </div>}
            </div>
            {/* NLM — card mínimo tempo morto */}
            <div>
              {(()=>{
                const nlmFeito=lsGet(`nlm_feito_${hoje}`,false);
                const fila=nlmSugerido?.fila||[];
                const idxValido=Math.min(nlmFilaIdx,Math.max(fila.length-1,0));
                const matAtual=fila[idxValido]||nlmSugerido;
                const podeProximo=fila.length>1&&idxValido<fila.length-1;
                // Assunto específico do Guruja para a matéria sugerida
                const assuntosManut=matAtual?getAssuntosManutencao(matAtual.mat,1):[];
                const assuntoEspecifico=assuntosManut[0]||null;
                return(
                  <>
                    <CardHeader emoji="🎧" titulo="NLM — tempo morto" resumo={nlmFeito?'✅ ouvido hoje':`${assuntoEspecifico?assuntoEspecifico.titulo.slice(0,28)+'…':matAtual?.mat||'—'} · manutenção`} key_="nlm" cor="#34d399" feito={!!nlmFeito} nfz={!!naoFiz.nlm}/>
                    {abertos.nlm&&!naoFiz.nlm&&!nlmFeito&&matAtual&&(
                      <div style={{padding:'0 14px 14px'}}>
                        <div style={{padding:'18px 16px',borderRadius:12,background:'rgba(52,211,153,.07)',border:'2px solid rgba(52,211,153,.3)',marginBottom:10,textAlign:'center'}}>
                          <div style={{fontSize:9,color:'#34d399',fontFamily:"'DM Mono',monospace",fontWeight:800,letterSpacing:'2px',marginBottom:8}}>🎧 OUVIR AGORA — manutenção</div>
                          <div style={{fontSize:18,fontWeight:900,color:'var(--text)',fontFamily:"'DM Serif Display',serif",marginBottom:3}}>{matAtual.mat}</div>
                          {assuntoEspecifico?(
                            <>
                              <div style={{fontSize:11,color:'#34d399',marginBottom:4,fontWeight:700}}>{assuntoEspecifico.titulo}</div>
                              <div style={{fontSize:10,color:'var(--text4)'}}>{assuntoEspecifico.acerto}% acerto{assuntoEspecifico.diffMedia>0?` · ⬆️${assuntoEspecifico.diffMedia}% da média`:''}</div>
                            </>
                          ):(
                            <div style={{fontSize:11,color:'#34d399'}}>NotebookLM · teoria</div>
                          )}
                        </div>
                        <div style={{display:'flex',gap:6}}>
                          <button onClick={()=>{lsSet(`nlm_feito_${hoje}`,true);if(onAddHoras)onAddHoras({mat:`NLM — ${matAtual?.mat||''}`,min:45,dt:Date.now()});}} style={{flex:2,padding:'10px',borderRadius:9,border:'none',background:'#34d399',color:'#0f172a',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Ouvi hoje</button>
                          {podeProximo&&<button onClick={()=>setNlmFilaIdx(i=>Math.min(i+1,fila.length-1))} style={{padding:'10px 14px',borderRadius:9,border:'1px solid rgba(52,211,153,.3)',background:'transparent',color:'#34d399',fontSize:12,cursor:'pointer'}}>🔄 Trocar</button>}
                          <BtnNaoFiz tipo="nlm"/>
                        </div>
                      </div>
                    )}
                    {abertos.nlm&&nlmFeito&&<div style={{padding:'0 14px 14px',fontSize:11,color:'#34d399',fontWeight:700}}>✅ Ouvido hoje!</div>}
                  </>
                );
              })()}
            </div>
          </div>
        </div>
      )}

      {/* ── SUB-ABA: TEC — cards simplificados Modelo 1 ── */}
      {subAba==='tec'&&(()=>{
        const todosItens=lsGet('rev_caderno',[]);
        const ativos=todosItens.filter(t=>!t.dominado);
        const dominados=todosItens.filter(t=>t.dominado);
        // Ordena só por dificuldade (desc) depois % acerto (asc) — sem datas
        const ordenados=[...ativos].sort((a,b)=>{
          const difA=a.dificuldade||3,difB=b.dificuldade||3;
          if(difB!==difA)return difB-difA;
          const pctA=a.pct??50,pctB=b.pct??50;
          return pctA-pctB;
        });
        // Resumo da semana — quantas questões revisadas nos últimos 7 dias
        const seteAtras=new Date();seteAtras.setDate(seteAtras.getDate()-7);
        const seteAtrasStr=seteAtras.toISOString().split('T')[0];
        let questoesSemana=0;
        todosItens.forEach(t=>{(t.historico||[]).forEach(h=>{if(h.data>=seteAtrasStr&&h.questoes)questoesSemana+=h.questoes;});});

        // Card com registro inline de revisão — Forma 1 completa
        const CardTEC=({t})=>{
          const[expandido,setExpandido]=useState(false);
          const[novasQ,setNovasQ]=useState('');
          const[novosA,setNovosA]=useState('');
          const[novaDif,setNovaDif]=useState(t.dificuldade||3);
          const pctCor=t.pct===null||t.pct===undefined?'#64748b':t.pct>=80?'#34d399':t.pct>=60?'#fbbf24':'#f87171';
          const difCors=['','#34d399','#a3e635','#fbbf24','#fb923c','#f87171'];
          const difLabels=['','Muito fácil','Fácil','Médio','Difícil','Muito difícil'];
          const dif=t.dificuldade||3;
          const salvar=()=>{
            const q=parseInt(novasQ)||0;
            const a=parseInt(novosA)||0;
            if(q===0)return;
            registrarRevisaoTec(t.id,q,a,novaDif);
            setNovasQ('');setNovosA('');setExpandido(false);
          };
          return(
            <div style={{borderRadius:12,background:'rgba(255,255,255,.02)',border:`1px solid ${difCors[dif]}30`,marginBottom:8,overflow:'hidden'}}>
              {/* Linha principal */}
              <div onClick={()=>setExpandido(e=>!e)} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',cursor:'pointer'}}>
                <div style={{textAlign:'center',flexShrink:0,width:44}}>
                  <div style={{fontSize:18,fontWeight:900,color:pctCor,fontFamily:"'DM Mono',monospace",lineHeight:1}}>{t.pct!==null&&t.pct!==undefined?t.pct+'%':'—'}</div>
                  {t.feitas>0&&<div style={{fontSize:8,color:'var(--text4)'}}>{t.feitas}Q</div>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>{t.mat}</div>
                  {t.assunto&&<div style={{fontSize:10,color:'var(--text4)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.assunto}</div>}
                  <div style={{display:'flex',gap:5,marginTop:4,flexWrap:'wrap',alignItems:'center'}}>
                    <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:`${difCors[dif]}18`,color:difCors[dif],fontFamily:"'DM Mono',monospace",fontWeight:700}}>{'⭐'.repeat(dif)} {difLabels[dif]}</span>
                    {(t.tentativas||0)>0&&<span style={{fontSize:9,color:'#a78bfa',fontFamily:"'DM Mono',monospace"}}>↻ {t.tentativas}x revisado</span>}
                  </div>
                </div>
                <span style={{fontSize:11,color:'var(--text4)',flexShrink:0}}>{expandido?'▲':'▼'}</span>
              </div>

              {/* Painel de registro — expande ao tocar */}
              {expandido&&(
                <div style={{borderTop:'1px solid var(--border)',padding:'12px 14px'}}>
                  {/* Linha do tempo, se tiver histórico */}
                  {(t.historico||[]).length>0&&(
                    <div style={{marginBottom:10,padding:'8px 10px',borderRadius:8,background:'rgba(255,255,255,.02)'}}>
                      <div style={{fontSize:8,color:'var(--text4)',fontFamily:"'DM Mono',monospace",marginBottom:4}}>HISTÓRICO</div>
                      {[...(t.historico||[])].slice(-4).reverse().map((h,i)=>(
                        <div key={i} style={{fontSize:10,color:'var(--text4)',marginBottom:2}}>
                          {h.data} — {h.questoes!==undefined?`${h.questoes}Q, ${h.acertos}✓ · `:''}{h.dificuldade?`${'⭐'.repeat(h.dificuldade)}`:h.acao||''}
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{fontSize:9,color:'var(--text4)',marginBottom:6,fontFamily:"'DM Mono',monospace"}}>REGISTRAR NOVA REVISÃO</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    <div>
                      <div style={{fontSize:9,color:'var(--text4)',marginBottom:3}}>QUESTÕES</div>
                      <input type="number" value={novasQ} onChange={e=>setNovasQ(e.target.value)} placeholder="ex: 10"
                        style={{width:'100%',padding:'9px',borderRadius:8,border:'1px solid var(--border)',background:'rgba(255,255,255,.03)',color:'var(--text)',fontSize:14,fontWeight:700,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
                    </div>
                    <div>
                      <div style={{fontSize:9,color:'var(--text4)',marginBottom:3}}>ACERTOS</div>
                      <input type="number" value={novosA} onChange={e=>setNovosA(e.target.value)} placeholder="ex: 7"
                        style={{width:'100%',padding:'9px',borderRadius:8,border:'1px solid rgba(52,211,153,.25)',background:'rgba(52,211,153,.04)',color:'#34d399',fontSize:14,fontWeight:700,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
                    </div>
                  </div>
                  <div style={{fontSize:9,color:'var(--text4)',marginBottom:4}}>QUÃO DIFÍCIL FOI DESSA VEZ?</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr',gap:4,marginBottom:10}}>
                    {[1,2,3,4,5].map(v=>(
                      <button key={v} onClick={()=>setNovaDif(v)}
                        style={{padding:'7px 2px',borderRadius:7,border:`2px solid ${novaDif===v?difCors[v]:'var(--border)'}`,background:novaDif===v?`${difCors[v]}18`:'transparent',fontSize:11,cursor:'pointer'}}>⭐</button>
                    ))}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={salvar} disabled={!novasQ} style={{flex:1,padding:'10px',borderRadius:9,border:'none',background:novasQ?'#60a5fa':'var(--border)',color:novasQ?'#0f172a':'var(--text4)',fontSize:12,fontWeight:800,cursor:'pointer'}}>💾 Salvar revisão</button>
                    <button onClick={()=>marcarDominado(t.id)} style={{padding:'10px 12px',borderRadius:9,border:'1px solid rgba(52,211,153,.35)',background:'rgba(52,211,153,.08)',color:'#34d399',fontSize:12,fontWeight:800,cursor:'pointer',whiteSpace:'nowrap'}}>✅ Dominei</button>
                  </div>
                </div>
              )}
            </div>
          );
        };

        return(
          <div>
            {/* Resumo fixo no topo */}
            <div style={{padding:'12px 14px',borderRadius:12,background:'rgba(96,165,250,.06)',border:'1px solid rgba(96,165,250,.2)',marginBottom:14}}>
              <div style={{display:'flex',gap:16}}>
                <div>
                  <div style={{fontSize:20,fontWeight:900,color:'#60a5fa',fontFamily:"'DM Mono',monospace",lineHeight:1}}>{questoesSemana}</div>
                  <div style={{fontSize:9,color:'var(--text4)',marginTop:2}}>questões essa semana</div>
                </div>
                <div>
                  <div style={{fontSize:20,fontWeight:900,color:'#34d399',fontFamily:"'DM Mono',monospace",lineHeight:1}}>{dominados.length}</div>
                  <div style={{fontSize:9,color:'var(--text4)',marginTop:2}}>dominadas no total</div>
                </div>
                <div>
                  <div style={{fontSize:20,fontWeight:900,color:'#f87171',fontFamily:"'DM Mono',monospace",lineHeight:1}}>{ativos.filter(t=>(t.dificuldade||3)>=4).length}</div>
                  <div style={{fontSize:9,color:'var(--text4)',marginTop:2}}>difíceis ativas</div>
                </div>
              </div>
            </div>

            {/* Lista ordenada por dificuldade */}
            {ordenados.length>0?<>
              <div style={{fontSize:10,color:'var(--text4)',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,letterSpacing:'1px'}}>MAIS DIFÍCIL PRIMEIRO — toque para registrar</div>
              {ordenados.map(t=><CardTEC key={t.id} t={t}/>)}
            </>:(
              <div style={{textAlign:'center',padding:'32px 20px',color:'var(--text4)'}}>
                <div style={{fontSize:28,marginBottom:8}}>✅</div>
                <div style={{fontSize:13,fontWeight:700,color:'#34d399'}}>Nenhum item ativo</div>
                <div style={{fontSize:11,marginTop:4}}>Registre um erro para começar.</div>
              </div>
            )}

            {/* Dominadas — colapsável */}
            {dominados.length>0&&(
              <details style={{marginTop:14}}>
                <summary style={{fontSize:10,color:'#34d399',fontFamily:"'DM Mono',monospace",fontWeight:700,cursor:'pointer',padding:'8px 10px',borderRadius:8,background:'rgba(52,211,153,.05)',border:'1px solid rgba(52,211,153,.2)',listStyle:'none',display:'flex',justifyContent:'space-between'}}>
                  <span>✅ DOMINADAS ({dominados.length})</span><span style={{opacity:.5}}>▼</span>
                </summary>
                <div style={{marginTop:6}}>
                  {[...dominados].sort((a,b)=>{
                    const da=(a.historico||[]).slice(-1)[0]?.data||'';
                    const db=(b.historico||[]).slice(-1)[0]?.data||'';
                    return db.localeCompare(da);
                  }).map(t=>{
                    const ultimaData=(t.historico||[]).slice(-1)[0]?.data||t.dia;
                    return(
                      <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:9,background:'rgba(52,211,153,.04)',border:'1px solid rgba(52,211,153,.15)',marginBottom:5}}>
                        <span style={{fontSize:14,color:'#34d399'}}>✓</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>{t.mat}{t.assunto?` — ${t.assunto}`:''}</div>
                          <div style={{fontSize:9,color:'var(--text4)'}}>dominado em {ultimaData} · {t.tentativas||1}x revisado</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </details>
            )}
          </div>
        );
      })()}

      {/* ── SUB-ABA: RADAR DO EDITAL ── */}
      {subAba==='radar'&&(()=>{
        const perigos=calcTop5Perigos(8);
        return(
          <div>
            <div style={{padding:'10px 12px',borderRadius:10,background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.2)',marginBottom:12}}>
              <div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:2}}>🎯 RADAR DO EDITAL — TOP PERIGOS</div>
              <div style={{fontSize:10,color:'var(--text4)'}}>peso da prova × seu déficit de acerto × tempo parado</div>
            </div>
            {perigos.map((p,i)=>{
              const scoreNorm=Math.min(Math.round(p.score),100);
              const c=p.acerto!==null?(p.acerto<50?'#f87171':p.acerto<70?'#fbbf24':'#34d399'):'#64748b';
              const prioridade=scoreNorm>=60?'🔴 ATACAR AGORA':scoreNorm>=30?'🟡 MANTER VIVO':'⬜ PODE ESPERAR';
              const corPri=scoreNorm>=60?'#f87171':scoreNorm>=30?'#fbbf24':'#64748b';
              return(
                <div key={i} style={{padding:'11px 13px',borderRadius:11,background:`${corPri}08`,border:`1px solid ${corPri}22`,marginBottom:7}}>

function TabEstudo({feitos,cicloNum,horas,onConcluir,onIrPara,onDesmarcar,onAddHoras,onSyncHistorico,mit,planoSemana,onSavePlano}){
  const[aba,setAba]=useState('foco');
  const feitosSet=useMemo(()=>new Set(feitos),[feitos]);
  const pendentes=useMemo(()=>CICLO.filter(s=>!feitosSet.has(s.id)),[feitosSet]);
  // Ciclo Extras — precisa ser declarado ANTES de ativo
  const[cicloExtras,setCicloExtras]=useState(()=>lsGet('ciclo_extras',[]));
  const extrasAtivos=useMemo(()=>cicloExtras.filter(e=>!e.feito),[cicloExtras]);
  // Extras ativos entram na frente da fila — ativo é sempre extra primeiro
  const ativoIsExtra=extrasAtivos.length>0;
  const ativo=ativoIsExtra?extrasAtivos[0]:(pendentes[0]||null);
  const cor=ativoIsExtra?'#fb923c':(ativo?.tag?.includes('TRIÂNGULO')?'#fbbf24':ativo?.cor||'#fbbf24');
  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[]);
  const semStart=todayStart-6*86400000;
  const minHoje=horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0);
  const minSem=horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0);
  const META=35*60;

  // Registro
  const hoje=getDK();
  const[historico,setHistorico]=useState(()=>lsGet('historico_diario',[]));
  const regHoje=historico.filter(r=>r.dia===hoje||r.id===hoje).slice(-1)[0]||null;
  // Último bloco concluído — pré-preenche o Registro automaticamente
  const[ultimoBlocoMat,setUltimoBlocoMat]=useState(null);
  const[rForm,setRForm]=useState({materia:ativo?.mat||'',assunto:'',tempo:'',questoes:'',acertei:'',dificuldade:0,obs:'',pendente:''});
  const[rSalvo,setRSalvo]=useState(false);
  const[obsExpandida,setObsExpandida]=useState(false);
  const[modalPct,setModalPct]=useState(null);
  const[pctSel,setPctSel]=useState(100);
  const[pendenteTxt,setPendenteTxt]=useState('');

  const criarExtra=(bloco,pct,pendente)=>{
    if(pct>=100||!pendente?.trim())return;
    const novo={
      id:'extra_'+Date.now(),
      mat:bloco.mat,ic:bloco.ic||'📌',cor:bloco.cor||'#fb923c',
      tag:'⏸ CONTINUA',conteudo:pendente.trim(),
      pctAnterior:pct,h:1.5,tipo:'Continuação',
      criadoEm:getDK(),feito:false
    };
    const n=[...lsGet('ciclo_extras',[]),novo];
    lsSet('ciclo_extras',n);setCicloExtras(n);
  };

  const concluirExtra=(id)=>{
    const n=cicloExtras.map(e=>e.id===id?{...e,feito:true}:e);
    lsSet('ciclo_extras',n);setCicloExtras(n);
  };

  // Revisão
  const[gurujaTxt,setGurujaTxt]=useState('');
  const[gurujaLoad,setGurujaLoad]=useState(false);
  const[confJaFiz,setConfJaFiz]=useState(null);
  const[confIr,setConfIr]=useState(null);
  const[cicloAbertos,setCicloAbertos]=useState(()=>new Set());

  // Planejamento semanal
  const[metaHoras,setMetaHoras]=useState(()=>lsGet('meta_horas_sem',35));
  const[contextSem,setContextSem]=useState('');
  const[planoProposto,setPlanoProposto]=useState(null);
  const[planEdit,setPlanEdit]=useState([]);
  const[planSalvo,setPlanSalvo]=useState(false);

  const dw=new Date().getDay();
  const DIAS_REV=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  const MODOS_REV=['Questões','Áudio NLM','Leitura','Anki','Misto','Flashcards'];
  const TIPOS_AUDIO=['Pegadinhas','Conceitos','Resumo geral','Questões comentadas','Mapa mental'];

  const analisarGurujaSemana=async()=>{
    if(!gurujaTxt.trim()||gurujaLoad)return;
    setGurujaLoad(true);
    try{
      const r=await chamarClaude(
        `Coach de concursos especializada em TCE-SP 2026 (VUNESP). Analise os dados do Guruja e monte plano inteligente considerando os 3 gates eliminatórios e o foco em Discursiva + Português + Auditoria.
Pesos: AFO=5,Contabilidade=5,Auditoria=5,Controle Externo=5,Dir.Adm=4,Dir.Const=4,Dir.Tributário=3,Português=3,RL=3,TI=2,Adm.Pública=2,Dir.Civil=2,Dir.Processual=2,Dir.Penal=2.
Ciclo atual: bloco ${ativo?.mat||'indefinido'}. Meta: ${metaHoras}h/semana. Contexto: ${contextSem||'semana normal'}.
APENAS JSON sem markdown: {"diagnostico":"2 frases","plano":[{"mat":"nome","horasSugeridas":2.5,"prioridade":1,"motivo":"por que","taxa":82.0,"status":"critica|atencao|ok"}],"alerta":"materia mais urgente"}`,
        [{role:'user',content:`Dados Guruja:\n${gurujaTxt.slice(0,6000)}`}],1500
      );
      const parsed=JSON.parse(r.replace(/\`\`\`json|\`\`\`/g,'').trim());
      setPlanoProposto(parsed);
      setPlanEdit(parsed.plano?.map(p=>({...p,horasEditadas:p.horasSugeridas,ativa:true}))||[]);
    }catch(e){alert(`❌ ${e.message}`);}
    setGurujaLoad(false);
  };
  const salvarPlano=()=>{
    const plano={...planoProposto,plano:planEdit,metaFinal:metaHoras,dt:Date.now(),semana:getDK()};
    if(onSavePlano)onSavePlano(plano);lsSet('plano_semanal',plano);
    setPlanSalvo(true);setTimeout(()=>setPlanSalvo(false),2500);
  };
  const MATS=CICLO.map(c=>c.mat).filter((v,i,a)=>a.indexOf(v)===i);

  // Motor tempo morto
  const tempoMorto=useMemo(()=>{
    if(historico.length<2)return null;
    const ultimos7=historico.slice(-7);
    const porMat={};
    MATS.forEach(m=>{
      const regs=ultimos7.filter(r=>r.materia===m);
      if(!regs.length)return;
      const difMedia=regs.reduce((s,r)=>s+(r.dificuldade||0),0)/regs.length;
      const ultimoAudio=[...regs].filter(r=>r.audioFeito).sort((a,b)=>b.id.localeCompare(a.id))[0];
      const diasSemAudio=ultimoAudio?Math.floor((Date.now()-new Date(ultimoAudio.id).getTime())/86400000):99;
      if(diasSemAudio>=3)porMat[m]={difMedia,diasSemAudio,score:difMedia*diasSemAudio};
    });
    const sorted=Object.entries(porMat).sort((a,b)=>b[1].score-a[1].score);
    if(!sorted.length)return null;
    const[mat,info]=sorted[0];
    return{mat,difMedia:info.difMedia.toFixed(1),diasSemAudio:info.diasSemAudio};
  },[historico]);

  // Motor revisão 1h30
  const motor1h30=useMemo(()=>{
    const n=historico.length;
    if(n<5)return{ativa:false,faltam:5-n};
    const multiplo=n%5===0;
    const ultimos5=historico.slice(-5);
    const porMat={};
    ultimos5.forEach(r=>{if(!r.materia)return;(porMat[r.materia]||(porMat[r.materia]=[])).push(r.dificuldade||0);});
    const ranking=Object.entries(porMat).map(([mat,difs])=>({mat,difMedia:difs.reduce((s,d)=>s+d,0)/difs.length})).sort((a,b)=>b.difMedia-a.difMedia);
    return{ativa:multiplo,faltam:5-(n%5)||5,ranking,total:n};
  },[historico]);

  // Ações
  const salvarRegistro=()=>{
    if(!rForm.materia||!rForm.dificuldade)return;
    const agora=Date.now();
    // Usa timestamp como id único — permite múltiplos registros por dia
    const novo={...rForm,id:hoje+'_'+agora,dia:hoje,dt:agora};
    const n=[...historico,novo].sort((a,b)=>(a.dt||0)-(b.dt||0));
    setHistorico(n);lsSet('historico_diario',n);
    if(rForm.tempo){onAddHoras({mat:rForm.materia,min:parseInt(rForm.tempo)||0,dt:agora});}
    // Se preencheu "ficou pendente", cria extra
    if(rForm.pendente?.trim()){
      criarExtra({mat:rForm.materia,ic:'📌',cor:'#fb923c',conteudo:rForm.pendente.trim()},50,rForm.pendente.trim());
    }
    // Limpa formulário após salvar (exceto matéria)
    setRForm(f=>({...f,assunto:'',tempo:'',questoes:'',acertei:'',obs:'',pendente:'',dificuldade:0}));
    setUltimoBlocoMat(null);
    setRSalvo(true);setTimeout(()=>setRSalvo(false),2500);if(onSyncHistorico)onSyncHistorico();
  };




  const analisarGuruja=async()=>{
    if(!gurujaTxt.trim()||gurujaLoad)return;
    setGurujaLoad(true);
    try{
      const r=await chamarClaude(
        `Coach de concursos especializada em Guruja/TCE-SP (VUNESP). Analise desempenho da Ritchely e cruze taxa de acerto com relevância para os gates do TCE-SP: Gerais (Português+RL+Ética+Legislação) e Específicos (6 disciplinas jurídicas).
Relevâncias: AFO=5, Contabilidade=5, Auditoria=5, Controle Externo=5, Dir.Adm=4, Dir.Const=4, Dir.Tributário=3, Português=3, RL=3, TI=2, Adm.Pública=2, Dir.Civil=2, Dir.Processual=2, Dir.Penal=2.
APENAS JSON sem markdown: {"prioridades":[{"mat":"nome","taxa":85.0,"relevancia":5,"status":"critica|atencao|ok","acao":"o que fazer"}],"resumo":"2 frases diretas","alerta":"materia mais critica"}`,
        [{role:'user',content:`Dados Guruja:\n${gurujaTxt.slice(0,6000)}`}],1200
      );
      const p=JSON.parse(r.replace(/```json|```/g,'').trim());
      setGurujaData(p);lsSet('guruja_data',p);setGurujaTxt('');
    }catch(e){alert(`❌ ${e.message}`);}
    setGurujaLoad(false);
  };

  const SUB=[{id:'foco',l:'🎯 Foco'},{id:'registro',l:'📝 Registro'},{id:'ciclo',l:'🔄 Ciclo'},{id:'stats',l:'📊 Stats'},{id:'plano',l:'📅 Plano'}];
  const PCOR={5:'#f87171',4:'#fb923c',3:'#fbbf24',2:'#34d399',1:'#60a5fa'};

  return(
    <div>
      {/* Sub-nav */}
      <div style={{display:'flex',gap:4,marginBottom:14}}>
        {SUB.map(s=>{const a=aba===s.id;return(
          <button key={s.id} onClick={()=>setAba(s.id)} style={{flex:1,padding:'9px 3px',borderRadius:9,border:`1px solid ${a?'#fbbf24':'rgba(148,163,184,.25)'}`,background:a?'rgba(251,191,36,.12)':'transparent',color:a?'#fbbf24':'var(--text4)',fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>{s.l}</button>
        );})}
      </div>

      {/* ── FOCO ─────────────────────────────────────────────── */}
      {aba==='foco'&&<div>

          {(()=>{
            const hist=lsGet('historico_diario',[]);
            if(!hist.length)return <div style={{textAlign:'center',padding:'16px',color:'var(--text4)',fontSize:12}}>Registre questões para ver a evolução.</div>;

            // Agrupa por semana ISO
            const porSemMat={};
            hist.forEach(r=>{
              if(!r.materia||!parseInt(r.questoes)||!parseInt(r.acertei))return;
              const dt=new Date(r.dt||Date.now());
              const jan1=new Date(dt.getFullYear(),0,1);
              const semNum=Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);
              const semKey=`S${String(semNum).padStart(2,'0')}`;
              if(!porSemMat[semKey])porSemMat[semKey]={};
              const mat=r.materia;
              if(!porSemMat[semKey][mat])porSemMat[semKey][mat]={q:0,a:0};
              porSemMat[semKey][mat].q+=parseInt(r.questoes)||0;
              porSemMat[semKey][mat].a+=parseInt(r.acertei)||0;
            });

            const semanas=Object.keys(porSemMat).sort().slice(-6);
            if(semanas.length<1)return <div style={{textAlign:'center',padding:'16px',color:'var(--text4)',fontSize:12}}>Ainda sem dados suficientes. Continue registrando!</div>;

            // Pega matérias com mais dados
            const matCount={};
            hist.filter(r=>parseInt(r.questoes)>0&&parseInt(r.acertei)>0).forEach(r=>{if(r.materia)matCount[r.materia]=(matCount[r.materia]||0)+1;});
            const mats=Object.entries(matCount).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([m])=>m);

            if(!mats.length)return null;

            const CORES=['#60a5fa','#f87171','#34d399','#fbbf24','#a78bfa','#fb923c'];
            const CHART_H=120;
            const CHART_W=280;
            const padL=30,padB=20,padR=10,padT=10;
            const innerW=CHART_W-padL-padR;
            const innerH=CHART_H-padB-padT;

            // Linhas de referência
            const refLines=[70,85];

            return(
              <div style={{overflowX:'auto',paddingBottom:4}}>

                    const y=padT+innerH-(pct/100)*innerH;
                    return(
                      <g key={pct}>
                        <line x1={padL} y1={y} x2={CHART_W-padR} y2={y} stroke="var(--border)" strokeWidth="1" strokeDasharray={pct===0?'none':'3,3'}/>
                        <text x={padL-4} y={y+4} textAnchor="end" fontSize="8" fill="var(--text4)">{pct}%</text>

                  {/* Linhas de referência coloridas */}
                  {refLines.map(pct=>{
                    const y=padT+innerH-(pct/100)*innerH;

                    return <line key={pct} x1={padL} y1={y} x2={CHART_W-padR} y2={y} stroke={cor} strokeWidth="1" strokeDasharray="4,2" opacity="0.5"/>;
                  })}
                  {/* Eixo X — semanas */}
                  {semanas.map((sem,i)=>{
                    const x=padL+(i/(semanas.length-1||1))*innerW;
                    return(
                      <g key={sem}>
                        <line x1={x} y1={padT} x2={x} y2={padT+innerH} stroke="var(--border)" strokeWidth="1" strokeDasharray="2,4"/>
                        <text x={x} y={CHART_H-4} textAnchor="middle" fontSize="8" fill="var(--text4)">{sem}</text>
                      </g>
                    );
                  })}
                  {/* Linhas por matéria */}
                  {mats.map((mat,mi)=>{
                    const cor=CORES[mi];
                    const pontos=semanas.map((sem,i)=>{
                      const d=porSemMat[sem]?.[mat];
                      if(!d||!d.q)return null;
                      const pct=Math.round(d.a/d.q*100);
                      const x=padL+(i/(semanas.length-1||1))*innerW;
                      const y=padT+innerH-(pct/100)*innerH;
                      return{x,y,pct};
                    });
                    // Draw line segments between non-null points
                    const segments=[];
                    let prev=null;

                        </g>
                      );
                    });
                    return <g key={mat}>{segments}{dots}</g>;
                  })}

                  </div>

        <div style={{fontSize:9,letterSpacing:'2px',color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:8,marginTop:14}}>🎯 RADAR DO EDITAL — PONTOS EM RISCO (peso × déficit)</div>
        <div style={{padding:'8px 12px',borderRadius:9,background:'rgba(248,113,113,.05)',border:'1px solid rgba(248,113,113,.18)',marginBottom:10}}>
          <div style={{fontSize:9,color:'var(--text4)',lineHeight:1.6}}>Ordena por impacto real na nota: matéria que cai muito + você acerta pouco = mais pontos em risco. Foque nos vermelhos.</div>

// Componente auxiliar para adicionar tempo manual (sem hooks problemáticos)
function AddTempoManual({onAdd}){
  const[mat,setMat]=useState('');
  const[min,setMin]=useState('');
  const[salvo,setSalvo]=useState(false);
  const add=()=>{
    const m=parseInt(min);
    if(!mat.trim()||!m||m<=0)return;
    onAdd({mat:mat.trim(),min:m,dt:Date.now()});
    setMat('');setMin('');
    setSalvo(true);setTimeout(()=>setSalvo(false),2000);
  };
  return(
    <div style={{display:'flex',gap:8}}>
      <input value={mat} onChange={e=>setMat(e.target.value)} placeholder="Matéria..." style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#f1f5f9',fontSize:12,outline:'none'}}/>
      <input type="number" value={min} onChange={e=>setMin(e.target.value)} placeholder="min" style={{width:65,padding:'8px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#fbbf24',fontSize:13,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
      <button onClick={add} disabled={!mat.trim()||!min} style={{padding:'8px 14px',borderRadius:8,border:'none',background:mat.trim()&&min?'#fbbf24':'rgba(148,163,184,.22)',color:mat.trim()&&min?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>{salvo?'✅':'+'}  </button>
    </div>
  );
}

        :<>
          <div style={{fontSize:20,fontWeight:900,color:'var(--text)',fontFamily:"'DM Serif Display',serif",marginBottom:4}}>{matAtual?.mat||'—'}</div>

          <div style={{display:'flex',gap:6,justifyContent:'center'}}>
            <button onClick={()=>{setTmFeitoNlm(true);lsSet(`tm_nlm_${hoje}`,true);}} style={{padding:'10px 20px',borderRadius:9,border:'none',background:'#34d399',color:'#0f172a',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Ouvi hoje</button>
            {filaNlm.length>1&&idxFinal<filaNlm.length-1&&<button onClick={()=>setIdx80(i=>i+1)} style={{padding:'10px 14px',borderRadius:9,border:'1px solid rgba(52,211,153,.3)',background:'transparent',color:'#34d399',fontSize:12,cursor:'pointer'}}>🔄 Trocar</button>}
          </div>
        </>
      }
    </div>

    if(!gurujaTxt.trim())return;
    setLoad(true);
    try{
      const k=getAK();
      if(!k?.startsWith('sk-ant')){alert('Configure a chave IA em ⚙️');setLoad(false);return;}

        'Você recebe uma tabela do Guruja Concursos. Extraia e retorne APENAS JSON sem markdown: {"assuntos":[{"titulo":"nome","acerto":87.5,"diffMedia":11.5,"relevancia":4,"tempoCump":"1h30m","questoes":28,"acertos":23}]}. Extraia: título da atividade, taxa de acertos (número), diferença pra média (com sinal), relevância (estrelas 1-5), tempo, questões e acertos.',
        [{role:'user',content:`Matéria: ${gurujaMatSel}\n\n${gurujaTxt}`}],800);

        const atual=lsGet('guruja_assuntos',{});
        lsSet('guruja_assuntos',{...atual,[gurujaMatSel]:{importadoEm:getDK(),assuntos:parsed.assuntos}});

      }
    }catch(e){alert('Erro: '+e.message);}
    setLoad(false);
  };

  return(
    <div style={{marginTop:16,background:'rgba(52,211,153,.04)',border:'1px solid rgba(52,211,153,.25)',borderRadius:13,padding:'14px'}}>
      <div style={{fontSize:9,color:'#34d399',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:3,letterSpacing:'1px'}}>📥 IMPORTAR GURUJA — por assunto</div>

  const LABELS_DIF=['FÁCIL','TRANQUILO','MÉDIO','DIFÍCIL','MUITO DIFÍCIL'];

  // Tempo Morto calculado no App e passado como prop tmSugestao
  const tempoMorto=tmSugestao||{anki:{mat:'Dir. Financeiro / AFO',difMedia:0,diasSem:0},nlm:{mat:'Discursivas',difMedia:0,diasSem:0},ranking:[],travouRecente:[]};

  // Fix 1h30 — conta blocos desde última revisão
  const ultimaRev=rev1h30Regs.length>0?rev1h30Regs[rev1h30Regs.length-1]:null;
  const ultimoBlocoRev=ultimaRev?.blocoRef||0;
  const blocosDesde=totalBlocos-ultimoBlocoRev;
  const deve1h30=blocosDesde>=5&&totalBlocos>0;
  const faltam1h30=Math.max(0,5-blocosDesde);

  // ── IA diária para Tempo Morto (uma vez por dia) ───────────
  const chamarIaTempoMorto=async()=>{
    const dk=getDK();
    const cached=lsGet('tm_ia_cache',null);
    if(cached&&cached.dia===dk)return; // já chamou hoje
    const k=getAK();if(!k||!k.startsWith('sk-ant'))return;
    try{
      const historico2=lsGet('historico_diario',[]);

      const ctx=`Ciclo atual: bloco ${totalBlocos}/${N}. Motor local sugere Anki: ${tempoMorto.anki.mat} e NLM: ${tempoMorto.nlm.mat}. ${fmtRanking()}. Travou recentemente: ${tempoMorto.travouRecente.join('; ')||'nada'}. Guruja: ${lsGet('guruja_data',null)?.alerta||'sem dado'}.`;

        [{role:'user',content:ctx}],200);
      const parsed=JSON.parse(res.replace(/```json|```/g,'').trim());
      const cache={...parsed,dia:dk};
      lsSet('tm_ia_cache',cache);
    }catch(e){console.log('TM IA error:',e.message);}
  };

  const toggleEditalStatus=(mat,topico,status)=>{

        {(()=>{
          const hist=lsGet('historico_diario',[]);
          const gurujaData=lsGet('guruja_data',null);
          const porItem={};
          hist.forEach(r=>{
            if(!r.materia)return;
            const q=parseInt(r.questoes)||0;const a=parseInt(r.acertei)||0;
            const key=r.assunto?`${r.materia} — ${r.assunto}`:r.materia;
            if(!porItem[key])porItem[key]={mat:r.materia,assunto:r.assunto||'',q:0,a:0,difs:[],lastDt:0,travouCount:0};
            if(q>0){porItem[key].q+=q;porItem[key].a+=a;}
            if(r.dificuldade)porItem[key].difs.push(r.dificuldade);
            if(r.dt>porItem[key].lastDt)porItem[key].lastDt=r.dt||0;
            if(r.travou)porItem[key].travouCount++;
          });
          const todayMs=new Date().setHours(0,0,0,0);
          const criticos=Object.entries(porItem).map(([key,v])=>{
            const pct=v.q>0?Math.round(v.a/v.q*100):null;
            const difMedia=v.difs.length?v.difs.reduce((s,d)=>s+d,0)/v.difs.length:0;
            const dias=Math.floor((todayMs-(v.lastDt||0))/86400000);
            const g=gurujaData?.prioridades?.find(p=>p.mat?.includes(v.mat.split(' ')[0]))?.status==='critica'?2:0;
            const acScore=pct!==null?(1-pct/100)*3:0;
            const score=acScore+difMedia*(dias+1)*0.5+g+v.travouCount*1.2;
            return{key,mat:v.mat,assunto:v.assunto,pct,q:v.q,a:v.a,difMedia,dias,score};
          }).sort((a,b)=>b.score-a.score).slice(0,8);
          if(!criticos.length)return <div style={{textAlign:'center',padding:'20px',color:'#334155',fontSize:11}}>Registre questões para detectar pontos críticos.</div>;
          return criticos.map((item,i)=>{

                  <div style={{flex:1}}>

                    {item.q>0&&<BarProg done={item.a} total={item.q} cor={cor} h={3}/>}
                    {item.pct!==null&&item.pct<70&&!item.assunto&&EDITAL[item.mat]&&(
                      <div style={{fontSize:8,color:'#f87171',marginTop:3,padding:'2px 6px',borderRadius:4,background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.2)',display:'inline-block'}}>
                        ⚠️ Priorize: {EDITAL[item.mat].top[0].t.slice(0,40)} ({EDITAL[item.mat].top[0].p}% da prova)
                      </div>
                    )}
                    <div style={{display:'flex',gap:5,marginTop:4,flexWrap:'wrap'}}>
                      {item.difMedia>0&&<span style={{fontSize:8,padding:'1px 5px',borderRadius:3,background:`${cor}15`,color:cor}}>dif {item.difMedia.toFixed(1)}★</span>}
                      {item.dias>0&&<span style={{fontSize:8,padding:'1px 5px',borderRadius:3,background:'rgba(148,163,184,.1)',color:'#64748b'}}>{item.dias}d atrás</span>}
                      {item.travouCount>0&&<span style={{fontSize:8,padding:'1px 5px',borderRadius:3,background:'rgba(248,113,113,.1)',color:'#f87171'}}>travou {item.travouCount}x</span>}
                    </div>
                  </div>
                  {item.pct!==null&&<div style={{textAlign:'right',flexShrink:0,marginLeft:8}}><div style={{fontSize:14,fontWeight:900,color:cor,fontFamily:"'DM Mono',monospace"}}>{item.pct}%</div><div style={{fontSize:8,color:'#475569'}}>{item.a}/{item.q}Q</div></div>}
                </div>
              </div>
            );
          });
        })()}
      </div>}

      {/* EDITAL — agora dentro de Estratégia > Edital */}

      {/* TÓPICOS PARA REVISITAR */}
      {/* TÓPICOS PARA REVISITAR — agora dentro de Estratégia > Revisitar */}
      {/* ═══ PROFUNDA ═══ */}
      {aba==='rev1h30'&&<TabRevProfunda totalBlocos={totalBlocos}/>}

      {aba==='estrategia'&&subEstrategia==='revisitar'&&<div>

          <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginBottom:4}}>📌 TÓPICOS PARA REVISITAR</div>

          <button onClick={addTopico} style={{padding:'9px 14px',borderRadius:9,border:'none',background:topicoForm.trim()?'#fbbf24':'rgba(148,163,184,.2)',color:topicoForm.trim()?'#0f172a':'#334155',fontSize:14,fontWeight:900,cursor:'pointer'}}>+</button>

          {topicos.filter(t=>t.feito).slice(0,5).map(t=>(
            <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 11px',borderRadius:9,background:'rgba(52,211,153,.04)',border:'1px solid rgba(52,211,153,.15)',marginBottom:4,opacity:.7}}>

// ─── TAB: AGENDA ─────────────────────────────────────────────
// ─── ABA: MAPA DA PROVA ──────────────────────────────────────
function TabMapa(){
  const[aba,setAba]=useState('ranking');
  const[matSel,setMatSel]=useState('Português');
  const[ordemTabela,setOrdemTabela]=useState('risco'); // risco|acerto|peso

  // Lê dados
  const hist=lsGet('historico_diario',[]);
  const guruja=getGurujaAssuntos();
  const todayMs=new Date().setHours(0,0,0,0);

  // Acerto real por assunto do historico
  const acertoPorAssunto=useMemo(()=>{
    const por={};
    hist.forEach(r=>{
      if(!r.materia||!r.assunto||!parseInt(r.questoes))return;
      const k=r.materia+'|||'+r.assunto;
      if(!por[k])por[k]={q:0,a:0,lastDt:0};
      por[k].q+=parseInt(r.questoes)||0;
      por[k].a+=parseInt(r.acertei)||0;
      if((r.dt||0)>por[k].lastDt)por[k].lastDt=r.dt||0;
    });
    return por;
  },[hist.length]);

  // Monta lista completa de assuntos cruzando Guruja + historico
  const todosAssuntos=useMemo(()=>{
    const lista=[];
    Object.entries(guruja).forEach(([mat,dados])=>{
      if(!dados.assuntos)return;
      dados.assuntos.forEach(a=>{
        const k=mat+'|||'+a.titulo;
        const reg=acertoPorAssunto[k]||null;
        const acertoApp=reg?Math.round(reg.a/reg.q*100):null;
        // Acerto combinado: se tem dado no app, pondera com Guruja
        const acertoComb=acertoApp!==null
          ?Math.round((a.acerto*(a.questoes||20)+acertoApp*(reg.q))/(( a.questoes||20)+reg.q))
          :a.acerto;
        const estudado=reg!==null||a.acerto>0;
        const pesoTopico=a.relevancia*2; // proxy de peso: relevância × 2
        const pontosRisco=Math.round(pesoTopico*(1-acertoComb/100)*10)/10;
        const diasSem=reg?.lastDt?Math.floor((todayMs-reg.lastDt)/86400000):null;
        lista.push({
          mat,titulo:a.titulo,
          pesoEdital:pesoTopico,
          acertoGuruja:a.acerto,
          acertoApp,
          acertoComb,
          diffMedia:a.diffMedia,
          relevancia:a.relevancia,
          tempoCump:a.tempoCump,
          questoesGuruja:a.questoes,
          pontosRisco,
          estudado,
          diasSem,
          status:acertoComb>=85?'dominio':acertoComb>=75?'atencao':estudado?'critico':'nao_estudado',
        });
      });
    });
    return lista;
  },[guruja,acertoPorAssunto]);

  const corStatus={dominio:'#34d399',atencao:'#fbbf24',critico:'#f87171',nao_estudado:'#64748b'};
  const emojiStatus={dominio:'🟢',atencao:'🟡',critico:'🔴',nao_estudado:'⬜'};
  const labelStatus={dominio:'Dominado',atencao:'Atenção',critico:'Crítico',nao_estudado:'Não estudado'};

  const ABAS_MAPA=[
    {id:'ranking',l:'🏆 Ranking Risco'},
    {id:'tabela', l:'📋 Tabela'},
    {id:'barras',  l:'📊 Barras'},
    {id:'painel',  l:'🎯 Por Matéria'},
    {id:'nao_estudados',l:'⬜ Não estudados'},
  ];

  return(
    <div style={{maxWidth:680,margin:'0 auto'}}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:18,fontWeight:900,color:'var(--text)',fontFamily:"'DM Serif Display',serif",marginBottom:2}}>📊 Mapa da Prova</div>
        <div style={{fontSize:11,color:'var(--text4)'}}>Peso no edital × seu desempenho real · {todosAssuntos.length} assuntos mapeados</div>
      </div>

      {/* Sub-abas */}
      <div style={{display:'flex',gap:4,marginBottom:14,overflowX:'auto',scrollbarWidth:'none',paddingBottom:2}}>
        {ABAS_MAPA.map(a=>{const at=aba===a.id;return(
          <button key={a.id} onClick={()=>setAba(a.id)} style={{flexShrink:0,padding:'8px 11px',borderRadius:9,border:`1px solid ${at?'var(--tab-active-border)':'var(--border)'}`,background:at?'var(--tab-active-bg)':'transparent',color:at?'var(--tab-active-color)':'var(--tab-inactive-color)',fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>{a.l}</button>
        );})}
      </div>

      {/* MODO 3 — Ranking de pontos em risco */}
      {aba==='ranking'&&(()=>{
        const sorted=[...todosAssuntos].sort((a,b)=>b.pontosRisco-a.pontosRisco);
        const naoEst=sorted.filter(a=>a.status==='nao_estudado');
        const criticos=sorted.filter(a=>a.status==='critico');
        const atencao=sorted.filter(a=>a.status==='atencao');

        const Item=({a,i})=>{
          const cor=corStatus[a.status];
          return(
            <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',borderRadius:10,background:`${cor}08`,border:`1px solid ${cor}22`,marginBottom:6}}>
              <span style={{fontSize:12,width:20,flexShrink:0,fontWeight:900,color:cor}}>{i+1}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--text)',lineHeight:1.3}}>{a.titulo.length>44?a.titulo.slice(0,42)+'…':a.titulo}</div>
                <div style={{fontSize:9,color:'var(--text4)',marginTop:2}}>{a.mat}</div>
                <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                  <span style={{fontSize:9,padding:'1px 5px',borderRadius:4,background:`${cor}15`,color:cor,fontWeight:700}}>{emojiStatus[a.status]} {labelStatus[a.status]}</span>
                  {a.diffMedia<0&&<span style={{fontSize:9,color:'#f87171'}}>⬇️{Math.abs(a.diffMedia).toFixed(1)}% da média</span>}
                  <span style={{fontSize:9,color:'var(--text4)'}}>{'★'.repeat(a.relevancia)}</span>
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:15,fontWeight:900,color:cor,fontFamily:"'DM Mono',monospace"}}>{a.status==='nao_estudado'?'—':a.acertoComb+'%'}</div>
                <div style={{fontSize:8,color:'var(--text4)'}}>Guruja: {a.acertoGuruja}%</div>
              </div>
            </div>
          );
        };

        return(
          <div>
            <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
              {[['⬜ Não estudados',naoEst.length,'#64748b'],['🔴 Críticos',criticos.length,'#f87171'],['🟡 Atenção',atencao.length,'#fbbf24'],['🟢 Dominados',todosAssuntos.filter(a=>a.status==='dominio').length,'#34d399']].map(([l,v,c])=>(
                <div key={l} style={{flex:1,minWidth:60,padding:'8px',borderRadius:9,background:`${c}0d`,border:`1px solid ${c}25`,textAlign:'center'}}>
                  <div style={{fontSize:16,fontWeight:900,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>
                  <div style={{fontSize:8,color:'var(--text4)',marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            {naoEst.length>0&&<><div style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace",marginBottom:6,marginTop:8}}>⬜ NÃO ESTUDADOS — por relevância</div>{naoEst.slice(0,5).map((a,i)=><Item key={a.mat+a.titulo} a={a} i={i}/>)}</>}
            {criticos.length>0&&<><div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:6,marginTop:12}}>🔴 CRÍTICOS — acerto {'<'}75%</div>{criticos.map((a,i)=><Item key={a.mat+a.titulo} a={a} i={i}/>)}</>}

      {/* MODO 4 — Painel por matéria com 3 seções */}

        const mats=Object.keys(guruja);
        const assuntosMat=(guruja[matSel]?.assuntos||[]).map(a=>{
          const k=matSel+'|||'+a.titulo;
          const reg=acertoPorAssunto[k];
          const acertoApp=reg?Math.round(reg.a/reg.q*100):null;
          const acertoComb=acertoApp!==null?Math.round((a.acerto*(a.questoes||20)+acertoApp*reg.q)/((a.questoes||20)+reg.q)):a.acerto;
          const status=acertoComb>=85?'dominio':acertoComb>=75?'atencao':acertoComb>0?'critico':'nao_estudado';
          const diasSem=reg?.lastDt?Math.floor((todayMs-reg.lastDt)/86400000):null;
          return{...a,acertoComb,acertoApp,status,diasSem,reg};
        });

        const naoEst=assuntosMat.filter(a=>a.status==='nao_estudado').sort((a,b)=>b.relevancia-a.relevancia);
        const comRisco=assuntosMat.filter(a=>a.status==='critico'||a.status==='atencao').sort((a,b)=>(1-a.acertoComb/100)*b.relevancia-(1-b.acertoComb/100)*a.relevancia);
        const dominados=assuntosMat.filter(a=>a.status==='dominio').sort((a,b)=>(b.diasSem||0)-(a.diasSem||0));

        const addTEC=(a)=>{
          const difEstim=a.acertoComb<65?5:a.acertoComb<75?4:3;
          const novo={id:Date.now()+Math.random(),mat:matSel,assunto:a.titulo,feitas:a.questoes||0,acertei:a.acertos||0,pct:a.acertoComb,dificuldade:difEstim,tentativas:1,dominado:false,dia:getDK(),obs:`Guruja: ${a.acertoComb}% · ⬇️${Math.abs(a.diffMedia||0)}% da média`,origem:'mapa',historico:[{data:getDK(),questoes:a.questoes||0,acertos:a.acertos||0,dificuldade:difEstim}]};
          const cad=[...lsGet('rev_caderno',[]),novo];lsSet('rev_caderno',cad);

        const ItemPainel=({a,mostrarBotao})=>{

            <div style={{padding:'9px 11px',borderRadius:10,background:`${cor}07`,border:`1px solid ${cor}22`,marginBottom:6}}>

                  <div style={{display:'flex',gap:6,marginTop:3,flexWrap:'wrap'}}>
                    <span style={{fontSize:9,color:'var(--text4)'}}>{'★'.repeat(a.relevancia)} · {a.tempoCump}</span>
                    {a.diffMedia<0&&<span style={{fontSize:9,color:'#f87171'}}>⬇️{Math.abs(a.diffMedia).toFixed(1)}%</span>}
                    {a.diasSem!==null&&<span style={{fontSize:9,color:'var(--text4)'}}>{a.diasSem}d atrás</span>}
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                  <span style={{fontSize:14,fontWeight:900,color:cor,fontFamily:"'DM Mono',monospace"}}>{a.status==='nao_estudado'?'—':a.acertoComb+'%'}</span>
                  {mostrarBotao&&<button onClick={()=>addTEC(a)} style={{padding:'3px 8px',borderRadius:6,border:'none',background:'#f87171',color:'#0f172a',fontSize:9,fontWeight:800,cursor:'pointer'}}>+ TEC</button>}
                </div>
              </div>
            </div>
          );
        };

        return(
          <div>
            {/* Seletor de matéria */}
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:14}}>
              {mats.map(m=>(
                <button key={m} onClick={()=>setMatSel(m)} style={{padding:'6px 10px',borderRadius:8,border:`1px solid ${matSel===m?'#60a5fa':'var(--border)'}`,background:matSel===m?'rgba(96,165,250,.15)':'transparent',color:matSel===m?'#60a5fa':'var(--text4)',fontSize:10,cursor:'pointer',fontWeight:matSel===m?700:400}}>
                  {m.length>14?m.slice(0,13)+'…':m}
                </button>
              ))}
            </div>

            {/* Resumo da matéria */}
            {(()=>{
              const media=assuntosMat.length?Math.round(assuntosMat.reduce((s,a)=>s+a.acertoComb,0)/assuntosMat.length):0;
              const cor=media>=85?'#34d399':media>=75?'#fbbf24':'#f87171';
              return(
                <div style={{display:'flex',gap:8,marginBottom:14}}>
                  {[['Média geral',`${media}%`,cor],['Não estudados',naoEst.length,'#64748b'],['Com risco',comRisco.length,'#f87171'],['Dominados',dominados.length,'#34d399']].map(([l,v,c])=>(
                    <div key={l} style={{flex:1,padding:'8px',borderRadius:9,background:`${c}0d`,border:`1px solid ${c}22`,textAlign:'center'}}>
                      <div style={{fontSize:14,fontWeight:900,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>
                      <div style={{fontSize:8,color:'var(--text4)',marginTop:2}}>{l}</div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {naoEst.length>0&&<>
              <div style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace",marginBottom:6}}>⬜ NÃO ESTUDADOS — por relevância</div>
              {naoEst.map(a=><ItemPainel key={a.titulo} a={a} mostrarBotao={false}/>)}
            </>}
            {comRisco.length>0&&<>
              <div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:6,marginTop:12}}>⚠️ COM RISCO — adicione ao TEC</div>
              {comRisco.map(a=><ItemPainel key={a.titulo} a={a} mostrarBotao={true}/>)}
            </>}
            {dominados.length>0&&<>
              <div style={{fontSize:9,color:'#34d399',fontFamily:"'DM Mono',monospace",marginBottom:6,marginTop:12}}>🟢 DOMINADOS — manutenção</div>
              {dominados.map(a=><ItemPainel key={a.titulo} a={a} mostrarBotao={false}/>)}
            </>}
          </div>
        );
      })()}

      {/* MODO 5 — Não estudados por prioridade */}
      {aba==='nao_estudados'&&(()=>{
        const naoEst=[...todosAssuntos]
          .filter(a=>a.status==='nao_estudado')
          .sort((a,b)=>b.relevancia-a.relevancia||a.mat.localeCompare(b.mat));
        const porMat={};
        naoEst.forEach(a=>{if(!porMat[a.mat])porMat[a.mat]=[];porMat[a.mat].push(a);});

        return(
          <div>
            <div style={{padding:'10px 12px',borderRadius:10,background:'rgba(96,165,250,.06)',border:'1px solid rgba(96,165,250,.2)',marginBottom:14}}>
              <div style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:2}}>⬜ {naoEst.length} ASSUNTOS SEM ESTUDO REGISTRADO</div>
              <div style={{fontSize:10,color:'var(--text4)'}}>Ordenados por relevância. Estes assuntos existem no Guruja mas você ainda não registrou questões específicas deles no app.</div>
            </div>
            {Object.entries(porMat).map(([mat,assuntos])=>(
              <div key={mat} style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:800,color:'var(--text)',marginBottom:6,padding:'4px 0',borderBottom:'1px solid var(--border)'}}>{mat} <span style={{fontSize:9,color:'var(--text4)',fontWeight:400}}>({assuntos.length} assuntos)</span></div>
                {assuntos.map((a,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:9,background:'rgba(148,163,184,.06)',border:'1px solid rgba(148,163,184,.15)',marginBottom:4}}>
                    <span style={{fontSize:11,flexShrink:0}}>⬜</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,color:'var(--text)',lineHeight:1.3}}>{a.titulo}</div>
                      <div style={{display:'flex',gap:6,marginTop:2}}>
                        <span style={{fontSize:9,color:'var(--text4)'}}>{'★'.repeat(a.relevancia)} · {a.tempoCump}</span>
                        <span style={{fontSize:9,color:'var(--text4)'}}>Guruja base: {a.acertoGuruja}%</span>
                      </div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace"}}>{'★'.repeat(a.relevancia)}</div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
            {naoEst.length===0&&(
              <div style={{textAlign:'center',padding:'40px 20px',color:'var(--text4)'}}>
                <div style={{fontSize:28,marginBottom:8}}>✅</div>
                <div style={{fontSize:14,fontWeight:700,color:'#34d399'}}>Todos os assuntos têm registro!</div>
                <div style={{fontSize:11,marginTop:4}}>Continue registrando questões por assunto no campo de registro de estudo.</div>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

                      <span style={{fontSize:7,padding:'1px 4px',borderRadius:3,background:`${CAT_COR[t.cat]||'#475569'}22`,color:CAT_COR[t.cat]||'#475569'}}>{CAT_IC[t.cat]} {t.cat}</span>

    </div>
  );

function ModalConfig({fechar}){
  const[aba,setAba]=useState('ia');
  const[msg,setMsg]=useState('');
  const[akVal,setAkVal]=useState(getAK);
  const[importTxt,setImportTxt]=useState('');
  const[confirmarDel,setConfirmarDel]=useState(false);

  const ABAS=[{id:'ia',l:'🤖 IA'},{id:'cloud',l:'☁️ Nuvem'},{id:'backup',l:'📦 Backup'},{id:'import',l:'📥 Restaurar'},{id:'info',l:'ℹ️ Info'}];
  const[cfgUrl,setCfgUrl]=useState(()=>Sync.getCfg().url);
  const[cfgKey,setCfgKey]=useState(()=>Sync.getCfg().key);
  const[cfgLoad,setCfgLoad]=useState(false);

  function salvarChave(){setAK(akVal);setMsg('✅ Chave salva!');setTimeout(()=>setMsg(''),3000);}
  function exportar(){
    try{
      const d={};
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{d[k]=JSON.parse(localStorage.getItem(k));}catch{d[k]=localStorage.getItem(k);}}
      const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const dt=new Date();
      a.href=url;a.download=`rity-backup-${dt.getDate()}-${dt.getMonth()+1}-${dt.getFullYear()}.json`;
      a.click();URL.revokeObjectURL(url);
      setMsg('✅ Backup exportado!');
    }catch(e){setMsg('❌ Erro ao exportar.');}
  }
  function importar(){
    try{
      const d=JSON.parse(importTxt);
      Object.entries(d).forEach(([k,v])=>localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v)));
      setMsg('✅ Restaurado! Recarregando...');
      setTimeout(()=>window.location.reload(),1500);
    }catch(e){setMsg('❌ JSON inválido.');}
  }
  function importFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setImportTxt(ev.target.result);r.readAsText(f);
  }
  function apagarTudo(){
    if(!confirmarDel){setConfirmarDel(true);return;}
    localStorage.clear();
    setMsg('🗑️ Apagado. Recarregando...');
    setTimeout(()=>window.location.reload(),1500);
  }

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>{if(e.target===e.currentTarget)fechar();}}>
      <div style={{background:'#1e293b',borderRadius:'20px 20px 0 0',border:'1px solid rgba(255,255,255,.1)',padding:'20px 18px 40px',width:'100%',maxWidth:520,maxHeight:'90dvh',overflowY:'auto'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(148,163,184,.28)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:8,letterSpacing:'3px',color:'rgba(251,191,36,.5)',fontFamily:"'DM Mono',monospace"}}>RITY OS · v4.0</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:'#f0e6d0',marginTop:2}}>Configurações</div>
          </div>
          <button onClick={fechar} style={{width:32,height:32,borderRadius:'50%',border:'1px solid rgba(255,255,255,.1)',background:'rgba(148,163,184,.22)',color:'#94a3b8',fontSize:16,cursor:'pointer'}}>✕</button>
        </div>

        <div style={{display:'flex',gap:4,marginBottom:16,overflowX:'auto',scrollbarWidth:'none'}}>
          {ABAS.map(s=>{const a=aba===s.id;return(
            <button key={s.id} onClick={()=>{setAba(s.id);setMsg('');setConfirmarDel(false);}} style={{flex:1,minWidth:70,padding:'8px 4px',borderRadius:8,border:`1px solid ${a?'#fbbf24':'rgba(148,163,184,.25)'}`,background:a?'rgba(251,191,36,.1)':'transparent',color:a?'#fbbf24':'#334155',fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>{s.l}</button>
          );})}
        </div>

        {aba==='ia'&&(
          <div>
            <div style={{padding:'12px',borderRadius:10,background:akVal.startsWith('sk-ant')?'rgba(52,211,153,.07)':'rgba(248,113,113,.07)',border:`1px solid ${akVal.startsWith('sk-ant')?'rgba(52,211,153,.3)':'rgba(248,113,113,.3)'}`,marginBottom:14,fontSize:12,color:akVal.startsWith('sk-ant')?'#34d399':'#f87171',fontWeight:700}}>
