            {vencendo.length===0&&proximos.length===0&&futuros.length===0&&(
              <div style={{textAlign:'center',padding:'30px',color:'var(--text4)',fontSize:12}}>
                <div style={{fontSize:28,marginBottom:8}}>✅</div>
                Nenhuma revisão pendente. Registre um erro abaixo para começar o ciclo.
              </div>
            )}

            {/* Registrar novo erro */}
            <div style={{marginTop:14,borderTop:'1px solid var(--border)',paddingTop:14}}>
              <button onClick={()=>setTecModal(true)} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:'#f87171',color:'#0f172a',fontSize:13,fontWeight:900,cursor:'pointer'}}>+ Registrar novo erro</button>
            </div>
          </div>
        );
      })()}

      {/* ── SUB-ABA: RADAR DO EDITAL ── */}
      {subAba==='radar'&&(()=>{
        const perigos=calcTop5Perigos(8);
        return(
          <div>
            <div style={{padding:'10px 12px',borderRadius:10,background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.2)',marginBottom:12}}>
              <div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:2}}>🎯 RADAR DO EDITAL — TOP PERIGOS</div>
              <div style={{fontSize:10,color:'var(--text4)'}}>peso da prova × seu déficit de acerto × tempo parado</div>
            </div>
            {perigos.map((p,i)=>{
              const scoreNorm=Math.min(Math.round(p.score),100);
              const c=p.acerto!==null?(p.acerto<50?'#f87171':p.acerto<70?'#fbbf24':'#34d399'):'#64748b';
              const prioridade=scoreNorm>=60?'🔴 ATACAR AGORA':scoreNorm>=30?'🟡 MANTER VIVO':'⬜ PODE ESPERAR';
              const corPri=scoreNorm>=60?'#f87171':scoreNorm>=30?'#fbbf24':'#64748b';
              return(
                <div key={i} style={{padding:'11px 13px',borderRadius:11,background:`${corPri}08`,border:`1px solid ${corPri}22`,marginBottom:7}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,color:'var(--text4)',marginBottom:1}}>{p.mat}</div>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--text)',lineHeight:1.3,paddingRight:8}}>{p.topico}</div>
                    </div>
                    <span style={{fontSize:9,padding:'2px 7px',borderRadius:5,background:`${corPri}18`,color:corPri,fontWeight:800,fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap',flexShrink:0}}>{prioridade}</span>
                  </div>
                  <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                    <span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:'rgba(96,165,250,.12)',color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>📊 {p.pesoEdital}% da prova</span>
                    {p.acerto!==null
                      ?<span style={{fontSize:9,padding:'1px 6px',borderRadius:4,background:`${c}12`,color:c,fontFamily:"'DM Mono',monospace"}}>🎯 você: {p.acerto}%</span>
                      :<span style={{fontSize:9,color:'var(--text4)'}}>sem dado ainda</span>
                    }
                    {p.diasSem>0&&<span style={{fontSize:9,color:'var(--text4)'}}>{p.diasSem}d parado</span>}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* MODAL NÃO FIZ */}
      {naoFizModal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:200,display:'flex',alignItems:'flex-end'}}>
        <div style={{width:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'16px 16px 0 0',padding:'20px 16px'}}>
          <div style={{fontSize:12,color:'var(--text)',fontWeight:700,marginBottom:12}}>❌ Por que não fez {naoFizModal==='anki'?'o Anki':naoFizModal==='tec'?'o TEC':'o NLM'}?</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
            {['Falta de tempo','Cansaço','Sem material','Esqueci','Outro'].map(m=>(
              <button key={m} onClick={()=>setNaoFizMotivo(m)} style={{padding:'7px 12px',borderRadius:8,border:`1px solid ${naoFizMotivo===m?'#f87171':'var(--border)'}`,background:naoFizMotivo===m?'rgba(248,113,113,.15)':'transparent',color:naoFizMotivo===m?'#f87171':'var(--text3)',fontSize:11,cursor:'pointer'}}>{m}</button>
            ))}
          </div>
          <input value={naoFizMotivo} onChange={e=>setNaoFizMotivo(e.target.value)} placeholder="ou escreva aqui..." style={{width:'100%',padding:'9px 12px',borderRadius:9,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text)',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:12}}/>
          <div style={{display:'flex',gap:6}}>
            <button onClick={marcarNaoFiz} disabled={!naoFizMotivo} style={{flex:2,padding:'11px',borderRadius:9,border:'none',background:naoFizMotivo?'#f87171':'var(--border)',color:naoFizMotivo?'#0f172a':'var(--text4)',fontSize:12,fontWeight:800,cursor:'pointer'}}>Salvar</button>
            <button onClick={()=>setNaoFizModal(null)} style={{flex:1,padding:'11px',borderRadius:9,border:'1px solid var(--border)',background:'transparent',color:'var(--text4)',fontSize:12,cursor:'pointer'}}>Cancelar</button>
          </div>
        </div>
      </div>}

      {/* MODAL REGISTRAR TEC — FULLSCREEN */}
      {tecModal&&(
        <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:300,display:'flex',flexDirection:'column'}}>
          {/* Header fixo */}
          <div style={{padding:'12px 16px',background:'var(--header-bg)',borderBottom:'1px solid rgba(248,113,113,.3)',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
            <button onClick={()=>{setTecModal(false);setTecForm({mat:'',assunto:'',feitas:'',acertei:'',prazo:'D+3',obs:''}); setTecSalvo(false);}} style={{padding:'8px 14px',borderRadius:9,border:'1px solid rgba(248,113,113,.35)',background:'rgba(248,113,113,.1)',color:'#f87171',fontSize:13,fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
              ← Voltar
            </button>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:12,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:900,letterSpacing:'1px'}}>🔴 REGISTRAR ERRO — TEC</div>
            </div>
            <div style={{width:70}}/>
          </div>

          {/* Conteúdo scrollável */}
          <div style={{flex:1,overflowY:'auto',padding:'20px 16px'}}>

            {/* Matéria */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:'var(--text4)',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,letterSpacing:'1px'}}>MATÉRIA</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                {CICLO.map(s=>s.mat).filter((v,i,a)=>a.indexOf(v)===i).map(m=>(
                  <button key={m} onClick={()=>setTecForm(f=>({...f,mat:m}))}
                    style={{padding:'7px 12px',borderRadius:8,border:`1.5px solid ${tecForm.mat===m?'#f87171':'var(--border)'}`,background:tecForm.mat===m?'rgba(248,113,113,.18)':'transparent',color:tecForm.mat===m?'#f87171':'var(--text3)',fontSize:12,fontWeight:tecForm.mat===m?800:400,cursor:'pointer',transition:'all .1s'}}>
                    {m}
                  </button>
                ))}
              </div>
              <input value={tecForm.mat&&!CICLO.map(s=>s.mat).includes(tecForm.mat)?tecForm.mat:''} onChange={e=>setTecForm(f=>({...f,mat:e.target.value}))} placeholder="Ou digitar matéria..." style={{width:'100%',padding:'10px 12px',borderRadius:9,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text)',fontSize:13,outline:'none',boxSizing:'border-box'}}/>
            </div>

            {/* Assunto */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:'var(--text4)',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,letterSpacing:'1px'}}>ASSUNTO ESPECÍFICO</div>
              <input value={tecForm.assunto} onChange={e=>setTecForm(f=>({...f,assunto:e.target.value}))} placeholder="ex: Princípios Tributários, Peculato, LRF art. 15..." style={{width:'100%',padding:'12px 14px',borderRadius:9,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text)',fontSize:14,outline:'none',boxSizing:'border-box'}}/>
            </div>

            {/* Questões */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:'var(--text4)',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,letterSpacing:'1px'}}>QUESTÕES</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                <div>
                  <div style={{fontSize:10,color:'var(--text4)',marginBottom:5,textAlign:'center'}}>FEITAS</div>
                  <input type="number" value={tecForm.feitas} onChange={e=>setTecForm(f=>({...f,feitas:e.target.value}))} placeholder="0"
                    style={{width:'100%',padding:'14px 8px',borderRadius:10,border:'2px solid rgba(248,113,113,.35)',background:'rgba(248,113,113,.06)',color:'#f87171',fontSize:22,fontWeight:900,textAlign:'center',outline:'none',boxSizing:'border-box',fontFamily:"'DM Mono',monospace"}}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:'var(--text4)',marginBottom:5,textAlign:'center'}}>ACERTEI</div>
                  <input type="number" value={tecForm.acertei} onChange={e=>setTecForm(f=>({...f,acertei:e.target.value}))} placeholder="0"
                    style={{width:'100%',padding:'14px 8px',borderRadius:10,border:'2px solid rgba(52,211,153,.35)',background:'rgba(52,211,153,.06)',color:'#34d399',fontSize:22,fontWeight:900,textAlign:'center',outline:'none',boxSizing:'border-box',fontFamily:"'DM Mono',monospace"}}/>
                </div>
                <div>
                  <div style={{fontSize:10,color:'var(--text4)',marginBottom:5,textAlign:'center'}}>ACERTO</div>
                  <div style={{width:'100%',padding:'14px 8px',borderRadius:10,border:`2px solid ${pctCor}50`,background:`${pctCor}10`,color:pctCor,fontSize:22,fontWeight:900,textAlign:'center',fontFamily:"'DM Mono',monospace"}}>
                    {pctLive!==null?`${pctLive}%`:'—'}
                  </div>
                </div>
              </div>
            </div>

            {/* Próxima revisão */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:'var(--text4)',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,letterSpacing:'1px'}}>PRÓXIMA REVISÃO</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                {[
                  {p:'D+3', desc:'3 dias', cor:'#f87171'},
                  {p:'D+15', desc:'15 dias', cor:'#fbbf24'},
                  {p:'D+45', desc:'45 dias', cor:'#34d399'},
                ].map(({p,desc,cor})=>(
                  <button key={p} onClick={()=>setTecForm(f=>({...f,prazo:p}))}
                    style={{padding:'12px 8px',borderRadius:10,border:`2px solid ${tecForm.prazo===p?cor:'var(--border)'}`,background:tecForm.prazo===p?`${cor}18`:'transparent',cursor:'pointer',textAlign:'center'}}>
                    <div style={{fontSize:15,fontWeight:900,color:tecForm.prazo===p?cor:'var(--text4)',fontFamily:"'DM Mono',monospace"}}>{p}</div>
                    <div style={{fontSize:10,color:'var(--text4)',marginTop:2}}>{desc}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Observação */}
            <div style={{marginBottom:24}}>
              <div style={{fontSize:11,color:'var(--text4)',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:8,letterSpacing:'1px'}}>OBSERVAÇÃO</div>
              <textarea value={tecForm.obs} onChange={e=>setTecForm(f=>({...f,obs:e.target.value}))} rows={3} placeholder="ex: confundi com art. 37... / conceito mal fixado / travei na pegadinha da banca..."
                style={{width:'100%',padding:'12px 14px',borderRadius:9,border:'1px solid var(--border)',background:'var(--input-bg)',color:'var(--text)',fontSize:13,outline:'none',resize:'none',boxSizing:'border-box',lineHeight:1.6}}/>
            </div>

            {/* Espaço para o botão fixo não cobrir */}
            <div style={{height:80}}/>
          </div>

          {/* Rodapé fixo com botão salvar */}
          <div style={{padding:'12px 16px',background:'var(--header-bg)',borderTop:'1px solid var(--border)',flexShrink:0}}>
            {!tecForm.mat&&(
              <div style={{fontSize:11,color:'var(--text4)',textAlign:'center',marginBottom:8}}>Selecione uma matéria para salvar</div>
            )}
            <button onClick={salvarTec} disabled={!tecForm.mat}
              style={{width:'100%',padding:'15px',borderRadius:12,border:'none',background:tecForm.mat?'linear-gradient(135deg,#e05555,#f87171)':'var(--border)',color:tecForm.mat?'#fff':'var(--text4)',fontSize:15,fontWeight:900,cursor:tecForm.mat?'pointer':'default',letterSpacing:'1px',fontFamily:"'DM Mono',monospace",boxShadow:tecForm.mat?'0 4px 14px rgba(248,113,113,.35)':'none',transition:'all .2s'}}>
              {tecSalvo?'✅ SALVO! Voltando...':'💾 SALVAR ERRO'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}


function TabEstudo({feitos,cicloNum,horas,onConcluir,onIrPara,onDesmarcar,onAddHoras,onSyncHistorico,mit,planoSemana,onSavePlano}){
  const[aba,setAba]=useState('foco');
  const feitosSet=useMemo(()=>new Set(feitos),[feitos]);
  const pendentes=useMemo(()=>CICLO.filter(s=>!feitosSet.has(s.id)),[feitosSet]);
  const ativo=pendentes[0]||null;
  const cor=ativo?.tag?.includes('TRIÂNGULO')?'#fbbf24':ativo?.cor||'#fbbf24';
  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[]);
  const semStart=todayStart-6*86400000;
  const minHoje=horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0);
  const minSem=horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0);
  const META=35*60;

  // Registro
  const hoje=getDK();
  const[historico,setHistorico]=useState(()=>lsGet('historico_diario',[]));
  const regHoje=historico.find(r=>r.id===hoje)||null;

          <div style={{fontSize:12,letterSpacing:'2px',color:'var(--text4)',fontFamily:"'DM Mono',monospace",marginBottom:10,marginTop:14}}>📈 EVOLUÇÃO POR MATÉRIA — semana a semana</div>
          {(()=>{
            const hist=lsGet('historico_diario',[]);
            if(!hist.length)return <div style={{textAlign:'center',padding:'16px',color:'var(--text4)',fontSize:12}}>Registre questões para ver a evolução.</div>;

            // Agrupa por semana ISO
            const porSemMat={};
            hist.forEach(r=>{
              if(!r.materia||!parseInt(r.questoes)||!parseInt(r.acertei))return;
              const dt=new Date(r.dt||Date.now());
              const jan1=new Date(dt.getFullYear(),0,1);
              const semNum=Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);
              const semKey=`S${String(semNum).padStart(2,'0')}`;
              if(!porSemMat[semKey])porSemMat[semKey]={};
              const mat=r.materia;
              if(!porSemMat[semKey][mat])porSemMat[semKey][mat]={q:0,a:0};
              porSemMat[semKey][mat].q+=parseInt(r.questoes)||0;
              porSemMat[semKey][mat].a+=parseInt(r.acertei)||0;
            });

            const semanas=Object.keys(porSemMat).sort().slice(-6);
            if(semanas.length<1)return <div style={{textAlign:'center',padding:'16px',color:'var(--text4)',fontSize:12}}>Ainda sem dados suficientes. Continue registrando!</div>;

            // Pega matérias com mais dados
            const matCount={};
            hist.filter(r=>parseInt(r.questoes)>0&&parseInt(r.acertei)>0).forEach(r=>{if(r.materia)matCount[r.materia]=(matCount[r.materia]||0)+1;});
            const mats=Object.entries(matCount).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([m])=>m);

            if(!mats.length)return null;

            const CORES=['#60a5fa','#f87171','#34d399','#fbbf24','#a78bfa','#fb923c'];
            const CHART_H=120;
            const CHART_W=280;
            const padL=30,padB=20,padR=10,padT=10;
            const innerW=CHART_W-padL-padR;
            const innerH=CHART_H-padB-padT;

            // Linhas de referência
            const refLines=[70,85];

            return(
              <div style={{overflowX:'auto',paddingBottom:4}}>
                {/* Legenda */}
                <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
                  {mats.map((mat,i)=>(
                    <div key={mat} style={{display:'flex',alignItems:'center',gap:4}}>
                      <div style={{width:12,height:3,borderRadius:2,background:CORES[i],flexShrink:0}}/>
                      <span style={{fontSize:10,color:'var(--text3)'}}>{mat.length>18?mat.slice(0,16)+'…':mat}</span>
                    </div>
                  ))}
                </div>
                {/* SVG Chart */}
                <svg width={CHART_W} height={CHART_H} style={{overflow:'visible',display:'block',margin:'0 auto'}}>
                  {/* Grid horizontal */}
                  {[0,25,50,75,100].map(pct=>{
                    const y=padT+innerH-(pct/100)*innerH;
                    return(
                      <g key={pct}>
                        <line x1={padL} y1={y} x2={CHART_W-padR} y2={y} stroke="var(--border)" strokeWidth="1" strokeDasharray={pct===0?'none':'3,3'}/>
                        <text x={padL-4} y={y+4} textAnchor="end" fontSize="8" fill="var(--text4)">{pct}%</text>
                      </g>
                    );
                  })}
                  {/* Linhas de referência coloridas */}
                  {refLines.map(pct=>{
                    const y=padT+innerH-(pct/100)*innerH;
                    const cor=pct>=85?'#34d399':'#fbbf24';
                    return <line key={pct} x1={padL} y1={y} x2={CHART_W-padR} y2={y} stroke={cor} strokeWidth="1" strokeDasharray="4,2" opacity="0.5"/>;
                  })}
                  {/* Eixo X — semanas */}
                  {semanas.map((sem,i)=>{
                    const x=padL+(i/(semanas.length-1||1))*innerW;
                    return(
                      <g key={sem}>
                        <line x1={x} y1={padT} x2={x} y2={padT+innerH} stroke="var(--border)" strokeWidth="1" strokeDasharray="2,4"/>
                        <text x={x} y={CHART_H-4} textAnchor="middle" fontSize="8" fill="var(--text4)">{sem}</text>
                      </g>
                    );
                  })}
                  {/* Linhas por matéria */}
                  {mats.map((mat,mi)=>{
                    const cor=CORES[mi];
                    const pontos=semanas.map((sem,i)=>{
                      const d=porSemMat[sem]?.[mat];
                      if(!d||!d.q)return null;
                      const pct=Math.round(d.a/d.q*100);
                      const x=padL+(i/(semanas.length-1||1))*innerW;
                      const y=padT+innerH-(pct/100)*innerH;
                      return{x,y,pct};
                    });
                    // Draw line segments between non-null points
                    const segments=[];
                    let prev=null;
                    pontos.forEach((p,i)=>{
                      if(p&&prev){segments.push(<line key={`l${mi}-${i}`} x1={prev.x} y1={prev.y} x2={p.x} y2={p.y} stroke={cor} strokeWidth="2" opacity="0.8"/>);}
                      if(p)prev=p;
                    });
                    const dots=pontos.map((p,i)=>{
                      if(!p)return null;
                      const isLast=pontos.slice(i+1).every(x=>!x);
                      return(
                        <g key={`d${mi}-${i}`}>
                          <circle cx={p.x} cy={p.y} r={isLast?5:3.5} fill={cor} opacity="0.9"/>
                          {isLast&&<text x={p.x} y={p.y-8} textAnchor="middle" fontSize="9" fill={cor} fontWeight="bold">{p.pct}%</text>}
                        </g>
                      );
                    });
                    return <g key={mat}>{segments}{dots}</g>;
                  })}
                </svg>
                {/* Indicador semana atual */}
                <div style={{display:'flex',gap:12,marginTop:8,justifyContent:'center'}}>
                  <div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:'var(--text4)'}}>
                    <div style={{width:16,height:1,borderTop:'2px dashed #34d399'}}/> ≥85% sólido
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:'var(--text4)'}}>
                    <div style={{width:16,height:1,borderTop:'2px dashed #fbbf24'}}/> ≥70% atenção
                  </div>
                </div>
              </div>
            );
          })()}

        {/* MODO C — RANKING POR PONTOS EM RISCO */}
        <div style={{fontSize:9,letterSpacing:'2px',color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:8,marginTop:14}}>🎯 RADAR DO EDITAL — PONTOS EM RISCO (peso × déficit)</div>
        <div style={{padding:'8px 12px',borderRadius:9,background:'rgba(248,113,113,.05)',border:'1px solid rgba(248,113,113,.18)',marginBottom:10}}>
          <div style={{fontSize:9,color:'var(--text4)',lineHeight:1.6}}>Ordena por impacto real na nota: matéria que cai muito + você acerta pouco = mais pontos em risco. Foque nos vermelhos.</div>
        </div>
        {(()=>{
          const ranking=calcPontosEmRisco();
          if(!ranking.filter(r=>r.temDado).length)return(
            <div style={{textAlign:'center',padding:'16px',color:'var(--text4)',fontSize:11}}>Registre questões com assunto para ver os pontos em risco.</div>
          );
          return ranking.map((item,i)=>{
            const cor=item.pontosRisco>=30?'#f87171':item.pontosRisco>=15?'#fbbf24':'#34d399';
            const acertoCor=item.acerto===null?'#64748b':item.acerto>=85?'#34d399':item.acerto>=70?'#fbbf24':'#f87171';
            return(
              <div key={item.mat} style={{padding:'10px 12px',borderRadius:10,background:`${cor}07`,border:`1px solid ${cor}22`,marginBottom:5}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:11,fontWeight:900,color:cor,width:20,flexShrink:0}}>{i+1}</span>
                  <div style={{flex:1,minWidth:0}}>

// Componente auxiliar para adicionar tempo manual (sem hooks problemáticos)
function AddTempoManual({onAdd}){
  const[mat,setMat]=useState('');
  const[min,setMin]=useState('');
  const[salvo,setSalvo]=useState(false);
  const add=()=>{
    const m=parseInt(min);
    if(!mat.trim()||!m||m<=0)return;
    onAdd({mat:mat.trim(),min:m,dt:Date.now()});
    setMat('');setMin('');
    setSalvo(true);setTimeout(()=>setSalvo(false),2000);
  };
  return(
    <div style={{display:'flex',gap:8}}>
      <input value={mat} onChange={e=>setMat(e.target.value)} placeholder="Matéria..." style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#f1f5f9',fontSize:12,outline:'none'}}/>
      <input type="number" value={min} onChange={e=>setMin(e.target.value)} placeholder="min" style={{width:65,padding:'8px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#fbbf24',fontSize:13,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
      <button onClick={add} disabled={!mat.trim()||!min} style={{padding:'8px 14px',borderRadius:8,border:'none',background:mat.trim()&&min?'#fbbf24':'rgba(148,163,184,.22)',color:mat.trim()&&min?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>{salvo?'✅':'+'}  </button>
    </div>
  );
}

// ─── TAB: REVISÃO (reformulada) ──────────────────────────────
function TabRevisao({totalBlocos,tmSugestao,tmIA,onSyncHistorico,onAddHoras}){
  const hoje=getDK();
  const[aba,setAba]=useState('morto');
  const[ankiRegs,setAnkiRegs]=useState(()=>lsGet('rev_anki',[]));
  const[nlmRegs,setNlmRegs]=useState(()=>lsGet('rev_nlm',[]));
  const[rev1h30Regs,setRev1h30Regs]=useState(()=>lsGet('rev_1h30',[]));
  const[cadRegs,setCadRegs]=useState(()=>lsGet('rev_caderno',[]));
  const[topicos,setTopicos]=useState(()=>lsGet('rev_topicos',[]));
  const[editalStatus,setEditalStatus]=useState(()=>lsGet('edital_status',{}));
  const[editalMatSel,setEditalMatSel]=useState(Object.keys(EDITAL)[0]||'Português');
  const[topicoForm,setTopicoForm]=useState('');
  const[criticosManuais,setCriticosManuais]=useState(()=>lsGet('criticos_manuais',[]));
  const[critForm,setCritForm]=useState({mat:'',motivo:'',prioridade:'alta'});
  const[critSalvo,setCritSalvo]=useState(false);
  const[criticoIALoad,setCriticoIALoad]=useState(false);
  const[ankiForm,setAnkiForm]=useState({mat:'',tempo:'',cards:'',questoes:'',dif:0});
  const[ankiSalvo,setAnkiSalvo]=useState(false);
  const[nlmForm,setNlmForm]=useState({mat:'',oque:'',tempo:'',questoes:'',dif:0});
  const[nlmSalvo,setNlmSalvo]=useState(false);
  const[cadForm,setCadForm]=useState({mat:'',tempo:'',questoes:'',anki:'',nlm:'',obs:''});
  const[cadSalvo,setCadSalvo]=useState(false);
  const[slots,setSlots]=useState([{mat:'',oque:[],tempo:'',questoes:'',dif:0,salvo:false},{mat:'',oque:[],tempo:'',questoes:'',dif:0,salvo:false},{mat:'',oque:[],tempo:'',questoes:'',dif:0,salvo:false}]);
  const[slotSalvo,setSlotSalvo]=useState(false);
  const[tmFeitoAnki,setTmFeitoAnki]=useState(()=>lsGet(`tm_anki_${hoje}`,false));
  const[tmFeitoNlm,setTmFeitoNlm]=useState(()=>lsGet(`tm_nlm_${hoje}`,false));

  const MATS=CICLO.map(c=>c.mat).filter((v,i,a)=>a.indexOf(v)===i);
  const CORS_DIF=['#34d399','#a3e635','#fbbf24','#fb923c','#f87171'];
  const LABELS_DIF=['FÁCIL','TRANQUILO','MÉDIO','DIFÍCIL','MUITO DIFÍCIL'];

  // Tempo Morto calculado no App e passado como prop tmSugestao
  const tempoMorto=tmSugestao||{anki:{mat:'AFO',difMedia:0,diasSem:0},nlm:{mat:'Auditoria',difMedia:0,diasSem:0},ranking:[],travouRecente:[]};

  // Fix 1h30 — conta blocos desde última revisão
  const ultimaRev=rev1h30Regs.length>0?rev1h30Regs[rev1h30Regs.length-1]:null;
  const ultimoBlocoRev=ultimaRev?.blocoRef||0;
  const blocosDesde=totalBlocos-ultimoBlocoRev;
  const deve1h30=blocosDesde>=5&&totalBlocos>0;
  const faltam1h30=Math.max(0,5-blocosDesde);

  // ── IA diária para Tempo Morto (uma vez por dia) ───────────
  const chamarIaTempoMorto=async()=>{
    const dk=getDK();
    const cached=lsGet('tm_ia_cache',null);
    if(cached&&cached.dia===dk)return; // já chamou hoje
    const k=getAK();if(!k||!k.startsWith('sk-ant'))return;
    try{
      const historico2=lsGet('historico_diario',[]);
      const ranking=Object.entries(historico2.reduce((acc,r)=>{if(r.materia&&r.questoes){acc[r.materia]=acc[r.materia]||{q:0,a:0};acc[r.materia].q+=parseInt(r.questoes)||0;acc[r.materia].a+=parseInt(r.acertei)||0;}return acc;},{})).map(([m,v])=>({m,pct:v.q>0?Math.round(v.a/v.q*100):null})).sort((a,b)=>(a.pct||100)-(b.pct||100));
      const ctx=`Ciclo atual: bloco ${totalBlocos}/${N}. Motor local sugere Anki: ${tempoMorto.anki.mat} e NLM: ${tempoMorto.nlm.mat}. ${fmtRanking()}. Travou recentemente: ${tempoMorto.travouRecente.join('; ')||'nada'}. Guruja: ${lsGet('guruja_data',null)?.alerta||'sem dado'}.`;
      const res=await chamarClaude('Você é assistente de estudos para concurso TCE-RJ. Responda APENAS JSON sem markdown: {"anki":"nome_materia","nlm":"nome_materia","motivo":"1 frase explicando por que essas matérias agora"}',
        [{role:'user',content:ctx}],200);
      const parsed=JSON.parse(res.replace(/```json|```/g,'').trim());
      const cache={...parsed,dia:dk};
      lsSet('tm_ia_cache',cache);
    }catch(e){console.log('TM IA error:',e.message);}
  };

  const toggleEditalStatus=(mat,topico,status)=>{
    // Cicla: '' → 'estudei' → 'domino' → ''
    const ciclo=['','estudei','domino'];
    const atual=editalStatus[mat+':'+topico]||'';
    const proximo=ciclo[(ciclo.indexOf(atual)+1)%ciclo.length];

          hist.forEach(r=>{

            {ultimaRev&&<div style={{fontSize:9,color:'#334155',marginTop:6,fontFamily:"'DM Mono',monospace"}}>Última: bloco {ultimoBlocoRev} · {ultimaRev.dia}</div>}
          </div>}
          {deve1h30&&<div>
            <div style={{padding:'9px 11px',borderRadius:9,background:'rgba(251,191,36,.12)',border:'1px solid rgba(251,191,36,.3)',marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:800,color:'#fbbf24'}}>🚨 HORA DA REVISÃO GRANDE!</div>
              <div style={{fontSize:10,color:'rgba(251,191,36,.7)',marginTop:2}}>{blocosDesde} blocos desde a última. Registre as matérias.</div>
            </div>
            {slots.map((s,i)=>(
              <div key={i} style={{padding:'12px',borderRadius:12,background:s.salvo?'rgba(52,211,153,.06)':'rgba(251,191,36,.04)',border:`1px solid ${s.salvo?'rgba(52,211,153,.3)':'rgba(251,191,36,.18)'}`,marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontSize:9,color:s.salvo?'#34d399':'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:800}}>MATÉRIA {i+1}{i===0?' — MAIS DIFÍCIL':''}</div>
                  {s.salvo&&<span style={{fontSize:9,color:'#34d399',fontWeight:700}}>✅ Salvo</span>}
                </div>
                <MatBtn value={s.mat} onChange={v=>setSlots(a=>a.map((x,j)=>j===i?{...x,mat:v,salvo:false}:x))}/>
                {/* O que fez */}
                <div style={{marginTop:8,marginBottom:8}}>
                  <div style={{fontSize:8,color:'#64748b',marginBottom:5}}>O QUE FEZ</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {['Anki','NLM','Questões','Guruja','Leitura','Revisão livre'].map(op=>{
                      const sel=(s.oque||[]).includes(op);
                      const cor=op==='Anki'?'#a78bfa':op==='NLM'?'#34d399':op==='Questões'?'#fbbf24':op==='Guruja'?'#fb923c':'#60a5fa';
                      return(<button key={op} onClick={()=>setSlots(a=>a.map((x,j)=>{if(j!==i)return x;const oq=x.oque||[];return{...x,oque:oq.includes(op)?oq.filter(v=>v!==op):[...oq,op],salvo:false};}))} style={{padding:'4px 9px',borderRadius:6,border:`1px solid ${sel?cor:'rgba(255,255,255,.12)'}`,background:sel?`${cor}20`:'transparent',color:sel?cor:'#475569',fontSize:9,cursor:'pointer'}}>{op}</button>);
                    })}
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:8}}>
                  <div><div style={{fontSize:8,color:'#64748b',marginBottom:3}}>⏱ TEMPO (min)</div>
                    <input type="number" value={s.tempo||''} onChange={e=>setSlots(a=>a.map((x,j)=>j===i?{...x,tempo:e.target.value,salvo:false}:x))} placeholder="0" style={{width:'100%',padding:'8px',borderRadius:7,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.04)',color:'#60a5fa',fontSize:14,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
                  </div>
                  <div><div style={{fontSize:8,color:'#64748b',marginBottom:3}}>📝 QUESTÕES</div>
                    <input type="number" value={s.questoes||''} onChange={e=>setSlots(a=>a.map((x,j)=>j===i?{...x,questoes:e.target.value,salvo:false}:x))} placeholder="0" style={{width:'100%',padding:'8px',borderRadius:7,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#fbbf24',fontSize:14,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
                  </div>
                  <div><div style={{fontSize:8,color:'#64748b',marginBottom:3}}>DIFICULDADE</div>
                    <Estrelas val={s.dif} onChange={v=>setSlots(a=>a.map((x,j)=>j===i?{...x,dif:v,salvo:false}:x))}/>
                  </div>
                </div>
                <button onClick={()=>salvarSlotIndividual(i)} disabled={!s.mat||s.salvo} style={{width:'100%',padding:'9px',borderRadius:9,border:'none',background:s.mat&&!s.salvo?'rgba(251,191,36,.7)':'rgba(148,163,184,.15)',color:s.mat&&!s.salvo?'#0f172a':'#334155',fontSize:11,fontWeight:800,cursor:'pointer'}}>{s.salvo?'✅ Salvo':'💾 Salvar esta matéria'}</button>
              </div>
            ))}
            <button onClick={salvar1h30} disabled={!slots.some(s=>s.mat&&s.dif>0)} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:slots.some(s=>s.mat&&s.dif>0)?'#fbbf24':'rgba(148,163,184,.2)',color:slots.some(s=>s.mat&&s.dif>0)?'#0f172a':'#334155',fontSize:12,fontWeight:800,cursor:'pointer'}}>{slotSalvo?'✅ TUDO SALVO!':'💾 Salvar todas de uma vez'}</button>
          </div>}
        </div>
        {[...rev1h30Regs].reverse().slice(0,3).map((r,i)=>(
          <div key={i} style={{padding:'8px 11px',borderRadius:9,background:'rgba(251,191,36,.05)',border:'1px solid rgba(251,191,36,.15)',marginBottom:4}}>
            <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>Bloco {r.blocoRef} · {r.dia}</div>
            <div style={{fontSize:10,color:'#94a3b8',marginTop:2}}>{r.slots?.filter(s=>s.mat).map(s=>s.mat).join(', ')}</div>
          </div>
        ))}
      </div>}

      {/* CADERNO DE ERROS — REGISTRO */}
      {aba==='caderno'&&(()=>{
        // Lê todos os itens do rev_caderno e separa TEC x sessões
        const todosItens=lsGet('rev_caderno',[]);
        const tecItens=todosItens.filter(t=>t.prazoLabel||t.fase);
        const sessoes=todosItens.filter(t=>!t.prazoLabel&&!t.fase);
        const todayMs=new Date().setHours(0,0,0,0);
        const todayStr=new Date().toISOString().split('T')[0];

        // Itens vencendo hoje ou atrasados
        const vencendoHoje=tecItens.filter(t=>{
          if(t.feito||t.dominado)return false;
          return t.prazo<=todayStr;
        });
        // Itens próximos 7 dias (mas não hoje)
        const proxStr=new Date(todayMs+7*86400000).toISOString().split('T')[0];
        const proximos=tecItens.filter(t=>{
          if(t.feito||t.dominado)return false;
          return t.prazo>todayStr&&t.prazo<=proxStr;
        });

        const marcarItemCaderno=(id,acertou)=>{
          const todos=lsGet('rev_caderno',[]);
          const item=todos.find(t=>t.id===id);
          if(!item)return;
          let updated;
          if(acertou){
            if(item.fase===1){
              // D+3 → avança para D+15
              const d=new Date();d.setDate(d.getDate()+15);
              updated={...item,fase:2,prazoLabel:'D+15',prazo:d.toISOString().split('T')[0],feito:false};
            }else if(item.fase===2){
              // D+15 → avança para D+30
              const d=new Date();d.setDate(d.getDate()+45);
              updated={...item,fase:3,prazoLabel:'D+45',prazo:d.toISOString().split('T')[0],feito:false};
            }else{
              // D+30 → dominado ✅
              updated={...item,dominado:true,feito:true};
            }
          }else{
            // Errou: reinicia conforme regra
            let dias=3;
            if(item.fase===2)dias=3;   // errou D+15 → novo D+3
            if(item.fase===3)dias=15;  // errou D+30 → volta D+15
            const d=new Date();d.setDate(d.getDate()+dias);
            const novaFase=item.fase===3?2:1;
            const novaLabel=novaFase===1?'D+3':'D+15';
            updated={...item,fase:novaFase,prazoLabel:novaLabel,prazo:d.toISOString().split('T')[0],feito:false};
          }
          const novos=todos.map(t=>t.id===id?updated:t);
          lsSet('rev_caderno',novos);
          setCadRegs(novos.filter(t=>!t.prazoLabel&&!t.fase));
        };

        const faseCor={1:'#60a5fa',2:'#fbbf24',3:'#34d399'};

        return(
          <div>
            {/* SEÇÃO TEC — itens com fase */}
            {vencendoHoje.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:10,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:8}}>📅 REVISAR HOJE — {vencendoHoje.length} item{vencendoHoje.length>1?'s':''}</div>
                {vencendoHoje.map(t=>{
                  const fc=faseCor[t.fase||1]||'#60a5fa';
                  const atrasado=t.prazo<todayStr;
                  return(
                    <div key={t.id} style={{padding:'11px 13px',borderRadius:11,background:'rgba(248,113,113,.06)',border:`1px solid ${atrasado?'rgba(248,113,113,.5)':'rgba(248,113,113,.25)'}`,marginBottom:7}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>{t.mat}</div>
                          {t.assunto&&<div style={{fontSize:11,color:'var(--text4)',marginTop:1}}>{t.assunto}</div>}
                          <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                            <span style={{fontSize:9,padding:'2px 8px',borderRadius:4,background:`${fc}20`,color:fc,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{t.prazoLabel||'D+3'} · fase {t.fase||1}/3</span>
                            {atrasado&&<span style={{fontSize:9,color:'#f87171',fontWeight:700}}>⚠️ atrasado</span>}
                            {t.feitas>0&&<span style={{fontSize:9,color:'var(--text4)',fontFamily:"'DM Mono',monospace"}}>{t.feitas}Q</span>}
                          </div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>marcarItemCaderno(t.id,true)} style={{flex:1,padding:'8px',borderRadius:8,border:'none',background:'rgba(52,211,153,.15)',color:'#34d399',fontSize:12,fontWeight:800,cursor:'pointer'}}>✅ Acertei</button>
                        <button onClick={()=>marcarItemCaderno(t.id,false)} style={{flex:1,padding:'8px',borderRadius:8,border:'none',background:'rgba(248,113,113,.15)',color:'#f87171',fontSize:12,fontWeight:800,cursor:'pointer'}}>❌ Errei</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {proximos.length>0&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:6}}>📆 PRÓXIMOS 7 DIAS ({proximos.length})</div>
                {proximos.map(t=>{
                  const fc=faseCor[t.fase||1]||'#60a5fa';
                  return(
                    <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 11px',borderRadius:9,background:'rgba(251,191,36,.05)',border:'1px solid rgba(251,191,36,.18)',marginBottom:4}}>
                      <div>
                        <span style={{fontSize:12,color:'var(--text)',fontWeight:600}}>{t.mat}</span>
                        {t.assunto&&<span style={{fontSize:10,color:'var(--text4)',marginLeft:6}}>{t.assunto}</span>}
                        <span style={{fontSize:9,marginLeft:7,padding:'1px 6px',borderRadius:4,background:`${fc}18`,color:fc,fontFamily:"'DM Mono',monospace"}}>{t.prazoLabel}</span>
                      </div>
                      <span style={{fontSize:10,color:'#fbbf24',fontFamily:"'DM Mono',monospace",flexShrink:0}}>{t.prazo}</span>
                    </div>
                  );
                })}
              </div>
            )}

            {vencendoHoje.length===0&&proximos.length===0&&tecItens.filter(t=>!t.dominado).length===0&&(
              <div style={{padding:'12px',borderRadius:10,background:'rgba(52,211,153,.06)',border:'1px solid rgba(52,211,153,.2)',marginBottom:12,textAlign:'center'}}>
                <div style={{fontSize:13,color:'#34d399',fontWeight:700}}>✅ Nenhuma revisão TEC pendente</div>
                <div style={{fontSize:10,color:'var(--text4)',marginTop:3}}>Registre um novo erro abaixo para iniciar o ciclo D+3/D+15/D+30</div>
              </div>
            )}

            {/* Contador geral */}
            {tecItens.length>0&&(
              <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
                {[
                  ['Em revisão',tecItens.filter(t=>!t.dominado&&!t.feito).length,'#60a5fa'],
                  ['Dominados ✅',tecItens.filter(t=>t.dominado).length,'#34d399'],
                  ['Total',tecItens.length,'#64748b'],
                ].map(([l,v,c])=>(
                  <div key={l} style={{flex:1,minWidth:70,padding:'8px',borderRadius:9,background:`${c}0d`,border:`1px solid ${c}25`,textAlign:'center'}}>
                    <div style={{fontSize:16,fontWeight:900,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>
                    <div style={{fontSize:8,color:'var(--text4)',marginTop:2}}>{l}</div>
                  </div>
                ))}
              </div>
            )}

            {/* FORMULÁRIO de novo registro */}
            <div style={{background:'rgba(248,113,113,.04)',border:'1px solid rgba(248,113,113,.18)',borderRadius:13,padding:'14px',marginBottom:12}}>
              <div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:10}}>➕ NOVO REGISTRO</div>
              <div style={{marginBottom:10}}><div style={{fontSize:9,color:'var(--text4)',marginBottom:5}}>MATÉRIA</div><MatBtn value={cadForm.mat} onChange={v=>setCadForm(f=>({...f,mat:v}))}/></div>
              <div style={{marginBottom:8}}>
                <div style={{fontSize:9,color:'var(--text4)',marginBottom:4}}>⏱ TEMPO (min)</div>
                <input type="number" value={cadForm.tempo||''} onChange={e=>setCadForm(f=>({...f,tempo:e.target.value}))} placeholder="ex: 45" style={{width:'100%',padding:'10px',borderRadius:8,border:'1px solid rgba(248,113,113,.3)',background:'rgba(248,113,113,.06)',color:'#f87171',fontSize:16,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:10}}>
                {[['📝 QUESTÕES','questoes','#f87171'],['🃏 ANKI','anki','#a78bfa'],['🎧 NLM','nlm','#34d399']].map(([l,k,col])=>(
                  <div key={k}><div style={{fontSize:7,color:'var(--text4)',marginBottom:3}}>{l}</div>
                  <input type="number" value={cadForm[k]||''} onChange={e=>setCadForm(f=>({...f,[k]:e.target.value}))} placeholder="0" style={{width:'100%',padding:'9px 4px',borderRadius:8,border:`1px solid ${col}25`,background:`${col}06`,color:col,fontSize:15,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none',boxSizing:'border-box'}}/></div>
                ))}
              </div>
              <input value={cadForm.obs||''} onChange={e=>setCadForm(f=>({...f,obs:e.target.value}))} placeholder="Assunto específico / observação..." style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'1px solid rgba(248,113,113,.15)',background:'rgba(248,113,113,.03)',color:'var(--text)',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:12}}/>
              <button onClick={salvarCaderno} disabled={!cadForm.mat} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:cadForm.mat?'#f87171':'var(--border)',color:cadForm.mat?'#0f172a':'var(--text4)',fontSize:13,fontWeight:900,cursor:'pointer'}}>{cadSalvo?'✅ SALVO! (D+3 criado)':'💾 SALVAR + CRIAR D+3'}</button>
            </div>

            {/* SESSÕES HISTÓRICAS */}
            {sessoes.length>0&&(
              <div>
                <div style={{fontSize:9,color:'var(--text4)',fontFamily:"'DM Mono',monospace",marginBottom:7}}>SESSÕES ANTERIORES ({sessoes.length})</div>
                {[...sessoes].reverse().slice(0,6).map((r,i)=>(
                  <div key={i} style={{padding:'8px 11px',borderRadius:9,background:'rgba(248,113,113,.05)',border:'1px solid rgba(248,113,113,.12)',marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:11,color:'var(--text)',fontWeight:700}}>{r.mat}</div>
                      <div style={{fontSize:9,color:'var(--text4)'}}>Q:{r.questoes||0} · 🃏{r.anki||0} · 🎧{r.nlm||0}{r.obs?` · ${r.obs.slice(0,22)}`:''}</div>
                    </div>
                    <span style={{fontSize:9,color:'var(--text4)',fontFamily:"'DM Mono',monospace"}}>{r.dia}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* TÓPICOS PARA REVISITAR */}
      {aba==='topicos'&&<div>
        <div style={{padding:'10px 12px',borderRadius:10,background:'rgba(251,191,36,.06)',border:'1px solid rgba(251,191,36,.2)',marginBottom:12}}>
          <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginBottom:4}}>📌 TÓPICOS PARA REVISITAR</div>
          <div style={{fontSize:11,color:'#64748b'}}>Lista pessoal de tópicos que precisa voltar — sem data, sem pressão.</div>
        </div>
        <div style={{display:'flex',gap:7,marginBottom:12}}>
          <input value={topicoForm} onChange={e=>setTopicoForm(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTopico()} placeholder="ex: NBC TA 700, art. 37 caput..." style={{flex:1,padding:'9px 11px',borderRadius:9,border:'1px solid rgba(251,191,36,.25)',background:'rgba(251,191,36,.05)',color:'#f1f5f9',fontSize:12,outline:'none'}}/>
          <button onClick={addTopico} style={{padding:'9px 14px',borderRadius:9,border:'none',background:topicoForm.trim()?'#fbbf24':'rgba(148,163,184,.2)',color:topicoForm.trim()?'#0f172a':'#334155',fontSize:14,fontWeight:900,cursor:'pointer'}}>+</button>
        </div>
        {topicos.filter(t=>!t.feito).map(t=>(
          <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 11px',borderRadius:9,background:'rgba(251,191,36,.06)',border:'1px solid rgba(251,191,36,.2)',marginBottom:5}}>
            <div onClick={()=>togTopico(t.id)} style={{width:16,height:16,borderRadius:'50%',flexShrink:0,border:'2px solid #fbbf24',cursor:'pointer'}}/>
            <span style={{flex:1,fontSize:12,color:'#f1f5f9'}}>{t.txt}</span>
            <button onClick={()=>delTopico(t.id)} style={{padding:'1px 6px',borderRadius:4,border:'none',background:'transparent',color:'#475569',fontSize:10,cursor:'pointer'}}>×</button>
          </div>
        ))}
        {topicos.filter(t=>t.feito).length>0&&<div style={{marginTop:8}}>
          <div style={{fontSize:9,color:'#334155',fontFamily:"'DM Mono',monospace",marginBottom:5}}>REVISADOS ✓</div>
          {topicos.filter(t=>t.feito).slice(0,5).map(t=>(
            <div key={t.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 11px',borderRadius:9,background:'rgba(52,211,153,.04)',border:'1px solid rgba(52,211,153,.15)',marginBottom:4,opacity:.7}}>
              <div onClick={()=>togTopico(t.id)} style={{width:16,height:16,borderRadius:'50%',flexShrink:0,border:'2px solid #34d399',background:'#34d399',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#0f172a',fontWeight:900}}>✓</div>
              <span style={{flex:1,fontSize:11,color:'#475569',textDecoration:'line-through'}}>{t.txt}</span>
              <button onClick={()=>delTopico(t.id)} style={{padding:'1px 6px',borderRadius:4,border:'none',background:'transparent',color:'#334155',fontSize:10,cursor:'pointer'}}>×</button>
            </div>
          ))}
        </div>}
        {topicos.length===0&&<div style={{textAlign:'center',padding:'30px',color:'#334155',fontSize:12}}>Nenhum tópico ainda.</div>}
      </div>}
    </div>
  );
}

  const[banco,setBanco]=useState(()=>lsGet('banco_tarefas',[]));

    {l:'📊 Guruja',desc:'Análise semanal',tab:'estudo',sub:'plano',cor:'#fb923c'},
    {l:'📕 Erros',desc:'Caderno de erros',tab:'erros',sub:null,cor:'#f87171'},
    {l:'📅 Plano',desc:'Planejamento',tab:'estudo',sub:'plano',cor:'#60a5fa'},
  ];

      <div style={{background:'linear-gradient(135deg,rgba(251,191,36,.1),rgba(10,15,30,.98))',border:'1px solid rgba(251,191,36,.3)',borderRadius:13,padding:'13px',marginBottom:14}}>

            {dia:2,ic:'⚡',titulo:'Terça — Execute',desc:'Siga o ciclo. Se surgir imprevisto, mova a tarefa para amanhã sem culpa.'},
            {dia:3,ic:'⚡',titulo:'Quarta — Execute',desc:'Meio da semana. Cheque o progresso no Stats.'},
            {dia:4,ic:'🔄',titulo:'Quinta — Revisão',desc:'Veja o que atrasou. Ajuste prioridades do banco de tarefas.'},
            {dia:5,ic:'✅',titulo:'Sexta — Fechar semana',desc:'Marque o que concluiu. O sistema calcula as revisões espaçadas automaticamente.'},
            {dia:6,ic:'😌',titulo:'Sábado — Anki + descanso',desc:'Só Anki leve. Prepare a semana nova no domingo.'},
          ];

              <span onClick={()=>togTarefa(t.id)} style={{flex:1,fontSize:11,color:t.done?'#64748b':'#f1f5f9',textDecoration:t.done?'line-through':'none',cursor:'pointer'}}>{t.txt}</span>
              <button onClick={()=>delTarefa(t.id)} style={{padding:'1px 6px',borderRadius:4,border:'none',background:'transparent',color:'#64748b',fontSize:10,cursor:'pointer'}}>×</button>

          <div style={{display:'flex',gap:5,marginTop:6}}>

            <select value={novoTPrior} onChange={e=>setNovoTPrior(e.target.value)} style={{padding:'7px',borderRadius:8,border:'1px solid rgba(255,255,255,.14)',background:'#1e293b',color:'#f1f5f9',fontSize:10,outline:'none',cursor:'pointer'}}>

          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <input value={mercado} onChange={e=>{setMercado(e.target.value);lsSet(`casa_m_${dk}`,e.target.value);}} placeholder="🛒 Mercado..." style={{flex:1,padding:'7px 10px',borderRadius:8,border:'1px solid rgba(255,255,255,.12)',background:'rgba(30,41,59,.8)',color:'#f1f5f9',fontSize:11,outline:'none'}}/>

          </div>
        </div>}

        {/* DIETA */}
        <BlocoHeader titulo="🥗 Dieta" k="dieta" cor="#34d399" badge={mlAtual>=META_AGUA?'meta água ✓':null}/>
        {aberto.dieta&&<div style={{padding:'12px 13px',borderRadius:'0 0 11px 11px',border:'1px solid rgba(52,211,153,.2)',borderTop:'none',background:'rgba(52,211,153,.04)',marginBottom:8}}>

                      {t.link&&<a href={t.link} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{fontSize:7,color:'#38bdf8',textDecoration:'none'}}>🔗</a>}
                      <button onClick={()=>delBanco(t.id)} style={{marginLeft:'auto',padding:'0 4px',borderRadius:3,border:'none',background:'transparent',color:'#334155',fontSize:9,cursor:'pointer'}}>×</button>
                    </div>
                  </div>
                ))}
                {its.length===0&&<div style={{fontSize:8,color:'#334155',textAlign:'center',padding:'10px 0'}}>Arraste aqui</div>}
              </div>
            );
          })}
        </div>
        {banco.length===0&&<div style={{textAlign:'center',padding:'20px',color:'#334155',fontSize:12,marginTop:8}}>Nenhuma tarefa ainda.</div>}
      </div>}
    </div>
  );
}

      if(_f.length>0)lsSet('feitos',[]);
      lsSet('cicloNum',1);lsSet('ciclo_versao','v26');
    }
    setFeitos(lsGet('feitos',[]));setCicloNum(lsGet('cicloNum',1));setHoras(lsGet('horas',[]));setMit(lsGet('mit',[]));
    const tick=setInterval(()=>setClock(new Date()),1000);
    return()=>clearInterval(tick);
  },[]);

  const feitosSet=useMemo(()=>new Set(feitos),[feitos]);
  const pendentes=useMemo(()=>CICLO.filter(s=>!feitosSet.has(s.id)),[feitosSet]);
  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[clock.toDateString()]);
  const semStart=todayStart-6*86400000;
  const tmSugestao=useMemo(()=>calcTempoMorto(feitos,horas,historico),[feitos,horas,historico,clock.toDateString()]);
  const minHoje=useMemo(()=>horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0),[horas,todayStart]);
  const minSemana=useMemo(()=>horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0),[horas,semStart]);
  const metaHoras=lsGet('meta_horas_sem',35);
  const appCtx={cicloNum,feitosN:feitos.length,N,pendentes,minHoje,minSemana};

  const desmarcar=n=>{lsSet('feitos',n);setFeitos(n);};
  const irPara=id=>{
    const targetIdx=CICLO.findIndex(s=>s.id===id);
    // IDs de todos os blocos ANTES do destino
    const anteriores=CICLO.slice(0,targetIdx).map(s=>s.id);
    // Une os já feitos com os anteriores — sem apagar o que foi feito fora de ordem
    const merged=[...new Set([...feitos,...anteriores])];
    // Remove o bloco destino da lista (para ele ficar como próximo)
    const final=merged.filter(fid=>fid!==id);
    lsSet('feitos',final);setFeitos(final);

  const corPrx=prox?.tag?.includes('TRIÂNGULO')?'#fbbf24':prox?.cor||'#fbbf24';

            <div style={{width:7,height:7,borderRadius:'50%',background:syncSt==='ok'?'#34d399':syncSt==='syncing'?'#fbbf24':syncSt==='error'?'#f87171':'#334155',transition:'background .4s'}}/>
            {!chaveOK&&<span onClick={()=>setShowCfg(true)} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(248,113,113,.12)',color:'#f87171',border:'1px solid rgba(248,113,113,.3)',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>⚠️ SEM CHAVE IA</span>}
            {urgentes.length>0&&<span onClick={()=>setTab('revisao')} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(248,113,113,.1)',color:'#f87171',border:'1px solid rgba(248,113,113,.25)',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>🚨 {urgentes.length} urgente{urgentes.length>1?'s':''}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:16,fontWeight:900,fontFamily:"'DM Mono',monospace",color:'var(--text)',lineHeight:1}}>{fH(clock)}</div>
              <div style={{fontSize:8,color:'var(--text4)',lineHeight:1,marginTop:2}}>{fmtMin(minHoje)} hoje · {fmtMin(minSemana)}/{metaHoras}h</div>
            </div>
            <button onClick={()=>setDarkMode(v=>!v)} title={darkMode?'Modo claro':'Modo escuro'} style={{width:32,height:32,borderRadius:'50%',border:'1px solid var(--border2)',background:'var(--card2)',color:'var(--text3)',fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{darkMode?'☀️':'🌙'}</button>
            <button onClick={()=>setShowCfg(true)} style={{width:32,height:32,borderRadius:'50%',border:'1px solid var(--border2)',background:'var(--card2)',color:'var(--text3)',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>⚙️</button>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div style={{display:'flex',gap:5}}>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(96,165,250,.1)',color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>⏱ {fmtMin(minSemana)}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.1)',color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>B{feitos.length}/{N}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.08)',color:Math.round(minSemana/(metaHoras*60)*100)>=100?'#34d399':'#fbbf24',fontFamily:"'DM Mono',monospace"}}>{Math.round(minSemana/(metaHoras*60)*100)}% meta</span>
          </div>
          <span style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace"}}>{pct}% · ciclo {cicloNum}</span>
        </div>
        <BarProg done={feitos.length} total={N} cor={corPrx} h={3}/>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'16px 16px 0',background:'var(--bg)'}}>
        {tab==='ia'     &&<TabIA     appCtx={appCtx} onMIT={saveMIT}/>}
        {tab==='estudo' &&<TabEstudo feitos={feitos} cicloNum={cicloNum} horas={horas} onConcluir={concluir} onIrPara={irPara} onDesmarcar={desmarcar} onAddHoras={addHoras} onSyncHistorico={syncHistorico} mit={mit} planoSemana={planoSemana} onSavePlano={savePlano}/>}
        {tab==='hoje'   &&<TabHoje feitos={feitos} onAddHoras={addHoras}/>}
        {tab==='revisao'&&<TabRevisao totalBlocos={feitos.length} tmSugestao={tmSugestao} tmIA={tmIA} onSyncHistorico={syncHistorico} onAddHoras={addHoras}/>}
        
        {tab==='agenda' &&<TabAgenda planoSemana={planoSemana} onSetTab={setTab}/>}
        <div style={{height:80}}/>
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'var(--header-bg)',borderTop:'1px solid var(--header-border)',display:'flex',zIndex:50}}>
        {TABS.map(t=>{const a=tab===t.id;return(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'9px 2px 7px',border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
            {t.badge>0&&<div style={{position:'absolute',top:4,right:'8%',width:14,height:14,borderRadius:'50%',background:'#f87171',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#050a14',fontWeight:900}}>{t.badge}</div>}
            <span style={{fontSize:a?20:17,transition:'font-size .15s'}}>{t.e}</span>
            <span style={{fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:a?800:400,color:a?'#fbbf24':'#334155'}}>{t.l}</span>
            {a&&<div style={{position:'absolute',top:0,left:'10%',right:'10%',height:2,borderRadius:1,background:'#fbbf24'}}/>}
          </button>
        );})}
      </div>

      {trofeu&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,flexDirection:'column',gap:16}} onClick={()=>setTrofeu(false)}>
          <div style={{fontSize:64}}>🏆</div>
          <div style={{fontFamily:"'DM Serif Display',serif",color:'#fbbf24',fontSize:26}}>Ciclo {cicloNum-1} completo!</div>
        </div>
      )}
      {showCfg&&<ModalConfig fechar={()=>setShowCfg(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>

<script>
if('serviceWorker' in navigator){
  // Cache versionado com timestamp do build — força atualização a cada deploy
  const BUILD_TS='${Date.now()}';
  const swCode=`
const CACHE='rity-os-${new Date().toISOString().slice(0,10)}-'+self.registration.scope.slice(-6).replace(/[^a-z0-9]/gi,'');
const ASSETS=[self.registration.scope];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(cache=>cache.addAll(ASSETS).catch(()=>{})));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>{console.log('[SW] Deletando cache antigo:',k);return caches.delete(k)}))));self.clients.claim();});
self.addEventListener('fetch',e=>{
  // Network-first: tenta rede, fallback para cache
  e.respondWith(
    fetch(e.request).then(r=>{
      const clone=r.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone)).catch(()=>{});
      return r;
    }).catch(()=>caches.match(e.request))
  );
});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
