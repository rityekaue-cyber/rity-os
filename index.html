// тФАтФАтФА CLOUD DB (localStorage + Supabase sync) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const SUPA_URL_LS='__supa_url__';
const SUPA_KEY_LS='__supa_key__';
let _sc=null; // supabase client
let _syncCBs=[];
let _syncSt='idle';

const Sync={
  onStatus(fn){_syncCBs.push(fn);},
  _emit(s){_syncSt=s;_syncCBs.forEach(fn=>fn(s));},
  isOk(){return _sc!==null;},
  isConfigured(){return !!(localStorage.getItem(SUPA_URL_LS)&&localStorage.getItem(SUPA_KEY_LS));},
  getCfg(){return{url:localStorage.getItem(SUPA_URL_LS)||'',key:localStorage.getItem(SUPA_KEY_LS)||''};},
  saveCfg(url,key){localStorage.setItem(SUPA_URL_LS,url.trim());localStorage.setItem(SUPA_KEY_LS,key.trim());},
  async init(){
    if(!this.isConfigured())return false;
    if(typeof window.supabase==='undefined'){this._emit('offline');return false;}
    try{
      const{url,key}=this.getCfg();
      _sc=window.supabase.createClient(url,key);
      this._emit('syncing');
      const{data,error}=await _sc.from('rity_os').select('key,value');
      if(error)throw error;
      // Mesclar dados da nuvem no localStorage (nuvem vence se mais recente)
      (data||[]).forEach(r=>{
        try{localStorage.setItem(r.key,JSON.stringify(r.value));}catch{}
      });
      this._emit('ok');
      return true;
    }catch(e){console.warn('Sync:',e.message);_sc=null;this._emit('error');return false;}
  },
  push(k,v){
    if(!_sc)return;
    _sc.from('rity_os').upsert({key:k,value:v,updated_at:new Date().toISOString()},{onConflict:'key'})
      .then(({error})=>{if(!error)this._emit('ok');else this._emit('error');})
      .catch(()=>this._emit('error'));
    this._emit('syncing');
  }
};

const lsGet=(k,def=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch{return def;}};
const lsSet=(k,v)=>{
  try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  Sync.push(k,v); // sync em background, n├гo bloqueia
};

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers,
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system:systemPrompt,messages:msgs})
  });
  if(!res.ok){const err=await res.text();throw new Error(`API ${res.status}: ${err.slice(0,200)}`);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||'Erro da API');
  return data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'';
}

// тФАтФАтФА POMODORO тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function beep(tipo){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notas=tipo==='pausa'?[[660,0,.2],[660,.25,.2]]:[[880,0,.15],[1108,.18,.15],[1320,.36,.25]];
    notas.forEach(([f,d,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+d+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+dur+.05);
    });
  }catch(e){}
}

function Pomodoro({cor,onFase}){
  const c=cor||'#fbbf24';
  const FASES=[{l:'1┬к METADE',d:45*60,e:'ЁЯУЦ'},{l:'PAUSA',d:10*60,e:'ЁЯЪ╢'},{l:'2┬к METADE',d:45*60,e:'тЬПя╕П'}];
  const[fase,setFase]=useState(0);
  const[secs,setSecs]=useState(FASES[0].d);
  const[rodando,setRodando]=useState(false);
  const[feito,setFeito]=useState(false);
  const endRef=useRef(null);
  const timerRef=useRef(null);
  const disparouRef=useRef(false);
  const cur=FASES[fase];

  const limparTimer=()=>{clearInterval(timerRef.current);timerRef.current=null;};

  useEffect(()=>{
    if(!rodando){limparTimer();return;}
    disparouRef.current=false;
    timerRef.current=setInterval(()=>{
      const r=Math.max(0,Math.round((endRef.current-Date.now())/1000));
      setSecs(r);
      if(r===0&&!disparouRef.current){
        disparouRef.current=true;
        limparTimer();
        setRodando(false);
        setFeito(true);
        beep(fase===1?'pausa':'done');
        if(fase!==1&&onFase)onFase(45);
      }
    },400);
    return limparTimer;
  },[rodando,fase]);

  const iniciar=()=>{endRef.current=Date.now()+secs*1000;setRodando(true);setFeito(false);disparouRef.current=false;};
  const pausar=()=>{limparTimer();setSecs(Math.max(0,Math.round((endRef.current-Date.now())/1000)));endRef.current=null;setRodando(false);};
  const proxFase=()=>{limparTimer();const n=(fase+1)%3;setFase(n);setSecs(FASES[n].d);setRodando(false);setFeito(false);disparouRef.current=false;};
  const irFase=i=>{limparTimer();setFase(i);setSecs(FASES[i].d);setRodando(false);setFeito(false);};
  const reiniciar=()=>{limparTimer();setSecs(cur.d);setRodando(false);setFeito(false);};

  const mm=Math.floor(secs/60);const ss_=secs%60;
  const pct=Math.max(0,Math.min(1,1-secs/cur.d));
  const r=40;const circ=2*Math.PI*r;
  return(
    <div style={{padding:'13px',borderRadius:13,background:`${c}08`,border:`1px solid ${c}22`,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:4}}>
        <span style={{fontSize:9,letterSpacing:'2px',color:c,fontFamily:"'DM Mono',monospace",fontWeight:800}}>тП▒ POMODORO 45┬╖10┬╖45</span>
        <div style={{display:'flex',gap:4}}>
          {FASES.map((f,i)=>(
            <button key={i} onClick={()=>irFase(i)} style={{padding:'2px 7px',borderRadius:4,cursor:'pointer',fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:700,background:fase===i?`${c}22`:'transparent',color:fase===i?c:'#334155',border:`1px solid ${fase===i?c+'44':'rgba(148,163,184,.25)'}`,transition:'all .15s'}}>
              {f.e} {f.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{position:'relative',width:88,height:88,flexShrink:0}}>
          <svg width="88" height="88" style={{transform:'rotate(-90deg)'}}>
            <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5"/>
            <circle cx="44" cy="44" r={r} fill="none" stroke={feito?'#34d399':c} strokeWidth="5"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
              style={{transition:'stroke-dashoffset .4s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:19,fontWeight:900,fontFamily:"'DM Mono',monospace",color:feito?'#34d399':rodando?'#fff':c,lineHeight:1}}>{pad(mm)}:{pad(ss_)}</div>
            <div style={{fontSize:8,color:'#64748b',marginTop:1}}>{Math.round(pct*100)}%</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:feito?'#34d399':'#c8d0e0',marginBottom:10}}>
            {feito?`тЬЕ ${cur.l} conclu├нda!`:rodando?`${cur.e} ${cur.l}...`:cur.l}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {feito?(
              <button onClick={proxFase} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#34d399,#34d399)',color:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {fase<2?'PR├УXIMA тЖТ':'ЁЯПЖ FEITO'}
              </button>
            ):(
              <button onClick={rodando?pausar:iniciar} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:rodando?`${c}18`:`linear-gradient(135deg,${c},${c})`,color:rodando?c:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {rodando?'тП╕ PAUSAR':'тЦ╢ INICIAR'}
              </button>
            )}
            <button onClick={reiniciar} style={{padding:'8px 10px',borderRadius:8,border:`1px solid ${c}30`,background:'transparent',color:c,fontSize:11,cursor:'pointer'}}>тЖ║</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// тФАтФА Helpers de aproveitamento тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function calcRankingAproveitamento(){
  const historico=lsGet('historico_diario',[]);
  const difBase=lsGet('dif_base_materias',{});
  const porMat={};

  // Grupo 1: mat├йrias com quest├╡es reais
  historico.forEach(r=>{
    if(!r.materia)return;
    const q=parseInt(r.questoes)||0;
    const a=parseInt(r.acertei)||0;
    if(!q)return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,temDado:true};
    porMat[r.materia].q+=q;
    porMat[r.materia].a+=a;
  });

  // Grupo 2: mat├йrias sem quest├╡es mas com dificuldade base definida
  Object.entries(difBase).forEach(([mat,dif])=>{
    if(porMat[mat])return; // j├б tem dado real, ignora
    if(!dif)return;
    // Converte dif 1-5 em % equivalente: 5тнР=0%, 4тнР=30%, 3тнР=55%, 2тнР=75%, 1тнР=90%
    const pctEquiv=[90,75,55,30,0][dif-1];
    porMat[mat]={q:null,a:null,pct:pctEquiv,temDado:false,difBase:dif};
  });

  // Monta ranking
  const comDado=Object.entries(porMat)
    .filter(([,v])=>v.temDado)
    .map(([mat,v])=>{
      const pct=Math.round(v.a/v.q*100);
      const label=pct>=85?'ЁЯЯв S├УLIDO':pct>=70?'ЁЯЯб ATEN├З├ГO':'ЁЯФ┤ CR├НTICO';
      return{mat,pct,q:v.q,label,temDado:true};
    })
    .sort((a,b)=>a.pct-b.pct);

  const semDado=Object.entries(porMat)
    .filter(([,v])=>!v.temDado)
    .map(([mat,v])=>{
      const label=v.pct<=30?'ЁЯФ┤ CR├НTICO (base)':v.pct<=55?'ЁЯЯб ATEN├З├ГO (base)':'ЁЯЯв OK (base)';
      return{mat,pct:v.pct,difBase:v.difBase,label,temDado:false};
    })
    .sort((a,b)=>a.pct-b.pct);

  return{comDado,semDado};
}

function fmtRanking(){
  const{comDado,semDado}=calcRankingAproveitamento();
  const escala='ESCALA: тЙе85%=S├УLIDO ┬╖ 70-84%=ATEN├З├ГO ┬╖ <70%=CR├НTICO';
  const parteComDado=comDado.length
    ? 'COM QUEST├ХES (piorтЖТmelhor): '+comDado.map(r=>`${r.label} ${r.mat} ${r.pct}%(${r.q}Q)`).join(' | ')
    : 'Sem quest├╡es registradas ainda';
  const parteSemDado=semDado.length
    ? 'SEM QUEST├ХES (dif base): '+semDado.map(r=>`${r.label} ${r.mat} dif${r.difBase}тнР`).join(' | ')
    : '';
  return [escala,parteComDado,parteSemDado].filter(Boolean).join(' || ');
}

  async function enviar(texto){
    if(carregando||!texto.trim())return;
    setCarregando(true);
    const nova=[...hist,{role:'user',content:texto}];
    setHist(nova);lsSet('ia_hist',nova);
    try{
      const resposta=await chamarClaude(buildSystem(),nova.slice(-18));
      const mitMatch=resposta.match(/MIT:\["([^"]+)","([^"]+)","([^"]+)"\]/);
      if(mitMatch)onMIT([mitMatch[1],mitMatch[2],mitMatch[3]]);
      const limpo=resposta.replace(/MIT:\[.*?\]/g,'').trim();
      const nova2=[...nova,{role:'assistant',content:limpo}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }catch(e){
      const nova2=[...nova,{role:'assistant',content:`тЭМ ${e.message}`}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }
    setCarregando(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

// тФАтФА Motor Tempo Morto Global (B+C) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function calcTempoMorto(feitos,horas,historico){
  const todayMs=new Date().setHours(0,0,0,0);
  const gurujaData=lsGet('guruja_data',null);
  const score={};
  const add=(mat,dif,dt,w=1)=>{
    if(!mat)return;
    if(!score[mat])score[mat]={total:0,count:0,lastDt:0,travou:0};
    score[mat].total+=dif*w;score[mat].count+=w;
    if(dt>score[mat].lastDt)score[mat].lastDt=dt;
  };
  // 1. Hist├│rico de registro (peso 1.5)
  historico.slice(-14).forEach(r=>{
    if(r.materia&&r.dificuldade)add(r.materia,r.dificuldade,r.dt||0,1.5);
    if(r.travou&&r.materia){if(!score[r.materia])score[r.materia]={total:0,count:0,lastDt:0,travou:0};score[r.materia].travou++;}
  });
  // 2. Anki (peso 1)
  const ankiRegs=lsGet('rev_anki',[]);
  ankiRegs.forEach(r=>{if(r.mat&&r.dif)add(r.mat,r.dif,r.dt||0,1);});
  // 3. NLM (peso 1)
  const nlmRegs=lsGet('rev_nlm',[]);
  nlmRegs.forEach(r=>{if(r.mat&&r.dif)add(r.mat,r.dif,r.dt||0,1);});
  // 4. Ciclo тАФ blocos pendentes ganham b├┤nus
  const feitosSet=new Set(feitos);
  CICLO.filter(s=>!feitosSet.has(s.id)).slice(0,5).forEach((s,i)=>{
    if(!score[s.mat])score[s.mat]={total:0,count:0,lastDt:0,travou:0};
    score[s.mat].total+=(5-i)*0.3;score[s.mat].count+=0.3;
  });
  // 5. Score final com acerto %
  const ranking=Object.entries(score).map(([mat,v])=>{
    const difMedia=v.count>0?v.total/v.count:0;
    const dias=Math.floor((todayMs-(v.lastDt||0))/86400000);
    const g=gurujaData?.prioridades?.find(p=>p.mat?.includes(mat.split(' ')[0]))?.status==='critica'?3:0;
    const regs=historico.filter(r=>r.materia===mat&&parseInt(r.questoes)>0);
    let acertoBonus=0;
    if(regs.length){const tq=regs.reduce((s,r)=>s+(parseInt(r.questoes)||0),0);const ta=regs.reduce((s,r)=>s+(parseInt(r.acertei)||0),0);acertoBonus=tq>0?(1-ta/tq)*3:0;}
    return{mat,difMedia,diasSem:dias,score:difMedia*(dias+1)+g+v.travou*1.5+acertoBonus};
  }).sort((a,b)=>b.score-a.score);
  const fallback={mat:CICLO.find(s=>s.tag?.includes('тнРтнРтнРтнРтнР'))?.mat||'AFO',difMedia:0,diasSem:0};
  const travouRecente=historico.slice(-3).filter(r=>r.travou).map(r=>`${r.materia}: ${r.travou}`);
  return{anki:ranking[0]||fallback,nlm:ranking[1]||ranking[0]||fallback,ranking:ranking.slice(0,5),travouRecente,ts:Date.now()};
}

                            </>

// Componente auxiliar para adicionar tempo manual (sem hooks problem├бticos)
function AddTempoManual({onAdd}){
  const[mat,setMat]=useState('');
  const[min,setMin]=useState('');
  const[salvo,setSalvo]=useState(false);
  const add=()=>{
    const m=parseInt(min);
    if(!mat.trim()||!m||m<=0)return;
    onAdd({mat:mat.trim(),min:m,dt:Date.now()});
    setMat('');setMin('');
    setSalvo(true);setTimeout(()=>setSalvo(false),2000);
  };
  return(
    <div style={{display:'flex',gap:8}}>
      <input value={mat} onChange={e=>setMat(e.target.value)} placeholder="Mat├йria..." style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#f1f5f9',fontSize:12,outline:'none'}}/>
      <input type="number" value={min} onChange={e=>setMin(e.target.value)} placeholder="min" style={{width:65,padding:'8px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.04)',color:'#fbbf24',fontSize:13,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
      <button onClick={add} disabled={!mat.trim()||!min} style={{padding:'8px 14px',borderRadius:8,border:'none',background:mat.trim()&&min?'#fbbf24':'rgba(148,163,184,.22)',color:mat.trim()&&min?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>{salvo?'тЬЕ':'+'}  </button>
    </div>
  );
}

// тФАтФАтФА TAB: REVIS├ГO (reformulada) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function TabRevisao({totalBlocos,tmSugestao,tmIA,onSyncHistorico,onAddHoras}){
  const hoje=getDK();
  const[aba,setAba]=useState('morto');
  const[ankiRegs,setAnkiRegs]=useState(()=>lsGet('rev_anki',[]));
  const[nlmRegs,setNlmRegs]=useState(()=>lsGet('rev_nlm',[]));
  const[rev1h30Regs,setRev1h30Regs]=useState(()=>lsGet('rev_1h30',[]));
  const[cadRegs,setCadRegs]=useState(()=>lsGet('rev_caderno',[]));
  const[topicos,setTopicos]=useState(()=>lsGet('rev_topicos',[]));
  const[editalStatus,setEditalStatus]=useState(()=>lsGet('edital_status',{}));
  const[editalMatSel,setEditalMatSel]=useState(Object.keys(EDITAL)[0]||'Portugu├кs');
  const[topicoForm,setTopicoForm]=useState('');
  const[criticosManuais,setCriticosManuais]=useState(()=>lsGet('criticos_manuais',[]));
  const[critForm,setCritForm]=useState({mat:'',motivo:'',prioridade:'alta'});
  const[critSalvo,setCritSalvo]=useState(false);
  const[criticoIALoad,setCriticoIALoad]=useState(false);
  const[ankiForm,setAnkiForm]=useState({mat:'',tempo:'',cards:'',questoes:'',dif:0});
  const[ankiSalvo,setAnkiSalvo]=useState(false);
  const[nlmForm,setNlmForm]=useState({mat:'',oque:'',tempo:'',questoes:'',dif:0});
  const[nlmSalvo,setNlmSalvo]=useState(false);
  const[cadForm,setCadForm]=useState({mat:'',tempo:'',questoes:'',anki:'',nlm:'',obs:''});
  const[cadSalvo,setCadSalvo]=useState(false);
  const[slots,setSlots]=useState([{mat:'',oque:[],tempo:'',questoes:'',dif:0,salvo:false},{mat:'',oque:[],tempo:'',questoes:'',dif:0,salvo:false},{mat:'',oque:[],tempo:'',questoes:'',dif:0,salvo:false}]);
  const[slotSalvo,setSlotSalvo]=useState(false);
  const[tmFeitoAnki,setTmFeitoAnki]=useState(()=>lsGet(`tm_anki_${hoje}`,false));
  const[tmFeitoNlm,setTmFeitoNlm]=useState(()=>lsGet(`tm_nlm_${hoje}`,false));

  const MATS=CICLO.map(c=>c.mat).filter((v,i,a)=>a.indexOf(v)===i);
  const CORS_DIF=['#34d399','#a3e635','#fbbf24','#fb923c','#f87171'];
  const LABELS_DIF=['F├БCIL','TRANQUILO','M├ЙDIO','DIF├НCIL','MUITO DIF├НCIL'];

  // Tempo Morto calculado no App e passado como prop tmSugestao
  const tempoMorto=tmSugestao||{anki:{mat:'AFO',difMedia:0,diasSem:0},nlm:{mat:'Auditoria',difMedia:0,diasSem:0},ranking:[],travouRecente:[]};

  // Fix 1h30 тАФ conta blocos desde ├║ltima revis├гo
  const ultimaRev=rev1h30Regs.length>0?rev1h30Regs[rev1h30Regs.length-1]:null;
  const ultimoBlocoRev=ultimaRev?.blocoRef||0;
  const blocosDesde=totalBlocos-ultimoBlocoRev;
  const deve1h30=blocosDesde>=5&&totalBlocos>0;
  const faltam1h30=Math.max(0,5-blocosDesde);

  // тФАтФА IA di├бria para Tempo Morto (uma vez por dia) тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  const chamarIaTempoMorto=async()=>{
    const dk=getDK();
    const cached=lsGet('tm_ia_cache',null);
    if(cached&&cached.dia===dk)return; // j├б chamou hoje
    const k=getAK();if(!k||!k.startsWith('sk-ant'))return;
    try{
      const historico2=lsGet('historico_diario',[]);
      const ranking=Object.entries(historico2.reduce((acc,r)=>{if(r.materia&&r.questoes){acc[r.materia]=acc[r.materia]||{q:0,a:0};acc[r.materia].q+=parseInt(r.questoes)||0;acc[r.materia].a+=parseInt(r.acertei)||0;}return acc;},{})).map(([m,v])=>({m,pct:v.q>0?Math.round(v.a/v.q*100):null})).sort((a,b)=>(a.pct||100)-(b.pct||100));
      const ctx=`Ciclo atual: bloco ${totalBlocos}/${N}. Motor local sugere Anki: ${tempoMorto.anki.mat} e NLM: ${tempoMorto.nlm.mat}. ${fmtRanking()}. Travou recentemente: ${tempoMorto.travouRecente.join('; ')||'nada'}. Guruja: ${lsGet('guruja_data',null)?.alerta||'sem dado'}.`;
      const res=await chamarClaude('Voc├к ├й assistente de estudos para concurso TCE-RJ. Responda APENAS JSON sem markdown: {"anki":"nome_materia","nlm":"nome_materia","motivo":"1 frase explicando por que essas mat├йrias agora"}',
        [{role:'user',content:ctx}],200);
      const parsed=JSON.parse(res.replace(/```json|```/g,'').trim());
      const cache={...parsed,dia:dk};
      lsSet('tm_ia_cache',cache);
    }catch(e){console.log('TM IA error:',e.message);}
  };

  const toggleEditalStatus=(mat,topico,status)=>{
    // Cicla: '' тЖТ 'estudei' тЖТ 'domino' тЖТ ''
    const ciclo=['','estudei','domino'];
    const atual=editalStatus[mat+':'+topico]||'';
    const proximo=ciclo[(ciclo.indexOf(atual)+1)%ciclo.length];
    const nd={...editalStatus,[mat+':'+topico]:proximo||undefined};
    if(!proximo)delete nd[mat+':'+topico];
    setEditalStatus(nd);lsSet('edital_status',nd);
  };

  const salvarCritico=()=>{
    if(!critForm.mat)return;
    const n=[...criticosManuais,{...critForm,id:Date.now(),dt:Date.now()}];
    setCriticosManuais(n);lsSet('criticos_manuais',n);
    setCritForm({mat:'',motivo:'',prioridade:'alta'});
    setCritSalvo(true);setTimeout(()=>setCritSalvo(false),1500);
  };
  const delCritico=id=>{const n=criticosManuais.filter(x=>x.id!==id);setCriticosManuais(n);lsSet('criticos_manuais',n);};
  const pedirIaCriticos=async()=>{
    if(criticoIALoad)return;
    setCriticoIALoad(true);
    try{
      const hist=lsGet('historico_diario',[]);

function ModalConfig({fechar}){
  const[aba,setAba]=useState('ia');
  const[msg,setMsg]=useState('');
  const[akVal,setAkVal]=useState(getAK);
  const[importTxt,setImportTxt]=useState('');
  const[confirmarDel,setConfirmarDel]=useState(false);

  const ABAS=[{id:'ia',l:'ЁЯдЦ IA'},{id:'cloud',l:'тШБя╕П Nuvem'},{id:'backup',l:'ЁЯУж Backup'},{id:'import',l:'ЁЯУе Restaurar'},{id:'info',l:'тД╣я╕П Info'}];
  const[cfgUrl,setCfgUrl]=useState(()=>Sync.getCfg().url);
  const[cfgKey,setCfgKey]=useState(()=>Sync.getCfg().key);
  const[cfgLoad,setCfgLoad]=useState(false);

  function salvarChave(){setAK(akVal);setMsg('тЬЕ Chave salva!');setTimeout(()=>setMsg(''),3000);}
  function exportar(){
    try{
      const d={};
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{d[k]=JSON.parse(localStorage.getItem(k));}catch{d[k]=localStorage.getItem(k);}}
      const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const dt=new Date();
      a.href=url;a.download=`rity-backup-${dt.getDate()}-${dt.getMonth()+1}-${dt.getFullYear()}.json`;
      a.click();URL.revokeObjectURL(url);
      setMsg('тЬЕ Backup exportado!');
    }catch(e){setMsg('тЭМ Erro ao exportar.');}
  }
  function importar(){
    try{
      const d=JSON.parse(importTxt);
      Object.entries(d).forEach(([k,v])=>localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v)));
      setMsg('тЬЕ Restaurado! Recarregando...');
      setTimeout(()=>window.location.reload(),1500);
    }catch(e){setMsg('тЭМ JSON inv├бlido.');}
  }
  function importFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setImportTxt(ev.target.result);r.readAsText(f);
  }
  function apagarTudo(){
    if(!confirmarDel){setConfirmarDel(true);return;}
    localStorage.clear();
    setMsg('ЁЯЧСя╕П Apagado. Recarregando...');
    setTimeout(()=>window.location.reload(),1500);
  }

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>{if(e.target===e.currentTarget)fechar();}}>
      <div style={{background:'#1e293b',borderRadius:'20px 20px 0 0',border:'1px solid rgba(255,255,255,.1)',padding:'20px 18px 40px',width:'100%',maxWidth:520,maxHeight:'90dvh',overflowY:'auto'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(148,163,184,.28)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:8,letterSpacing:'3px',color:'rgba(251,191,36,.5)',fontFamily:"'DM Mono',monospace"}}>RITY OS ┬╖ v4.0</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:'#f0e6d0',marginTop:2}}>Configura├з├╡es</div>
          </div>
          <button onClick={fechar} style={{width:32,height:32,borderRadius:'50%',border:'1px solid rgba(255,255,255,.1)',background:'rgba(148,163,184,.22)',color:'#94a3b8',fontSize:16,cursor:'pointer'}}>тЬХ</button>
        </div>

        <div style={{display:'flex',gap:4,marginBottom:16,overflowX:'auto',scrollbarWidth:'none'}}>
          {ABAS.map(s=>{const a=aba===s.id;return(
            <button key={s.id} onClick={()=>{setAba(s.id);setMsg('');setConfirmarDel(false);}} style={{flex:1,minWidth:70,padding:'8px 4px',borderRadius:8,border:`1px solid ${a?'#fbbf24':'rgba(148,163,184,.25)'}`,background:a?'rgba(251,191,36,.1)':'transparent',color:a?'#fbbf24':'#334155',fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>{s.l}</button>
          );})}
        </div>

        {aba==='ia'&&(
          <div>
            <div style={{padding:'12px',borderRadius:10,background:akVal.startsWith('sk-ant')?'rgba(52,211,153,.07)':'rgba(248,113,113,.07)',border:`1px solid ${akVal.startsWith('sk-ant')?'rgba(52,211,153,.3)':'rgba(248,113,113,.3)'}`,marginBottom:14,fontSize:12,color:akVal.startsWith('sk-ant')?'#34d399':'#f87171',fontWeight:700}}>
              {akVal.startsWith('sk-ant')?'тЬЕ Chave configurada тАФ IA Assessora funcionando':'тЭМ Chave ausente тАФ IA offline'}
            </div>
            <div style={{background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.18)',borderRadius:12,padding:'14px'}}>
              <div style={{fontSize:9,letterSpacing:'2px',color:'#a78bfa',fontFamily:"'DM Mono',monospace",marginBottom:8}}>ЁЯФС CHAVE ANTHROPIC (CLAUDE)</div>

              <input value={akVal} onChange={e=>setAkVal(e.target.value)} type="password" placeholder="sk-ant-api03-..." style={{width:'100%',padding:'10px 12px',borderRadius:9,border:'1px solid rgba(167,139,250,.25)',background:'rgba(167,139,250,.06)',color:'#f1f5f9',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:10,fontFamily:"'DM Mono',monospace"}}/>

            <div style={{padding:'11px',borderRadius:10,background:'rgba(148,163,184,.22)',border:'1px solid rgba(255,255,255,.06)',fontSize:11,color:'#64748b',lineHeight:1.8}}>
              ЁЯТб A tabela necess├бria no Supabase ├й: <code style={{color:'#60a5fa'}}>rity_os</code> (key text PK, value jsonb, updated_at timestamptz).<br/>

              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.7,marginBottom:12}}>Salva todos seus dados locais em JSON. Fa├зa sempre antes de uma atualiza├з├гo.</div>

            </div>

            <div style={{padding:'14px',borderRadius:12,background:'rgba(251,191,36,.05)',border:'1px solid rgba(251,191,36,.2)',marginBottom:12}}>

              <div style={{fontSize:12,color:'#94a3b8',marginBottom:10}}>Zera apenas os blocos feitos e reinicia o contador do ciclo. N├гo apaga horas, Anki, erros ou plano semanal.</div>
              <button onClick={()=>{localStorage.removeItem('feitos');localStorage.removeItem('cicloNum');setMsg('тЬЕ Ciclo resetado! Recarregando...');setTimeout(()=>window.location.reload(),1200);}} style={{width:'100%',padding:'11px',borderRadius:9,border:'2px solid rgba(251,191,36,.4)',background:'rgba(251,191,36,.08)',color:'#fbbf24',fontSize:12,fontWeight:800,cursor:'pointer'}}>ЁЯФД Resetar para bloco 1</button>
            </div>
            <div style={{padding:'14px',borderRadius:12,background:'rgba(248,113,113,.04)',border:'1px solid rgba(248,113,113,.15)'}}>
              <div style={{fontSize:9,letterSpacing:'2px',color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:6}}>ЁЯЧСя╕П APAGAR TUDO</div>
              <div style={{fontSize:12,color:'#94a3b8',marginBottom:10}}>Remove todos os dados locais. Somente para recome├зar do zero.</div>
              {!confirmarDel
                ?<button onClick={apagarTudo} style={{width:'100%',padding:'11px',borderRadius:9,border:'2px solid rgba(248,113,113,.4)',background:'transparent',color:'#f87171',fontSize:12,fontWeight:800,cursor:'pointer'}}>тЪая╕П Apagar todos os dados</button>
                :<div style={{display:'flex',gap:8}}>
                  <button onClick={()=>setConfirmarDel(false)} style={{flex:1,padding:'11px',borderRadius:9,border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'#94a3b8',fontSize:12,cursor:'pointer'}}>Cancelar</button>
                  <button onClick={apagarTudo} style={{flex:1,padding:'11px',borderRadius:9,border:'none',background:'#f87171',color:'#050a14',fontSize:12,fontWeight:800,cursor:'pointer'}}>тЬУ Confirmar</button>
                </div>}
            </div>
          </div>
        )}

        {aba==='import'&&(
          <div style={{background:'rgba(96,165,250,.05)',border:'1px solid rgba(96,165,250,.2)',borderRadius:12,padding:'14px'}}>
            <div style={{fontSize:9,letterSpacing:'2px',color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:6}}>ЁЯУе RESTAURAR BACKUP</div>
            <label style={{display:'block',padding:'14px',borderRadius:9,border:'2px dashed rgba(96,165,250,.3)',background:'rgba(96,165,250,.04)',textAlign:'center',cursor:'pointer',marginBottom:10}}>
              <div style={{fontSize:20,marginBottom:4}}>ЁЯУВ</div>
              <div style={{fontSize:11,color:'#94a3b8'}}>Escolher arquivo .json</div>
              <input type="file" accept=".json" onChange={importFile} style={{display:'none'}}/>
            </label>
            <div style={{textAlign:'center',fontSize:10,color:'#475569',marginBottom:8}}>тАФ ou cole o JSON тАФ</div>
            <textarea value={importTxt} onChange={e=>setImportTxt(e.target.value)} rows={4} placeholder='{"feitos":[],...}' style={{width:'100%',padding:'9px',borderRadius:8,border:'1px solid rgba(96,165,250,.25)',background:'rgba(96,165,250,.05)',color:'#f1f5f9',fontSize:11,outline:'none',resize:'vertical',boxSizing:'border-box',marginBottom:10}}/>
            <button onClick={importar} disabled={!importTxt.trim()} style={{width:'100%',padding:'12px',borderRadius:9,border:'none',background:importTxt.trim()?'linear-gradient(135deg,#60a5fa,#60a5fa)':'rgba(148,163,184,.22)',color:importTxt.trim()?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>ЁЯУе Restaurar</button>
          </div>

        {aba==='info'&&(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[['RITY OS','v4.0 тАФ reconstru├нdo'],['Ciclo','Meirelles Op├з├гo 3 ┬╖ 23 blocos'],['Meta semanal','35h+ de estudo'],['Dieta','Low carb ┬╖ Cetog├кnico ┬╖ Jejum IF'],['Kau├к','13 anos ┬╖ Preparat├│rio Col├йgio Naval'],['Concurso','TCE-RJ тАФ Auditora de Controle Externo']].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',borderRadius:9,background:'rgba(148,163,184,.25)',border:'1px solid rgba(255,255,255,.06)'}}>
                <span style={{fontSize:10,color:'#64748b',fontFamily:"'DM Mono',monospace",fontWeight:700}}>{k}</span>
                <span style={{fontSize:11,color:'#94a3b8',textAlign:'right',maxWidth:'65%'}}>{v}</span>

        {msg&&<div style={{marginTop:14,padding:'11px 13px',borderRadius:9,background:'rgba(52,211,153,.1)',border:'1px solid rgba(52,211,153,.3)',fontSize:12,color:'#34d399',fontWeight:700,textAlign:'center'}}>{msg}</div>}

}

// тФАтФАтФА APP RAIZ тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function App(){
  const[feitos,setFeitos]=useState([]);
  const[cicloNum,setCicloNum]=useState(1);
  const[horas,setHoras]=useState([]);
  const[mit,setMit]=useState([]);
  const[historico,setHistorico]=useState(()=>lsGet('historico_diario',[]));
  const[tmIA,setTmIA]=useState(()=>lsGet('tm_ia_cache',null));
  const[planoSemana,setPlanoSemana]=useState(()=>lsGet('plano_semanal',null));
  const[tab,setTab]=useState('ia');
  const[clock,setClock]=useState(new Date());
  const[showCfg,setShowCfg]=useState(false);
  const[trofeu,setTrofeu]=useState(false);
  const[syncSt,setSyncSt]=useState('idle');

  useEffect(()=>{
    Sync.onStatus(s=>setSyncSt(s));
    if(Sync.isConfigured()){Sync.init().then(ok=>{if(ok){setFeitos(lsGet('feitos',[]));setCicloNum(lsGet('cicloNum',1));setHoras(lsGet('horas',[]));setMit(lsGet('mit',[]));}});}
    // Auto-reset: se tiver dados do ciclo antigo (тЙд23 blocos), zera para come├зar do 1
    const _f=lsGet('feitos',[]);
    if(lsGet('ciclo_versao','')!=='v26'){
      if(_f.length>0)lsSet('feitos',[]);
      lsSet('cicloNum',1);lsSet('ciclo_versao','v26');
    }
    setFeitos(lsGet('feitos',[]));setCicloNum(lsGet('cicloNum',1));setHoras(lsGet('horas',[]));setMit(lsGet('mit',[]));
    const tick=setInterval(()=>setClock(new Date()),1000);
    return()=>clearInterval(tick);
  },[]);

  const feitosSet=useMemo(()=>new Set(feitos),[feitos]);
  const pendentes=useMemo(()=>CICLO.filter(s=>!feitosSet.has(s.id)),[feitosSet]);
  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[clock.toDateString()]);
  const semStart=todayStart-6*86400000;
  const tmSugestao=useMemo(()=>calcTempoMorto(feitos,horas,historico),[feitos,horas,historico,clock.toDateString()]);
  const minHoje=useMemo(()=>horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0),[horas,todayStart]);
  const minSemana=useMemo(()=>horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0),[horas,semStart]);
  const metaHoras=lsGet('meta_horas_sem',35);
  const appCtx={cicloNum,feitosN:feitos.length,N,pendentes,minHoje,minSemana};

  const concluir=id=>{if(feitos.includes(id))return;const n=[...feitos,id];if(n.length>=N){lsSet('feitos',[]);lsSet('cicloNum',cicloNum+1);setFeitos([]);setCicloNum(c=>c+1);setTrofeu(true);setTimeout(()=>setTrofeu(false),4000);}else{lsSet('feitos',n);setFeitos(n);}};
  const desmarcar=n=>{lsSet('feitos',n);setFeitos(n);};
  const irPara=id=>{
    const targetIdx=CICLO.findIndex(s=>s.id===id);
    // IDs de todos os blocos ANTES do destino
    const anteriores=CICLO.slice(0,targetIdx).map(s=>s.id);
    // Une os j├б feitos com os anteriores тАФ sem apagar o que foi feito fora de ordem
    const merged=[...new Set([...feitos,...anteriores])];
    // Remove o bloco destino da lista (para ele ficar como pr├│ximo)
    const final=merged.filter(fid=>fid!==id);
    lsSet('feitos',final);setFeitos(final);
  };
  const addHoras=e=>{const n=[...horas,e];lsSet('horas',n);setHoras(n);};
  const syncHistorico=()=>setHistorico(lsGet('historico_diario',[]));
  const saveMIT=itens=>{lsSet('mit',itens);setMit(itens);};
  const savePlano=p=>{setPlanoSemana(p);lsSet('plano_semanal',p);};

  const pct=Math.round(feitos.length/N*100);
  const prox=pendentes[0];
  const corPrx=prox?.tag?.includes('TRI├ВNGULO')?'#fbbf24':prox?.cor||'#fbbf24';
  const urgentes=lsGet('rev_urgentes',[]);
  const errosPend=useMemo(()=>{
    const erros=lsGet('caderno_erros',[]);const agora=Date.now();const iv=[1,3,7,15,30];
    return erros.filter(e=>!e.dominado&&e.dt+iv[Math.min(e.revisoes||0,iv.length-1)]*86400000<=agora).length;
  },[tab]);
  const chaveOK=getAK().startsWith('sk-ant');

  const TABS=[
    {id:'ia',e:'ЁЯдЦ',l:'IA'},
    {id:'estudo',e:'ЁЯУЪ',l:'Estudo'},
    {id:'revisao',e:'ЁЯза',l:'Revis├гo'},
    {id:'agenda',e:'ЁЯЧУя╕П',l:'Agenda'},
  ];

  return(
    <div style={{minHeight:'100dvh',background:'#0f172a',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'10px 14px 8px',background:'#1e293b',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:'#fbbf24',letterSpacing:'1px'}}>RITY OS</div>
            <span style={{fontSize:8,fontWeight:800,letterSpacing:'2px',padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.1)',color:'rgba(251,191,36,.6)',border:'1px solid rgba(251,191,36,.2)',fontFamily:"'DM Mono',monospace"}}>TCE-RJ</span>
            <div style={{width:7,height:7,borderRadius:'50%',background:syncSt==='ok'?'#34d399':syncSt==='syncing'?'#fbbf24':syncSt==='error'?'#f87171':'#334155',transition:'background .4s'}}/>
            {!chaveOK&&<span onClick={()=>setShowCfg(true)} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(248,113,113,.12)',color:'#f87171',border:'1px solid rgba(248,113,113,.3)',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>тЪая╕П SEM CHAVE IA</span>}
            {urgentes.length>0&&<span onClick={()=>setTab('revisao')} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(248,113,113,.1)',color:'#f87171',border:'1px solid rgba(248,113,113,.25)',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>ЁЯЪи {urgentes.length} urgente{urgentes.length>1?'s':''}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:16,fontWeight:900,fontFamily:"'DM Mono',monospace",color:'#f1f5f9',lineHeight:1}}>{fH(clock)}</div>
              <div style={{fontSize:8,color:'#64748b',lineHeight:1,marginTop:2}}>{fmtMin(minHoje)} hoje ┬╖ {fmtMin(minSemana)}/{metaHoras}h</div>
            </div>
            <button onClick={()=>setShowCfg(true)} style={{width:30,height:30,borderRadius:'50%',border:'1px solid rgba(255,255,255,.1)',background:'rgba(148,163,184,.28)',color:'#94a3b8',fontSize:14,cursor:'pointer'}}>тЪЩя╕П</button>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div style={{display:'flex',gap:5}}>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(96,165,250,.1)',color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>тП▒ {fmtMin(minSemana)}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.1)',color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>B{feitos.length}/{N}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.08)',color:Math.round(minSemana/(metaHoras*60)*100)>=100?'#34d399':'#fbbf24',fontFamily:"'DM Mono',monospace"}}>{Math.round(minSemana/(metaHoras*60)*100)}% meta</span>
          </div>
          <span style={{fontSize:9,color:'#64748b',fontFamily:"'DM Mono',monospace"}}>{pct}% ┬╖ ciclo {cicloNum}</span>
        </div>
        <BarProg done={feitos.length} total={N} cor={corPrx} h={3}/>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'14px 14px 0'}}>
        {tab==='ia'     &&<TabIA     appCtx={appCtx} onMIT={saveMIT}/>}
        {tab==='estudo' &&<TabEstudo feitos={feitos} cicloNum={cicloNum} horas={horas} onConcluir={concluir} onIrPara={irPara} onDesmarcar={desmarcar} onAddHoras={addHoras} onSyncHistorico={syncHistorico} mit={mit} planoSemana={planoSemana} onSavePlano={savePlano}/>}
        {tab==='revisao'&&<TabRevisao totalBlocos={feitos.length} tmSugestao={tmSugestao} tmIA={tmIA} onSyncHistorico={syncHistorico} onAddHoras={addHoras}/>}
        
        {tab==='agenda' &&<TabAgenda planoSemana={planoSemana} onSetTab={setTab}/>}
        <div style={{height:80}}/>
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#1e293b',borderTop:'1px solid rgba(255,255,255,.07)',display:'flex',zIndex:50}}>
        {TABS.map(t=>{const a=tab===t.id;return(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'9px 2px 7px',border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
            {t.badge>0&&<div style={{position:'absolute',top:4,right:'8%',width:14,height:14,borderRadius:'50%',background:'#f87171',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#050a14',fontWeight:900}}>{t.badge}</div>}
            <span style={{fontSize:a?20:17,transition:'font-size .15s'}}>{t.e}</span>
            <span style={{fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:a?800:400,color:a?'#fbbf24':'#334155'}}>{t.l}</span>
            {a&&<div style={{position:'absolute',top:0,left:'10%',right:'10%',height:2,borderRadius:1,background:'#fbbf24'}}/>}
          </button>
        );})}
      </div>

      {trofeu&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,flexDirection:'column',gap:16}} onClick={()=>setTrofeu(false)}>
          <div style={{fontSize:64}}>ЁЯПЖ</div>
          <div style={{fontFamily:"'DM Serif Display',serif",color:'#fbbf24',fontSize:26}}>Ciclo {cicloNum-1} completo!</div>
        </div>
      )}
      {showCfg&&<ModalConfig fechar={()=>setShowCfg(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>

<script>
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='rity-os-v4';
const ASSETS=[self.registration.scope];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(cache=>cache.addAll(ASSETS).catch(()=>{})));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(cached=>cached||fetch(e.request).catch(()=>cached)));});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
