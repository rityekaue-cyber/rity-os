// ─── CLOUD DB (localStorage + Supabase sync) ─────────────────
const SUPA_URL_LS='__supa_url__';
const SUPA_KEY_LS='__supa_key__';
let _sc=null; // supabase client
let _syncCBs=[];
let _syncSt='idle';

const Sync={
  onStatus(fn){_syncCBs.push(fn);},
  _emit(s){_syncSt=s;_syncCBs.forEach(fn=>fn(s));},
  isOk(){return _sc!==null;},
  isConfigured(){return !!(localStorage.getItem(SUPA_URL_LS)&&localStorage.getItem(SUPA_KEY_LS));},
  getCfg(){return{url:localStorage.getItem(SUPA_URL_LS)||'',key:localStorage.getItem(SUPA_KEY_LS)||''};},
  saveCfg(url,key){localStorage.setItem(SUPA_URL_LS,url.trim());localStorage.setItem(SUPA_KEY_LS,key.trim());},
  async init(){
    if(!this.isConfigured())return false;
    if(typeof window.supabase==='undefined'){this._emit('offline');return false;}
    try{
      const{url,key}=this.getCfg();
      _sc=window.supabase.createClient(url,key);
      this._emit('syncing');
      const{data,error}=await _sc.from('rity_os').select('key,value');
      if(error)throw error;
      // Mesclar dados da nuvem no localStorage (nuvem vence se mais recente)
      (data||[]).forEach(r=>{
        try{localStorage.setItem(r.key,JSON.stringify(r.value));}catch{}
      });
      this._emit('ok');
      return true;
    }catch(e){console.warn('Sync:',e.message);_sc=null;this._emit('error');return false;}
  },
  push(k,v){
    if(!_sc)return;
    _sc.from('rity_os').upsert({key:k,value:v,updated_at:new Date().toISOString()},{onConflict:'key'})
      .then(({error})=>{if(!error)this._emit('ok');else this._emit('error');})
      .catch(()=>this._emit('error'));
    this._emit('syncing');
  }
};

const ANTHR_KEY_LS='__anthr_key__';
const getAK=()=>localStorage.getItem(ANTHR_KEY_LS)||'';
const setAK=v=>localStorage.setItem(ANTHR_KEY_LS,v.trim());

async function chamarClaude(systemPrompt,msgs,maxTokens=800){
  const k=getAK();
  if(!k)throw new Error('Chave da IA não configurada. Vá em ⚙️ → IA para configurar.');
  const headers={'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  if(k.startsWith('sk-ant'))headers['x-api-key']=k;
  else headers['Authorization']=`Bearer ${k}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers,
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system:systemPrompt,messages:msgs})
  });
  if(!res.ok){const err=await res.text();throw new Error(`API ${res.status}: ${err.slice(0,200)}`);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||'Erro da API');
  return data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'';
}

// ─── POMODORO ────────────────────────────────────────────────
function beep(tipo){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notas=tipo==='pausa'?[[660,0,.2],[660,.25,.2]]:[[880,0,.15],[1108,.18,.15],[1320,.36,.25]];
    notas.forEach(([f,d,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+d+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+dur+.05);
    });
  }catch(e){}
}

function Pomodoro({cor,onFase}){
  const c=cor||'#fbbf24';
  const FASES=[{l:'1ª METADE',d:45*60,e:'📖'},{l:'PAUSA',d:10*60,e:'🚶'},{l:'2ª METADE',d:45*60,e:'✏️'}];
  const[fase,setFase]=useState(0);
  const[secs,setSecs]=useState(FASES[0].d);
  const[rodando,setRodando]=useState(false);
  const[feito,setFeito]=useState(false);
  const endRef=useRef(null);
  const timerRef=useRef(null);
  const disparouRef=useRef(false);
  const cur=FASES[fase];

  const limparTimer=()=>{clearInterval(timerRef.current);timerRef.current=null;};

  useEffect(()=>{
    if(!rodando){limparTimer();return;}
    disparouRef.current=false;
    timerRef.current=setInterval(()=>{
      const r=Math.max(0,Math.round((endRef.current-Date.now())/1000));
      setSecs(r);
      if(r===0&&!disparouRef.current){
        disparouRef.current=true;
        limparTimer();
        setRodando(false);
        setFeito(true);
        beep(fase===1?'pausa':'done');
        if(fase!==1&&onFase)onFase(45);
      }
    },400);
    return limparTimer;
  },[rodando,fase]);

  const iniciar=()=>{endRef.current=Date.now()+secs*1000;setRodando(true);setFeito(false);disparouRef.current=false;};
  const pausar=()=>{limparTimer();setSecs(Math.max(0,Math.round((endRef.current-Date.now())/1000)));endRef.current=null;setRodando(false);};
  const proxFase=()=>{limparTimer();const n=(fase+1)%3;setFase(n);setSecs(FASES[n].d);setRodando(false);setFeito(false);disparouRef.current=false;};
  const irFase=i=>{limparTimer();setFase(i);setSecs(FASES[i].d);setRodando(false);setFeito(false);};
  const reiniciar=()=>{limparTimer();setSecs(cur.d);setRodando(false);setFeito(false);};

  const mm=Math.floor(secs/60);const ss_=secs%60;
  const pct=Math.max(0,Math.min(1,1-secs/cur.d));
  const r=40;const circ=2*Math.PI*r;
  return(
    <div style={{padding:'13px',borderRadius:13,background:`${c}08`,border:`1px solid ${c}22`,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:4}}>
        <span style={{fontSize:9,letterSpacing:'2px',color:c,fontFamily:"'DM Mono',monospace",fontWeight:800}}>⏱ POMODORO 45·10·45</span>
        <div style={{display:'flex',gap:4}}>
          {FASES.map((f,i)=>(
            <button key={i} onClick={()=>irFase(i)} style={{padding:'2px 7px',borderRadius:4,cursor:'pointer',fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:700,background:fase===i?`${c}22`:'transparent',color:fase===i?c:'#334155',border:`1px solid ${fase===i?c+'44':'rgba(255,255,255,.06)'}`,transition:'all .15s'}}>
              {f.e} {f.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{position:'relative',width:88,height:88,flexShrink:0}}>
          <svg width="88" height="88" style={{transform:'rotate(-90deg)'}}>
            <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5"/>
            <circle cx="44" cy="44" r={r} fill="none" stroke={feito?'#34d399':c} strokeWidth="5"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
              style={{transition:'stroke-dashoffset .4s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:19,fontWeight:900,fontFamily:"'DM Mono',monospace",color:feito?'#34d399':rodando?'#fff':c,lineHeight:1}}>{pad(mm)}:{pad(ss_)}</div>
            <div style={{fontSize:8,color:'#334155',marginTop:1}}>{Math.round(pct*100)}%</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:feito?'#34d399':'#c8d0e0',marginBottom:10}}>
            {feito?`✅ ${cur.l} concluída!`:rodando?`${cur.e} ${cur.l}...`:cur.l}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {feito?(
              <button onClick={proxFase} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#34d399,#34d399)',color:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {fase<2?'PRÓXIMA →':'🏆 FEITO'}
              </button>
            ):(
              <button onClick={rodando?pausar:iniciar} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:rodando?`${c}18`:`linear-gradient(135deg,${c},${c})`,color:rodando?c:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {rodando?'⏸ PAUSAR':'▶ INICIAR'}
              </button>
            )}
            <button onClick={reiniciar} style={{padding:'8px 10px',borderRadius:8,border:`1px solid ${c}30`,background:'transparent',color:c,fontSize:11,cursor:'pointer'}}>↺</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── TAB: IA ASSESSORA ────────────────────────────────────────
function TabIA({appCtx,onMIT}){
  const[hist,setHist]=useState([]);
  const[carregando,setCarregando]=useState(false);
  const inputRef=useRef(null);
  const finalRef=useRef(null);

  // Restaurar histórico do dia
  useEffect(()=>{
    const dk=getDK();
    if(lsGet('ia_dk','')=== dk){
      setHist(lsGet('ia_hist',[])||[]);
    }else{
      lsSet('ia_hist',[]);lsSet('ia_dk',dk);
    }
  },[]);

  // Scroll automático
  useEffect(()=>{finalRef.current?.scrollIntoView({behavior:'smooth'});},[hist,carregando]);

  function buildSystem(){
    const d=new Date();
    const treinos={0:'CORRIDA LONGA 60min + tarde livre',1:'CORRIDA LEVE 35min',2:'CORRIDA PESADA 50min',3:'CORRIDA LEVE 35min',4:'CORRIDA PESADA 50min',5:'DESCANSO',6:'sem treino'};
    const trabalha=[1,2,5].includes(d.getDay());
    return `Você é a Assessora IA pessoal da Ritchely — mentora de alto desempenho para o concurso TCE-RJ (Auditora de Controle Externo).
PERFIL: Ritchely, 38 anos, mãe solteira do Kauê (13a, preparando Colégio Naval). Ciclo Meirelles Opção 3 (23 blocos ~34h). Meta: 35h+/semana. Acorda 04:30h. Dieta cetogênica/low carb, meta perder 15kg.
AGORA: ${NOMES_DIA[d.getDay()]} ${fH(d)} | Ciclo ${appCtx.cicloNum} | Blocos ${appCtx.feitosN}/${N} | Hoje: ${fmtMin(appCtx.minHoje)} | Semana: ${fmtMin(appCtx.minSemana)}.
Treino hoje: ${treinos[d.getDay()]}. Trabalho hoje: ${trabalha?'SIM 13h-18h':'NÃO'}.
ESTILO: Direta, calorosa, sem frases vazias. Máx 100 palavras. Uma ação concreta sempre.
EXTRA: Se mencionar os 3 MITs do dia, inclua no final: MIT:["tarefa1","tarefa2","tarefa3"]`;
  }

  async function enviar(texto){
    if(carregando||!texto.trim())return;
    setCarregando(true);
    const nova=[...hist,{role:'user',content:texto}];
    setHist(nova);lsSet('ia_hist',nova);
    try{
      const resposta=await chamarClaude(buildSystem(),nova.slice(-18));
      // Extrair MIT se houver
      const mitMatch=resposta.match(/MIT:\["([^"]+)","([^"]+)","([^"]+)"\]/);
      if(mitMatch)onMIT([mitMatch[1],mitMatch[2],mitMatch[3]]);
      const limpo=resposta.replace(/MIT:\[.*?\]/g,'').trim();
      const nova2=[...nova,{role:'assistant',content:limpo}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }catch(e){
      const nova2=[...nova,{role:'assistant',content:`❌ ${e.message}`}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }
    setCarregando(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  function iniciarDia(){
    const d=new Date();
    const treinos={0:'corrida longa + tarde livre',1:'corrida leve',2:'corrida pesada',3:'corrida leve',4:'corrida pesada',5:'descanso',6:'sem treino'};
    setHist([]);lsSet('ia_hist',[]);
    enviar(`Bom dia! ${NOMES_DIA[d.getDay()]}, ${fH(d)}. Treino: ${treinos[d.getDay()]}. Ciclo ${appCtx.cicloNum}, blocos ${appCtx.feitosN}/${N}. Semana: ${fmtMin(appCtx.minSemana)}. Pode fazer check-in?`);

  const ATALHOS=[
    ['📋 MITs','Quais são as 3 tarefas mais importantes que ainda não fiz hoje?'],
    ['🎯 Próx. bloco','Qual bloco devo estudar agora?'],
    ['😮‍💨 Travada','Estou travada. Qual o mínimo que devo fazer agora?'],
    ['📊 Semana','Como está minha semana? Vou bater 35h?'],
    ['⚓ Kauê','Dica rápida para apoiar o Kauê hoje.'],
    ['🍽️ Comida','O que comer agora na cetogênica?'],
  ];

  return(
    <div style={{display:'flex',flexDirection:'column',height:'calc(100dvh - 155px)'}}>
      {/* Cabeçalho */}
      <div style={{background:'linear-gradient(135deg,rgba(30,20,10,.95),rgba(10,7,3,.98))',border:'1px solid rgba(251,191,36,.15)',borderRadius:13,padding:'11px 13px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div>
          <div style={{fontSize:8,color:'rgba(251,191,36,.5)',letterSpacing:'3px',fontFamily:"'DM Mono',monospace",fontWeight:700}}>ASSESSORA IA · TCE-RJ</div>
          <div style={{fontFamily:"'DM Serif Display',serif",color:'#f0e6d0',fontSize:15,marginTop:2}}>Check-in · Plano · Suporte</div>
        </div>
        <button onClick={iniciarDia} style={{background:'linear-gradient(135deg,#c8850a,#fbbf24)',border:'none',borderRadius:9,padding:'8px 13px',fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:800,color:'#050a14',cursor:'pointer'}}>
          {hist.length>0?'🔄 Novo dia':'☀️ Começar dia'}
        </button>
      </div>
      {/* Atalhos */}
      <div style={{overflowX:'auto',scrollbarWidth:'none',marginBottom:8,flexShrink:0}}>
        <div style={{display:'flex',gap:5,width:'max-content',padding:'1px 0'}}>
          {ATALHOS.map(([l,p])=>(
            <button key={l} onClick={()=>enviar(p)} style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.08)',borderRadius:18,padding:'6px 11px',whiteSpace:'nowrap',fontSize:11,color:'#64748b',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>{l}</button>
          ))}
        </div>
      </div>
      {/* Mensagens */}
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:9,paddingBottom:6}}>
        {hist.length===0&&(
          <div style={{textAlign:'center',padding:'40px 20px'}}>
            <div style={{fontSize:40,marginBottom:12}}>☀️</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:'#c8d0e0',marginBottom:8}}>Bom dia, Ritchely!</div>
            <div style={{fontSize:12,color:'#334155',lineHeight:1.7}}>Toque em <strong style={{color:'#fbbf24'}}>"Começar dia"</strong> para o check-in matinal.<br/>Ou use um atalho acima.</div>

        {hist.map((m,i)=>{

                {!user&&<div style={{fontSize:8,color:'rgba(251,191,36,.6)',letterSpacing:'2px',fontFamily:"'DM Mono',monospace",fontWeight:700,marginBottom:5}}>✦ ASSESSORA</div>}
                <span dangerouslySetInnerHTML={{__html:m.content.replace(/\n/g,'<br/>')}}/>

        })}
        {carregando&&(
          <div style={{display:'flex'}}>
            <div style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'14px 14px 14px 4px',padding:'14px 16px',display:'flex',gap:5,alignItems:'center'}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:'#fbbf24',animation:'pulse 1.2s ease-in-out infinite',animationDelay:`${i*.2}s`}}/>)}
            </div>
          </div>
        )}
        <div ref={finalRef}/>
      </div>
      {/* Input */}
      <div style={{display:'flex',gap:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>

          onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,80)+'px';}}
          style={{flex:1,border:'1px solid rgba(255,255,255,.1)',borderRadius:20,padding:'10px 13px',fontFamily:"'DM Sans',sans-serif",fontSize:13,color:'#c8d0e0',background:'rgba(255,255,255,.04)',resize:'none',outline:'none',lineHeight:1.5}}/>

          style={{width:42,height:42,borderRadius:'50%',background:'linear-gradient(135deg,#c8850a,#fbbf24)',border:'none',fontSize:18,cursor:'pointer',flexShrink:0,color:'#050a14',fontWeight:900,alignSelf:'flex-end'}}>↑</button>

  );

          {ag&&<span style={{fontSize:8,color:c,fontFamily:"'DM Mono',monospace",fontWeight:700}}>AGORA</span>}
        </div>
      );})}

  );
}

            <div style={{fontSize:12,color:'#475569',marginBottom:6}}>{CICLO.find(s=>s.id===confIr)?.mat}</div>

            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setConfIr(null)} style={{flex:1,padding:'11px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'transparent',color:'#475569',fontSize:11,cursor:'pointer'}}>Cancelar</button>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TAB: STATS ──────────────────────────────────────────────
function TabStats({horas,onAddHoras}){
  const[aba,setAba]=useState('horas');
  const[materia,setMateria]=useState('');
  const[minutos,setMinutos]=useState('90');
  const[salvo,setSalvo]=useState(false);
  const[sessoes,setSessoes]=useState(()=>lsGet('sessoes',[]));
  const[sForm,setSForm]=useState({mat:'',tipo:'',nq:'',acerto:'',obs:''});
  const[sSalvo,setSSalvo]=useState(false);
  const[reforcos,setReforcos]=useState(()=>lsGet('reforcos',[]));
  const[rForm,setRForm]=useState({mat:'',oque:'',precisar:null});
  const[rSalvo,setRSalvo]=useState(false);
  const[fila,setFila]=useState(()=>lsGet('fila',[]));
  const[fForm,setFForm]=useState({mat:'',modo:'',prior:'',quando:''});
  const[fSalvo,setFSalvo]=useState(false);

  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[]);
  const semStart=todayStart-6*86400000;
  const minHoje=horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0);
  const minSem=horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0);
  const META=35*60;

  const addManual=()=>{
    const m=parseInt(minutos);
    if(!materia.trim()||!m||m<=0)return;
    onAddHoras({mat:materia.trim(),min:m,dt:Date.now()});
    setMateria('');setMinutos('90');
    setSalvo(true);setTimeout(()=>setSalvo(false),2000);
  };
  const salvarSessao=()=>{
    if(!sForm.mat||!sForm.tipo)return;
    const n=[...sessoes,{...sForm,dt:Date.now(),id:Date.now()}];
    setSessoes(n);lsSet('sessoes',n);
    setSForm({mat:'',tipo:'',nq:'',acerto:'',obs:''});
    setSSalvo(true);setTimeout(()=>setSSalvo(false),2000);
  };
  const salvarReforco=()=>{
    if(!rForm.mat||!rForm.oque||rForm.precisar===null)return;
    const n=[...reforcos,{...rForm,dt:Date.now(),id:Date.now()}];
    setReforcos(n);lsSet('reforcos',n);
    setRForm({mat:'',oque:'',precisar:null});
    setRSalvo(true);setTimeout(()=>setRSalvo(false),2000);
  };
  const salvarFila=()=>{
    if(!fForm.mat||!fForm.modo||!fForm.prior||!fForm.quando)return;
    const n=[...fila,{...fForm,dt:Date.now(),id:Date.now(),feito:false}];
    setFila(n);lsSet('fila',n);
    setFForm({mat:'',modo:'',prior:'',quando:''});
    setFSalvo(true);setTimeout(()=>setFSalvo(false),2000);
  };
  const delFila=id=>{const n=fila.filter(f=>f.id!==id);setFila(n);lsSet('fila',n);};
  const togFila=id=>{const n=fila.map(f=>f.id===id?{...f,feito:!f.feito}:f);setFila(n);lsSet('fila',n);};

  const TIPOS=['Teoria','Questões','Teoria+Q','NotebookLM','Discursiva'];
  const OQUES=['Questões','Áudio NLM','Leitura','Misto','Anki'];
  const MODOS=['Áudio NLM','Leitura','Questões','Anki','Misto'];
  const PRIORS=[{v:'urgente',l:'🔴 Urgente'},{v:'importante',l:'🟡 Import.'},{v:'normal',l:'🟢 Normal'}];
  const QUANDO=['Hoje','Amanhã','Em 2d','Na semana'];
  const PCOR={urgente:'#f87171',importante:'#fbbf24',normal:'#34d399'};

  const SUB=[{id:'horas',l:'⏱ Horas'},{id:'sessoes',l:'📋 Sessões'},{id:'reforco',l:'🔄 Reforço'},{id:'fila',l:'⚡ Fila'}];

  return(
    <div>
      {/* Sub-abas */}
      <div style={{display:'flex',gap:4,marginBottom:14}}>
        {SUB.map(s=>{const a=aba===s.id;return(
          <button key={s.id} onClick={()=>setAba(s.id)} style={{flex:1,padding:'8px 3px',borderRadius:9,border:`1px solid ${a?'#fbbf24':'rgba(255,255,255,.07)'}`,background:a?'rgba(251,191,36,.12)':'transparent',color:a?'#fbbf24':'#334155',fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>{s.l}</button>
        );})}
      </div>

      {aba==='horas'&&<div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {[['Hoje',fmtMin(minHoje),'#60a5fa'],['Semana',fmtMin(minSem),'#fbbf24'],['Meta','35h','#34d399']].map(([l,v,c])=>(
            <div key={l} style={{flex:1,padding:'14px 8px',borderRadius:12,background:`${c}08`,border:`1px solid ${c}20`,textAlign:'center'}}>
              <div style={{fontSize:16,fontWeight:900,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>
              <div style={{fontSize:9,color:'#334155',marginTop:4}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:10,color:'#64748b'}}>Progresso semanal</span>
            <span style={{fontSize:10,color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>{Math.round(minSem/META*100)}%</span>
          </div>
          <BarProg done={minSem} total={META} cor='#fbbf24' h={7}/>
        </div>
        <div style={{background:'rgba(251,191,36,.05)',border:'1px solid rgba(251,191,36,.2)',borderRadius:12,padding:'13px',marginBottom:12}}>
          <div style={{fontSize:9,letterSpacing:'2px',color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginBottom:10}}>➕ ADICIONAR TEMPO MANUAL</div>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <input value={materia} onChange={e=>setMateria(e.target.value)} placeholder="Ex: AFO, Português..." style={{flex:1,padding:'9px 11px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.05)',color:'#c8d0e0',fontSize:12,outline:'none'}}/>
            <input type="number" value={minutos} onChange={e=>setMinutos(e.target.value)} min="1" style={{width:65,padding:'9px',borderRadius:8,border:'1px solid rgba(251,191,36,.2)',background:'rgba(251,191,36,.05)',color:'#fbbf24',fontSize:13,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
          </div>
          <div style={{display:'flex',gap:5,marginBottom:8,flexWrap:'wrap'}}>
            {[30,45,90,120].map(m=><button key={m} onClick={()=>setMinutos(String(m))} style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${minutos==m?'#fbbf24':'rgba(251,191,36,.2)'}`,background:minutos==m?'rgba(251,191,36,.15)':'transparent',color:minutos==m?'#fbbf24':'#475569',fontSize:10,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>{m}min</button>)}
          </div>
          <button onClick={addManual} disabled={!materia.trim()} style={{width:'100%',padding:'11px',borderRadius:9,border:'none',background:materia.trim()?'linear-gradient(135deg,#fbbf24,#fbbf24)':'rgba(255,255,255,.05)',color:materia.trim()?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>
            {salvo?'✅ Adicionado!':'+ Adicionar'}
          </button>
        </div>
        <div style={{fontSize:9,letterSpacing:'2px',color:'#1e293b',fontFamily:"'DM Mono',monospace",marginBottom:8}}>ÚLTIMAS SESSÕES</div>
        {horas.slice().reverse().slice(0,12).map((e,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'9px 12px',borderRadius:9,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.05)',marginBottom:4}}>
            <span style={{fontSize:12,color:'#64748b'}}>{e.mat||'Estudo'}</span>
            <span style={{fontSize:12,color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>{fmtMin(e.min)}</span>
          </div>
        ))}
        {horas.length===0&&<div style={{textAlign:'center',padding:'30px',color:'#1e293b',fontSize:12}}>Nenhuma hora registrada ainda.<br/>Use o Pomodoro ou adicione manualmente.</div>}
      </div>}

      {aba==='sessoes'&&<div>
        <div style={{background:'rgba(96,165,250,.05)',border:'1px solid rgba(96,165,250,.2)',borderRadius:12,padding:'13px',marginBottom:12}}>
          <div style={{fontSize:9,letterSpacing:'2px',color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:10}}>📋 REGISTRAR SESSÃO DE ESTUDO</div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,color:'#334155',marginBottom:5}}>MATÉRIA</div>
            <input value={sForm.mat} onChange={e=>setSForm(f=>({...f,mat:e.target.value}))} placeholder="Ex: AFO, Dir. Tributário..." style={{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,color:'#334155',marginBottom:5}}>TIPO</div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {TIPOS.map(t=><button key={t} onClick={()=>setSForm(f=>({...f,tipo:t}))} style={{padding:'6px 10px',borderRadius:7,border:`1px solid ${sForm.tipo===t?'#60a5fa':'rgba(255,255,255,.08)'}`,background:sForm.tipo===t?'rgba(96,165,250,.18)':'rgba(255,255,255,.03)',color:sForm.tipo===t?'#60a5fa':'#475569',fontSize:10,cursor:'pointer'}}>{t}</button>)}
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'#334155',marginBottom:4}}>Nº QUESTÕES</div>
              <input type="number" value={sForm.nq} onChange={e=>setSForm(f=>({...f,nq:e.target.value}))} min="0" placeholder="0" style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box',textAlign:'center'}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'#334155',marginBottom:4}}>% ACERTO</div>
              <input type="number" value={sForm.acerto} onChange={e=>setSForm(f=>({...f,acerto:e.target.value}))} min="0" max="100" placeholder="0" style={{width:'100%',padding:'8px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box',textAlign:'center'}}/>
            </div>
          </div>
          <textarea value={sForm.obs} onChange={e=>setSForm(f=>({...f,obs:e.target.value}))} rows={2} placeholder="Observações, dificuldades..." style={{width:'100%',padding:'9px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none',resize:'vertical',boxSizing:'border-box',marginBottom:10}}/>
          <button onClick={salvarSessao} disabled={!sForm.mat||!sForm.tipo} style={{width:'100%',padding:'12px',borderRadius:9,border:'none',background:sForm.mat&&sForm.tipo?'linear-gradient(135deg,#60a5fa,#60a5fa)':'rgba(255,255,255,.05)',color:sForm.mat&&sForm.tipo?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>
            {sSalvo?'✅ Salvo!':'💾 SALVAR SESSÃO'}
          </button>
        </div>
        <div style={{fontSize:9,letterSpacing:'2px',color:'#1e293b',fontFamily:"'DM Mono',monospace",marginBottom:8}}>HISTÓRICO</div>
        {[...sessoes].reverse().slice(0,10).map(s=>(
          <div key={s.id} style={{padding:'9px 12px',borderRadius:10,background:'rgba(96,165,250,.04)',border:'1px solid rgba(96,165,250,.12)',marginBottom:5}}>

              <span style={{fontSize:12,color:'#c8d0e0',fontWeight:700}}>{s.mat}</span>
              <span style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>{s.tipo}</span>

        {sessoes.length===0&&<div style={{textAlign:'center',padding:'30px',color:'#1e293b',fontSize:12}}>Nenhuma sessão registrada.</div>}
      </div>}

      {aba==='reforco'&&<div>

          <div style={{fontSize:9,letterSpacing:'2px',color:'#a78bfa',fontFamily:"'DM Mono',monospace",marginBottom:10}}>🔄 REGISTRAR REFORÇO</div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,color:'#334155',marginBottom:4}}>MATÉRIA / ASSUNTO</div>
            <input value={rForm.mat} onChange={e=>setRForm(f=>({...f,mat:e.target.value}))} placeholder="Ex: AFO — Receita Corrente" style={{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid rgba(167,139,250,.2)',background:'rgba(167,139,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:9,color:'#334155',marginBottom:5}}>O QUE FEZ</div>
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {OQUES.map(t=><button key={t} onClick={()=>setRForm(f=>({...f,oque:t}))} style={{padding:'6px 10px',borderRadius:7,border:`1px solid ${rForm.oque===t?'#a78bfa':'rgba(255,255,255,.08)'}`,background:rForm.oque===t?'rgba(167,139,250,.18)':'rgba(255,255,255,.03)',color:rForm.oque===t?'#a78bfa':'#475569',fontSize:10,cursor:'pointer'}}>{t}</button>)}

          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,color:'#334155',marginBottom:5}}>PRECISA FAZER DE NOVO?</div>
            <div style={{display:'flex',gap:8}}>

// ─── TAB: KAUÊ ───────────────────────────────────────────────
function TabKaue({wakeH,wakeM,onSaveWake}){
  const dk=getDK();
  const[wH,setWH]=useState(wakeH);
  const[wM,setWM]=useState(wakeM);
  const[naval,setNaval]=useState(()=>lsGet(`naval_${dk}`,[false,false,false,false,false,false]));
  const[agenda,setAgenda]=useState(()=>lsGet(`kagenda_${dk}`,{escola:false,almoco:false,naval:false,basquete:false}));
  const[temas,setTemas]=useState(()=>lsGet(`ktemas_${dk}`,[false,false,false,false,false]));

  const toggleNaval=i=>{const n=[...naval];n[i]=!n[i];setNaval(n);lsSet(`naval_${dk}`,n);};
  const toggleAgenda=(k,v)=>{const n={...agenda,[k]:v};setAgenda(n);lsSet(`kagenda_${dk}`,n);};
  const toggleTema=i=>{const n=[...temas];n[i]=!n[i];setTemas(n);lsSet(`ktemas_${dk}`,n);};

  const AGENDA_K=[{k:'escola',l:'🏫 Escola'},{k:'almoco',l:'🍽️ Almoço juntos'},{k:'naval',l:'⚓ Vai ao Naval'},{k:'basquete',l:'🏀 Basquete'}];

  return(

        <div style={{fontSize:9,letterSpacing:'3px',color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:12}}>⚓ KAUÊ — 13 ANOS · COLÉGIO NAVAL</div>
        <div style={{fontSize:9,color:'#1e293b',fontFamily:"'DM Mono',monospace",marginBottom:6}}>HORÁRIO DE ACORDAR</div>

          <input type="number" min="0" max="23" value={wH} onChange={e=>setWH(Number(e.target.value))} style={{width:55,padding:'8px',borderRadius:8,border:'1px solid rgba(248,113,113,.25)',background:'rgba(248,113,113,.06)',color:'#f87171',fontSize:16,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
          <span style={{color:'#f87171',fontSize:18,fontWeight:900}}>:</span>
          <input type="number" min="0" max="59" value={wM} onChange={e=>setWM(Number(e.target.value))} style={{width:55,padding:'8px',borderRadius:8,border:'1px solid rgba(248,113,113,.25)',background:'rgba(248,113,113,.06)',color:'#f87171',fontSize:16,fontWeight:900,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>

          <span style={{fontSize:12,color:'#f87171',fontFamily:"'DM Mono',monospace",fontWeight:700}}>atual: {pad(wakeH)}:{pad(wakeM)}</span>
        </div>
        <div style={{fontSize:9,color:'#1e293b',fontFamily:"'DM Mono',monospace",marginBottom:6}}>AGENDA HOJE</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {AGENDA_K.map(({k,l})=>(
            <button key={k} onClick={()=>toggleAgenda(k,!agenda[k])} style={{padding:'7px 11px',borderRadius:8,border:`1px solid ${agenda[k]?'#f87171':'rgba(255,255,255,.08)'}`,background:agenda[k]?'rgba(248,113,113,.18)':'rgba(255,255,255,.03)',color:agenda[k]?'#f87171':'#475569',fontSize:11,fontWeight:700,cursor:'pointer'}}>{l}</button>

      </div>
      <div style={{background:'rgba(251,191,36,.05)',border:'1px solid rgba(251,191,36,.2)',borderRadius:12,padding:'13px',marginBottom:12}}>

          <div key={i} onClick={()=>toggleTema(i)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:9,marginBottom:4,cursor:'pointer',background:temas[i]?'rgba(52,211,153,.06)':'rgba(255,255,255,.02)',border:`1px solid ${temas[i]?'rgba(52,211,153,.2)':'rgba(255,255,255,.05)'}`}}>
            <div style={{width:16,height:16,borderRadius:'50%',flexShrink:0,border:`2px solid ${temas[i]?'#34d399':'rgba(255,255,255,.15)'}`,background:temas[i]?'#34d399':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#050a14',fontWeight:900}}>{temas[i]?'✓':''}</div>

        {NAVAL_ITEMS.map((it,i)=>(
          <div key={i} onClick={()=>toggleNaval(i)} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:9,marginBottom:4,cursor:'pointer',background:naval[i]?'rgba(52,211,153,.06)':'rgba(255,255,255,.02)',border:`1px solid ${naval[i]?'rgba(52,211,153,.2)':'rgba(255,255,255,.04)'}`}}>

            <span style={{fontSize:12,color:naval[i]?'#34d399':'#64748b',textDecoration:naval[i]?'line-through':'none'}}>{it}</span>
          </div>
        ))}
        <div style={{marginTop:6,fontSize:11,color:'#475569'}}>{naval.filter(Boolean).length}/{NAVAL_ITEMS.length} itens ✓</div>
      </div>
    </div>
  );
}

// ─── TAB: COMIDA ─────────────────────────────────────────────
function TabComida(){
  const dk=getDK();const dw=new Date().getDay();
  const[aba,setAba]=useState('hoje');
  const[plano,setPlano]=useState(()=>lsGet('plano_semana',null));
  const[txt,setTxt]=useState('');
  const[loadP,setLoadP]=useState(false);
  const[hidra,setHidra]=useState(()=>lsGet(`hidra_${dk}`,0));
  const[jejum,setJejum]=useState(()=>lsGet(`jejum_${dk}`,{fez:null,horas:''}));
  const[seguiu,setSeguiu]=useState(()=>lsGet(`seguiu_${dk}`,null));
  const[iaResp,setIaResp]=useState(()=>lsGet(`ci_ia_${dk}`,''));
  const[loadCI,setLoadCI]=useState(false);

  const ML=250;const MAX=12;const META=3000;const mlAtual=hidra*ML;
  const diaKey=DIAS_KEY[dw];
  const planoHoje=plano?.semana?.[diaKey];

  async function gerarPlano(){
    if(!txt.trim()||loadP)return;
    setLoadP(true);
    try{
      const r=await chamarClaude(
        `Você é nutricionista especializada em low carb/cetogênico. Ritchely, 38a, jejum IF, meta -15kg, treina 6x/sem. Com base no texto, organize plano semanal. Responda APENAS JSON sem markdown: {"semana":{"Dom":{"cafe":"","almoco":"","lanche":"","jantar":"","dica":""},"Seg":{},"Ter":{},"Qua":{},"Qui":{},"Sex":{},"Sab":{}}}`,
        [{role:'user',content:`Meu plano:\n\n${txt.slice(0,4000)}`}]
      );
      const p=JSON.parse(r.replace(/```json|```/g,'').trim());
      setPlano(p);lsSet('plano_semana',p);setTxt('');setAba('plano');
    }catch(e){alert(`Erro: ${e.message}`);}
    setLoadP(false);
  }

  async function enviarCI(){
    if(loadCI||seguiu===null)return;
    setLoadCI(true);
    try{
      const r=await chamarClaude(
        `Nutricionista/coach da Ritchely. Cetogênica, meta -15kg. Direta, empática, máx 80 palavras. Se não seguiu: 1 sugestão prática. Se seguiu: celebra + dica amanhã.`,
        [{role:'user',content:`Plano (${NOMES_DIA[dw]}): ${planoHoje?JSON.stringify(planoHoje):'não definido'}. Seguiu: ${seguiu?'SIM':'NÃO'}. Jejum: ${jejum.fez?`SIM ${jejum.horas}h`:'NÃO'}. Água: ${mlAtual}ml/3000ml.`}]
      );
      setIaResp(r);lsSet(`ci_ia_${dk}`,r);
    }catch(e){setIaResp(`❌ ${e.message}`);}
    setLoadCI(false);
  }

  const addCopo=()=>{const n=Math.min(16,hidra+1);setHidra(n);lsSet(`hidra_${dk}`,n);};
  const remCopo=()=>{const n=Math.max(0,hidra-1);setHidra(n);lsSet(`hidra_${dk}`,n);};
  const savJejum=(fez,horas)=>{const j={fez,horas};setJejum(j);lsSet(`jejum_${dk}`,j);};

  const SUB=[{id:'hoje',l:'🍽️ Hoje'},{id:'plano',l:'📅 Semana'},{id:'checkin',l:'✅ Check-in'},{id:'upload',l:'📤 Upload'}];
  return(
    <div>
      <div style={{display:'flex',gap:5,marginBottom:14}}>
        {SUB.map(s=>{const a=aba===s.id;return <button key={s.id} onClick={()=>setAba(s.id)} style={{flex:1,padding:'8px 3px',borderRadius:9,border:`1px solid ${a?'#fb923c':'rgba(255,255,255,.07)'}`,background:a?'rgba(251,146,60,.12)':'transparent',color:a?'#fb923c':'#1e293b',fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>{s.l}</button>;})}
      </div>
      {aba==='hoje'&&<div>
        <div style={{background:'linear-gradient(135deg,rgba(251,146,60,.1),rgba(5,10,20,.98))',border:'1px solid rgba(251,146,60,.22)',borderRadius:14,padding:'13px',marginBottom:12}}>
          <div style={{fontSize:9,letterSpacing:'3px',color:'#fb923c',fontFamily:"'DM Mono',monospace",marginBottom:2}}>🍽️ CARDÁPIO — {NOMES_DIA[dw].toUpperCase()}</div>
          {planoHoje?[['☀️ Café','cafe','#fbbf24'],['🌤️ Almoço','almoco','#fb923c'],['🌥️ Lanche','lanche','#a78bfa'],['🌙 Jantar','jantar','#60a5fa']].map(([l,k,c])=>(
            <div key={k} style={{padding:'10px 11px',borderRadius:10,background:`${c}08`,border:`1px solid ${c}20`,marginBottom:7}}>
              <div style={{fontSize:10,fontWeight:700,color:c,marginBottom:3}}>{l}</div>
              <div style={{fontSize:13,color:'#e8edf5',fontWeight:600}}>{planoHoje[k]||'—'}</div>
            </div>
          )):<div style={{textAlign:'center',padding:'20px',borderRadius:10,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)'}}>
            <div style={{fontSize:24,marginBottom:8}}>📤</div>
            <div style={{fontSize:12,color:'#475569',lineHeight:1.8}}>Sem plano. Vá em <strong style={{color:'#fb923c'}}>Upload</strong>.</div>
            <button onClick={()=>setAba('upload')} style={{marginTop:10,padding:'8px 16px',borderRadius:8,border:'1px solid rgba(251,146,60,.3)',background:'rgba(251,146,60,.1)',color:'#fb923c',fontSize:11,fontWeight:700,cursor:'pointer'}}>Ir para Upload →</button>
          </div>}
        </div>
        <div style={{background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.18)',borderRadius:12,padding:'13px',marginBottom:12}}>
          <div style={{fontSize:9,letterSpacing:'2px',color:'#a78bfa',fontFamily:"'DM Mono',monospace",marginBottom:10}}>⏳ JEJUM INTERMITENTE</div>
          <div style={{display:'flex',gap:7,marginBottom:8}}>
            <button onClick={()=>savJejum(true,jejum.horas)} style={{flex:1,padding:'10px',borderRadius:9,border:`1px solid ${jejum.fez===true?'#a78bfa':'rgba(255,255,255,.1)'}`,background:jejum.fez===true?'rgba(167,139,250,.18)':'rgba(255,255,255,.03)',color:jejum.fez===true?'#a78bfa':'#475569',fontSize:12,fontWeight:700,cursor:'pointer'}}>✅ Fiz jejum</button>
            <button onClick={()=>savJejum(false,'')} style={{flex:1,padding:'10px',borderRadius:9,border:`1px solid ${jejum.fez===false?'#f87171':'rgba(255,255,255,.1)'}`,background:jejum.fez===false?'rgba(248,113,113,.12)':'rgba(255,255,255,.03)',color:jejum.fez===false?'#f87171':'#475569',fontSize:12,fontWeight:700,cursor:'pointer'}}>❌ Não fiz</button>
          </div>
          {jejum.fez===true&&<div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{['12','14','16','18','20','24'].map(h=><button key={h} onClick={()=>savJejum(true,h)} style={{padding:'5px 9px',borderRadius:7,border:`1px solid ${jejum.horas===h?'#a78bfa':'rgba(167,139,250,.2)'}`,background:jejum.horas===h?'rgba(167,139,250,.2)':'transparent',color:jejum.horas===h?'#a78bfa':'#475569',fontSize:11,cursor:'pointer'}}>{h}h</button>)}</div>}
        </div>
        <div style={{background:'rgba(96,165,250,.05)',border:'1px solid rgba(96,165,250,.18)',borderRadius:12,padding:'13px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:9,letterSpacing:'2px',color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>💧 HIDRATAÇÃO</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:900,color:mlAtual>=META?'#34d399':'#60a5fa'}}>{(mlAtual/1000).toFixed(2).replace('.',',')}L / 3L</div>

          <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>

              <div key={i} onClick={()=>{if(i===hidra-1)remCopo();else if(i>=hidra){const n=Math.min(16,i+1);setHidra(n);lsSet(`hidra_${dk}`,n);}}} style={{width:28,height:36,borderRadius:5,border:`2px solid ${i<hidra?'#60a5fa':'rgba(96,165,250,.15)'}`,background:i<hidra?'rgba(96,165,250,.15)':'rgba(96,165,250,.03)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,cursor:'pointer'}}>
                {i<hidra?'💧':'·'}
              </div>
            ))}
          </div>

// ─── TAB: TREINO ─────────────────────────────────────────────
function TabTreino(){
  const dk=getDK();
  const[regs,setRegs]=useState(()=>lsGet('treino_regs',[]));
  const[form,setForm]=useState({ativ:'',horario:'',dur:'',obs:'',feito:null});
  const[salvo,setSalvo]=useState(false);

  const hj=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[]);
  const diasSem=useMemo(()=>{
    const f=regs.filter(r=>r.feito&&r.dtMs);
    if(!f.length)return null;
    const ult=f.reduce((mx,r)=>r.dtMs>mx?r.dtMs:mx,0);
    return Math.floor((hj-ult)/86400000);
  },[regs,hj]);
  const treinouHj=regs.some(r=>r.dk===dk&&r.feito);
  const nivel=diasSem===null?0:diasSem>=2?2:diasSem>=1?1:0;

  const ATIVS=['🏃 Corrida leve','🏃 Corrida pesada','🏃 Corrida longa','🏋️ Musculação','🤸 Mobilidade','🚶 Caminhada'];

  const salvar=()=>{
    if(!form.ativ||form.feito===null)return;
    const novo={...form,dk,dtMs:hj,id:Date.now()};
    const n=[...regs,novo];setRegs(n);lsSet('treino_regs',n);
    setForm({ativ:'',horario:'',dur:'',obs:'',feito:null});
    setSalvo(true);setTimeout(()=>setSalvo(false),2000);

  return(
    <div>

      {nivel===1&&<div style={{marginBottom:12,padding:'11px 13px',borderRadius:11,background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.4)'}}><div style={{fontSize:11,fontWeight:800,color:'#fbbf24',marginBottom:3}}>⚠️ 1 DIA SEM TREINAR</div><div style={{fontSize:11,color:'rgba(251,191,36,.8)'}}>Tente encaixar algo hoje, mesmo que leve.</div></div>}
      {treinouHj&&<div style={{marginBottom:12,padding:'10px 13px',borderRadius:10,background:'rgba(52,211,153,.08)',border:'1px solid rgba(52,211,153,.3)'}}><div style={{fontSize:11,fontWeight:800,color:'#34d399'}}>✅ Treino registrado hoje!</div></div>}

        <div style={{fontSize:9,letterSpacing:'2px',color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:10}}>➕ REGISTRAR ATIVIDADE</div>
        <div style={{marginBottom:8}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
            {ATIVS.map(a=><button key={a} onClick={()=>setForm(f=>({...f,ativ:a}))} style={{padding:'5px 9px',borderRadius:7,border:`1px solid ${form.ativ===a?'#60a5fa':'rgba(255,255,255,.08)'}`,background:form.ativ===a?'rgba(96,165,250,.18)':'rgba(255,255,255,.03)',color:form.ativ===a?'#60a5fa':'#475569',fontSize:10,cursor:'pointer'}}>{a}</button>)}
          </div>
          <input value={ATIVS.includes(form.ativ)?'':form.ativ} onChange={e=>setForm(f=>({...f,ativ:e.target.value}))} placeholder="Ou digitar..." style={{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <div style={{flex:1}}><div style={{fontSize:9,color:'#1e293b',marginBottom:4}}>HORÁRIO</div><input type="time" value={form.horario} onChange={e=>setForm(f=>({...f,horario:e.target.value}))} style={{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/></div>
          <div style={{flex:1}}><div style={{fontSize:9,color:'#1e293b',marginBottom:4}}>MIN</div><input type="number" min="1" value={form.dur} onChange={e=>setForm(f=>({...f,dur:e.target.value}))} placeholder="45" style={{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.04)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box'}}/></div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>

          <button onClick={()=>setForm(f=>({...f,feito:false}))} style={{flex:1,padding:'10px',borderRadius:9,border:`2px solid ${form.feito===false?'#f87171':'rgba(255,255,255,.1)'}`,background:form.feito===false?'rgba(248,113,113,.12)':'rgba(255,255,255,.03)',color:form.feito===false?'#f87171':'#475569',fontSize:12,fontWeight:800,cursor:'pointer'}}>❌ Não fiz</button>

      </div>

      <div style={{fontSize:9,letterSpacing:'2px',color:'#1e293b',fontFamily:"'DM Mono',monospace",marginBottom:8}}>HISTÓRICO</div>
      {[...regs].reverse().slice(0,14).map(r=>(
        <div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,background:r.feito?'rgba(52,211,153,.04)':'rgba(248,113,113,.04)',border:`1px solid ${r.feito?'rgba(52,211,153,.15)':'rgba(248,113,113,.15)'}`,marginBottom:5}}>
          <span style={{fontSize:16}}>{r.feito?'✅':'❌'}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'#c8d0e0',fontWeight:600}}>{r.ativ}</div>
            <div style={{fontSize:10,color:'#334155'}}>{r.dk}{r.dur?` · ${r.dur}min`:''}</div>
          </div>
          <button onClick={()=>del(r.id)} style={{padding:'3px 8px',borderRadius:5,border:'1px solid rgba(248,113,113,.2)',background:'transparent',color:'#f87171',fontSize:10,cursor:'pointer'}}>×</button>
        </div>
      ))}
      {regs.length===0&&<div style={{textAlign:'center',padding:'30px',color:'#1e293b',fontSize:12}}>Nenhum registro ainda.</div>}
    </div>
  );
}

// ─── TAB: CASA ───────────────────────────────────────────────
function TabCasa(){
  const dk=getDK();
  const defT=[{id:1,txt:'Limpeza da casa',prior:'normal',done:false},{id:2,txt:'Louça do dia',prior:'normal',done:false},{id:3,txt:'Roupa',prior:'normal',done:false}];

  const[prior,setPrior]=useState('normal');
  const[mercado,setMercado]=useState(()=>lsGet(`casa_m_${dk}`,''));

  const addT=()=>{if(!novo.trim())return;const n=[...tarefas,{id:Date.now(),txt:novo.trim(),prior,done:false}];setTarefas(n);lsSet(`casa_t_${dk}`,n);setNovo('');};
  const togT=id=>{const n=tarefas.map(t=>t.id===id?{...t,done:!t.done}:t);setTarefas(n);lsSet(`casa_t_${dk}`,n);};

          <div style={{fontSize:11,fontWeight:900,color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:6}}>🚨 URGENTE</div>
          {tarefas.filter(t=>t.prior==='urgente'&&!t.done).map(t=><div key={t.id} style={{fontSize:12,color:'#f87171',marginBottom:2}}>• {t.txt}</div>)}

      )}

          <div style={{fontSize:9,letterSpacing:'2px',color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>🏡 TAREFAS DO DIA</div>
          <span style={{fontSize:10,color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>{tarefas.filter(t=>t.done).length}/{tarefas.length}</span>
        </div>
        {tarefas.map(t=>(
          <div key={t.id} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:9,background:t.done?'rgba(52,211,153,.04)':'rgba(255,255,255,.02)',border:`1px solid ${t.done?'rgba(52,211,153,.15)':'rgba(255,255,255,.05)'}`,marginBottom:4}}>
            <div onClick={()=>togT(t.id)} style={{width:18,height:18,borderRadius:'50%',flexShrink:0,border:`2px solid ${t.done?'#34d399':COR[t.prior]}`,background:t.done?'#34d399':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#050a14',fontWeight:900,cursor:'pointer'}}>{t.done?'✓':''}</div>
            <div style={{flex:1,fontSize:12,color:t.done?'#334155':'#c8d0e0',textDecoration:t.done?'line-through':'none',cursor:'pointer'}} onClick={()=>togT(t.id)}>{t.txt}</div>
            <Chip label={t.prior} cor={COR[t.prior]} sm/>
            <button onClick={()=>delT(t.id)} style={{padding:'2px 6px',borderRadius:4,border:'1px solid rgba(255,255,255,.06)',background:'transparent',color:'#334155',fontSize:10,cursor:'pointer'}}>×</button>
          </div>

        <div style={{display:'flex',gap:7,marginTop:8}}>
          <input value={novo} onChange={e=>setNovo(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addT()} placeholder="Nova tarefa..." style={{flex:1,padding:'8px 10px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.04)',color:'#c8d0e0',fontSize:12,outline:'none'}}/>
          <select value={prior} onChange={e=>setPrior(e.target.value)} style={{padding:'8px',borderRadius:8,border:'1px solid rgba(255,255,255,.08)',background:'#0c1220',color:'#c8d0e0',fontSize:11,outline:'none',cursor:'pointer'}}>
            <option value="normal">Normal</option>
            <option value="importante">Importante</option>
            <option value="urgente">Urgente</option>

          <button onClick={addT} style={{padding:'8px 14px',borderRadius:8,border:'none',background:'#60a5fa',color:'#050a14',fontSize:14,fontWeight:900,cursor:'pointer'}}>+</button>
        </div>
      </div>
      {[['🛒 Supermercado',mercado,v=>{setMercado(v);lsSet(`casa_m_${dk}`,v);},'#34d399'],
        ['🚨 Urgente/Imprevisto',urgente,v=>{setUrgente(v);lsSet(`casa_u_${dk}`,v);},'#f87171']
      ].map(([l,val,set,c])=>(
        <div key={l} style={{background:`${c}04`,border:`1px solid ${c}22`,borderRadius:12,padding:'12px',marginBottom:10}}>
