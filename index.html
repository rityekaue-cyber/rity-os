/* ── TEMA CLARO ── */
body.light{
  --bg:#f1f5f9;

  --bg3:#e8eef5;

  --card2:#f8fafc;

  --text3:#334155;
  --text4:#475569;

  --input-bg:#f8fafc;

  --tab-active-color:#2563eb;
  --tab-inactive-color:#64748b;
  --scrollbar-bg:#e2e8f0;
  --scrollbar-thumb:#94a3b8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  overscroll-behavior:none;
  font-size:15px;
  line-height:1.5;
  transition:background .2s, color .2s;
}

::-webkit-scrollbar{width:4px;background:var(--scrollbar-bg)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
button:active{transform:scale(.97)}
button{transition:background .15s,border-color .15s,color .15s;}
textarea,input{-webkit-appearance:none;transition:border-color .15s;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── MODO CLARO: overrides globais ── */
body.light{
  color-scheme: light;
}
body.light input, body.light textarea{
  background:var(--input-bg)!important;
  border-color:var(--input-border)!important;
  color:var(--text)!important;
}
body.light button{color:inherit;}

/* Cards e containers no modo claro */
body.light #root > div > div:nth-child(2){
  background:var(--bg)!important;
}
/* Override específico para modo claro em cards genéricos */
body.light [data-card]{
  background:var(--card)!important;
  border-color:var(--border)!important;
  color:var(--text)!important;
}
/* Header text no modo claro */
body.light [data-mono]{
  color:var(--text3)!important;
}

// A fila de Revisão Profunda agora é 100% dinâmica — ver getFilaRevProfunda() abaixo,
// que deriva de calcProfunda80() e só considera as 12 matérias reais do EDITAL_MATS.

// Retorna o estado atual da fila (posição + histórico de revisões)
// Fonte dinâmica: calcProfunda80() agrupado por matéria — só as 12 matérias reais do
// edital TCE-SP entram aqui (EDITAL_MATS nunca incluiu as hibernação/suspensas).
function getFilaRevProfunda(){
  const hist=lsGet('rev_profunda_hist',[]);
  const abaixo80=calcProfunda80();
  const porMat={};
  abaixo80.forEach(it=>{
    if(!porMat[it.mat])porMat[it.mat]={itens:[],maxScore:0,temCritico:false};
    porMat[it.mat].maxScore=Math.max(porMat[it.mat].maxScore,it.score);
    if(it.critico)porMat[it.mat].temCritico=true;
    porMat[it.mat].itens.push(it);
  });
  const CORES_MAT=['#f472b6','#a78bfa','#fb923c','#fbbf24','#94a3b8','#60a5fa','#f87171','#34d399'];
  let base=Object.entries(porMat).map(([mat,v],i)=>({
    mat,ic:v.temCritico?'🚨':'📉',cor:v.temCritico?'#f87171':CORES_MAT[i%CORES_MAT.length],
    motivo:v.itens.sort((a,b)=>b.score-a.score).slice(0,2).map(it=>`${it.titulo} ${it.acerto}%`).join(' · '),
    jornada:null,ferramenta:'TecConcursos',maxScore:v.maxScore,
  })).sort((a,b)=>b.maxScore-a.maxScore);
  if(base.length===0){
    // nada com dado real abaixo de 80% no momento — fallback neutro com as matérias reais do edital
    base=EDITAL_MATS.filter(m=>m!=='Discursivas').map((mat,i)=>({mat,ic:'📚',cor:CORES_MAT[i%CORES_MAT.length],motivo:'Manutenção — sem ponto crítico registrado agora',jornada:null,ferramenta:'TecConcursos',maxScore:0}));
  }
  const posicoes=base.map((m,i)=>{
    const ultRev=hist.filter(h=>h.mat===m.mat).sort((a,b)=>b.cicloRef-a.cicloRef)[0]||null;
    return{...m,posOriginal:i,ultRevCiclo:ultRev?.cicloRef||0,ultRevData:ultRev?.data||null,totalRevisoes:hist.filter(h=>h.mat===m.mat).length};
  });
  // Ordena: quem foi revisada há mais ciclos fica na frente; empate desfeito por urgência
  posicoes.sort((a,b)=>a.ultRevCiclo-b.ultRevCiclo||b.maxScore-a.maxScore);
  return posicoes;
}

// Verifica se é hora de fazer revisão profunda (a cada 7 ciclos do Foco)
function deveRevisaoProfunda(totalBlocosFoco){
  const hist=lsGet('rev_profunda_hist',[]);
  const ultimaRev=hist.length>0?hist.sort((a,b)=>b.cicloRef-a.cicloRef)[0]:null;
  const ultimoCicloRev=ultimaRev?.cicloRef||0;
  return totalBlocosFoco>0&&(totalBlocosFoco-ultimoCicloRev)>=7;
}

// ── Tags dinâmicas — calculadas em runtime com base no historico real ──
function calcTagDinamica(mat){
  const hist=lsGet('historico_diario',[]);
  const difBase=lsGet('dif_base_materias',{});
  const regs=hist.filter(r=>r.materia===mat&&parseInt(r.questoes)>0);
  if(!regs.length){
    // Sem questões: usa dif base se definida
    const dif=difBase[mat]||0;
    if(dif>=4)return'🔴 CRÍTICO (base)';
    if(dif>=3)return'🟡 ATENÇÃO (base)';
    if(dif>0)return'🟢 OK (base)';
    return'⬜ NÃO INICIADO';
  }
  const tq=regs.reduce((s,r)=>s+(parseInt(r.questoes)||0),0);
  const ta=regs.reduce((s,r)=>s+(parseInt(r.acertei)||0),0);
  const pct=tq>0?Math.round(ta/tq*100):0;
  const lastDt=Math.max(...regs.map(r=>r.dt||0));
  const diasSem=Math.floor((Date.now()-lastDt)/86400000);
  if(pct>=85){
    if(diasSem>15)return'🟡 OXIDANDO ('+pct+'%)';
    return'🟢 SÓLIDO ('+pct+'%)';
  }
  if(pct>=70)return'🟡 ATENÇÃO ('+pct+'%)';
  return'🔴 CRÍTICO ('+pct+'%)';
}

// ─── CLOUD DB (localStorage + Supabase sync) ─────────────────
const SUPA_URL_LS='__supa_url__';
const SUPA_KEY_LS='__supa_key__';
let _sc=null; // supabase client
let _syncCBs=[];
let _syncSt='idle';

const Sync={
  onStatus(fn){_syncCBs.push(fn);},
  _emit(s){_syncSt=s;_syncCBs.forEach(fn=>fn(s));},
  isOk(){return _sc!==null;},
  isConfigured(){return !!(localStorage.getItem(SUPA_URL_LS)&&localStorage.getItem(SUPA_KEY_LS));},
  getCfg(){return{url:localStorage.getItem(SUPA_URL_LS)||'',key:localStorage.getItem(SUPA_KEY_LS)||''};},
  saveCfg(url,key){localStorage.setItem(SUPA_URL_LS,url.trim());localStorage.setItem(SUPA_KEY_LS,key.trim());},
  async init(){
    if(!this.isConfigured())return false;
    if(typeof window.supabase==='undefined'){this._emit('offline');return false;}
    try{
      const{url,key}=this.getCfg();
      _sc=window.supabase.createClient(url,key);
      this._emit('syncing');
      const{data,error}=await _sc.from('rity_os').select('key,value,updated_at');
      if(error)throw error;
      // Mesclar: nuvem vence se updated_at mais recente que local
      const cloudMap={};
      (data||[]).forEach(r=>{cloudMap[r.key]=r;});
      (data||[]).forEach(r=>{
        try{
          const localRaw=localStorage.getItem(r.key);
          // Se não tem local ou nuvem é mais recente, usa nuvem
          if(!localRaw){localStorage.setItem(r.key,JSON.stringify(r.value));return;}
          // Se updated_at existe, compara; senão nuvem vence
          if(r.updated_at){
            const cloudTs=new Date(r.updated_at).getTime();
            const localMeta=localStorage.getItem('__ts_'+r.key);
            const localTs=localMeta?parseInt(localMeta):0;
            if(cloudTs>localTs)localStorage.setItem(r.key,JSON.stringify(r.value));
          }else{localStorage.setItem(r.key,JSON.stringify(r.value));}
        }catch{}
      });
      // Após pull, empurra chaves locais que não estão na nuvem
      const cloudKeys=new Set((data||[]).map(r=>r.key));
      const syncKeys=['feitos','cicloNum','horas','historico_diario','rev_anki','rev_nlm','rev_caderno','rev_1h30','rev_topicos','anki_meta','dif_base_materias','criticos_manuais','edital_status','guruja_data','plano_semanal','urgentes_ia','ia_hist','theme_mode','ciclo_versao','ciclo_extras','rev_profunda_hist'];
      for(const k of syncKeys){
        if(!cloudKeys.has(k)){
          const v=localStorage.getItem(k);
          if(v!==null){try{await _sc.from('rity_os').upsert({key:k,value:JSON.parse(v)},{onConflict:'key'});}catch{}}
        }
      }
      this._emit('ok');
      return true;
    }catch(e){console.warn('Sync:',e.message);_sc=null;this._emit('error');return false;}
  },
  push(k,v){
    if(!_sc)return;
    _sc.from('rity_os').upsert({key:k,value:v,updated_at:new Date().toISOString()},{onConflict:'key'})
      .then(({error})=>{if(!error)this._emit('ok');else this._emit('error');})
      .catch(()=>this._emit('error'));
    this._emit('syncing');
  }
};

const ANTHR_KEY_LS='__anthr_key__';
const getAK=()=>localStorage.getItem(ANTHR_KEY_LS)||'';

async function chamarClaude(systemPrompt,msgs,maxTokens=800){
  const k=getAK();
  if(!k)throw new Error('Chave da IA não configurada. Vá em ⚙️ → IA para configurar.');
  const headers={'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  if(k.startsWith('sk-ant'))headers['x-api-key']=k;
  else headers['Authorization']=`Bearer ${k}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers,
    body:JSON.stringify({model:'claude-sonnet-5',max_tokens:maxTokens,system:systemPrompt,messages:msgs})
  });
  if(!res.ok){const err=await res.text();throw new Error(`API ${res.status}: ${err.slice(0,200)}`);}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||'Erro da API');
  return data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'';
}

function beep(tipo){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notas=tipo==='pausa'?[[660,0,.2],[660,.25,.2]]:[[880,0,.15],[1108,.18,.15],[1320,.36,.25]];
    notas.forEach(([f,d,dur])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+d);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+d+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+dur+.05);
    });
  }catch(e){}
}

function Pomodoro({cor,onFase}){
  const c=cor||'#fbbf24';
  const FASES=[{l:'1ª METADE',d:45*60,e:'📖'},{l:'PAUSA',d:10*60,e:'🚶'},{l:'2ª METADE',d:45*60,e:'✏️'}];
  const[fase,setFase]=useState(0);
  const[secs,setSecs]=useState(FASES[0].d);
  const[rodando,setRodando]=useState(false);
  const[feito,setFeito]=useState(false);
  const endRef=useRef(null);
  const timerRef=useRef(null);
  const disparouRef=useRef(false);
  const cur=FASES[fase];

  const limparTimer=()=>{clearInterval(timerRef.current);timerRef.current=null;};

  useEffect(()=>{
    if(!rodando){limparTimer();return;}
    disparouRef.current=false;
    timerRef.current=setInterval(()=>{
      const r=Math.max(0,Math.round((endRef.current-Date.now())/1000));
      setSecs(r);
      if(r===0&&!disparouRef.current){
        disparouRef.current=true;
        limparTimer();
        setRodando(false);
        setFeito(true);
        beep(fase===1?'pausa':'done');
        if(fase!==1&&onFase)onFase(45);
      }
    },400);
    return limparTimer;
  },[rodando,fase]);

  const iniciar=()=>{endRef.current=Date.now()+secs*1000;setRodando(true);setFeito(false);disparouRef.current=false;};
  const pausar=()=>{limparTimer();setSecs(Math.max(0,Math.round((endRef.current-Date.now())/1000)));endRef.current=null;setRodando(false);};
  const proxFase=()=>{limparTimer();const n=(fase+1)%3;setFase(n);setSecs(FASES[n].d);setRodando(false);setFeito(false);disparouRef.current=false;};
  const irFase=i=>{limparTimer();setFase(i);setSecs(FASES[i].d);setRodando(false);setFeito(false);};
  const reiniciar=()=>{limparTimer();setSecs(cur.d);setRodando(false);setFeito(false);};

  const mm=Math.floor(secs/60);const ss_=secs%60;
  const pct=Math.max(0,Math.min(1,1-secs/cur.d));
  const r=40;const circ=2*Math.PI*r;
  return(
    <div style={{padding:'13px',borderRadius:13,background:`${c}08`,border:`1px solid ${c}22`,marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:4}}>
        <span style={{fontSize:9,letterSpacing:'2px',color:c,fontFamily:"'DM Mono',monospace",fontWeight:800}}>⏱ POMODORO 45·10·45</span>
        <div style={{display:'flex',gap:4}}>
          {FASES.map((f,i)=>(
            <button key={i} onClick={()=>irFase(i)} style={{padding:'2px 7px',borderRadius:4,cursor:'pointer',fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:700,background:fase===i?`${c}22`:'transparent',color:fase===i?c:'#334155',border:`1px solid ${fase===i?c+'44':'rgba(148,163,184,.25)'}`,transition:'all .15s'}}>
              {f.e} {f.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <div style={{position:'relative',width:88,height:88,flexShrink:0}}>
          <svg width="88" height="88" style={{transform:'rotate(-90deg)'}}>
            <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5"/>
            <circle cx="44" cy="44" r={r} fill="none" stroke={feito?'#34d399':c} strokeWidth="5"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
              style={{transition:'stroke-dashoffset .4s linear'}}/>
          </svg>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <div style={{fontSize:19,fontWeight:900,fontFamily:"'DM Mono',monospace",color:feito?'#34d399':rodando?'#fff':c,lineHeight:1}}>{pad(mm)}:{pad(ss_)}</div>
            <div style={{fontSize:8,color:'#64748b',marginTop:1}}>{Math.round(pct*100)}%</div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:700,color:feito?'#34d399':'#c8d0e0',marginBottom:10}}>
            {feito?`✅ ${cur.l} concluída!`:rodando?`${cur.e} ${cur.l}...`:cur.l}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {feito?(
              <button onClick={proxFase} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#34d399,#34d399)',color:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {fase<2?'PRÓXIMA →':'🏆 FEITO'}
              </button>
            ):(
              <button onClick={rodando?pausar:iniciar} style={{padding:'8px 14px',borderRadius:8,border:'none',cursor:'pointer',background:rodando?`${c}18`:`linear-gradient(135deg,${c},${c})`,color:rodando?c:'#050a14',fontSize:11,fontWeight:800,fontFamily:"'DM Mono',monospace"}}>
                {rodando?'⏸ PAUSAR':'▶ INICIAR'}
              </button>
            )}
            <button onClick={reiniciar} style={{padding:'8px 10px',borderRadius:8,border:`1px solid ${c}30`,background:'transparent',color:c,fontSize:11,cursor:'pointer'}}>↺</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ MOTOR REVISÃO 2.0 — cada sub-aba com critério próprio ═══════════════
// Heurística por padrão — funciona em QUALQUER título (EDITAL ou Guruja), já que os dois
// usam nomenclaturas diferentes e não batem por string exata. Detecta lei/artigo/decreto/
// número de norma = decoreba (memorização de referência); resto = raciocínio.
const PADROES_DECOREBA=[/\bLei\b/i,/\bLC\b/,/\bDecreto\b/i,/\bInstrução\b/i,/\bResolução\b/i,
  /art\.?\s?\d/i,/arts?\.?\s?\d/i,/§/,/\d{3,4}\/\d{2,4}/,/CGSN/,/\bCP\b/,/CF\/88/,
  /LREF/,/Espécies de/i,/Impostos/i,/Crimes contra/i,/Precatórios/i,/Regimento Interno/i,/UNCAC/,/OCDE/];
const isDecorebaHeuristico=titulo=>PADROES_DECOREBA.some(p=>p.test(titulo));

// Peso de risco por gate — Gerais tem margem pequena (20q, corte 12 = 8 de folga);
// Discursiva é eliminatória e sem chute; Específicos tem folga maior (60q, corte 36).
function pesoGate(mat){
  const g=EDITAL[mat];
  if(!g)return 1;
  if(g.bloco==='discursiva')return 1.4;
  if(g.bloco==='gerais')return 1.5;
  return 1;
}

// ── 1. QUESTÕES — pior desempenho ponderado dos últimos 7 dias (ontem pesa 3x) ──
function calcQuestoesPrioridade(historico){
  const todayMs=new Date().setHours(0,0,0,0);
  const janela=[];
  for(let i=1;i<=7;i++){const diaMs=todayMs-i*86400000;const peso=i===1?3:i<=3?2:1;janela.push({diaMs,peso});}
  const porMat={};
  historico.forEach(r=>{
    if(!r.materia||!r.dt)return;
    const diaMs=new Date(r.dt).setHours(0,0,0,0);
    const j=janela.find(jj=>jj.diaMs===diaMs);
    if(!j)return;
    const q=parseInt(r.questoes)||0,a=parseInt(r.acertei)||0;
    if(q<=0)return;
    if(!porMat[r.materia])porMat[r.materia]={qp:0,ap:0,q:0};
    porMat[r.materia].qp+=q*j.peso;porMat[r.materia].ap+=a*j.peso;porMat[r.materia].q+=q;
  });
  const ranking=Object.entries(porMat)
    .filter(([,v])=>v.q>=10)
    .map(([mat,v])=>({mat,pct:Math.round(v.ap/v.qp*100),questoes:v.q,peso:pesoGate(mat)}))
    .sort((a,b)=>(a.pct/a.peso)-(b.pct/b.peso));
  return{top:ranking[0]||null,ranking};
}

// ── 2. MEMORIZAÇÃO — fila fixa de todas as matérias do edital por dificuldade pessoal ──
// Matéria sem dado real (null) = tratada como DIFÍCIL (sobe na fila), não como fácil.
function calcFilaMemorizacao(){
  const guruja=getGurujaAssuntos();
  const lastAnkiMat={};
  lsGet('rev_anki',[]).forEach(r=>{if(r.mat&&(r.dt||0)>(lastAnkiMat[r.mat]||0))lastAnkiMat[r.mat]=r.dt||0;});
  const hojeMs=new Date().setHours(0,0,0,0);
  const fila=EDITAL_MATS.map(mat=>{
    let pct=null;
    if(guruja[mat]){
      const comDado=(guruja[mat].assuntos||[]).filter(a=>a.acerto!=null);
      if(comDado.length)pct=Math.round(comDado.reduce((s,a)=>s+a.acerto,0)/comDado.length);
    }
    if(pct===null){
      const tops=(EDITAL[mat]?.top||[]).filter(t=>t.acerto!=null);
      if(tops.length)pct=Math.round(tops.reduce((s,t)=>s+t.acerto,0)/tops.length);
    }
    // sem dado = incerteza alta = prioridade alta (dificuldade fictícia 40, abaixo da maioria medida)
    const dificuldade=pct===null?40:pct;
    const jaHoje=(lastAnkiMat[mat]||0)>=hojeMs;
    return{mat,pct,dificuldade,semDado:pct===null,lastAnki:lastAnkiMat[mat]||0,jaHoje};
  }).sort((a,b)=>a.dificuldade-b.dificuldade||pesoGate(b.mat)-pesoGate(a.mat));
  const candidatos=fila.filter(f=>!f.jaHoje).sort((a,b)=>a.lastAnki-b.lastAnki);
  return{filaCompleta:fila,hoje:candidatos[0]||fila[0]};
}

// ── 3. PASSIVA — decoreba + dificuldade das matérias jurídicas, ponderado pelo peso do gate ──
// Prioriza os tópicos REAIS que você importou do Guruja (mais granular, muda quando você
// alimenta) e só cai pro EDITAL fixo quando ainda não há nada seu importado pra essa matéria.
function calcPassivaJuridica(){
  const guruja=getGurujaAssuntos();
  const itens=[];
  MATS_JURIDICAS.forEach(mat=>{
    const gurujaTopicos=guruja[mat]?.assuntos;
    const usaGuruja=gurujaTopicos&&gurujaTopicos.length>0;
    const fonte=usaGuruja
      ?gurujaTopicos.map(a=>({titulo:a.titulo,acerto:a.acerto}))
      :(EDITAL[mat]?.top||[]).map(t=>({titulo:t.t,acerto:t.acerto}));
    fonte.forEach(t=>{
      const decoreba=isDecorebaHeuristico(t.titulo);
      const semDado=t.acerto==null;
      const acerto=semDado?55:t.acerto;
      const risco=Math.round((100-acerto)*pesoGate(mat)*(decoreba?1.3:1));
      itens.push({mat,titulo:t.titulo,decoreba,acerto:t.acerto,semDado,risco,critico:t.acerto!=null&&t.acerto<50,origem:usaGuruja?'Guruja':'EDITAL'});
    });
  });
  return itens.sort((a,b)=>b.risco-a.risco);
}

// ── 4. PROFUNDA — tópicos <80%, ranqueados por URGÊNCIA real p/ nota final ──
// Score = distância do teto (80-acerto) × peso do gate × severidade (buraco fundo sangra mais)
function calcProfunda80(){
  const guruja=getGurujaAssuntos();
  const abaixo=[];
  const push=(mat,titulo,acerto,fonte)=>{
    const distancia=80-acerto;
    const buracoFundo=acerto<50?1.8:acerto<60?1.3:1;
    const score=Math.round(distancia*pesoGate(mat)*buracoFundo);
    abaixo.push({mat,titulo,acerto,fonte,score,critico:acerto<50});
  };
  Object.entries(guruja).forEach(([mat,dados])=>{
    (dados.assuntos||[]).forEach(a=>{if(a.acerto!=null&&a.acerto<80)push(mat,a.titulo,a.acerto,'Guruja');});
  });
  EDITAL_MATS.forEach(mat=>{
    (EDITAL[mat]?.top||[]).forEach(t=>{
      if(t.acerto!=null&&t.acerto<80&&!abaixo.some(x=>x.mat===mat&&x.titulo===t.t))push(mat,t.t,t.acerto,'EDITAL');
    });
  });
  return abaixo.sort((a,b)=>b.score-a.score);
}

// ── 5. ESTRATÉGIA — painel semanal: delta, cobertura do edital, decisão sugerida ──
function calcEstrategiaSemanal(){
  const hist=lsGet('historico_diario',[]);
  const now=new Date();
  const diaSemana=now.getDay();
  const inicioSemAtual=new Date(now);inicioSemAtual.setHours(0,0,0,0);inicioSemAtual.setDate(now.getDate()-diaSemana);
  const inicioSemAnt=new Date(inicioSemAtual);inicioSemAnt.setDate(inicioSemAtual.getDate()-7);
  const porSemana=(ini,fim)=>{
    const porMat={};
    hist.forEach(r=>{
      if(!r.materia||!r.dt||r.dt<ini||r.dt>=fim)return;
      const q=parseInt(r.questoes)||0,a=parseInt(r.acertei)||0;
      if(q<=0)return;
      if(!porMat[r.materia])porMat[r.materia]={q:0,a:0};
      porMat[r.materia].q+=q;porMat[r.materia].a+=a;
    });
    return porMat;
  };
  const semAtual=porSemana(inicioSemAtual.getTime(),now.getTime()+1);
  const semAnt=porSemana(inicioSemAnt.getTime(),inicioSemAtual.getTime());
  const delta=Object.keys({...semAtual,...semAnt}).map(mat=>{
    const pctA=semAtual[mat]&&semAtual[mat].q>0?Math.round(semAtual[mat].a/semAtual[mat].q*100):null;
    const pctB=semAnt[mat]&&semAnt[mat].q>0?Math.round(semAnt[mat].a/semAnt[mat].q*100):null;
    return{mat,pctAtual:pctA,pctAnterior:pctB,delta:(pctA!=null&&pctB!=null)?pctA-pctB:null};
  }).filter(d=>d.delta!==null).sort((a,b)=>a.delta-b.delta);

  const editalStatus=lsGet('edital_status',{});
  const cobertura=EDITAL_MATS.map(mat=>{
    const tops=EDITAL[mat]?.top||[];
    if(!tops.length)return{mat,pct:100,total:0,tocados:0};
    const tocados=tops.filter(t=>editalStatus[mat+':'+t.t]).length;
    return{mat,pct:Math.round(tocados/tops.length*100),total:tops.length,tocados};
  }).sort((a,b)=>a.pct-b.pct);

  const zeroBase=cobertura.filter(c=>c.pct===0&&c.total>0).sort((a,b)=>pesoGate(b.mat)-pesoGate(a.mat));
  const decisao=zeroBase[0]?{mat:zeroBase[0].mat,texto:`${zeroBase[0].mat} — 0% do edital tocado ainda. Entra essa semana?`}:null;
  return{delta,cobertura,decisao};
}

// Retorna mapa { "Mat — Tópico": { q, a, pct } } do histórico real
function calcAcertoPorAssunto(){
  const hist=lsGet('historico_diario',[]);
  const por={};
  hist.forEach(r=>{
    if(!r.materia||!r.assunto)return;
    const q=parseInt(r.questoes)||0;
    const a=parseInt(r.acertei)||0;
    if(!q)return;
    const k=r.materia+'|||'+r.assunto;
    if(!por[k])por[k]={q:0,a:0,mat:r.materia,assunto:r.assunto,lastDt:0};
    por[k].q+=q; por[k].a+=a;
    if((r.dt||0)>por[k].lastDt)por[k].lastDt=r.dt||0;
  });
  return por;
}

// Calcula score de perigo: peso_topico × (1 - acerto) × fator_tempo
// score alto = tópico que cai muito + você está indo mal + faz tempo que não toca
function calcScorePerigo(pesoTopico, acertoPct, lastDtMs){
  const deficit = 1 - (acertoPct !== null ? acertoPct/100 : 0.7); // sem dado = assume 30% acerto
  const diasSem = Math.min(Math.floor((Date.now()-(lastDtMs||0))/86400000), 60);
  const fatorTempo = 1 + diasSem*0.02; // cada dia parado aumenta 2% o perigo
  return pesoTopico * deficit * fatorTempo;
}

// Retorna top N tópicos mais perigosos cruzando EDITAL × histórico real
function calcTop5Perigos(n=5){
  const porAssunto=calcAcertoPorAssunto();
  const todayMs=new Date().setHours(0,0,0,0);
  const perigos=[];
  EDITAL_MATS.forEach(mat=>{
    const dados=EDITAL[mat];
    dados.top.forEach(topico=>{
      const k=mat+'|||'+topico.t;
      const reg=porAssunto[k]||null;
      const acerto=reg?Math.round(reg.a/reg.q*100):null;
      const lastDt=reg?.lastDt||0;
      const score=calcScorePerigo(topico.p, acerto, lastDt);
      const diasSem=Math.floor((todayMs-(lastDt||0))/86400000);
      perigos.push({mat,topico:topico.t,pesoEdital:topico.p,acerto,score,diasSem,temDado:!!reg});
    });
  });
  return perigos.sort((a,b)=>b.score-a.score).slice(0,n);
}

// Retorna ranking de matérias com pontos em risco
function calcPontosEmRisco(){
  const hist=lsGet('historico_diario',[]);
  const porMat={};
  hist.forEach(r=>{
    if(!r.materia||!parseInt(r.questoes))return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0};
    porMat[r.materia].q+=parseInt(r.questoes)||0;
    porMat[r.materia].a+=parseInt(r.acertei)||0;
  });
  return EDITAL_MATS.map(mat=>{
    const reg=porMat[mat]||null;
    const acerto=reg&&reg.q>0?Math.round(reg.a/reg.q*100):null;
    const topPeso=EDITAL[mat].top.reduce((s,t)=>s+t.p,0); // soma dos tops
    const deficit=acerto!==null?(100-acerto)/100:0.5;
    const pontosRisco=Math.round(topPeso*deficit*10)/10;
    const pontosGarantidos=acerto!==null?Math.round(topPeso*(acerto/100)*10)/10:null;
    return{mat,acerto,pontosRisco,pontosGarantidos,topPeso,temDado:!!reg};
  }).sort((a,b)=>b.pontosRisco-a.pontosRisco);
}

// ── SAÚDE DA SEMANA — score composto 0-10 ────────────────────
function calcSaude(){
  const hoje=getDK();
  const todayMs=new Date().setHours(0,0,0,0);
  const semStart=todayMs-6*86400000;

  // Fator 1: Meta de horas (peso 2)
  const horas=lsGet('horas',[]);
  const minSem=horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0);
  const metaH=lsGet('meta_horas_sem',35)*60;
  const pctMeta=metaH>0?minSem/metaH:0;
  const f1=pctMeta>=0.8?2:pctMeta>=0.5?1:0;
  const f1label=pctMeta>=0.8?'✅':pctMeta>=0.5?'⚠️':'🔴';

  // Fator 2: Revisão TEC em dia (itens difíceis acumulados sem resolver)
  const caderno=lsGet('rev_caderno',[]);
  const todayStr=new Date().toISOString().split('T')[0];
  const atrasados=caderno.filter(t=>!t.dominado&&(t.dificuldade||3)>=4).length;
  const f2=atrasados===0?2:atrasados<=2?1:0;
  const f2label=atrasados===0?'✅':atrasados<=2?'⚠️':'🔴';

  // Fator 3: Sequência de Anki (dias seguidos)
  let sequenciaAnki=0;
  for(let i=0;i<7;i++){
    const d=new Date(todayMs-i*86400000);
    const dk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(lsGet(`anki_feito_${dk}`,null))sequenciaAnki++;
    else break;
  }
  const f3=sequenciaAnki>=3?2:sequenciaAnki>=1?1:0;
  const f3label=sequenciaAnki>=3?'✅':sequenciaAnki>=1?'⚠️':'🔴';

  // Fator 4: Matérias críticas sem contato há 7+ dias
  const hist=lsGet('historico_diario',[]);
  const sete=todayMs-7*86400000;
  const porMat={};
  hist.forEach(r=>{
    if(!r.materia||!parseInt(r.questoes))return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,lastDt:0};
    porMat[r.materia].q+=parseInt(r.questoes)||0;
    porMat[r.materia].a+=parseInt(r.acertei)||0;
    if((r.dt||0)>porMat[r.materia].lastDt)porMat[r.materia].lastDt=r.dt||0;
  });
  const criticasSemContato=Object.entries(porMat).filter(([,v])=>{
    const pct=v.q>0?Math.round(v.a/v.q*100):100;
    return pct<70&&v.lastDt<sete;
  }).length;
  const f4=criticasSemContato===0?2:criticasSemContato<=2?1:0;
  const f4label=criticasSemContato===0?'✅':criticasSemContato<=2?'⚠️':'🔴';

  // Fator 5: Travamentos na semana
  const travamentos=hist.filter(r=>r.travou&&(r.dt||0)>=semStart).length;
  const f5=travamentos<=1?2:travamentos<=3?1:0;
  const f5label=travamentos<=1?'✅':travamentos<=3?'⚠️':'🔴';

  const score=f1+f2+f3+f4+f5;
  const nivel=score>=8?'ÓTIMA':score>=6?'BOA':score>=4?'ATENÇÃO':'RISCO';
  const cor=score>=8?'#34d399':score>=6?'#a3e635':score>=4?'#fbbf24':'#f87171';
  const emoji=score>=8?'💚':score>=6?'🟢':score>=4?'🟡':'🔴';

  return{
    score,nivel,cor,emoji,
    fatores:[
      {k:'Meta',label:f1label,detalhe:`${Math.round(pctMeta*100)}% da meta (${Math.floor(minSem/60)}h/${lsGet('meta_horas_sem',35)}h)`,val:f1},
      {k:'TEC',label:f2label,detalhe:`${atrasados} revisão(ões) atrasada(s)`,val:f2},
      {k:'Anki',label:f3label,detalhe:`${sequenciaAnki} dia(s) seguidos`,val:f3},
      {k:'Críticas',label:f4label,detalhe:`${criticasSemContato} matéria(s) crítica(s) sem contato`,val:f4},
      {k:'Travou',label:f5label,detalhe:`${travamentos} travamento(s) esta semana`,val:f5},
    ]
  };
}

// ── Helpers de aproveitamento ──────────────────────────────────
function calcRankingAproveitamento(){
  const historico=lsGet('historico_diario',[]);
  const difBase=lsGet('dif_base_materias',{});
  const porMat={};

  // Grupo 1: matérias com questões reais
  historico.forEach(r=>{
    if(!r.materia)return;
    const q=parseInt(r.questoes)||0;
    const a=parseInt(r.acertei)||0;
    if(!q)return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,temDado:true};
    porMat[r.materia].q+=q;
    porMat[r.materia].a+=a;
  });

  // Grupo 2: matérias sem questões mas com dificuldade base definida
  Object.entries(difBase).forEach(([mat,dif])=>{
    if(porMat[mat])return; // já tem dado real, ignora
    if(!dif)return;
    // Converte dif 1-5 em % equivalente: 5⭐=0%, 4⭐=30%, 3⭐=55%, 2⭐=75%, 1⭐=90%
    const pctEquiv=[90,75,55,30,0][dif-1];
    porMat[mat]={q:null,a:null,pct:pctEquiv,temDado:false,difBase:dif};
  });

  // Monta ranking
  const comDado=Object.entries(porMat)
    .filter(([,v])=>v.temDado)
    .map(([mat,v])=>{
      const pct=Math.round(v.a/v.q*100);
      const label=pct>=85?'🟢 SÓLIDO':pct>=70?'🟡 ATENÇÃO':'🔴 CRÍTICO';
      return{mat,pct,q:v.q,label,temDado:true};
    })
    .sort((a,b)=>a.pct-b.pct);

  const semDado=Object.entries(porMat)
    .filter(([,v])=>!v.temDado)
    .map(([mat,v])=>{
      const label=v.pct<=30?'🔴 CRÍTICO (base)':v.pct<=55?'🟡 ATENÇÃO (base)':'🟢 OK (base)';
      return{mat,pct:v.pct,difBase:v.difBase,label,temDado:false};
    })
    .sort((a,b)=>a.pct-b.pct);

  return{comDado,semDado};
}

function fmtRanking(){
  const{comDado,semDado}=calcRankingAproveitamento();
  const escala='ESCALA: ≥85%=SÓLIDO · 70-84%=ATENÇÃO · <70%=CRÍTICO';
  const parteComDado=comDado.length
    ? 'COM QUESTÕES (pior→melhor): '+comDado.map(r=>`${r.label} ${r.mat} ${r.pct}%(${r.q}Q)`).join(' | ')
    : 'Sem questões registradas ainda';
  const parteSemDado=semDado.length
    ? 'SEM QUESTÕES (dif base): '+semDado.map(r=>`${r.label} ${r.mat} dif${r.difBase}⭐`).join(' | ')
    : '';
  return [escala,parteComDado,parteSemDado].filter(Boolean).join(' || ');
}

  async function enviar(texto){
    if(carregando||!texto.trim())return;
    setCarregando(true);
    const nova=[...hist,{role:'user',content:texto}];
    setHist(nova);lsSet('ia_hist',nova);
    try{
      const resposta=await chamarClaude(buildSystem(),nova.slice(-18));
      const mitMatch=resposta.match(/MIT:\["([^"]+)","([^"]+)","([^"]+)"\]/);
      if(mitMatch)onMIT([mitMatch[1],mitMatch[2],mitMatch[3]]);
      const limpo=resposta.replace(/MIT:\[.*?\]/g,'').trim();
      const nova2=[...nova,{role:'assistant',content:limpo}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }catch(e){
      const nova2=[...nova,{role:'assistant',content:`❌ ${e.message}`}];
      setHist(nova2);lsSet('ia_hist',nova2);
    }
    setCarregando(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  const gerarExporte=()=>{
    const hist=lsGet('historico_diario',[]);

    const nlm=lsGet('rev_nlm',[]);

    const criticos=lsGet('criticos_manuais',[]);
    const d=new Date();

    // Aproveitamento por matéria
    const porMat={};
    hist.forEach(r=>{
      if(!r.materia)return;
      const q=parseInt(r.questoes)||0;const a=parseInt(r.acertei)||0;
      if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,travou:[],assuntos:{}};
      if(q){porMat[r.materia].q+=q;porMat[r.materia].a+=a;}
      if(r.travou)porMat[r.materia].travou.push(r.travou);
      if(r.assunto&&q){
        const k=r.assunto;
        if(!porMat[r.materia].assuntos[k])porMat[r.materia].assuntos[k]={q:0,a:0};
        porMat[r.materia].assuntos[k].q+=q;
        porMat[r.materia].assuntos[k].a+=a;
      }
    });

    // Horas por matéria
    const porHoras={};
    horas.forEach(e=>{
      const m=e.mat||'Geral';
      porHoras[m]=(porHoras[m]||0)+e.min;
    });

    // Monta texto
    let txt=`═══════════════════════════════════════
RITY OS — EXPORTAÇÃO PARA IA
${d.toLocaleDateString('pt-BR')} · Ciclo ${appCtx.cicloNum} · Blocos ${appCtx.feitosN}/${N}
═══════════════════════════════════════

📊 APROVEITAMENTO POR MATÉRIA
Escala: ≥85% SÓLIDO · 70-84% ATENÇÃO · <70% CRÍTICO
───────────────────────────────────────
`;

    const ranking=Object.entries(porMat)
      .filter(([,v])=>v.q>0)
      .map(([mat,v])=>({mat,pct:Math.round(v.a/v.q*100),q:v.q,a:v.a,travou:v.travou,assuntos:v.assuntos}))
      .sort((a,b)=>a.pct-b.pct);

    ranking.forEach(r=>{
      const label=r.pct>=85?'🟢 SÓLIDO':r.pct>=70?'🟡 ATENÇÃO':'🔴 CRÍTICO';
      txt+=`${label} ${r.mat}: ${r.pct}% (${r.a}/${r.q}Q)
`;
      // Assuntos
      const assRank=Object.entries(r.assuntos)
        .map(([ass,v])=>({ass,pct:Math.round(v.a/v.q*100),q:v.q}))
        .sort((a,b)=>a.pct-b.pct);
      assRank.forEach(a=>{
        const al=a.pct>=85?'✅':a.pct>=70?'⚠️':'❌';
        txt+=`   ${al} ${a.ass}: ${a.pct}% (${a.q}Q)
`;
      });
      // O que travou
      if(r.travou.length>0){
        const uniq=[...new Set(r.travou)];
        txt+=`   🔴 Travou: ${uniq.slice(0,3).join('; ')}
`;
      }
    });

    // Matérias sem questões com dif base
    const semQuestoes=Object.entries(difBase).filter(([mat])=>!porMat[mat]||!porMat[mat].q);
    if(semQuestoes.length>0){
      txt+=`
📌 SEM QUESTÕES — DIFICULDADE BASE
───────────────────────────────────────
`;
      semQuestoes.forEach(([mat,dif])=>{
        const label=dif>=4?'🔴 CRÍTICO':dif>=3?'🟡 ATENÇÃO':'🟢 OK';
        txt+=`${label} ${mat}: dif base ${dif}⭐
`;
      });
    }

    // Horas por matéria
    txt+=`
⏱ HORAS POR MATÉRIA (total)
───────────────────────────────────────
`;
    Object.entries(porHoras)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,12)
      .forEach(([mat,min])=>{
        const h=Math.floor(min/60);const m2=min%60;
        txt+=`${mat}: ${h>0?h+'h':''}${m2>0?m2+'min':''}
`;
      });

    // Status do edital
    const matsEdital=EDITAL_MATS;
    txt+=`
📋 STATUS DO EDITAL
───────────────────────────────────────
`;
    matsEdital.forEach(mat=>{
      const tops=EDITAL[mat].top;
      const dom=tops.filter(t=>editalSt[mat+':'+t.t]==='domino').length;
      const est=tops.filter(t=>editalSt[mat+':'+t.t]==='estudei').length;
      if(dom>0||est>0){
        txt+=`${mat}: ✅${dom} domino · 🟡${est} estudei · ⬜${tops.length-dom-est} pendente
`;
        tops.filter(t=>editalSt[mat+':'+t.t]==='estudei').forEach(t=>{
          txt+=`   🟡 ${t.t} (${t.p}%)
`;
        });
      }
    });

    // Pontos críticos manuais
    if(criticos.length>0){
      txt+=`
🎯 PONTOS CRÍTICOS MANUAIS
───────────────────────────────────────
`;
      criticos.forEach(c2=>{
        txt+=`${c2.prioridade==='alta'?'🔴':c2.prioridade==='media'?'🟡':'🟢'} ${c2.mat}`;

        txt+='\n';

    }

    // Ciclo atual
    txt+=`
🔄 CICLO ATUAL — BLOCOS PENDENTES
───────────────────────────────────────
`;
    const feitos=lsGet('feitos',[]);
    const feitosSet=new Set(feitos);
    CICLO.filter(s=>!feitosSet.has(s.id)).forEach(s=>{
      txt+=`B${s.id} ${s.mat} — ${s.conteudo||s.tag||''}
`;

    // Guruja
    if(gurujaData?.alerta){
      txt+=`
📊 GURUJA
───────────────────────────────────────
`;
      txt+=`Alerta: ${gurujaData.alerta}
`;
    }

    // Anki
    const ankiRegs=lsGet('rev_anki',[]);
    if(ankiRegs.length>0){
      txt+=`
🃏 ANKI — ${ankiRegs.length} sessões
───────────────────────────────────────
`;
      const porAnki={};
      ankiRegs.forEach(r=>{
        if(!r.mat)return;
        if(!porAnki[r.mat])porAnki[r.mat]={s:0,cards:0,q:0,difs:[],last:''};
        porAnki[r.mat].s++;porAnki[r.mat].cards+=parseInt(r.cards)||0;
        porAnki[r.mat].q+=parseInt(r.questoes)||0;
        if(r.dif)porAnki[r.mat].difs.push(r.dif);

      });
      Object.entries(porAnki).sort((a,b)=>(b[1].difs.reduce((s,d)=>s+d,0)/(b[1].difs.length||1))-(a[1].difs.reduce((s,d)=>s+d,0)/(a[1].difs.length||1)))
        .forEach(([mat,v])=>{
          const dm=v.difs.length?(v.difs.reduce((s,d)=>s+d,0)/v.difs.length).toFixed(1):'-';
          const lbl=parseFloat(dm)>=4?'🔴':parseFloat(dm)>=3?'🟡':'🟢';
          txt+=`${lbl} ${mat}: ${v.s} sessões · ${v.cards} cards · ${v.q}Q · dif ${dm}★ · último: ${v.last}
`;
        });
    }

    // NLM
    const nlmRegs=lsGet('rev_nlm',[]);
    if(nlmRegs.length>0){
      txt+=`
🎧 NOTEBOOKLM — ${nlmRegs.length} sessões
───────────────────────────────────────
`;
      const porNlm={};
      nlmRegs.forEach(r=>{
        if(!r.mat)return;
        if(!porNlm[r.mat])porNlm[r.mat]={s:0,min:0,difs:[],oque:[],last:''};
        porNlm[r.mat].s++;porNlm[r.mat].min+=parseInt(r.tempo)||0;
        if(r.dif)porNlm[r.mat].difs.push(r.dif);
        if(r.oque&&!porNlm[r.mat].oque.includes(r.oque))porNlm[r.mat].oque.push(r.oque);
        if(r.dia>porNlm[r.mat].last)porNlm[r.mat].last=r.dia;
      });
      Object.entries(porNlm).sort((a,b)=>(b[1].difs.reduce((s,d)=>s+d,0)/(b[1].difs.length||1))-(a[1].difs.reduce((s,d)=>s+d,0)/(a[1].difs.length||1)))
        .forEach(([mat,v])=>{
          const dm=v.difs.length?(v.difs.reduce((s,d)=>s+d,0)/v.difs.length).toFixed(1):'-';
          const lbl=parseFloat(dm)>=4?'🔴':parseFloat(dm)>=3?'🟡':'🟢';
          const h=Math.floor(v.min/60);const m2=v.min%60;

    // Revisão 1h30

// MatBtn — seletor de matéria reutilizável (global para não recriar em cada render)
const MATS_GLOBAL=()=>CICLO.map(s=>s.mat).filter((v,i,a)=>a.indexOf(v)===i);
function MatBtn({value,onChange,placeholder}){
  const mats=MATS_GLOBAL();
  const isPreset=mats.includes(value);
  return(
    <div>
      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:5}}>
        {mats.map(m=>(
          <button key={m} onClick={()=>onChange(m)} style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${value===m?'#60a5fa':'rgba(148,163,184,.2)'}`,background:value===m?'rgba(96,165,250,.18)':'transparent',color:value===m?'#60a5fa':'#64748b',fontSize:9,cursor:'pointer'}}>{m}</button>
        ))}
      </div>
      <input
        value={isPreset?'':value}
        onChange={e=>onChange(e.target.value)}
        placeholder={placeholder||'Ou digitar matéria...'}
        style={{width:'100%',padding:'7px 10px',borderRadius:7,border:'1px solid rgba(96,165,250,.15)',background:'rgba(96,165,250,.03)',color:'#f1f5f9',fontSize:11,outline:'none',boxSizing:'border-box'}}
      />
    </div>
  );
}

// Retorna dados do Guruja: seed + dados importados pelo usuário (usuário vence)
function getGurujaAssuntos(){
  const importados=lsGet('guruja_assuntos',{});
  return{...GURUJA_SEED,...importados};
}

// Score de urgência por assunto: acerto baixo + abaixo da média + relevância alta
function calcScoreAssunto(a){
  const deficitAcerto=(1-a.acerto/100)*3;
  const penalMedia=a.diffMedia<0?Math.abs(a.diffMedia)*0.2:0; // negativo = urgente
  const bonusRel=a.relevancia*0.3;
  return deficitAcerto+penalMedia+bonusRel;
}

// Retorna assuntos críticos de uma matéria (acerto <80% ou diffMedia negativa)
function getAssuntosCriticos(mat,n=5){
  const dados=getGurujaAssuntos();
  const assuntos=dados[mat]?.assuntos||[];
  return assuntos
    .map(a=>({...a,score:calcScoreAssunto(a)}))
    .sort((a,b)=>b.score-a.score)
    .filter(a=>a.acerto<80||a.diffMedia<0)
    .slice(0,n);
}

// Retorna assuntos de manutenção de uma matéria (acerto ≥80% + diffMedia positiva ou neutra)
function getAssuntosManutencao(mat,n=5){
  const dados=getGurujaAssuntos();
  const assuntos=dados[mat]?.assuntos||[];
  return assuntos
    .filter(a=>a.acerto>=80)
    .sort((a,b)=>a.acerto-b.acerto) // menor acerto primeiro entre os bons
    .slice(0,n);
}

// ── MOTOR UNIFICADO: Forma 1 (roteamento por canal) + Forma 4 (penalidade de ausência) ──
// Cada canal tem lógica própria e memória de quando cada matéria apareceu nele.
// Penalidade: quanto mais dias sem aparecer naquele canal, maior o score naquele canal.

function _buildBaseMat(historico){
  // Constrói mapa base por matéria com todos os dados necessários
  const todayMs=new Date().setHours(0,0,0,0);
  const semStart=todayMs-7*86400000;
  const porMat={};
  const allMats=CICLO.map(s=>s.mat).filter((v,i,a)=>a.indexOf(v)===i);
  allMats.forEach(m=>{porMat[m]={q:0,a:0,difs:[],travou:0,lastDt:0,lastAnki:0,lastNlm:0,lastRev1h:0};});
  historico.slice(-60).forEach(r=>{
    if(!r.materia)return;
    if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,difs:[],travou:0,lastDt:0,lastAnki:0,lastNlm:0,lastRev1h:0};
    const v=porMat[r.materia];
    if(parseInt(r.questoes)>0){v.q+=parseInt(r.questoes)||0;v.a+=parseInt(r.acertei)||0;}
    if(r.dificuldade)v.difs.push(r.dificuldade);
    if((r.dt||0)>v.lastDt)v.lastDt=r.dt||0;
    if(r.travou&&(r.dt||0)>=semStart)v.travou++;
  });
  const ankiRegs=lsGet('rev_anki',[]);
  ankiRegs.forEach(r=>{if(r.mat&&porMat[r.mat]&&(r.dt||0)>porMat[r.mat].lastAnki)porMat[r.mat].lastAnki=r.dt||0;});
  const nlmRegs=lsGet('rev_nlm',[]);
  nlmRegs.forEach(r=>{if(r.mat&&porMat[r.mat]&&(r.dt||0)>porMat[r.mat].lastNlm)porMat[r.mat].lastNlm=r.dt||0;});
  const rev1h30=lsGet('rev_1h30',[]);
  rev1h30.forEach(reg=>{(reg.slots||[]).forEach(s=>{if(s.mat&&porMat[s.mat]&&(reg.dt||0)>porMat[s.mat].lastRev1h)porMat[s.mat].lastRev1h=reg.dt||0;});});
  return{porMat,todayMs};
}

function calcMotorCanais(feitos,horas,historico){
  const{porMat,todayMs}=_buildBaseMat(historico);

  const diasSem=(lastDt)=>{
    if(!lastDt)return null; // sem dado — nunca registrado neste canal
    return Math.min(Math.floor((todayMs-lastDt)/86400000),60);
  };
  // Para score: usa 30 dias como padrão quando sem dado (incentiva rotação sem distorcer)
  const diasSemScore=(lastDt)=>diasSem(lastDt)??30;
  const deficit=(v)=>v.q>0?(1-v.a/v.q):0.5; // sem dado = assume 50% déficit
  const difMedia=(v)=>v.difs.length?v.difs.reduce((s,d)=>s+d,0)/v.difs.length:2.5;
  const pesoEdital=(mat)=>{
    const tops=EDITAL[mat]?.top||[];
    return tops.reduce((s,t)=>s+t.p,0)/100; // normalizado 0-1
  };

  // ── CANAL ANKI — Forma 3: baseado exclusivamente no historico_diario ──
  // Slot 1: menor % de acerto, não apareceu no historico nos últimos 7 dias — 35 cards
  // Slot 2: dos 3 últimos registros, o de maior dificuldade declarada — 20 cards
  // Slot 3: matéria há mais tempo sem aparecer no historico (ou nunca) — 20 cards
  // Regra: as 3 devem ser obrigatoriamente diferentes

  const set7dias=todayMs-7*86400000;
  const set3dias=todayMs-3*86400000;
  const todasMats=CICLO.map(s=>s.mat).filter((v,i,a)=>a.indexOf(v)===i);

  // Acumulado por matéria (últimos 60 dias)
  const acumMat={};
  historico.slice(-120).forEach(r=>{
    if(!r.materia)return;
    if(!acumMat[r.materia])acumMat[r.materia]={q:0,a:0,dif:[],lastDt:0,ultRegs:[]};
    const q=parseInt(r.questoes)||0;
    const a=parseInt(r.acertei)||0;
    if(q>0){acumMat[r.materia].q+=q;acumMat[r.materia].a+=a;}
    if(r.dificuldade)acumMat[r.materia].dif.push(r.dificuldade);
    if((r.dt||0)>acumMat[r.materia].lastDt)acumMat[r.materia].lastDt=r.dt||0;
    acumMat[r.materia].ultRegs.push(r);
  });

  // Mapa de última vez que cada matéria apareceu no canal Anki (rev_anki)
  const lastAnkiMat={};
  lsGet('rev_anki',[]).forEach(r=>{
    if(r.mat&&(r.dt||0)>(lastAnkiMat[r.mat]||0))lastAnkiMat[r.mat]=r.dt||0;
  });

  // SLOT 1: pior acerto, priorizando matérias que não foram Anki nos últimos 3 dias
  // Janela: começa em 3d no canal Anki, relaxa para 0 se não encontrar
  let slot1=null;
  for(const janela of[set3dias,0]){
    const candidatas=todasMats
      .map(mat=>{
        const v=acumMat[mat]||{q:0,a:0,lastDt:0};
        const pct=v.q>0?Math.round(v.a/v.q*100):null;
        const fezAnkiRecente=(lastAnkiMat[mat]||0)>=(janela);
        return{mat,pct,lastDt:v.lastDt,fezAnkiRecente};
      })
      .filter(r=>!r.fezAnkiRecente&&r.pct!==null)
      .sort((a,b)=>a.pct-b.pct);
    if(candidatas.length){slot1=candidatas[0];break;}
  }
  // Fallback slot1: matéria com pior acerto sem restrição
  if(!slot1){
    const fb=todasMats
      .map(mat=>{const v=acumMat[mat]||{q:0,a:0};const pct=v.q>0?Math.round(v.a/v.q*100):null;return{mat,pct,lastDt:v.lastDt||0};})
      .filter(r=>r.pct!==null)
      .sort((a,b)=>a.pct-b.pct)[0];
    slot1=fb||{mat:todasMats[0],pct:null,lastDt:0};
  }

  // SLOT 2: matéria com maior dificuldade média E que não foi Anki nos últimos 2 dias, diferente do slot1
  const set2dias=todayMs-2*86400000;
  let slot2=null;
  {
    const cands=todasMats
      .filter(m=>m!==slot1?.mat)
      .map(mat=>{
        const regs=historico.filter(r=>r.materia===mat&&r.dificuldade);
        const difMedia=regs.length?regs.reduce((s,r)=>s+r.dificuldade,0)/regs.length:0;
        const v=acumMat[mat]||{q:0,a:0};
        const pct=v.q>0?Math.round(v.a/v.q*100):50;
        const score=difMedia>0?difMedia:(1-pct/100)*5;
        const fezAnkiRecente=(lastAnkiMat[mat]||0)>=set2dias;
        return{mat,difMedia,score,pct,fezAnkiRecente};
      })
      .sort((a,b)=>{
        // Prefere quem não fez Anki recente; desempate por score
        if(a.fezAnkiRecente!==b.fezAnkiRecente)return a.fezAnkiRecente?1:-1;
        return b.score-a.score;
      });
    slot2=cands[0]||null;
  }
  // Fallback slot2: segunda matéria com pior acerto (diferente do slot1)
  if(!slot2){
    const fb=todasMats
      .filter(m=>m!==slot1?.mat)
      .map(mat=>{const v=acumMat[mat]||{q:0,a:0};const pct=v.q>0?Math.round(v.a/v.q*100):null;return{mat,pct};})
      .filter(r=>r.pct!==null)
      .sort((a,b)=>a.pct-b.pct)[0];
    slot2=fb?{mat:fb.mat,difMedia:0,score:0,pct:fb.pct}:{mat:todasMats.find(m=>m!==slot1?.mat)||todasMats[1],difMedia:0,score:0,pct:null};
  }

  // SLOT 3: há mais tempo sem aparecer no canal Anki (lastAnkiMat), diferente dos anteriores
  const excluir=new Set([slot1?.mat,slot2?.mat].filter(Boolean));
  const slot3cands=todasMats
    .filter(m=>!excluir.has(m))
    .map(mat=>({mat,lastAnki:lastAnkiMat[mat]||0}))
    .sort((a,b)=>a.lastAnki-b.lastAnki); // nunca feito Anki ou mais antigo primeiro
  const slot3=slot3cands[0]||null;

  // Monta motivos
  const s1pct=slot1?.pct!==null?`${slot1.pct}% acerto`:'pior acerto';
  const s2dif=slot2?.difMedia>0?`dif ${slot2.difMedia.toFixed(1)}★`:'maior dificuldade';
  const s3dias=slot3&&lastAnkiMat[slot3.mat]
    ?`${Math.floor((todayMs-lastAnkiMat[slot3.mat])/86400000)}d sem Anki`
    :'nunca fez Anki';

  const rankAnki=[slot1,slot2,slot3].filter(Boolean);
  // Para compatibilidade com código legado que usa rankAnki
  rankAnki.forEach((r,i)=>{if(r&&!r.motivo)r.motivo='';});

  const ankiMaterias=[
    slot1?{mat:slot1.mat,cards:35,motivo:`${s1pct} · pior acerto`}:null,
    slot2?{mat:slot2.mat,cards:20,motivo:`${s2dif} · estudou recentemente`}:null,
    slot3?{mat:slot3.mat,cards:20,motivo:s3dias}:null,
  ].filter(Boolean);
  if(!ankiMaterias.length)ankiMaterias.push({mat:'Qualquer matéria',cards:75,motivo:'meta do dia'});

  // ── CANAL NLM ÁUDIO (tempo morto): score = diasSemNlm × 0.7 + acerto × 0.3 ──
  // Filtro: só matérias/assuntos com acerto ≥80% (manutenção, atenção parcial)
  // Quando há dados Guruja: sugere assunto específico, não só matéria
  const rankNlmBase=Object.entries(porMat).map(([mat,v])=>{
    const pct=v.q>0?Math.round(v.a/v.q*100):null;
    // Usa acerto do Guruja se disponível
    const gurujaData=getGurujaAssuntos();
    const gurujaAcerto=gurujaData[mat]
      ?Math.round(gurujaData[mat].assuntos.reduce((s,a)=>s+a.acerto,0)/gurujaData[mat].assuntos.length)
      :null;
    const acertoFinal=gurujaAcerto||pct;
    const score=diasSemScore(v.lastNlm)*0.7+(acertoFinal!==null?acertoFinal/100*0.3:0.15);
    const assuntosManut=getAssuntosManutencao(mat,3);
    return{mat,score,pct:acertoFinal,diasNlm:diasSem(v.lastNlm),assuntosManut};
  }).sort((a,b)=>b.score-a.score);

  let rankNlm=rankNlmBase.filter(r=>r.pct!==null&&r.pct>=80);
  if(rankNlm.length<2){
    const semDado=rankNlmBase.filter(r=>r.pct===null);
    rankNlm=[...rankNlm,...semDado].slice(0,5);
  }
  if(!rankNlm.length) rankNlm=rankNlmBase.slice(0,3);
  const nlmTop=rankNlm[0]||null;

  // ── CANAL REVISÃO 1h: score = pesoEdital × 2 + diasSemRev × 0.5 + déficit × 1 ──
  // Forma 1: prioriza impacto na nota (peso no edital)
  // Forma 4: penaliza ausência no canal Revisão 1h especificamente
  const rankRev1h=Object.entries(porMat).map(([mat,v])=>{
    const score=pesoEdital(mat)*2 + diasSemScore(v.lastRev1h)*0.5 + deficit(v)*1 + v.travou*0.5;
    return{mat,score,pct:v.q>0?Math.round(v.a/v.q*100):null,diasSemRev:diasSem(v.lastRev1h)};
  }).sort((a,b)=>b.score-a.score);
  const rev1hTop=rankRev1h.slice(0,3);

  // ── Ranking geral para tempo morto / contexto IA ──
  const rankGeral=Object.entries(porMat).map(([mat,v])=>{
    const score=deficit(v)*2+difMedia(v)*1+diasSem(v.lastDt)*0.3+v.travou*1.2+pesoEdital(mat)*0.5;
    return{mat,score,difMedia:difMedia(v),diasSem:diasSem(v.lastDt)};
  }).sort((a,b)=>b.score-a.score);

  const travouRecente=historico.slice(-5).filter(r=>r.travou).map(r=>`${r.materia}: ${r.travou}`);

  return{
    anki:{materias:ankiMaterias,ranking:rankAnki.slice(0,5)},
    nlm:{top:nlmTop,ranking:rankNlm.slice(0,5)},
    rev1h:{top:rev1hTop,ranking:rankRev1h.slice(0,5)},
    geral:rankGeral.slice(0,5),
    travouRecente,
    ts:Date.now(),
  };
}

// Mantém compatibilidade com código legado que usa calcTempoMorto
function calcTempoMorto(feitos,horas,historico){
  const motor=calcMotorCanais(feitos,horas,historico);
  const fallback={mat:'Dir. Financeiro / AFO',difMedia:0,diasSem:0};
  return{
    anki:motor.geral[0]||fallback,
    nlm:motor.nlm.top?{mat:motor.nlm.top.mat,difMedia:0,diasSem:motor.nlm.top.diasNlm}:motor.geral[1]||fallback,
    ranking:motor.geral,
    travouRecente:motor.travouRecente,
    ts:motor.ts,
  };
}


// ── Motor Revisão de Hoje (Modo 2 — esqueleto) ─────────────────
function calcRevisaoHoje(feitos){
  const hoje=getDK();
  const dw=new Date().getDay();
  const trabalha=[2,4,5].includes(dw);
  const historico=lsGet('historico_diario',[]);
  const caderno=lsGet('rev_caderno',[]);
  const todayMs=new Date().setHours(0,0,0,0);
  const ontemMs=todayMs-86400000;
  const ontemKey=new Date(ontemMs).toISOString().split('T')[0];
  const naoFeitoOntem=lsGet(`nao_fiz_${ontemKey}`,null);
  const ankiMeta=lsGet('anki_meta',{meta:75,backlog:0});
  const metaHoje=ankiMeta.meta||75;
  const ankiHoje=lsGet(`anki_feito_${hoje}`,null);

  // Usa o novo motor de canais
  const motor=calcMotorCanais(feitos,lsGet('horas',[]),historico);

  // TEC — usa rev_caderno unificado — Forma 1: por dificuldade, sem datas
  const tecHoje=caderno.filter(t=>!t.dominado&&(t.dificuldade||3)>=4);
  const tecProximo=caderno.filter(t=>!t.dominado&&(t.dificuldade||3)===3);
  const tecCronico=caderno.filter(t=>!t.dominado&&(t.tentativas||1)>=3);

  const nlmFeito=lsGet(`nlm_feito_${hoje}`,false);
  const blocoAtual=feitos?feitos.length:0;
  const janelaMeio=blocoAtual>=12&&blocoAtual<=14;
  const janelaFinal=blocoAtual>=20&&blocoAtual<=22;
  const janelaAtiva=janelaMeio||janelaFinal;

  // Alertas
  const alertas=[];
  if(tecCronico.length>0)alertas.push({tipo:'cronico',msg:`${tecCronico[0].mat} errado ${tecCronico[0].tentativas}x — considere NLM`});
  if((ankiMeta.backlog||0)>150)alertas.push({tipo:'backlog',msg:`Backlog Anki: ${ankiMeta.backlog} — não adicionar novos por 2 dias`});
  if(janelaAtiva)alertas.push({tipo:'janela',msg:`Bloco ${blocoAtual}/25 — janela NLM ativa`});

  return{
    anki:{meta:metaHoje,materias:motor.anki.materias,feito:ankiHoje,backlog:ankiMeta.backlog||0},
    tec:{hoje:tecHoje,proximo:tecProximo,cronico:tecCronico},
    nlm:{
      candidato:motor.nlm.top?{mat:motor.nlm.top.mat,pct:motor.nlm.top.pct,diasNlm:motor.nlm.top.diasNlm,travou:0,emJanela:janelaAtiva,score:motor.nlm.top.score}:null,
      todos:motor.nlm.ranking.slice(0,3).map(r=>({mat:r.mat,pct:r.pct,diasNlm:r.diasNlm,score:r.score,emJanela:janelaAtiva})),
      janelaAtiva,feito:nlmFeito,blocoAtual
    },
    rev1h:motor.rev1h,
    alertas,trabalha,hojeKey:hoje,naoFeitoOntem,
    motor, // expõe o motor completo para uso na UI
  };
}

// ── URGÊNCIA DO CADERNO — Modo 5 ─────────────────────────────
// score = (tentativas × 3) + (diasAtraso × 2) + (pesoEdital/10) + bônus de fase
// nivel: urgente(≥15) | atencao(≥7) | normal(<7)
// reincidente: ≥3 tentativas = tópico travado
function calcUrgencia(item){
  const todayStr=new Date().toISOString().split('T')[0];
  const tentativas=item.tentativas||1;
  const diasAtraso=item.prazo?Math.max(0,Math.round((new Date(todayStr)-new Date(item.prazo))/86400000)):0;
  const pesoEdital=(()=>{const tops=EDITAL[item.mat]?.top||[];return tops.reduce((s,t)=>s+t.p,0);})();
  const bonusFase=(item.fase||1)===1?4:(item.fase||1)===2?1:0; // D+3 mais urgente
  const score=(tentativas*3)+(diasAtraso*2)+(pesoEdital/10)+bonusFase;
  const nivel=score>=15?'urgente':score>=7?'atencao':'normal';
  return{score:Math.round(score),nivel,reincidente:tentativas>=3,diasAtraso};
}

function TabHoje({feitos,onAddHoras,onSetTab}){
  const hoje=getDK();
  const dw=new Date().getDay();
  const NOMES_DW=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const trabalha=[2,4,5].includes(dw);
  const totalH=trabalha?4:6;

  // ── Estados colapsáveis ──────────────────────────────────────
  const[abertos,setAbertos]=useState({despacho:true,anki:false,tec:false,nlm:false});
  const toggle=k=>setAbertos(p=>({...p,[k]:!p[k]}));

  // ── Estados de dados ─────────────────────────────────────────
  const[ankiFeito,setAnkiFeito]=useState(()=>lsGet(`anki_feito_${hoje}`,null));
  const[tecModal,setTecModal]=useState(false);
  const[tecForm,setTecForm]=useState({mat:'',assunto:'',feitas:'',acertei:'',dificuldade:3,obs:''});
  const[tecSalvo,setTecSalvo]=useState(false);
  const[despacho,setDespacho]=useState(()=>lsGet(`despacho_ia_${hoje}`,null));
  const[despachoLoad,setDespachoLoad]=useState(false);
  const[naoFiz,setNaoFiz]=useState(()=>lsGet(`nao_fiz_${hoje}`,{}));
  const[naoFizModal,setNaoFizModal]=useState(null); // 'anki'|'tec'|'nlm'
  const[naoFizMotivo,setNaoFizMotivo]=useState('');
  const[ankiCards,setAnkiCards]=useState({});
  const[ankiExpandMats,setAnkiExpandMats]=useState(false);
  const[ankiFeitosMat,setAnkiFeitosMat]=useState(()=>lsGet(`anki_mats_${hoje}`,{}));
  const[nlmFilaIdx,setNlmFilaIdx]=useState(0);

  // ── Motor: calcula tudo ───────────────────────────────────────
  const rev=useMemo(()=>calcRevisaoHoje(feitos),[feitos,hoje]);

  // ── Alerta de Oxidação: matérias ≥85% sem aparecer há 15+ dias ──
  const alertaOxidacao=useMemo(()=>{
    const hist=lsGet('historico_diario',[]);
    const todayMs=new Date().setHours(0,0,0,0);
    const porMat={};
    hist.forEach(r=>{
      if(!r.materia||!parseInt(r.questoes))return;
      if(!porMat[r.materia])porMat[r.materia]={q:0,a:0,lastDt:0};
      porMat[r.materia].q+=parseInt(r.questoes)||0;
      porMat[r.materia].a+=parseInt(r.acertei)||0;
      if((r.dt||0)>porMat[r.materia].lastDt)porMat[r.materia].lastDt=r.dt||0;
    });
    return Object.entries(porMat)
      .filter(([,v])=>{
        const pct=v.q>0?Math.round(v.a/v.q*100):0;
        const diasSem=Math.floor((todayMs-(v.lastDt||0))/86400000);
        return pct>=85&&diasSem>=15;
      })
      .map(([mat,v])=>{
        const pct=Math.round(v.a/v.q*100);
        const diasSem=Math.floor((todayMs-(v.lastDt||0))/86400000);
        return{mat,pct,diasSem};
      })
      .sort((a,b)=>b.diasSem-a.diasSem);
  },[hoje]);

  // ── Motor ANKI — Forma 3: baseado exclusivamente no historico_diario ──
  const ankiMaterias=useMemo(()=>{
    const hist=lsGet('historico_diario',[]);
    const todayMs=new Date().setHours(0,0,0,0);
    const set7dias=todayMs-7*86400000;
    const set3dias=todayMs-3*86400000;
    const todasMats=CICLO.map(s=>s.mat).filter((v,i,a)=>a.indexOf(v)===i);

    // Acumulado por matéria
    const acum={};
    hist.slice(-120).forEach(r=>{
      if(!r.materia)return;
      if(!acum[r.materia])acum[r.materia]={q:0,a:0,dif:[],lastDt:0};
      const q=parseInt(r.questoes)||0;const a=parseInt(r.acertei)||0;
      if(q>0){acum[r.materia].q+=q;acum[r.materia].a+=a;}
      if(r.dificuldade)acum[r.materia].dif.push(r.dificuldade);
      if((r.dt||0)>acum[r.materia].lastDt)acum[r.materia].lastDt=r.dt||0;
    });

    // Mapa de última vez no canal Anki
    const lastAnkiMat2={};
    lsGet('rev_anki',[]).forEach(r=>{if(r.mat&&(r.dt||0)>(lastAnkiMat2[r.mat]||0))lastAnkiMat2[r.mat]=r.dt||0;});
    const set2d=todayMs-2*86400000;

    // SLOT 1: pior acerto, priorizando quem não fez Anki nos últimos 3 dias
    let s1=null;
    for(const janela of[set3dias,0]){
      const cands=todasMats
        .map(mat=>{const v=acum[mat]||{q:0,a:0,lastDt:0};const pct=v.q>0?Math.round(v.a/v.q*100):null;return{mat,pct,lastDt:v.lastDt,fezAnkiRecente:(lastAnkiMat2[mat]||0)>=janela};})
        .filter(r=>r.pct!==null&&!r.fezAnkiRecente)
        .sort((a,b)=>a.pct-b.pct);
      if(cands.length){s1=cands[0];break;}
    }
    if(!s1){
      const fb=todasMats.map(mat=>{const v=acum[mat]||{q:0,a:0};const pct=v.q>0?Math.round(v.a/v.q*100):null;return{mat,pct,lastDt:v.lastDt||0};}).filter(r=>r.pct!==null).sort((a,b)=>a.pct-b.pct)[0];
      s1=fb||{mat:todasMats[0],pct:null,lastDt:0};
    }

    // SLOT 2: maior dificuldade média, priorizando quem não fez Anki nos últimos 2 dias, diferente do slot1
    let s2=null;
    {
      const cands=todasMats.filter(m=>m!==s1?.mat).map(mat=>{
        const regs=hist.filter(r=>r.materia===mat&&r.dificuldade);
        const difMedia=regs.length?regs.reduce((s,r)=>s+r.dificuldade,0)/regs.length:0;
        const v=acum[mat]||{q:0,a:0};
        const pct=v.q>0?Math.round(v.a/v.q*100):50;
        return{mat,difMedia,score:difMedia>0?difMedia:(1-pct/100)*5,pct,fezAnkiRecente:(lastAnkiMat2[mat]||0)>=set2d};
      }).sort((a,b)=>{if(a.fezAnkiRecente!==b.fezAnkiRecente)return a.fezAnkiRecente?1:-1;return b.score-a.score;});
      s2=cands[0]||null;
    }
    if(!s2){
      const fb=todasMats.filter(m=>m!==s1?.mat).map(mat=>{const v=acum[mat]||{q:0,a:0};const pct=v.q>0?Math.round(v.a/v.q*100):null;return{mat,pct};}).filter(r=>r.pct!==null).sort((a,b)=>a.pct-b.pct)[0];
      s2=fb?{mat:fb.mat,difMedia:0,pct:fb.pct}:{mat:todasMats.find(m=>m!==s1?.mat)||todasMats[1],difMedia:0,pct:null};
    }

    // SLOT 3: mais tempo sem aparecer no canal Anki, diferente dos anteriores
    const excluir=new Set([s1?.mat,s2?.mat].filter(Boolean));
    const s3=todasMats.filter(m=>!excluir.has(m)).map(mat=>({mat,lastAnki:lastAnkiMat2[mat]||0})).sort((a,b)=>a.lastAnki-b.lastAnki)[0]||null;

    const s1pct=s1?.pct!==null&&s1?.pct!=null?`${s1.pct}% acerto`:'pior acerto';
    const s2dif=s2?.difMedia>0?`dif ${s2.difMedia.toFixed(1)}★`:'maior dificuldade';
    const s3d=s3&&lastAnkiMat2[s3.mat]?`${Math.floor((todayMs-lastAnkiMat2[s3.mat])/86400000)}d sem Anki`:'nunca fez Anki';

    return[
      s1?{mat:s1.mat,cards:35,motivo:`${s1pct} · pior acerto`}:null,
      s2?{mat:s2.mat,cards:20,motivo:`${s2dif} · estudou recentemente`}:null,
      s3?{mat:s3.mat,cards:20,motivo:s3d}:null,
    ].filter(Boolean);
  },[feitos,hoje]);

  // ── Motor TEC: usa rev_caderno unificado ──────────────────────
  const tecHoje=useMemo(()=>{
    const caderno=lsGet('rev_caderno',[]);
    // Forma 1: sem datas — d3=difíceis(4-5⭐), d15=médio(3⭐), d30=leve(1-2⭐)
    const ativos=caderno.filter(t=>!t.dominado);
    const d3=ativos.filter(t=>(t.dificuldade||3)>=4);
    const d15=ativos.filter(t=>(t.dificuldade||3)===3);
    const d30=ativos.filter(t=>(t.dificuldade||3)<=2);
    return{d3,d15,d30,total:ativos.length};
  },[hoje]);

  // ── Motor NLM: ≥80% acerto, mais dias sem aparecer ─────────
  const nlmSugerido=useMemo(()=>{
    const hist=lsGet('historico_diario',[]);
    const motor=calcMotorCanais(feitos,lsGet('horas',[]),hist);
    const blocoAtual=feitos?.length||0;
    const emJanela=(blocoAtual>=12&&blocoAtual<=14)||(blocoAtual>=20&&blocoAtual<=22);
    const top=motor.nlm.top;
    if(!top)return null;
    // Fila completa para botão "Trocar"
    const fila=motor.nlm.ranking.slice(0,5);
    return{mat:top.mat,pct:top.pct,diasNlm:top.diasNlm,travou:0,emJanela,score:top.score,fila};
  },[feitos,hoje]);

  // ── Ações ─────────────────────────────────────────────────────
  const marcarAnkiMat=(mat)=>{
    const novos={...ankiFeitosMat,[mat]:{feito:true,cards:parseInt(ankiCards[mat])||0,dt:Date.now()}};
    setAnkiFeitosMat(novos);
    lsSet(`anki_mats_${hoje}`,novos);
    // Se todas as matérias foram feitas, marca o Anki geral
    if(ankiMaterias.every(m=>novos[m.mat]?.feito)){
      const totalCards=Object.values(novos).reduce((s,v)=>s+(v.cards||0),0)||75;
      const registro={feito:true,cards:totalCards,porMat:Object.fromEntries(Object.entries(novos).map(([k,v])=>[k,v.cards])),mats:ankiMaterias,dt:Date.now()};
      lsSet(`anki_feito_${hoje}`,registro);
      setAnkiFeito(registro);
      if(onAddHoras)onAddHoras({mat:'Anki',min:30,dt:Date.now()});
    }
  };

  const marcarAnki=()=>{
    const total=Object.values(ankiCards).reduce((s,v)=>s+(parseInt(v)||0),0)||75;
    const registro={feito:true,cards:total,porMat:ankiCards,mats:ankiMaterias,dt:Date.now()};
    lsSet(`anki_feito_${hoje}`,registro);
    setAnkiFeito(registro);
    if(onAddHoras)onAddHoras({mat:'Anki',min:30,dt:Date.now()});
  };

  const marcarNaoFiz=()=>{
    const novo={...naoFiz,[naoFizModal]:{motivo:naoFizMotivo,dt:Date.now()}};
    lsSet(`nao_fiz_${hoje}`,novo);
    setNaoFiz(novo);
    setNaoFizModal(null);setNaoFizMotivo('');
  };

  const salvarTec=()=>{
    if(!tecForm.mat)return;
    const pct=tecForm.feitas&&tecForm.acertei?Math.round(parseInt(tecForm.acertei)/parseInt(tecForm.feitas)*100):null;
    const dif=tecForm.dificuldade||3;
    const novo={id:Date.now(),mat:tecForm.mat,assunto:tecForm.assunto,feitas:parseInt(tecForm.feitas)||0,acertei:parseInt(tecForm.acertei)||0,pct,dificuldade:dif,tentativas:1,dominado:false,dia:hoje,obs:tecForm.obs,origem:'hoje',historico:[{data:hoje,questoes:parseInt(tecForm.feitas)||0,acertos:parseInt(tecForm.acertei)||0,dificuldade:dif}]};
    const caderno=[...lsGet('rev_caderno',[]),novo];
    lsSet('rev_caderno',caderno);
    setTecForm({mat:'',assunto:'',feitas:'',acertei:'',dificuldade:3,obs:''});
    setTecSalvo(true);setTimeout(()=>{setTecSalvo(false);setTecModal(false);},1500);
  };

  // ── NOVA LÓGICA TEC — Forma 1: só dificuldade, sem datas ──
  // Registra uma sessão de revisão: quantas questões, quantos acertos, dificuldade sentida
  const registrarRevisaoTec=(id,novasQuestoes,novosAcertos,difSentida)=>{
    const caderno=lsGet('rev_caderno',[]).map(t=>{
      if(t.id!==id)return t;
      const totalFeitas=(t.feitas||0)+novasQuestoes;
      const totalAcertos=(t.acertei||0)+novosAcertos;
      const entrada={data:getDK(),questoes:novasQuestoes,acertos:novosAcertos,dificuldade:difSentida};
      return{
        ...t,
        feitas:totalFeitas,
        acertei:totalAcertos,
        pct:totalFeitas>0?Math.round(totalAcertos/totalFeitas*100):null,
        dificuldade:difSentida, // sempre atualiza para a percepção mais recente
        tentativas:(t.tentativas||0)+1,
        historico:[...(t.historico||[]),entrada],
      };
    });
    lsSet('rev_caderno',caderno);
  };
  // Marca item como dominado — sai da lista ativa
  const marcarDominado=(id)=>{
    const caderno=lsGet('rev_caderno',[]).map(t=>{
      if(t.id!==id)return t;
      const entrada={data:getDK(),acao:'dominado'};
      return{...t,dominado:true,historico:[...(t.historico||[]),entrada]};
    });
    lsSet('rev_caderno',caderno);
  };
  // Mantido por compatibilidade com chamadas antigas — redireciona para a nova lógica
  const marcarTecItem=(id,acertou)=>{
    registrarRevisaoTec(id,1,acertou?1:0,3);
  };

  const gerarDespacho=async()=>{
    if(despachoLoad)return;
    const k=getAK();if(!k?.startsWith('sk-ant'))return;
    setDespachoLoad(true);
    try{
      const ontem=lsGet(`nao_fiz_${(()=>{const d=new Date();d.setDate(d.getDate()-1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})()}`,{});
      const cobrar=Object.entries(ontem).map(([m,v])=>`${m}: "${v.motivo||'sem motivo'}"`).join(', ');
      const ctx=`Hoje: ${NOMES_DW[dw]}, ${trabalha?'dia de trabalho':'dia livre'}, bloco ${feitos?.length||0}/25.
Anki: ${ankiMaterias.map(m=>`${m.mat}(${m.cards}cards)`).join(', ')}.
TEC hoje: ${tecHoje.d3.length} itens vencendo, ${tecHoje.d15.length} próximos.

            {abertos.despacho&&<div style={{padding:'0 14px 12px',fontSize:12,color:'var(--text2)',lineHeight:1.7,whiteSpace:'pre-line'}}>
              {despacho||<span style={{color:'var(--text4)'}}>{getAK()?.startsWith('sk-ant')?'Gerando...':'Configure a chave IA em ⚙️'}</span>}
            </div>}
            {!abertos.despacho&&despacho&&<div style={{padding:'0 14px 10px',fontSize:11,color:'var(--text4)',lineHeight:1.5}}>{despacho.split('\n')[0]}</div>}
          </div>

          {/* ALERTA DE OXIDAÇÃO */}
          {alertaOxidacao.length>0&&(
            <div style={{padding:'10px 13px',borderRadius:11,background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.35)',marginBottom:10}}>
              <div style={{fontSize:9,color:'#fbbf24',fontFamily:"'DM Mono',monospace",fontWeight:800,marginBottom:6}}>🟡 RISCO DE OXIDAÇÃO — matérias sólidas paradas</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                {alertaOxidacao.map(item=>(
                  <div key={item.mat} style={{padding:'4px 9px',borderRadius:7,background:'rgba(251,191,36,.12)',border:'1px solid rgba(251,191,36,.3)'}}>
                    <span style={{fontSize:11,color:'#fbbf24',fontWeight:700}}>{item.mat}</span>
                    <span style={{fontSize:9,color:'#94a3b8',marginLeft:5}}>{item.pct}% · {item.diasSem}d sem revisar</span>
                  </div>
                ))}
              </div>
              <div style={{fontSize:9,color:'#94a3b8',marginTop:6}}>Matéria ≥85% sem aparecer há 15+ dias pode travar na prova.</div>
            </div>
          )}

          {/* CARDS COLAPSÁVEIS: ANKI, TEC resumo, NLM */}
          <div style={{border:'1px solid var(--border)',borderRadius:13,overflow:'hidden',background:'var(--card)'}}>
            {/* ANKI */}
            <div style={{borderBottom:'1px solid var(--border)'}}>
