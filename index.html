  );
}

// ─── TAB: AGENDA GERAL ───────────────────────────────────────
function TabAgenda(){
  const[view,setView]=useState('semana'); // 'hoje' | 'semana'
  const now=new Date();
  const dw=now.getDay();
  const dk=getDK();
  const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
  const DIAS_FULL=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

  // ── Lê dados de TODAS as abas ────────────────────────────
  const horas=lsGet('horas',[]);
  const feitos=lsGet('feitos',[]);
  const treinos=lsGet('treino_regs',[]);
  const sessoes=lsGet('sessoes',[]);
  const revUrgentes=lsGet('rev_urgentes',[]);
  const revSemana=lsGet('rev_sem_items',[]);
  const fila=lsGet('fila',[]).filter(f=>!f.feito);
  const wakeH=lsGet('wakeH',10);
  const wakeM=lsGet('wakeM',0);
  const mit=lsGet('mit',[]);
  const naval=lsGet(`naval_${dk}`,[]);
  const kagenda=lsGet(`kagenda_${dk}`,{});
  const hidra=lsGet(`hidra_${dk}`,0);
  const tarefas=lsGet(`casa_t_${dk}`,[]);
  const mercado=lsGet(`casa_m_${dk}`,'');
  const planoComida=lsGet('plano_semana',null);

  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[]);
  const semStart=todayStart-6*86400000;
  const minHoje=horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0);
  const minSem=horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0);
  const treinouHj=treinos.some(r=>r.dk===dk&&r.feito);
  const navaisFalta=naval.filter(Boolean).length;
  const tarefasUrg=tarefas.filter(t=>t.prior==='urgente'&&!t.done);
  const tarefasPend=tarefas.filter(t=>!t.done);
  const PCOR={urgente:'#f87171',importante:'#fbbf24',normal:'#60a5fa',study:'#a78bfa',treino:'#34d399',revisao:'#fb923c',naval:'#60a5fa',casa:'#fcd34d',comida:'#fb923c'};

  // Agenda do dia atual
  const AGENDA_DIA=useMemo(()=>{
    const items=[];
    // MIT
    if(mit.length>0) items.push({t:'05:00',tipo:'study',icone:'✦',label:'MITs do dia',detalhe:mit.join(' · '),cor:'#fbbf24'});
    // Anki
    items.push({t:'05:00',tipo:'study',icone:'🃏',label:'Anki profundo',cor:'#a78bfa'});
    // Blocos de estudo (agenda fixa)
    const AGENDA_FIXA=AGENDA[dw]||[];
    AGENDA_FIXA.forEach(a=>{
      const c=KCOR[a.k]||'#475569';
      items.push({t:a.t,tipo:a.k==='s'?'study':a.k==='e'?'treino':'outro',icone:a.k==='s'?'📚':a.k==='e'?'🏃':'⏰',label:a.l,cor:c});
    });
    // Revisões urgentes
    revUrgentes.forEach(u=>items.push({t:'—',tipo:'revisao',icone:'🚨',label:u.mat,detalhe:`${u.modo||''} · ${'⭐'.repeat(u.stars)}`,cor:'#f87171'}));
    // Revisões da semana no dia de hoje
    revSemana.filter(s=>s.dia===DIAS[dw]&&!s.feito).forEach(s=>items.push({t:'—',tipo:'revisao',icone:'📚',label:s.mat,detalhe:s.modo,cor:'#34d399'}));
    // Fila urgente
    fila.filter(f=>f.quando==='Hoje'||f.prior==='urgente').forEach(f=>items.push({t:'—',tipo:'revisao',icone:'⚡',label:f.mat,detalhe:`${f.modo} · ${f.quando}`,cor:'#fb923c'}));
    // Tarefas urgentes de casa
    tarefasUrg.forEach(t=>items.push({t:'—',tipo:'casa',icone:'🚨',label:t.txt,cor:'#f87171'}));
    // Kauê
    if(kagenda.escola) items.push({t:`${pad(wakeH)}:${pad(wakeM)}`,tipo:'naval',icone:'⚓',label:`Kauê acorda ${pad(wakeH)}:${pad(wakeM)}`,cor:'#60a5fa'});
    items.push({t:'18:00',tipo:'naval',icone:'⚓',label:'Kauê chega',cor:'#f87171'});
    // Comida
    const diaKey=DIAS_KEY[dw];
    const planoHoje=planoComida?.semana?.[diaKey];
    if(planoHoje?.almoco) items.push({t:'12:00',tipo:'comida',icone:'🍽️',label:`Almoço: ${planoHoje.almoco}`,cor:'#fb923c'});
    if(planoHoje?.jantar) items.push({t:'19:00',tipo:'comida',icone:'🌙',label:`Jantar: ${planoHoje.jantar}`,cor:'#fb923c'});
    return items.sort((a,b)=>{
      const ta=a.t==='—'?'99:00':a.t;
      const tb=b.t==='—'?'99:00':b.t;
      return ta.localeCompare(tb);
    });
  },[mit,revUrgentes,revSemana,fila,tarefasUrg,kagenda,planoComida,wakeH,wakeM]);

  // Visão semanal: agrega por dia
  const semanaData=useMemo(()=>{
    return DIAS.map((d,i)=>{
      const items=[];
      // Revisões agendadas
      revSemana.filter(s=>s.dia===d&&!s.feito).forEach(s=>items.push({tipo:'revisao',icone:'📚',label:s.mat,detalhe:s.modo,cor:'#34d399',feito:false}));
      // Urgentes (todos os dias)
      if(revUrgentes.length>0) items.push({tipo:'revisao',icone:'🚨',label:`${revUrgentes.length} urgente${revUrgentes.length>1?'s':''}`,cor:'#f87171'});
      // Fila do dia
      fila.filter(f=>{
        if(f.quando==='Hoje'&&i===dw)return true;
        if(f.quando==='Amanhã'&&i===(dw+1)%7)return true;
        if(f.quando==='Em 2d'&&i===(dw+2)%7)return true;
        return false;
      }).forEach(f=>items.push({tipo:'fila',icone:'⚡',label:f.mat,detalhe:f.modo,cor:'#fb923c'}));
      // Tarefas de casa do dia atual
      if(i===dw) tarefasPend.slice(0,3).forEach(t=>items.push({tipo:'casa',icone:'🏡',label:t.txt,cor:t.prior==='urgente'?'#f87171':t.prior==='importante'?'#fbbf24':'#60a5fa'}));
      return{dia:d,diaFull:DIAS_FULL[i],i,items,hj:i===dw};
    });
  },[revSemana,revUrgentes,fila,tarefasPend,dw]);

  return(
    <div>
      {/* Resumo do dia */}
      <div style={{background:'linear-gradient(135deg,rgba(251,191,36,.08),rgba(5,10,20,.98))',border:'1px solid rgba(251,191,36,.2)',borderRadius:14,padding:'13px',marginBottom:14}}>
        <div style={{fontSize:9,letterSpacing:'3px',color:'#fbbf24',fontFamily:"'DM Mono',monospace",marginBottom:8}}>📍 HOJE — {DIAS_FULL[dw].toUpperCase()}</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {[
            [`⏱ ${fmtMin(minHoje)}`,minHoje>0?'#34d399':'#334155','hoje'],
            [`📚 ${fmtMin(minSem)}/35h`,minSem>=35*60?'#34d399':'#fbbf24','semana'],
            [`🏃 ${treinouHj?'feito':'pendente'}`,treinouHj?'#34d399':'#f87171','treino'],
            [`🏡 ${tarefasPend.length} taref.`,tarefasUrg.length>0?'#f87171':'#60a5fa','casa'],
            [`🚨 ${revUrgentes.length} rev.`,revUrgentes.length>0?'#f87171':'#334155','revisão'],
            [`💧 ${(hidra*250/1000).toFixed(1)}L`,hidra*250>=3000?'#34d399':'#60a5fa','água'],
          ].map(([l,c,t])=>(
            <div key={t} style={{padding:'5px 9px',borderRadius:7,background:`${c}12`,border:`1px solid ${c}30`}}>
              <div style={{fontSize:10,color:c,fontWeight:700}}>{l}</div>
            </div>
          ))}
        </div>
        {mit.length>0&&<div style={{marginTop:10,padding:'8px 10px',borderRadius:8,background:'rgba(251,191,36,.06)',border:'1px solid rgba(251,191,36,.15)'}}>
          <div style={{fontSize:9,color:'rgba(251,191,36,.6)',fontFamily:"'DM Mono',monospace",marginBottom:4}}>✦ MITS DO DIA</div>
          {mit.map((m,i)=><div key={i} style={{fontSize:11,color:'#c8d0e0',marginBottom:2}}>{i+1}. {m}</div>)}
        </div>}
      </div>

      {/* Toggle hoje/semana */}
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[['hoje','📅 Hoje'],['semana','🗓️ Semana']].map(([v,l])=>{
          const a=view===v;
          return <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'10px',borderRadius:10,border:`1px solid ${a?'#fbbf24':'rgba(255,255,255,.08)'}`,background:a?'rgba(251,191,36,.12)':'transparent',color:a?'#fbbf24':'#334155',fontSize:12,fontWeight:700,cursor:'pointer'}}>{l}</button>;
        })}
      </div>

      {/* VISÃO: HOJE */}
      {view==='hoje'&&<div>
        {AGENDA_DIA.map((it,i)=>{
          const c=it.cor||'#475569';
          return(
            <div key={i} style={{display:'flex',gap:10,padding:'9px 11px',borderRadius:10,background:`${c}06`,border:`1px solid ${c}18`,marginBottom:5,alignItems:'flex-start'}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:c,fontWeight:700,width:40,flexShrink:0,marginTop:1}}>{it.t}</div>
              <span style={{fontSize:14,flexShrink:0}}>{it.icone}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:it.tipo==='study'?'#c8d0e0':c,fontWeight:600}}>{it.label}</div>
                {it.detalhe&&<div style={{fontSize:10,color:'#334155',marginTop:2}}>{it.detalhe}</div>}
              </div>
              <span style={{fontSize:8,padding:'2px 6px',borderRadius:4,background:`${c}18`,color:c,fontFamily:"'DM Mono',monospace",flexShrink:0}}>{it.tipo}</span>
            </div>
          );
        })}
        {/* Checklist casa */}
        {tarefasPend.length>0&&(
          <div style={{marginTop:10,padding:'11px',borderRadius:11,background:'rgba(96,165,250,.05)',border:'1px solid rgba(96,165,250,.18)'}}>
            <div style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:8}}>🏡 CASA — {tarefasPend.length} pendente{tarefasPend.length>1?'s':''}</div>
            {tarefasPend.slice(0,5).map(t=>(
              <div key={t.id} style={{fontSize:11,color:t.prior==='urgente'?'#f87171':t.prior==='importante'?'#fbbf24':'#64748b',marginBottom:3}}>
                {t.prior==='urgente'?'🚨 ':t.prior==='importante'?'⚠️ ':'• '}{t.txt}
              </div>
            ))}
          </div>
        )}
        {/* Naval */}
        <div style={{marginTop:10,padding:'11px',borderRadius:11,background:'rgba(248,113,113,.05)',border:'1px solid rgba(248,113,113,.15)'}}>
          <div style={{fontSize:9,color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:6}}>⚓ KAUÊ — NOTURNO</div>
          <div style={{fontSize:11,color:'#64748b'}}>{navaisFalta}/{NAVAL_ITEMS.length} itens do checklist naval ✓</div>
          {kagenda.escola&&<div style={{fontSize:11,color:'#60a5fa',marginTop:3}}>🏫 Escola hoje</div>}
          {kagenda.basquete&&<div style={{fontSize:11,color:'#34d399',marginTop:3}}>🏀 Basquete hoje</div>}
        </div>
        {mercado&&<div style={{marginTop:10,padding:'11px',borderRadius:11,background:'rgba(52,211,153,.04)',border:'1px solid rgba(52,211,153,.15)'}}>
          <div style={{fontSize:9,color:'#34d399',fontFamily:"'DM Mono',monospace",marginBottom:5}}>🛒 SUPERMERCADO</div>
          <div style={{fontSize:11,color:'#64748b',lineHeight:1.7}}>{mercado}</div>
        </div>}
      </div>}

      {/* VISÃO: SEMANA */}
      {view==='semana'&&<div>
        {semanaData.map(({dia,diaFull,i,items,hj})=>(
          <div key={dia} style={{marginBottom:8,borderRadius:12,overflow:'hidden',border:`1px solid ${hj?'rgba(251,191,36,.3)':'rgba(255,255,255,.06)'}`,opacity:i<dw&&!hj?.55:1}}>
            <div style={{padding:'8px 13px',background:hj?'rgba(251,191,36,.07)':'rgba(255,255,255,.02)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:11,fontWeight:800,color:hj?'#fbbf24':'#334155',fontFamily:"'DM Mono',monospace"}}>{hj?'▶ ':''}{diaFull.toUpperCase()}{hj?' — HOJE':''}</span>
              <span style={{fontSize:9,color:'#1e293b',fontFamily:"'DM Mono',monospace"}}>{items.length} item{items.length!==1?'s':''}</span>
            </div>
            {items.length===0&&<div style={{padding:'8px 13px',fontSize:11,color:'#1e293b'}}>Dia livre ✓</div>}
            {items.map((it,j)=>(
              <div key={j} style={{padding:'8px 13px',borderTop:'1px solid rgba(255,255,255,.04)',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:13}}>{it.icone}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:it.cor,fontWeight:700}}>{it.label}</div>
                  {it.detalhe&&<div style={{fontSize:9,color:'#334155'}}>{it.detalhe}</div>}
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>}
    </div>
  );
}

// ─── MODAL CONFIGURAÇÕES ─────────────────────────────────────
// IMPORTANTE: TODOS os useState estão no topo, sem exceção
function ModalConfig({fechar}){
  const[aba,setAba]=useState('ia');
  const[msg,setMsg]=useState('');
  const[akVal,setAkVal]=useState(getAK);
  const[importTxt,setImportTxt]=useState('');
  const[confirmarDel,setConfirmarDel]=useState(false);

  const ABAS=[{id:'ia',l:'🤖 IA'},{id:'cloud',l:'☁️ Nuvem'},{id:'backup',l:'📦 Backup'},{id:'import',l:'📥 Restaurar'},{id:'info',l:'ℹ️ Info'}];
  const[cfgUrl,setCfgUrl]=useState(()=>Sync.getCfg().url);
  const[cfgKey,setCfgKey]=useState(()=>Sync.getCfg().key);
  const[cfgLoad,setCfgLoad]=useState(false);

  function salvarChave(){setAK(akVal);setMsg('✅ Chave salva!');setTimeout(()=>setMsg(''),3000);}
  function exportar(){
    try{
      const d={};
      for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{d[k]=JSON.parse(localStorage.getItem(k));}catch{d[k]=localStorage.getItem(k);}}
      const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const dt=new Date();
      a.href=url;a.download=`rity-backup-${dt.getDate()}-${dt.getMonth()+1}-${dt.getFullYear()}.json`;
      a.click();URL.revokeObjectURL(url);
      setMsg('✅ Backup exportado!');
    }catch(e){setMsg('❌ Erro ao exportar.');}
  }
  function importar(){
    try{
      const d=JSON.parse(importTxt);
      Object.entries(d).forEach(([k,v])=>localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v)));
      setMsg('✅ Restaurado! Recarregando...');
      setTimeout(()=>window.location.reload(),1500);
    }catch(e){setMsg('❌ JSON inválido.');}
  }
  function importFile(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setImportTxt(ev.target.result);r.readAsText(f);
  }
  function apagarTudo(){
    if(!confirmarDel){setConfirmarDel(true);return;}
    localStorage.clear();
    setMsg('🗑️ Apagado. Recarregando...');
    setTimeout(()=>window.location.reload(),1500);
  }

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>{if(e.target===e.currentTarget)fechar();}}>
      <div style={{background:'#0c1220',borderRadius:'20px 20px 0 0',border:'1px solid rgba(255,255,255,.1)',padding:'20px 18px 40px',width:'100%',maxWidth:520,maxHeight:'90dvh',overflowY:'auto'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,.15)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:8,letterSpacing:'3px',color:'rgba(251,191,36,.5)',fontFamily:"'DM Mono',monospace"}}>RITY OS · v4.0</div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:18,color:'#f0e6d0',marginTop:2}}>Configurações</div>
          </div>
          <button onClick={fechar} style={{width:32,height:32,borderRadius:'50%',border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.05)',color:'#475569',fontSize:16,cursor:'pointer'}}>✕</button>
        </div>

        <div style={{display:'flex',gap:4,marginBottom:16,overflowX:'auto',scrollbarWidth:'none'}}>
          {ABAS.map(s=>{const a=aba===s.id;return(
            <button key={s.id} onClick={()=>{setAba(s.id);setMsg('');setConfirmarDel(false);}} style={{flex:1,minWidth:70,padding:'8px 4px',borderRadius:8,border:`1px solid ${a?'#fbbf24':'rgba(255,255,255,.07)'}`,background:a?'rgba(251,191,36,.1)':'transparent',color:a?'#fbbf24':'#334155',fontSize:9,fontWeight:700,fontFamily:"'DM Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>{s.l}</button>
          );})}
        </div>

        {aba==='ia'&&(
          <div>
            <div style={{padding:'12px',borderRadius:10,background:akVal.startsWith('sk-ant')?'rgba(52,211,153,.07)':'rgba(248,113,113,.07)',border:`1px solid ${akVal.startsWith('sk-ant')?'rgba(52,211,153,.3)':'rgba(248,113,113,.3)'}`,marginBottom:14,fontSize:12,color:akVal.startsWith('sk-ant')?'#34d399':'#f87171',fontWeight:700}}>
              {akVal.startsWith('sk-ant')?'✅ Chave configurada — IA Assessora funcionando':'❌ Chave ausente — IA offline'}
            </div>
            <div style={{background:'rgba(167,139,250,.05)',border:'1px solid rgba(167,139,250,.18)',borderRadius:12,padding:'14px'}}>
              <div style={{fontSize:9,letterSpacing:'2px',color:'#a78bfa',fontFamily:"'DM Mono',monospace",marginBottom:8}}>🔑 CHAVE ANTHROPIC (CLAUDE)</div>
              <div style={{fontSize:11,color:'#475569',lineHeight:1.7,marginBottom:10}}>Obtenha em <strong style={{color:'#c8d0e0'}}>console.anthropic.com</strong> → API Keys. Começa com <code style={{color:'#a78bfa'}}>sk-ant-...</code></div>
              <input value={akVal} onChange={e=>setAkVal(e.target.value)} type="password" placeholder="sk-ant-api03-..." style={{width:'100%',padding:'10px 12px',borderRadius:9,border:'1px solid rgba(167,139,250,.25)',background:'rgba(167,139,250,.06)',color:'#c8d0e0',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:10,fontFamily:"'DM Mono',monospace"}}/>
              <button onClick={salvarChave} disabled={!akVal.trim()} style={{width:'100%',padding:'12px',borderRadius:9,border:'none',background:akVal.trim()?'linear-gradient(135deg,#a78bfa,#a78bfa)':'rgba(255,255,255,.05)',color:akVal.trim()?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>💾 Salvar chave da IA</button>
            </div>
            <div style={{marginTop:12,padding:'11px',borderRadius:10,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',fontSize:11,color:'#334155',lineHeight:1.7}}>
              💡 A chave fica salva neste dispositivo/navegador. Em outro aparelho, cole a mesma chave uma vez em ⚙️ → IA.
            </div>
          </div>
        )}

        {aba==='cloud'&&(
          <div>
            <div style={{padding:'12px',borderRadius:10,background:Sync.isConfigured()?'rgba(52,211,153,.07)':'rgba(251,191,36,.06)',border:`1px solid ${Sync.isConfigured()?'rgba(52,211,153,.25)':'rgba(251,191,36,.2)'}`,marginBottom:14,fontSize:12,color:Sync.isConfigured()?'#34d399':'#fbbf24',fontWeight:700}}>
              {Sync.isConfigured()?'☁️ Nuvem configurada — dados sincronizando':'⚠️ Sem nuvem — dados apenas neste dispositivo'}
            </div>
            <div style={{background:'rgba(96,165,250,.05)',border:'1px solid rgba(96,165,250,.18)',borderRadius:12,padding:'14px',marginBottom:12}}>
              <div style={{fontSize:9,letterSpacing:'2px',color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:10}}>🔑 CREDENCIAIS SUPABASE</div>
              <div style={{fontSize:11,color:'#475569',lineHeight:1.7,marginBottom:12}}>Acesse <strong style={{color:'#c8d0e0'}}>supabase.com</strong> → seu projeto → Settings → API para copiar as credenciais.</div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:4}}>PROJECT URL</div>
                <input value={cfgUrl} onChange={e=>setCfgUrl(e.target.value)} placeholder="https://xxxxxxxx.supabase.co" style={{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.05)',color:'#c8d0e0',fontSize:11,outline:'none',boxSizing:'border-box'}}/>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:9,color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:4}}>ANON PUBLIC KEY</div>
                <input value={cfgKey} onChange={e=>setCfgKey(e.target.value)} placeholder="sb_publishable_... ou eyJhbGci..." style={{width:'100%',padding:'9px 11px',borderRadius:8,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.05)',color:'#c8d0e0',fontSize:11,outline:'none',boxSizing:'border-box'}}/>
              </div>
              <button onClick={async()=>{
                if(!cfgUrl.trim()||!cfgKey.trim())return;
                setCfgLoad(true);
                Sync.saveCfg(cfgUrl,cfgKey);
                const ok=await Sync.init();
                setCfgLoad(false);
                setMsg(ok?'✅ Conectado! Dados sincronizando...':'❌ Erro de conexão. Verifique as credenciais.');
              }} disabled={cfgLoad||!cfgUrl.trim()||!cfgKey.trim()} style={{width:'100%',padding:'12px',borderRadius:9,border:'none',background:cfgUrl.trim()&&cfgKey.trim()?'linear-gradient(135deg,#60a5fa,#60a5fa)':'rgba(255,255,255,.05)',color:cfgUrl.trim()&&cfgKey.trim()?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>
                {cfgLoad?'⏳ Conectando...':'☁️ Salvar e conectar'}
              </button>
            </div>
            <div style={{padding:'11px',borderRadius:10,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',fontSize:11,color:'#334155',lineHeight:1.8}}>
              💡 A tabela necessária no Supabase é: <code style={{color:'#60a5fa'}}>rity_os</code> (key text PK, value jsonb, updated_at timestamptz).<br/>
              Configure com RLS público ou desative RLS para uso pessoal.
            </div>
          </div>
        )}

        {aba==='backup'&&(
          <div>
            <div style={{padding:'14px',borderRadius:12,background:'rgba(52,211,153,.05)',border:'1px solid rgba(52,211,153,.2)',marginBottom:12}}>
              <div style={{fontSize:9,letterSpacing:'2px',color:'#34d399',fontFamily:"'DM Mono',monospace",marginBottom:6}}>📦 EXPORTAR BACKUP</div>
              <div style={{fontSize:12,color:'#475569',lineHeight:1.7,marginBottom:12}}>Salva todos seus dados locais em JSON. Faça sempre antes de uma atualização.</div>
              <button onClick={exportar} style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#34d399,#34d399)',color:'#050a14',fontSize:13,fontWeight:800,cursor:'pointer'}}>⬇️ Baixar backup</button>
            </div>
            <div style={{padding:'14px',borderRadius:12,background:'rgba(248,113,113,.04)',border:'1px solid rgba(248,113,113,.15)'}}>
              <div style={{fontSize:9,letterSpacing:'2px',color:'#f87171',fontFamily:"'DM Mono',monospace",marginBottom:6}}>🗑️ APAGAR TUDO</div>
              <div style={{fontSize:12,color:'#475569',marginBottom:10}}>Remove todos os dados locais. Somente para recomeçar do zero.</div>
              {!confirmarDel
                ?<button onClick={apagarTudo} style={{width:'100%',padding:'11px',borderRadius:9,border:'2px solid rgba(248,113,113,.4)',background:'transparent',color:'#f87171',fontSize:12,fontWeight:800,cursor:'pointer'}}>⚠️ Apagar todos os dados</button>
                :<div style={{display:'flex',gap:8}}>
                  <button onClick={()=>setConfirmarDel(false)} style={{flex:1,padding:'11px',borderRadius:9,border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'#475569',fontSize:12,cursor:'pointer'}}>Cancelar</button>
                  <button onClick={apagarTudo} style={{flex:1,padding:'11px',borderRadius:9,border:'none',background:'#f87171',color:'#050a14',fontSize:12,fontWeight:800,cursor:'pointer'}}>✓ Confirmar</button>
                </div>}
            </div>
          </div>
        )}

        {aba==='import'&&(
          <div style={{background:'rgba(96,165,250,.05)',border:'1px solid rgba(96,165,250,.2)',borderRadius:12,padding:'14px'}}>
            <div style={{fontSize:9,letterSpacing:'2px',color:'#60a5fa',fontFamily:"'DM Mono',monospace",marginBottom:6}}>📥 RESTAURAR BACKUP</div>
            <label style={{display:'block',padding:'14px',borderRadius:9,border:'2px dashed rgba(96,165,250,.3)',background:'rgba(96,165,250,.04)',textAlign:'center',cursor:'pointer',marginBottom:10}}>
              <div style={{fontSize:20,marginBottom:4}}>📂</div>
              <div style={{fontSize:11,color:'#64748b'}}>Escolher arquivo .json</div>
              <input type="file" accept=".json" onChange={importFile} style={{display:'none'}}/>
            </label>
            <div style={{textAlign:'center',fontSize:10,color:'#1e293b',marginBottom:8}}>— ou cole o JSON —</div>
            <textarea value={importTxt} onChange={e=>setImportTxt(e.target.value)} rows={4} placeholder='{"feitos":[],...}' style={{width:'100%',padding:'9px',borderRadius:8,border:'1px solid rgba(96,165,250,.25)',background:'rgba(96,165,250,.05)',color:'#c8d0e0',fontSize:11,outline:'none',resize:'vertical',boxSizing:'border-box',marginBottom:10}}/>
            <button onClick={importar} disabled={!importTxt.trim()} style={{width:'100%',padding:'12px',borderRadius:9,border:'none',background:importTxt.trim()?'linear-gradient(135deg,#60a5fa,#60a5fa)':'rgba(255,255,255,.05)',color:importTxt.trim()?'#050a14':'#1e293b',fontSize:12,fontWeight:800,cursor:'pointer'}}>📥 Restaurar</button>
          </div>
        )}

        {aba==='info'&&(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[['RITY OS','v4.0 — reconstruído'],['Ciclo','Meirelles Opção 3 · 23 blocos'],['Meta semanal','35h+ de estudo'],['Dieta','Low carb · Cetogênico · Jejum IF'],['Kauê','13 anos · Preparatório Colégio Naval'],['Concurso','TCE-RJ — Auditora de Controle Externo']].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',borderRadius:9,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)'}}>
                <span style={{fontSize:10,color:'#334155',fontFamily:"'DM Mono',monospace",fontWeight:700}}>{k}</span>
                <span style={{fontSize:11,color:'#64748b',textAlign:'right',maxWidth:'65%'}}>{v}</span>
              </div>
            ))}
          </div>
        )}

        {msg&&<div style={{marginTop:14,padding:'11px 13px',borderRadius:9,background:'rgba(52,211,153,.1)',border:'1px solid rgba(52,211,153,.3)',fontSize:12,color:'#34d399',fontWeight:700,textAlign:'center'}}>{msg}</div>}
      </div>
    </div>
  );
}

// ─── APP RAIZ ────────────────────────────────────────────────
function App(){
  // ── estado global (todos os useState juntos no topo) ──
  const[feitos,setFeitos]=useState([]);
  const[cicloNum,setCicloNum]=useState(1);
  const[horas,setHoras]=useState([]);
  const[mit,setMit]=useState([]);
  const[wakeH,setWakeH]=useState(10);
  const[wakeM,setWakeM]=useState(0);
  const[tab,setTab]=useState('ia');
  const[clock,setClock]=useState(new Date());
  const[showCfg,setShowCfg]=useState(false);
  const[trofeu,setTrofeu]=useState(false);
  const[syncSt,setSyncSt]=useState('idle');

  // Boot: carregar dados
  useEffect(()=>{
    Sync.onStatus(s=>setSyncSt(s));
    if(Sync.isConfigured()){
      Sync.init().then(ok=>{
        if(ok){
          // Recarregar dados da nuvem após sync inicial
          setFeitos(lsGet('feitos',[]));
          setCicloNum(lsGet('cicloNum',1));
          setHoras(lsGet('horas',[]));
          setMit(lsGet('mit',[]));
          setWakeH(lsGet('wakeH',10));
          setWakeM(lsGet('wakeM',0));
        }
      });
    }
    setFeitos(lsGet('feitos',[]));
    setCicloNum(lsGet('cicloNum',1));
    setHoras(lsGet('horas',[]));
    setMit(lsGet('mit',[]));
    setWakeH(lsGet('wakeH',10));
    setWakeM(lsGet('wakeM',0));
    const tick=setInterval(()=>setClock(new Date()),1000);
    return()=>clearInterval(tick);
  },[]);

  // Computados
  const feitosSet=useMemo(()=>new Set(feitos),[feitos]);
  const pendentes=useMemo(()=>CICLO.filter(s=>!feitosSet.has(s.id)),[feitosSet]);
  const todayStart=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();},[clock.toDateString()]);
  const semStart=todayStart-6*86400000;
  const minHoje=useMemo(()=>horas.filter(e=>e.dt>=todayStart).reduce((s,e)=>s+e.min,0),[horas,todayStart]);
  const minSemana=useMemo(()=>horas.filter(e=>e.dt>=semStart).reduce((s,e)=>s+e.min,0),[horas,semStart]);

  const regsAtuais=useMemo(()=>lsGet('treino_regs',[]),[tab]);
  const diasSemTreinar=useMemo(()=>{
    const f=regsAtuais.filter(r=>r.feito&&r.dtMs);
    if(!f.length)return null;
    const ult=f.reduce((mx,r)=>r.dtMs>mx?r.dtMs:mx,0);
    const d=new Date();d.setHours(0,0,0,0);
    return Math.floor((d.getTime()-ult)/86400000);
  },[regsAtuais]);

  const appCtx={cicloNum,feitosN:feitos.length,N,pendentes,minHoje,minSemana};

  // Ações
  const concluir=id=>{
    const n=[...feitos,id];
    if(n.length>=N){
      lsSet('feitos',[]);lsSet('cicloNum',cicloNum+1);
      setFeitos([]);setCicloNum(c=>c+1);
      setTrofeu(true);setTimeout(()=>setTrofeu(false),4000);
    }else{lsSet('feitos',n);setFeitos(n);}
  };
  const irPara=idx=>{const ids=CICLO.slice(0,idx).map(s=>s.id);lsSet('feitos',ids);setFeitos(ids);setTab('hoje');};
  const addHoras=e=>{const n=[...horas,e];lsSet('horas',n);setHoras(n);};
  const saveMIT=itens=>{lsSet('mit',itens);setMit(itens);};
  const saveWake=(h,m)=>{setWakeH(h);setWakeM(m);lsSet('wakeH',h);lsSet('wakeM',m);};

  const pct=Math.round(feitos.length/N*100);
  const prox=pendentes[0];
  const corPrx=prox?.tag?.includes('TRIÂNGULO')?'#fbbf24':prox?.cor||'#fbbf24';

  const TABS=[{id:'ia',e:'🤖',l:'IA'},{id:'hoje',e:'🏠',l:'Hoje'},{id:'ciclo',e:'🔄',l:'Ciclo'},{id:'stats',e:'📊',l:'Stats'},{id:'revisao',e:'🧠',l:'Revisão'},{id:'agenda',e:'🗓️',l:'Agenda'},{id:'kaue',e:'👦',l:'Kauê'},{id:'comida',e:'🍽️',l:'Comida'},{id:'treino',e:'🏃',l:'Treino'},{id:'casa',e:'🏡',l:'Casa'}];

  const ativAlerta=diasSemTreinar!==null&&diasSemTreinar>=1;
  const chaveOK=getAK().startsWith('sk-ant');

  return(
    <div style={{minHeight:'100dvh',background:'#050a14',display:'flex',flexDirection:'column'}}>
      {/* ── HEADER ── */}
      <div style={{padding:'10px 14px 8px',background:'#07101f',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:'#fbbf24',letterSpacing:'1px'}}>RITY OS</div>
            <span style={{fontSize:8,fontWeight:800,letterSpacing:'2px',padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.1)',color:'rgba(251,191,36,.6)',border:'1px solid rgba(251,191,36,.2)',fontFamily:"'DM Mono',monospace"}}>TCE-RJ</span>
            <div title={syncSt==='ok'?'Nuvem OK':syncSt==='syncing'?'Sincronizando...':syncSt==='error'?'Erro de sync':'Offline'} style={{width:7,height:7,borderRadius:'50%',background:syncSt==='ok'?'#34d399':syncSt==='syncing'?'#fbbf24':syncSt==='error'?'#f87171':'#334155',transition:'background .4s',cursor:'default'}}/>
            {!chaveOK&&<span onClick={()=>setShowCfg(true)} style={{fontSize:8,padding:'2px 6px',borderRadius:3,background:'rgba(248,113,113,.12)',color:'#f87171',border:'1px solid rgba(248,113,113,.3)',cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>⚠️ SEM CHAVE IA</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:16,fontWeight:900,fontFamily:"'DM Mono',monospace",color:'#c8d0e0',lineHeight:1}}>{fH(clock)}</div>
              <div style={{fontSize:8,color:'#334155',lineHeight:1,marginTop:2}}>{fmtMin(minHoje)} hoje · {fmtMin(minSemana)}/sem</div>
            </div>
            <button id="btn-instalar" onClick={()=>window.instalarApp&&window.instalarApp()} style={{display:'none',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:8,border:'1px solid rgba(96,165,250,.4)',background:'rgba(96,165,250,.12)',color:'#60a5fa',fontSize:10,fontWeight:800,cursor:'pointer',fontFamily:"'DM Mono',monospace"}}>📲 Instalar</button>
            <button onClick={()=>setShowCfg(true)} style={{width:30,height:30,borderRadius:'50%',border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.04)',color:'#475569',fontSize:14,cursor:'pointer'}}>⚙️</button>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(96,165,250,.1)',color:'#60a5fa',fontFamily:"'DM Mono',monospace"}}>⏱ {fmtMin(minSemana)}</span>
            <span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:'rgba(251,191,36,.1)',color:'#fbbf24',fontFamily:"'DM Mono',monospace"}}>B{feitos.length}/{N}</span>
            {ativAlerta&&<span style={{fontSize:8,fontWeight:700,padding:'2px 6px',borderRadius:3,background:diasSemTreinar>=2?'rgba(248,113,113,.12)':'rgba(251,191,36,.1)',color:diasSemTreinar>=2?'#f87171':'#fbbf24',fontFamily:"'DM Mono',monospace",cursor:'pointer'}} onClick={()=>setTab('treino')}>{diasSemTreinar>=2?'🚨':'⚠️'} {diasSemTreinar}d s/treino</span>}
          </div>
          <span style={{fontSize:9,color:'#334155',fontFamily:"'DM Mono',monospace"}}>{pct}% · ciclo {cicloNum}</span>
        </div>
        <BarProg done={feitos.length} total={N} cor={corPrx} h={3}/>
      </div>

      {/* ── CONTEÚDO ── */}
      <div style={{flex:1,overflowY:'auto',padding:'14px 14px 0'}}>
        {tab==='ia'   &&<TabIA    appCtx={appCtx} onMIT={saveMIT}/>}
        {tab==='hoje' &&<TabHoje  pendentes={pendentes} mit={mit} onConcluir={concluir} onAddHoras={addHoras}/>}
        {tab==='ciclo'&&<TabCiclo feitos={feitos} cicloNum={cicloNum} onConcluir={concluir} onIrPara={irPara}/>}
        {tab==='stats'&&<TabStats horas={horas} onAddHoras={addHoras}/>}
        {tab==='revisao'&&<TabRevisao/>}
        {tab==='agenda'&&<TabAgenda/>}
        {tab==='kaue' &&<TabKaue  wakeH={wakeH} wakeM={wakeM} onSaveWake={saveWake}/>}
        {tab==='comida'&&<TabComida/>}
        {tab==='treino'&&<TabTreino/>}
        {tab==='casa' &&<TabCasa/>}
        <div style={{height:72}}/>
      </div>

      {/* ── NAV BOTTOM ── */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#07101f',borderTop:'1px solid rgba(255,255,255,.07)',display:'flex',overflowX:'auto',scrollbarWidth:'none',zIndex:50}}>
        {TABS.map(t=>{
          const a=tab===t.id;
          const badge=(t.id==='treino'&&ativAlerta)?diasSemTreinar:0;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,minWidth:46,padding:'8px 2px 6px',border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
              {badge>0&&<div style={{position:'absolute',top:4,right:'12%',width:14,height:14,borderRadius:'50%',background:diasSemTreinar>=2?'#f87171':'#fbbf24',display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,color:'#050a14',fontWeight:900}}>{badge}</div>}
              <span style={{fontSize:a?18:16,transition:'font-size .15s'}}>{t.e}</span>
              <span style={{fontSize:8,fontFamily:"'DM Mono',monospace",fontWeight:a?800:400,color:a?'#fbbf24':'#334155',transition:'color .15s'}}>{t.l}</span>
              {a&&<div style={{position:'absolute',top:0,left:'15%',right:'15%',height:2,borderRadius:1,background:'#fbbf24'}}/>}
            </button>
          );
        })}
      </div>

      {/* ── TROFÉU ── */}
      {trofeu&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,flexDirection:'column',gap:16}} onClick={()=>setTrofeu(false)}>
          <div style={{fontSize:64}}>🏆</div>
          <div style={{fontFamily:"'DM Serif Display',serif",color:'#fbbf24',fontSize:26,textAlign:'center'}}>Ciclo {cicloNum-1} completo!</div>
          <div style={{fontSize:13,color:'#64748b'}}>Iniciando ciclo {cicloNum}...</div>
        </div>
      )}

      {/* ── CONFIG ── */}
      {showCfg&&<ModalConfig fechar={()=>setShowCfg(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
<script>
// ── PWA: Registrar Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(()=>console.log('SW registrado'))
      .catch(e=>console.warn('SW falhou:',e));
  });
}

// ── PWA: Botão "Instalar app" ──
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  _deferredPrompt=e;
  // Mostrar botão instalar se existir
  const btn=document.getElementById('btn-instalar');
  if(btn)btn.style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  _deferredPrompt=null;
  const btn=document.getElementById('btn-instalar');
  if(btn)btn.style.display='none';
});
window.instalarApp=async()=>{
  if(!_deferredPrompt)return;
  _deferredPrompt.prompt();
  const{outcome}=await _deferredPrompt.userChoice;
  _deferredPrompt=null;
  const btn=document.getElementById('btn-instalar');
  if(btn)btn.style.display='none';
};
</script>

<script>
// ── SERVICE WORKER (PWA offline) ──────────────────────────────
if('serviceWorker' in navigator){
  const swCode = `
const CACHE = 'rity-os-v4';
const ASSETS = [
  self.registration.scope,
  'https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;600;700&display=swap',
  'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js'
];
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(cache => cache.addAll(ASSETS).catch(()=>{}))
  );
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => cached))
  );
});
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
